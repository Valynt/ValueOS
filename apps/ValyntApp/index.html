<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ValueOS - Build defensible ROI models and value cases for enterprise sales. Quantify business impact, accelerate deals, and prove value." />
    <meta name="theme-color" content="#2563eb" />
    <meta property="og:title" content="ValueOS - Value Engineering Platform" />
    <meta property="og:description" content="Build defensible ROI models and value cases for enterprise sales." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>ValueOS - Value Engineering Platform</title>
    <style>
      .loading-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
      }
      .loading-fallback.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-fallback" id="loading-fallback">
        <div>Loading...</div>
      </div>
    </div>
    <script>
      window.onerror = function (msg, url, line, col, error) {
        document.getElementById("loading-fallback").innerHTML =
          '<div style="color:red;padding:20px;max-width:600px;">' +
          "<h2>Startup Error</h2>" +
          "<p>" +
          msg +
          "</p>" +
          "<p>File: " +
          url +
          ":" +
          line +
          "</p>" +
          "</div>";
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
