# Prometheus Configuration for Local Development
# Prometheus is a time-series database for metrics collection

global:
  # How frequently to scrape targets
  scrape_interval: 15s
  # How long to wait before timing out a scrape
  scrape_timeout: 10s
  # How frequently to evaluate alerting rules
  evaluation_interval: 15s
  # Attach these labels to all time series
  external_labels:
    cluster: "local"
    environment: "development"

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# Load alerting rules from files
# rule_files:
#   - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ValueOS Application
  # Assumes your app exposes metrics on port 8080 at /metrics
  - job_name: "valueos-app"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "valueos"
          component: "application"
    metrics_path: "/metrics"
    # Scrape more frequently for the app
    scrape_interval: 10s

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
          component: "observability"
    metrics_path: "/metrics"

  # Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: "tempo"
          component: "observability"
    metrics_path: "/metrics"

  # Grafana metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
          component: "observability"
    metrics_path: "/metrics"

# Storage configuration
# Retention period for metrics (default: 15 days)
# Can be overridden with --storage.tsdb.retention.time flag
