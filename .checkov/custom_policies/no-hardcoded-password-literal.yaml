metadata:
  id: "CKV2_CUSTOM_001"
  name: "Disallow hardcoded password literals in Terraform resources"
  category: "SECRETS"
  severity: "HIGH"
definition:
  and:
    - cond_type: "attribute"
      resource_types:
        - "*"
      attribute: "password"
      operator: "exists"
    - cond_type: "attribute"
      resource_types:
        - "*"
      attribute: "password"
      operator: "not_regex_match"
      value: "^(var\\.|data\\.|local\\.|module\\.|random_password\\.)"
