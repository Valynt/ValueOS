<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ValueOS - Maintenance Mode</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
      }

      .maintenance-container {
        background: white;
        border-radius: 16px;
        padding: 3rem;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .maintenance-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s infinite;
      }

      .maintenance-icon::before {
        content: "🔧";
        font-size: 2rem;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }

      h1 {
        color: #333;
        margin-bottom: 1rem;
        font-size: 2rem;
        font-weight: 600;
      }

      .message {
        color: #666;
        line-height: 1.6;
        margin-bottom: 2rem;
        font-size: 1.1rem;
      }

      .status-info {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        border-left: 4px solid #667eea;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      .status-item:last-child {
        margin-bottom: 0;
      }

      .status-label {
        color: #666;
      }

      .status-value {
        font-weight: 600;
        color: #333;
      }

      .refresh-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .refresh-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .refresh-button:active {
        transform: translateY(0);
      }

      .countdown {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #666;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #999;
      }

      @media (max-width: 480px) {
        .maintenance-container {
          padding: 2rem 1.5rem;
        }

        h1 {
          font-size: 1.5rem;
        }

        .message {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="maintenance-container">
      <div class="maintenance-icon"></div>
      <h1>System Maintenance</h1>
      <p class="message">
        ValueOS is currently undergoing scheduled maintenance to improve performance and security.
        We'll be back online shortly.
      </p>

      <div class="status-info">
        <div class="status-item">
          <span class="status-label">Status:</span>
          <span class="status-value">Maintenance Mode</span>
        </div>
        <div class="status-item">
          <span class="status-label">Started:</span>
          <span class="status-value" id="start-time">--</span>
        </div>
        <div class="status-item">
          <span class="status-label">Estimated Duration:</span>
          <span class="status-value">15-30 minutes</span>
        </div>
      </div>

      <button class="refresh-button" onclick="location.reload()">Check Status</button>

      <div class="countdown">Auto-refreshing in <span id="countdown">30</span> seconds...</div>

      <div class="footer">© 2026 ValueOS. High-Availability Frontend Service</div>
    </div>

    <script>
      // Set start time
      document.getElementById("start-time").textContent = new Date().toLocaleString();

      // Countdown timer
      let countdown = 30;
      const countdownElement = document.getElementById("countdown");

      const timer = setInterval(() => {
        countdown--;
        countdownElement.textContent = countdown;

        if (countdown <= 0) {
          clearInterval(timer);
          location.reload();
        }
      }, 1000);

      // Auto-refresh every 30 seconds
      setTimeout(() => {
        location.reload();
      }, 30000);
    </script>
  </body>
</html>
