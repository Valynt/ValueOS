<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - ValueOS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #333;
      }

      .error-container {
        background: white;
        border-radius: 12px;
        padding: 3rem;
        max-width: 450px;
        width: 90%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .error-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      h1 {
        color: #333;
        margin-bottom: 1rem;
        font-size: 1.8rem;
        font-weight: 600;
      }

      .error-code {
        color: #667eea;
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 1rem;
        font-family: "Courier New", monospace;
      }

      .message {
        color: #666;
        line-height: 1.6;
        margin-bottom: 2rem;
        font-size: 1rem;
      }

      .search-box {
        margin-bottom: 2rem;
      }

      .search-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s;
      }

      .search-input:focus {
        outline: none;
        border-color: #667eea;
      }

      .actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-secondary {
        background: #6c757d;
        color: white;
      }

      .btn-secondary:hover {
        background: #545b62;
        transform: translateY(-1px);
      }

      .suggestions {
        margin-top: 2rem;
        text-align: left;
      }

      .suggestions h3 {
        color: #333;
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }

      .suggestion-list {
        list-style: none;
      }

      .suggestion-list li {
        margin-bottom: 0.5rem;
      }

      .suggestion-list a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.2s;
      }

      .suggestion-list a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #999;
      }

      @media (max-width: 480px) {
        .error-container {
          padding: 2rem 1.5rem;
        }

        h1 {
          font-size: 1.5rem;
        }

        .error-code {
          font-size: 2.5rem;
        }

        .actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-icon">🔍</div>
      <h1>Page Not Found</h1>
      <div class="error-code">404</div>
      <p class="message">
        The page you're looking for doesn't exist or has been moved. Let's help you find what you
        need.
      </p>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          placeholder="Search for what you need..."
          onkeypress="if (event.key === 'Enter') handleSearch();"
        />
      </div>

      <div class="actions">
        <a href="/" class="btn btn-primary"> 🏠 Go Home </a>
        <button class="btn btn-secondary" onclick="history.back()">⬅️ Go Back</button>
      </div>

      <div class="suggestions">
        <h3>Popular Destinations:</h3>
        <ul class="suggestion-list">
          <li><a href="/">🏠 Dashboard</a></li>
          <li><a href="/agents">🤖 Agent Management</a></li>
          <li><a href="/analytics">📊 Analytics</a></li>
          <li><a href="/settings">⚙️ Settings</a></li>
        </ul>
      </div>

      <div class="footer">
        Error ID: 404-<span id="timestamp"></span> | © 2026 ValueOS High-Availability System
      </div>
    </div>

    <script>
      // Add timestamp for error tracking
      document.getElementById("timestamp").textContent = Date.now();

      function handleSearch() {
        const searchInput = document.querySelector(".search-input");
        const query = searchInput.value.trim();
        if (query) {
          // Redirect to search results or handle search
          window.location.href = `/search?q=${encodeURIComponent(query)}`;
        }
      }

      // Focus search input
      document.querySelector(".search-input").focus();
    </script>
  </body>
</html>
