version: "3.8"
services:
  migrator:
    image: postgres:16
    env_file: .env
    working_dir: /work
    volumes:
      - ./:/work
    entrypoint: ["/bin/bash","-lc"]
    command: >
      export PGSSLMODE=${PGSSLMODE:-require} &&
      for f in $(ls -1 ${MIGRATIONS_DIR}/*.sql | sort); do
        echo Applying $f;
        psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f";
      done
