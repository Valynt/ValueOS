# Gitleaks configuration for ValueOS
# https://github.com/gitleaks/gitleaks

title = "ValueOS Gitleaks Config"

[extend]
useDefault = true

# Custom rules for project-specific secret patterns
[[rules]]
id = "stripe-secret-key"
description = "Stripe secret key"
regex = '''sk_live_[0-9a-zA-Z]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe webhook secret"
regex = '''whsec_[0-9a-zA-Z]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[0-9a-zA-Z]{20,}'''
tags = ["openai", "secret"]

[[rules]]
id = "together-api-key"
description = "Together AI API key"
regex = '''together_[0-9a-zA-Z]{20,}'''
tags = ["together", "secret"]

[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service_role JWT embedded in source"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]{30,}\.[A-Za-z0-9_-]{20,}'''
tags = ["supabase", "jwt", "secret"]
[rules.allowlist]
# Allow well-known supabase-demo anon keys used for local dev
regexes = ['''eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24i''']

[allowlist]
description = "Global allowlist"
paths = [
  '''.env\.example$''',
  '''.env\.ports\.example$''',
  '''.env\.ports$''',
  '''tests/fixtures/''',
  '''tests/test/mocks/''',
  '''\.gitleaks\.toml$''',
  '''pnpm-lock\.yaml$''',
  '''scripts/setup-test-environment\.sh$''',
  '''\.windsurf/workflows/''',
  '''docs/security-compliance/''',
  '''DEPLOY\.md$''',
  '''scripts/dx/doctor\.js$''',
  '''packages/backend/benchmarks/''',
]
