# Gitleaks configuration for ValueOS
# https://github.com/gitleaks/gitleaks

title = "ValueOS Gitleaks Config"

[extend]
useDefault = true

# ── Custom rules ──────────────────────────────────────────────────────────────

[[rules]]
id = "stripe-secret-key"
description = "Stripe secret key"
regex = '''sk_live_[0-9a-zA-Z]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe webhook secret"
regex = '''whsec_[0-9a-zA-Z]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[0-9a-zA-Z]{20,}'''
tags = ["openai", "secret"]

[[rules]]
id = "together-api-key"
description = "Together AI API key"
regex = '''together_[0-9a-zA-Z]{20,}'''
tags = ["together", "secret"]

[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service_role JWT embedded in source"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]{30,}\.[A-Za-z0-9_-]{20,}'''
tags = ["supabase", "jwt", "secret"]
[rules.allowlist]
# Well-known supabase-demo keys used for local dev (public, not real credentials)
# Well-known local compose service_role key (supabase/gotrue default, not a real project key)
# Well-known local compose anon key (supabase local default, not a real project key)
# Local test service_role JWT (issued by localhost:54321, not a real project)
regexes = [
  '''eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24i''',
  '''eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSI''',
  '''eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDY3NDU2MDA''',
  '''eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzA2NzQ1NjAw''',
  '''eyJpc3MiOiJodHRwOi8vMTI3LjAuMC4xOjU0MzIxL2F1dGgvdjEiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiZXhwIjoxOTgzODEyOTk2fQ''',
]

# ── Global allowlist ──────────────────────────────────────────────────────────

[allowlist]
description = "Global allowlist"

paths = [
  # Template / example files — values are intentionally blank or illustrative
  '''.env\.example$''',
  '''.env\.local\.example$''',
  '''.env\.ports\.example$''',
  '''.env\.ports$''',
  '''.env\.template$''',
  '''\.env\.template$''',

  # Test fixtures — fake/canary tokens used to verify scrubbing/redaction logic
  '''tests/fixtures/''',
  '''tests/test/mocks/''',
  '''tests/test/setup\.ts$''',
  '''tests/setup\.ts$''',
  '''test/setup\.ts$''',

  # Red-team canary token file — fake tokens used to test detection pipelines.
  # ROTATION NOTICE: if any token here matches a real credential that was ever
  # live, rotate that credential and record it in docs/security-compliance/secret-rotation-log.md
  '''scripts/red-team-canary-tokens\.ts$''',

  # Privacy scrubber tests — tokens are inputs to scrubbing assertions, not real secrets
  '''packages/backend/src/services/middleware/__tests__/PrivacyScrubber\.test\.ts$''',

  # MemorySystem tests — fake sk_live_ strings used to assert redaction behaviour
  '''packages/backend/src/lib/agent-fabric/__tests__/MemorySystem\.test\.ts$''',

  # UI placeholder — sk_live_abc123def456 is a display mask in the API key UI, not a real key
  '''apps/ValyntApp/src/views/SettingsPage\.tsx$''',

  # pnpm content-addressed store — binary/hashed package content, not source secrets
  '''\.pnpm-store/''',

  # This config file itself
  '''\.gitleaks\.toml$''',

  # Lockfile — contains package integrity hashes, not secrets
  '''pnpm-lock\.yaml$''',

  # Merged docs archive — historical deployment guides with example curl commands.
  # curl-auth-header hits are example Bearer tokens in documentation, not live credentials.
  '''docs_merged/''',
  '''docs/operations/deployment-guide\.md$''',

  # Infra archive directories — old devcontainer compose files.
  # Supabase JWTs in these files were local-dev demo keys; see rotation log.
  '''\.archive/''',
  '''archive/''',
  '''_valueos-dev-setup/''',
  '''modeling/value_drivers/''',

  # Terraform dev environment — password is a placeholder, not production.
  # Production credentials are managed via AWS Secrets Manager.
  '''infra/environments/dev/terraform/main\.tf$''',
  '''infrastructure/environments/dev/terraform/main\.tf$''',

  # Security test files that embed fake tokens as test inputs
  '''packages/backend/src/services/security/__tests__/''',
  '''packages/backend/src/runtime/context-store/__tests__/''',
  '''packages/backend/src/services/__tests__/LLMSanitizer\.test\.ts$''',
  '''packages/backend/src/services/billing/__tests__/webhook-idempotency\.test\.ts$''',
  '''packages/backend/src/__tests__/security_metrics_sanitization\.test\.ts$''',
  '''packages/backend/src/middleware/__tests__/''',
  '''tests/integration/security-flows\.test\.ts$''',

  # SecretValidator test — fake env values used to test validation logic, not real credentials
  '''packages/backend/src/config/secrets/__tests__/SecretValidator\.test\.ts$''',

  # docsContent.ts — "Authorization: Bearer YOUR_TOKEN" is a documentation placeholder
  '''packages/backend/src/api/docsContent\.ts$''',

  # Infra Supabase reports — generated completion summaries, not live config
  '''infra/supabase/FINAL_REPORT\.md$''',
  '''infra/supabase/COMPLETION_SUMMARY\.md$''',

  # .roo MCP config — API key placeholders, not real credentials
  '''\.roo/mcp\.json$''',

  # Dev setup scripts — JWT references are ${VAR} interpolations, not literal values
  '''scripts/dx/env-compiler\.js$''',
  '''scripts/setup-dev-env\.js$''',
  '''scripts/dev-setup\.sh$''',
  '''scripts/verify-golden-path\.sh$''',
  '''scripts/setup-dev-failsafe\.sh$''',
  '''scripts/setup-test-environment\.sh$''',

  # Docker frontend image — JWT_SECRET is an ARG/ENV reference, not a literal value
  '''infra/docker/Dockerfile\.frontend$''',

  # docker-compose files — all JWT/key values are ${VAR} interpolations, not literals
  '''docker-compose\.yml$''',
  '''\.devcontainer/docker-compose\.yml$''',
  '''\.devcontainer/docker-compose\.devcontainer\.yml$''',

  # ops env test template — example values for CI test environment setup
  '''ops/env/\.env\.test\.template$''',

  # Test secure storage helpers — fake keys used in storage unit tests
  '''apps/ValyntApp/src/lib/testSecureStorage''',

  # secrets-sync workflow — kubernetes Secret manifest is a template with no real values
  '''\.github/workflows/secrets-sync\.yml$''',

  # Legacy allowlist entries
  '''\.windsurf/workflows/''',
  '''docs/security-compliance/''',
  '''DEPLOY\.md$''',
  '''scripts/dx/doctor\.js$''',
  '''packages/backend/benchmarks/''',

  # Historical docs and reports — curl examples and placeholder tokens in documentation,
  # not live credentials. Real credentials from these paths have been rotated (see
  # docs/security-compliance/secret-scan-evidence.md TP-1 through TP-4).
  '''docs/deployment/''',
  '''docs/dev/''',
  '''docs/ops/''',
  '''docs/operations/''',
  '''docs/database/''',
  '''docs/portal/''',
  '''docs-backup-''',
  '''reports/''',
  '''OPERATION_FORTRESS''',
  '''PHASE1_COMPLETED\.md$''',
  '''TROUBLESHOOTING\.md$''',
  '''DATABASE_SETUP\.md$''',

  # devcontainer incident docs — contain redacted token values as part of the
  # incident response record. Real token (sbp_4d0537...) has been revoked (TP-4).
  '''\.devcontainer/SECURITY_INCIDENT_REPORT\.md$''',
  '''\.devcontainer/scripts/remove-secrets\.sh$''',
  '''\.devcontainer/SECRETS_MANAGEMENT\.md$''',
  '''\.devcontainer/IMPLEMENTATION_COMPLETE\.md$''',
  '''\.devcontainer/SUPABASE_TOKEN_REVOCATION_GUIDE\.md$''',
  '''\.devcontainer/REVIEW_SUMMARY\.md$''',
  '''\.devcontainer/WEEK1_IMPLEMENTATION_SUMMARY\.md$''',

  # Pre-commit hook self-test — AKIA1234567890ABCDEF is a synthetic key used to
  # verify the hook detects secrets. Not a real AWS credential (confirmed FP).
  '''\.devcontainer/scripts/install-git-hooks\.sh$''',

  # Migration SQL — curl examples in documentation content population script
  '''supabase/migrations/20251118120000_populate_documentation_content\.sql$''',

  # Devpod internal install script — synthetic key in install tooling
  '''\.devpod-internal/''',

  # Lint baseline files — JWT patterns in lint rule examples, not real credentials
  '''\.lint/''',

  # Additional false positive paths identified in full-history scan
  # All are test fixtures, documentation examples, or legacy source trees
  # that no longer exist in HEAD. Real credentials have been rotated (TP-1 to TP-4).
  '''src/security/__tests__/''',
  '''src/test/security/''',
  '''src/test/services/''',
  '''src/api/docs\.ts$''',
  '''verify_token\.js$''',
  '''dev-setup\.sh$''',
  '''\.env\.local\.bak$''',
  '''\.windsurf/plans/''',
  '''docs/development/''',
  '''docs/audits/''',
  '''docs/security/''',
  '''docs/DISASTER_RECOVERY_RUNBOOK\.md$''',
  '''ARCHITECTURE_CLARIFICATION\.md$''',
  '''infra/terraform/''',
  '''infrastructure/terraform/''',
  '''supabase/migrations/_archived/''',
  '''\.devcontainer/FINAL_ACTIONS_CHECKLIST\.md$''',
  '''mcp-dashboard/src/pages/APIManagement\.tsx$''',
  '''packages/agents/evaluation/__tests__/''',
  '''packages/shared/src/lib/supabase-factory\.ts$''',
  # webhook-security test — whsec_test_secret is a synthetic fixture value
  '''apps/ValyntApp/src/api/__tests__/webhook-security\.test\.ts$''',
]
