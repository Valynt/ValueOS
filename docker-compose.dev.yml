version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-dev
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    environment:
      DEV_DOMAIN: ${DEV_DOMAIN:-localhost}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:${VITE_PORT:-5173}}
      CADDY_ADMIN: ${CADDY_ADMIN:-0.0.0.0:${CADDY_ADMIN_PORT:-2019}}
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-DEBUG}
      AUTO_HTTPS: ${AUTO_HTTPS:-off}
    volumes:
      - ./infra/caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile.dev", "--adapter", "caddyfile"]
    networks:
      - valueos
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--spider", "https://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: valueos-frontend-dev
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "npm ci --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173} --strictPort --hmr-port ${VITE_HMR_PORT:-24678}",
      ]
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: /api
      VITE_APP_URL: https://${DEV_DOMAIN:-localhost}:${CADDY_HTTPS_PORT:-8443}
      VITE_HMR_HOST: ${DEV_DOMAIN:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
    volumes:
      - ./:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "${VITE_PORT:-5173}:5173"
      - "${VITE_HMR_PORT:-24678}:24678"
    networks:
      - valueos
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:${VITE_PORT:-5173}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  backend:
    image: node:20-alpine
    container_name: valueos-backend-dev
    working_dir: /app
    command: ["sh", "-c", "npm ci --legacy-peer-deps && npm run backend:dev"]
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      CORS_ALLOWED_ORIGINS: https://${DEV_DOMAIN:-localhost}:${CADDY_HTTPS_PORT:-8443},http://localhost:${VITE_PORT:-5173}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:dev_password@postgres:${POSTGRES_PORT:-5432}/valuecanvas_dev
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
    env_file:
      - .env.ports
      - .env.local
    volumes:
      - ./:/app
      - backend-node-modules:/app/node_modules
    expose:
      - "${API_PORT:-3001}"
    networks:
      - valueos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${API_PORT:-3001}/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    container_name: valueos-postgres-dev
    environment:
      POSTGRES_DB: valuecanvas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos

  redis:
    image: redis:7-alpine
    container_name: valueos-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - valueos

networks:
  valueos:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
  postgres-data:
  redis-data:
  frontend-node-modules:
  backend-node-modules:
