apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: valueos
  description: >-
    AI-powered value engineering platform for B2B SaaS with multi-agent
    orchestration, a React frontend, and a tenant-isolated Express API.
  tags:
    - typescript
    - monorepo
    - react
    - express
    - supabase
    - ai-agents
    - internal
  links:
    - url: https://app.valueos.com
      title: Production Application
    - url: https://github.com/Valynt/ValueOS/blob/main/docs/operations/incident-response.md
      title: Incident Response Playbook
      icon: docs
    - url: https://github.com/Valynt/ValueOS/blob/main/docs/operations/runbooks/deployment-runbook.md
      title: Deployment Runbook
      icon: docs
    - url: https://github.com/Valynt/ValueOS/blob/main/docs/runbooks/disaster-recovery.md
      title: Disaster Recovery Runbook
      icon: docs
  annotations:
    github.com/project-slug: Valynt/ValueOS
spec:
  type: service
  lifecycle: production
  owner: team:platform-engineering
  system: valueos-platform
  dependsOn:
    - resource:supabase-postgres
    - resource:redis

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: valueos-platform
  description: Canonical ValueOS platform system spanning application, data, security, and observability controls.
spec:
  owner: team:platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-engineering
  description: Platform engineering team accountable for ValueOS runtime ownership, deployment controls, and operational governance.
spec:
  type: team
  profile:
    displayName: Platform Engineering
    email: platform-leadership@valueos.com
  children: []
