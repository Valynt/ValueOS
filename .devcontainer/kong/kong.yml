_format_version: "2.1"
_transform: true

###############################################################################
# Kong Declarative Config for Supabase Local Stack
# Routes all Supabase services through the Kong gateway
###############################################################################

services:
  # Auth Service (GoTrue)
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-supabase-api-version
          credentials: true
          max_age: 3600

  # REST Service (PostgREST)
  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - Prefer
            - Range
          credentials: true
          max_age: 3600

  # Realtime Service
  - name: realtime-service
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"

  # Storage Service
  - name: storage-service
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - upload-length
            - upload-offset
            - tus-resumable
            - upload-metadata
          credentials: true
          max_age: 3600

  # Meta Service (for Studio)
  - name: meta-service
    url: http://meta:8080
    routes:
      - name: meta-route
        paths:
          - /pg
        strip_path: true
