name: valueos-devcontainer-auth-stub

services:
  auth:
    image: curlimages/curl:8.5.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 10s
      timeout: 5s
      retries: 1
    networks:
      - valueos-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 1
    networks:
      - valueos-network

  kong:
    image: nginx:1.25-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD-SHELL", "echo OK"]
      interval: 10s
      timeout: 5s
      retries: 1
