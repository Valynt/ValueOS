# Canonical devcontainer compose entrypoint.
# Always run with root .env.ports for deterministic port mappings:
#   docker compose --env-file .env.ports -f .devcontainer/docker-compose.devcontainer.yml <cmd>
#
# NOTE: Docker Compose expands ${...} from the shell or a `.env` file *before*
# reading service `env_file`. If you see a failure like:
#   required variable SUPABASE_SERVICE_ROLE_KEY is missing a value
# create a project-level `.env` so Compose can interpolate variables, e.g.:
#   cp ops/env/.env.local .env
# or run the helper:
#   bash .devcontainer/scripts/ensure-dotenv.sh
# (You can also run Compose with `--env-file ops/env/.env.local`.)

include:
  - ../docker-compose.yml
  - ../ops/compose/profiles/devcontainer.yml
