version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.optimized
      args:
        NODE_VERSION: "20"
        VARIANT: "ubuntu-22.04"
    volumes:
      - ..:/workspaces/valuecanvas:cached
    command: /bin/sh -c "while sleep 1000; do :; done"
    init: true
    networks:
      - valueos-network
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DB_HOST: postgres

networks:
  valueos-network:
    name: valueos-network
