# Unified docker-compose.yml for ValueOS with internal networks and Caddy reverse proxy
# Aligned with Pragmatic Reproducibility framework

x-common:
  &common
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

x-network:
  &network
    networks:
      - internal
      - caddy-proxy

networks:
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
  caddy-proxy:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.21.0.0/16

services:
  # Development service
  dev:
    &common
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.optimized
      args:
        NODE_VERSION: "22.11.0"
        APP: "ValyntApp"
    volumes:
      - ..:/workspaces/ValueOS:cached
      - pnpm-store:/home/vscode/.local/share/pnpm
      - node_modules:/workspaces/ValueOS/node_modules
    working_dir: /workspaces/ValueOS
    command: sleep infinity
    network_mode: service:caddy
    environment:
      - NODE_ENV=development
      - ENVIRONMENT=development
      - CONTAINER=true
      - VALUEOS_DEV_MODE=devcontainer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      caddy:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dev.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.dev.service=dev"
      - "traefik.http.services.dev.loadbalancer.server.port=3001"

  # PostgreSQL database
  postgres:
    &common
    &network
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: valueos_dev
      POSTGRES_USER: valueos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valueos -d valueos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis cache
  redis:
    &common
    &network
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-valueos_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Caddy reverse proxy
  caddy:
    &common
    image: caddy:2-alpine
    volumes:
      - ./infra/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "2015:2015"
    networks:
      - caddy-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2015/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Supabase services
  supabase:
    &common
    &network
    image: supabase/supabase:1.200.3
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      POSTGRES_USER: valueos
      POSTGRES_DB: valueos_dev
      JWT_SECRET: ${JWT_SECRET:-supabase_dev_secret}
      ANON_KEY: ${ANON_KEY:-supabase_dev_anon}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-supabase_dev_service}
      DB_CONNECTION_RETRIES: 10
    volumes:
      - supabase_data:/supabase
    ports:
      - "54321:54321"
      - "54323:54323"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54321/rest/v1/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Kong API Gateway
  kong:
    &common
    &network
    image: kong:3.4-alpine
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/etc/kong/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    networks:
      - caddy-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  supabase_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  pnpm-store:
    driver: local
  node_modules:
    driver: local
