# Unified docker-compose.yml for ValueOS with internal networks and Caddy reverse proxy
# Aligned with Pragmatic Reproducibility framework
# Includes local Supabase services for development

x-common: &common
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

x-network: &network
  networks:
    - internal
    - caddy-proxy

x-supabase-env: &supabase-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: valueos_dev
  POSTGRES_USER: valueos
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
  JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
  ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
  SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}

networks:
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
  caddy-proxy:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.21.0.0/16

services:
  # Development service
  app:
    <<: *common
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
      args:
        NODE_VERSION: "20"
    volumes:
      - ..:/workspaces/ValueOS:cached
    working_dir: /workspaces/ValueOS/apps/ValyntApp
    command: sleep infinity
    network_mode: service:postgres

  # PostgreSQL database
  postgres:
    <<: *common
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: valueos_dev
      POSTGRES_USER: valueos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valueos -d valueos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis cache
  redis:
    <<: *common
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-valueos_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  # Caddy reverse proxy
  caddy:
    <<: *common
    image: caddy:2-alpine
    volumes:
      - ./infra/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "2015:2015"
    networks:
      - caddy-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2015/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Supabase core services for local development
  auth:
    image: supabase/gotrue:v2.185.0
    restart: unless-stopped
    environment:
      GOTRUE_DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: valueos_dev
      DB_USER: valueos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      SITE_URL: http://localhost:3000
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_API_URL: http://localhost:9999
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_SMTP_HOST: mailhog
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: "ValueOS"
      GOTRUE_SMTP_SENDER_EMAIL: "noreply@valueos.local"
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "9999:9999"

  rest:
    image: supabase/postgrest:v10.1.0
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://valueos:${POSTGRES_PASSWORD:-valueos_dev}@postgres:5432/valueos_dev
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "3000:3000"

  realtime:
    image: supabase/realtime:v2.24.0
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: valueos_dev
      DB_USER: valueos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "4000:4000"

  storage:
    image: supabase/storage-api:v0.43.0
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: valueos_dev
      POSTGRES_USER: valueos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "5000:5000"

  studio:
    image: supabase/studio:2026.01.27-sha-6aa59ff
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: valueos_dev
      POSTGRES_USER: valueos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valueos_dev}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}
    depends_on:
      - postgres
    networks:
      - internal
    ports:
      - "54323:54323"

  # Kong API Gateway
  kong:
    <<: *common
    image: kong:3.4-alpine
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/etc/kong/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    networks:
      - caddy-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  pnpm-store:
    driver: local
  node_modules:
    driver: local
