        - name: unreadOnly
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items: { type: object }
                  unreadCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/notifications/{notificationId}/read:
    post:
      tags: [Notifications]
      summary: Mark notification as read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Notification marked as read }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: All notifications marked as read }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/cases/{caseId}/checkpoints:
    get:
      tags: [Checkpoints]
      summary: List workflow checkpoints for a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Checkpoint list
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Checkpoints]
      summary: Create a checkpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: { type: string }
                metadata: { type: object }
      responses:
        "201": { description: Checkpoint created }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/cases/{caseId}/checkpoints/{checkpointId}/restore:
    post:
      tags: [Checkpoints]
      summary: Restore case to a checkpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: checkpointId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Case restored to checkpoint }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/documents:
    get:
      tags: [Documents]
      summary: List documents attached to a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Document list }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Documents]
      summary: Upload a document to a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                label: { type: string }
      responses:
        "201": { description: Document uploaded }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/cases/{caseId}/documents/{documentId}:
    delete:
      tags: [Documents]
      summary: Remove a document from a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: documentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Document removed }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/approvals:
    get:
      tags: [Approvals]
      summary: List approval requests for a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Approval requests }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Approvals]
      summary: Submit a case for approval
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approvers: { type: array, items: { type: string } }
                message: { type: string }
      responses:
        "201": { description: Approval request created }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/cases/{caseId}/approvals/{approvalId}/approve:
    post:
      tags: [Approvals]
      summary: Approve a case
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: approvalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        "200": { description: Case approved }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/approvals/{approvalId}/reject:
    post:
      tags: [Approvals]
      summary: Reject a case approval
      security: [{ bearerAuth: [] }]
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: approvalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { description: Approval rejected }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/compliance/controls:
    get:
      tags: [Compliance]
      summary: List compliance controls
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Compliance controls }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/compliance/evidence:
    get:
      tags: [Compliance]
      summary: List compliance evidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: query
          schema: { type: string }
      responses:
        "200": { description: Evidence list }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Compliance]
      summary: Submit compliance evidence
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controlId, evidenceType, content]
              properties:
                controlId: { type: string }
                evidenceType: { type: string }
                content: { type: string }
      responses:
        "201": { description: Evidence submitted }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/compliance/score:
    get:
      tags: [Compliance]
      summary: Get compliance score for the tenant
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Compliance score
          content:
            application/json:
              schema:
                type: object
                properties:
                  score: { type: number, minimum: 0, maximum: 100 }
                  breakdown: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---------------------------------------------------------------------------
  # Value Graph — Sprint 49
  # ---------------------------------------------------------------------------

  /api/v1/cases/{caseId}/graph:
    get:
      summary: Get full Value Graph for a case
      description: Returns all nodes and edges in the Value Graph for the given case.
      operationId: getValueGraph
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Full graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/ValueGraph"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/graph/paths:
    get:
      summary: Get ordered value paths for a case
      description: Returns traversable paths from use cases through capabilities and metrics to value drivers, ordered by path_confidence descending.
      operationId: getValueGraphPaths
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Ordered value paths
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValuePath"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/graph/nodes:
    get:
      summary: Get all graph nodes for a case
      description: Returns all nodes. Use the optional `type` query parameter to filter by entity type.
      operationId: getValueGraphNodes
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ValueGraphEntityType"
          description: Filter nodes by entity type
      responses:
        "200":
          description: Graph nodes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValueGraphNode"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/graph/nodes/{nodeId}:
    get:
      summary: Get a single graph node by entity ID
      operationId: getValueGraphNode
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Graph node
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/ValueGraphNode"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/cases/{caseId}/graph/edges:
    get:
      summary: Get all graph edges for a case
      description: Returns all edges. Use the optional `edge_type` query parameter to filter.
      operationId: getValueGraphEdges
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - name: edge_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ValueGraphEdgeType"
          description: Filter edges by type
      responses:
        "200":
          description: Graph edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValueGraphEdge"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

    post:
      summary: Create a graph edge manually
      description: |
        Creates a typed edge between two graph entities. The (from_entity_type, edge_type,
        to_entity_type) triple is validated against the canonical EDGE_TYPE_CONSTRAINTS
        allowlist. Returns 422 if the triple is invalid.
      operationId: createValueGraphEdge
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_entity_type
                - from_entity_id
                - to_entity_type
                - to_entity_id
                - edge_type
              properties:
                from_entity_type:
                  $ref: "#/components/schemas/ValueGraphEntityType"
                from_entity_id:
                  type: string
                  format: uuid
                to_entity_type:
                  $ref: "#/components/schemas/ValueGraphEntityType"
                to_entity_id:
                  type: string
                  format: uuid
                edge_type:
                  $ref: "#/components/schemas/ValueGraphEdgeType"
                confidence_score:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.5
                evidence_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  default: []
                created_by_agent:
                  type: string
                  default: human
      responses:
        "201":
          description: Edge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: "#/components/schemas/ValueGraphEdge"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Edge triple violates EDGE_TYPE_CONSTRAINTS
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error:
                    type: object
                    properties:
                      message: { type: string }

  /api/v1/cases/{caseId}/graph/integrity:
    get:
      summary: Get Value Graph integrity gap report
      description: |
        Returns a gap report identifying hypothesis_claims_value_driver edges that have
        no evidence_supports_metric counterpart in the graph. Used by IntegrityAgent
        and the frontend to surface unverified claims.
      operationId: getValueGraphIntegrity
      tags: [ValueGraph]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Integrity gap report
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      gaps:
                        type: array
                        items:
                          type: object
                          properties:
                            hypothesis_entity_id: { type: string, format: uuid }
                            value_driver_entity_id: { type: string, format: uuid }
                            edge_id: { type: string, format: uuid }
                            gap_type:
                              type: string
                              enum: [no_evidence_supports_metric]
                      total_claims: { type: integer }
                      covered_claims: { type: integer }
                      gap_count: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 64
    CaseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        enum:
          - OpportunityAgent
          - TargetAgent
          - FinancialModelingAgent
          - IntegrityAgent
          - RealizationAgent
          - ExpansionAgent
          - NarrativeAgent
          - ComplianceAuditorAgent
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    # -------------------------------------------------------------------------
    # Value Graph (Sprint 49)
    # -------------------------------------------------------------------------
    ValueGraphEntityType:
      type: string
      enum:
        - account
        - stakeholder
        - use_case
        - vg_capability
        - vg_metric
        - vg_value_driver
        - evidence
        - value_hypothesis
        - narrative

    ValueGraphEdgeType:
      type: string
      enum:
        - company_has_persona
        - persona_executes_use_case
        - use_case_enabled_by_capability
        - capability_impacts_metric
        - metric_maps_to_value_driver
        - evidence_supports_metric
        - hypothesis_claims_value_driver
        - narrative_explains_hypothesis
        - target_quantifies_driver
        - realization_tracks_target
        - expansion_extends_node
        - audit_verifies_node

    ValueGraphNode:
      type: object
      required: [entity_type, entity_id, data]
      properties:
        entity_type:
          $ref: "#/components/schemas/ValueGraphEntityType"
        entity_id:
          type: string
          format: uuid
        data:
          type: object
          description: Entity-specific fields (VgCapability, VgMetric, VgValueDriver, etc.)

    ValueGraphEdge:
      type: object
      required:
        - id
        - organization_id
        - opportunity_id
        - from_entity_type
        - from_entity_id
        - to_entity_type
        - to_entity_id
        - edge_type
        - confidence_score
        - evidence_ids
        - created_by_agent
        - ontology_version
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        opportunity_id:
          type: string
          format: uuid
        from_entity_type:
          $ref: "#/components/schemas/ValueGraphEntityType"
        from_entity_id:
          type: string
          format: uuid
        to_entity_type:
          $ref: "#/components/schemas/ValueGraphEntityType"
        to_entity_id:
          type: string
          format: uuid
        edge_type:
          $ref: "#/components/schemas/ValueGraphEdgeType"
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        evidence_ids:
          type: array
          items:
            type: string
            format: uuid
        created_by_agent:
          type: string
        ontology_version:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ValueGraph:
      type: object
      required: [opportunity_id, organization_id, ontology_version, nodes, edges]
      properties:
        opportunity_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        ontology_version:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/ValueGraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/ValueGraphEdge"

    ValuePath:
      type: object
      required: [edges, path_confidence, value_driver, use_case_id, metrics, capabilities]
      properties:
        edges:
          type: array
          items:
            $ref: "#/components/schemas/ValueGraphEdge"
        path_confidence:
          type: number
          minimum: 0
          maximum: 1
        value_driver:
          type: object
          description: VgValueDriver entity at the end of the path
        use_case_id:
          type: string
          format: uuid
        metrics:
          type: array
          items:
            type: object
            description: VgMetric entities along the path
        capabilities:
          type: array
          items:
            type: object
            description: VgCapability entities along the path

    # -------------------------------------------------------------------------
    # Financial Model Snapshot (Sprint 45)
    # -------------------------------------------------------------------------
    FinancialModelSnapshot:
      type: object
      required: [id, case_id, organization_id, snapshot_version, created_at]
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        snapshot_version:
          type: integer
        roi:
          type: number
          description: Return on investment (ratio)
        npv:
          type: number
          description: Net present value (USD)
        payback_period_months:
          type: integer
        source_agent:
          type: string
        created_at:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Agent Execution Lineage (Sprint 45)
    # -------------------------------------------------------------------------
    AgentExecutionLineage:
      type: object
      required: [id, session_id, agent_name, organization_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        agent_name:
          type: string
        organization_id:
          type: string
          format: uuid
        memory_reads:
          type: array
          items:
            type: object
        tool_calls:
          type: array
          items:
            type: object
        db_writes:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Auth
    # -------------------------------------------------------------------------
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        organizationId:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, member, viewer]
        createdAt:
          type: string
          format: date-time

    Session:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          description: Unix timestamp (seconds)

    # -------------------------------------------------------------------------
    # Value Cases
    # -------------------------------------------------------------------------
    ValueCaseStage:
      type: string
      enum:
        - discovery
        - hypothesis
        - drafting
        - validating
        - composing
        - realization
        - expansion

    ValueCase:
      type: object
      required: [id, title, stage, organizationId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        stage:
          $ref: "#/components/schemas/ValueCaseStage"
        organizationId:
          type: string
          format: uuid
        qualityScore:
          type: number
          format: float
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ValueCaseCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        stage:
          $ref: "#/components/schemas/ValueCaseStage"

    ValueCaseUpdateRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        stage:
          $ref: "#/components/schemas/ValueCaseStage"

    ValueCaseEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ValueCase"

    ValueCaseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, page, pageSize, total]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ValueCase"
            page:
              type: integer
              minimum: 1
            pageSize:
              type: integer
              minimum: 1
              maximum: 100
            total:
              type: integer
              minimum: 0

    HypothesisOutput:
      type: object
      required: [id, caseId, organizationId, hypotheses, createdAt]
      properties:
        id:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        hypotheses:
          type: array
          items:
            type: object
        kpis:
          type: array
          items:
            type: object
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        reasoning:
          type: string
          nullable: true
        hallucinationCheck:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    IntegrityOutput:
      type: object
      required: [id, valueCaseId, organizationId, vetoDecision, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        claims:
          type: array
          items:
            type: object
        vetoDecision:
          type: string
          enum: [pass, veto, re_refine]
          nullable: true
        overallScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
        hallucinationCheck:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    NarrativeDraft:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        content:
          type: string
          nullable: true
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    RealizationReport:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        milestones:
          type: array
          items:
            type: object
        risks:
          type: array
          items:
            type: object
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    ExpansionOpportunity:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Agents
    # -------------------------------------------------------------------------
    AgentInvokeRequest:
      type: object
      required: [sessionId, context]
      properties:
        sessionId:
          type: string
          format: uuid
        context:
          type: object
          description: LifecycleContext payload passed to the agent
        options:
          type: object
          properties:
            stream:
              type: boolean
              default: false
            timeoutMs:
              type: integer
              minimum: 1000
              maximum: 120000

    AgentResponse:
      type: object
      required: [agentId, status]
      properties:
        agentId:
          type: string
        status:
          type: string
          enum: [success, error, partial]
        output:
          type: object
          nullable: true
        jobId:
          type: string
          format: uuid
          nullable: true
          description: Present when the response is async
        hallucinationCheck:
          type: boolean
          nullable: true

    AgentInfo:
      type: object
      required: [agentId, name, lifecycleStage, version]
      properties:
        agentId:
          type: string
        name:
          type: string
        lifecycleStage:
          type: string
        version:
          type: string

    AgentJob:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, completed, failed]
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    # -------------------------------------------------------------------------
    # Value Commitments
    # -------------------------------------------------------------------------
    ValueCommitment:
      type: object
      required: [id, organizationId, title, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [draft, active, at_risk, completed, cancelled]
        targetValue:
          type: number
          nullable: true
        actualValue:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ValueCommitmentInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        targetValue:
          type: number
        currency:
          type: string
        dueDate:
          type: string
          format: date

    # -------------------------------------------------------------------------
    # LLM
    # -------------------------------------------------------------------------
    LLMChatRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
        model:
          type: string
          nullable: true
        maxTokens:
          type: integer
          minimum: 1
          maximum: 32000
          nullable: true
        temperature:
          type: number
          minimum: 0
          maximum: 2
          nullable: true
        stream:
          type: boolean
          default: false

    LLMChatResponse:
      type: object
      required: [content]
      properties:
        content:
          type: string
        model:
          type: string
        usage:
          type: object
          properties:
            promptTokens:
              type: integer
            completionTokens:
              type: integer
            totalTokens:
              type: integer

    # -------------------------------------------------------------------------
    # Projects
    # -------------------------------------------------------------------------
    ProjectStatus:
      type: string
      enum: ["planned", "active", "paused", "completed"]
    Project:
      type: object
      required:
        - id
        - name
        - status
        - tags
        - ownerId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: "proj_2b1b5d45-acde-4e2f-8c69-5efec4ff8c2c"
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: ["string", "null"]
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
    ProjectUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
    ProjectEnvelope:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Project"
    ProjectListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
    ProjectListEnvelope:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProjectListResponse"
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - requestId
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Invalid request body"
            requestId:
              type: string
              example: "req_7e3c1a5b4a"
            details:
              type: object
              additionalProperties: true

    # -------------------------------------------------------------------------
    # Auth schemas
    # -------------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "s3cr3t!"
        otpCode:
          type: string
          description: TOTP code when MFA is enabled
          example: "123456"

    SignupRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        fullName:
          type: string
          example: "Jane Smith"

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        user_metadata:
          type: object
          additionalProperties: true

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: integer
          description: Unix timestamp

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/AuthSession"

    SessionResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/AuthSession"

    # -------------------------------------------------------------------------
    # Value Case schemas
    # -------------------------------------------------------------------------
    ValueCaseStatus:
      type: string
      enum: [draft, active, archived]


    CreateValueCaseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: "#/components/schemas/ValueCaseStatus"

    UpdateValueCaseRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: "#/components/schemas/ValueCaseStatus"

    # -------------------------------------------------------------------------
    # Agent schemas
    # -------------------------------------------------------------------------
    AgentInvokeResponse:
      type: object
      properties:
        jobId:
          type: string
          description: Present when the job is queued asynchronously
        result:
          type: object
          additionalProperties: true
          description: Present when the result is returned synchronously
        status:
          type: string
          enum: [queued, completed, failed]

    AgentJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [waiting, active, completed, failed]
        result:
          type: object
          additionalProperties: true
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    AgentExecuteRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          maxLength: 200
          example: "OpportunityAgent:generateHypotheses"
          description: "AgentType:action"
        data:
          type: object
          additionalProperties: true
        sessionId:
          type: string
          maxLength: 100

    AgentExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validation:
              $ref: "#/components/examples/BadRequestExample"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            unauthorized:
              $ref: "#/components/examples/UnauthorizedExample"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            forbidden:
              $ref: "#/components/examples/ForbiddenExample"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            notFound:
              $ref: "#/components/examples/NotFoundExample"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            conflict:
              $ref: "#/components/examples/ConflictExample"
    RateLimited:
      description: Too Many Requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            rateLimited:
              $ref: "#/components/examples/RateLimitedExample"
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            internalError:
              $ref: "#/components/examples/InternalServerErrorExample"
  examples:
    BadRequestExample:
      value:
        error:
          code: "VALIDATION_ERROR"
          message: "Invalid request body"
          requestId: "req_7e3c1a5b4a"
          details:
            errors:
              - field: "name"
                message: "String must contain at least 2 character(s)"
    UnauthorizedExample:
      value:
        error:
          code: "UNAUTHORIZED"
          message: "Bearer token required"
          requestId: "req_7e3c1a5b4a"
    ForbiddenExample:
      value:
        error:
          code: "FORBIDDEN"
          message: "Insufficient permissions for this action"
          requestId: "req_7e3c1a5b4a"
    NotFoundExample:
      value:
        error:
          code: "NOT_FOUND"
          message: "Project not found: proj_123"
          requestId: "req_7e3c1a5b4a"
          details:
            resource: "Project"
            id: "proj_123"
    ConflictExample:
      value:
        error:
          code: "CONFLICT"
          message: "Project name already exists"
          requestId: "req_7e3c1a5b4a"
    RateLimitedExample:
      value:
        error:
          code: "RATE_LIMITED"
          message: "Rate limit exceeded"
          requestId: "req_7e3c1a5b4a"
          details:
            retryAfter: 60
    InternalServerErrorExample:
      value:
        error:
          code: "INTERNAL_ERROR"
          message: "An unexpected error occurred"
          requestId: "req_7e3c1a5b4a"

