        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Value Cases
  # ---------------------------------------------------------------------------
  /api/v1/cases:
    post:
      summary: Create a value case
      operationId: createValueCase
      tags: [Value Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateValueCaseRequest"
      responses:
        "201":
          description: Value case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      summary: List value cases for the tenant
      operationId: listValueCases
      tags: [Value Cases]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, archived]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of value cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/cases/{caseId}:
    parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get a value case by ID
      operationId: getValueCase
      tags: [Value Cases]
      responses:
        "200":
          description: Value case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a value case
      operationId: updateValueCase
      tags: [Value Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateValueCaseRequest"
      responses:
        "200":
          description: Updated value case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a value case
      operationId: deleteValueCase
      tags: [Value Cases]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/cases/{caseId}/hypothesis:
    parameters:
      - name: caseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get the latest hypothesis output for a case
      operationId: getCaseHypothesis
      tags: [Value Cases]
      responses:
        "200":
          description: Hypothesis output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HypothesisOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Agent Invocation
  # ---------------------------------------------------------------------------
  # Literal paths must precede parameterized paths to avoid ambiguity
  /api/v1/agents/execute:
    post:
      summary: Execute an agent action by type
      operationId: executeAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentExecuteRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentExecuteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/agents/jobs/{jobId}:
    get:
      summary: Poll an async agent job
      operationId: getAgentJob
      tags: [Agents]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status and result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentJobStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/agents/{agentId}/invoke:
    post:
      summary: Invoke an agent by ID
      operationId: invokeAgent
      tags: [Agents]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            example: opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInvokeRequest"
      responses:
        "200":
          description: Agent job queued or result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInvokeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Usage quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/agents/{agentId}/info:
    get:
      summary: Get agent metadata
      operationId: getAgentInfo
      tags: [Agents]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 64
    CaseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        enum:
          - OpportunityAgent
          - TargetAgent
          - FinancialModelingAgent
          - IntegrityAgent
          - RealizationAgent
          - ExpansionAgent
          - NarrativeAgent
          - ComplianceAuditorAgent
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    # -------------------------------------------------------------------------
    # Auth
    # -------------------------------------------------------------------------
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        organizationId:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, member, viewer]
        createdAt:
          type: string
          format: date-time

    Session:
      type: object
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: integer
          description: Unix timestamp (seconds)

    # -------------------------------------------------------------------------
    # Value Cases
    # -------------------------------------------------------------------------
    ValueCaseStage:
      type: string
      enum:
        - discovery
        - hypothesis
        - drafting
        - validating
        - composing
        - realization
        - expansion

    ValueCase:
      type: object
      required: [id, title, stage, organizationId, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        stage:
          $ref: "#/components/schemas/ValueCaseStage"
        organizationId:
          type: string
          format: uuid
        qualityScore:
          type: number
          format: float
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ValueCaseCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        stage:
          $ref: "#/components/schemas/ValueCaseStage"

    ValueCaseUpdateRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        stage:
          $ref: "#/components/schemas/ValueCaseStage"

    ValueCaseEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ValueCase"

    ValueCaseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, page, pageSize, total]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ValueCase"
            page:
              type: integer
              minimum: 1
            pageSize:
              type: integer
              minimum: 1
              maximum: 100
            total:
              type: integer
              minimum: 0

    HypothesisOutput:
      type: object
      required: [id, caseId, organizationId, hypotheses, createdAt]
      properties:
        id:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        hypotheses:
          type: array
          items:
            type: object
        kpis:
          type: array
          items:
            type: object
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        reasoning:
          type: string
          nullable: true
        hallucinationCheck:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    IntegrityOutput:
      type: object
      required: [id, valueCaseId, organizationId, vetoDecision, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        claims:
          type: array
          items:
            type: object
        vetoDecision:
          type: string
          enum: [pass, veto, re_refine]
          nullable: true
        overallScore:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
        hallucinationCheck:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    NarrativeDraft:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        content:
          type: string
          nullable: true
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    RealizationReport:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        milestones:
          type: array
          items:
            type: object
        risks:
          type: array
          items:
            type: object
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    ExpansionOpportunity:
      type: object
      required: [id, valueCaseId, organizationId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        valueCaseId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        confidence:
          type: string
          enum: [high, medium, low]
          nullable: true
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Agents
    # -------------------------------------------------------------------------
    AgentInvokeRequest:
      type: object
      required: [sessionId, context]
      properties:
        sessionId:
          type: string
          format: uuid
        context:
          type: object
          description: LifecycleContext payload passed to the agent
        options:
          type: object
          properties:
            stream:
              type: boolean
              default: false
            timeoutMs:
              type: integer
              minimum: 1000
              maximum: 120000

    AgentResponse:
      type: object
      required: [agentId, status]
      properties:
        agentId:
          type: string
        status:
          type: string
          enum: [success, error, partial]
        output:
          type: object
          nullable: true
        jobId:
          type: string
          format: uuid
          nullable: true
          description: Present when the response is async
        hallucinationCheck:
          type: boolean
          nullable: true

    AgentInfo:
      type: object
      required: [agentId, name, lifecycleStage, version]
      properties:
        agentId:
          type: string
        name:
          type: string
        lifecycleStage:
          type: string
        version:
          type: string

    AgentJob:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, completed, failed]
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    # -------------------------------------------------------------------------
    # LLM
    # -------------------------------------------------------------------------
    LLMChatRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
        model:
          type: string
          nullable: true
        maxTokens:
          type: integer
          minimum: 1
          maximum: 32000
          nullable: true
        temperature:
          type: number
          minimum: 0
          maximum: 2
          nullable: true
        stream:
          type: boolean
          default: false

    LLMChatResponse:
      type: object
      required: [content]
      properties:
        content:
          type: string
        model:
          type: string
        usage:
          type: object
          properties:
            promptTokens:
              type: integer
            completionTokens:
              type: integer
            totalTokens:
              type: integer

    # -------------------------------------------------------------------------
    # Projects
    # -------------------------------------------------------------------------
    ProjectStatus:
      type: string
      enum: ["planned", "active", "paused", "completed"]
    Project:
      type: object
      required:
        - id
        - name
        - status
        - tags
        - ownerId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: "proj_2b1b5d45-acde-4e2f-8c69-5efec4ff8c2c"
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: ["string", "null"]
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProjectCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
    ProjectUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: "#/components/schemas/ProjectStatus"
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 32
          maxItems: 20
    ProjectEnvelope:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Project"
    ProjectListResponse:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
    ProjectListEnvelope:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ProjectListResponse"
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - requestId
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "Invalid request body"
            requestId:
              type: string
              example: "req_7e3c1a5b4a"
            details:
              type: object
              additionalProperties: true

    # -------------------------------------------------------------------------
    # Auth schemas
    # -------------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "s3cr3t!"
        otpCode:
          type: string
          description: TOTP code when MFA is enabled
          example: "123456"

    SignupRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        fullName:
          type: string
          example: "Jane Smith"

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        user_metadata:
          type: object
          additionalProperties: true

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: integer
          description: Unix timestamp

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/AuthSession"

    SessionResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/AuthSession"

    # -------------------------------------------------------------------------
    # Value Case schemas
    # -------------------------------------------------------------------------
    ValueCaseStatus:
      type: string
      enum: [draft, active, archived]

    ValueCase:
      type: object
      required: [id, title, status, organization_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "Cloud Migration ROI"
        description:
          type: string
        status:
          $ref: "#/components/schemas/ValueCaseStatus"
        organization_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ValueCaseEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ValueCase"

    ValueCaseListEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ValueCase"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateValueCaseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: "#/components/schemas/ValueCaseStatus"

    UpdateValueCaseRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: "#/components/schemas/ValueCaseStatus"

    HypothesisOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        hypotheses:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              statement:
                type: string
              confidence:
                type: string
                enum: [high, medium, low]
              reasoning:
                type: string
        created_at:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Agent schemas
    # -------------------------------------------------------------------------
    AgentInvokeRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 2000
          example: "Generate value hypotheses for a cloud migration project"
        context:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
        sessionId:
          type: string
          maxLength: 100

    AgentInvokeResponse:
      type: object
      properties:
        jobId:
          type: string
          description: Present when the job is queued asynchronously
        result:
          type: object
          additionalProperties: true
          description: Present when the result is returned synchronously
        status:
          type: string
          enum: [queued, completed, failed]

    AgentInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        lifecycleStage:
          type: string
        version:
          type: string

    AgentJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [waiting, active, completed, failed]
        result:
          type: object
          additionalProperties: true
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    AgentExecuteRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          maxLength: 200
          example: "OpportunityAgent:generateHypotheses"
          description: "AgentType:action"
        data:
          type: object
          additionalProperties: true
        sessionId:
          type: string
          maxLength: 100

    AgentExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validation:
              $ref: "#/components/examples/BadRequestExample"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            unauthorized:
              $ref: "#/components/examples/UnauthorizedExample"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            forbidden:
              $ref: "#/components/examples/ForbiddenExample"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            notFound:
              $ref: "#/components/examples/NotFoundExample"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            conflict:
              $ref: "#/components/examples/ConflictExample"
    RateLimited:
      description: Too Many Requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            rateLimited:
              $ref: "#/components/examples/RateLimitedExample"
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            internalError:
              $ref: "#/components/examples/InternalServerErrorExample"
  examples:
    BadRequestExample:
      value:
        error:
          code: "VALIDATION_ERROR"
          message: "Invalid request body"
          requestId: "req_7e3c1a5b4a"
          details:
            errors:
              - field: "name"
                message: "String must contain at least 2 character(s)"
    UnauthorizedExample:
      value:
        error:
          code: "UNAUTHORIZED"
          message: "Bearer token required"
          requestId: "req_7e3c1a5b4a"
    ForbiddenExample:
      value:
        error:
          code: "FORBIDDEN"
          message: "Insufficient permissions for this action"
          requestId: "req_7e3c1a5b4a"
    NotFoundExample:
      value:
        error:
          code: "NOT_FOUND"
          message: "Project not found: proj_123"
          requestId: "req_7e3c1a5b4a"
          details:
            resource: "Project"
            id: "proj_123"
    ConflictExample:
      value:
        error:
          code: "CONFLICT"
          message: "Project name already exists"
          requestId: "req_7e3c1a5b4a"
    RateLimitedExample:
      value:
        error:
          code: "RATE_LIMITED"
          message: "Rate limit exceeded"
          requestId: "req_7e3c1a5b4a"
          details:
            retryAfter: 60
    InternalServerErrorExample:
      value:
        error:
          code: "INTERNAL_ERROR"
          message: "An unexpected error occurred"
          requestId: "req_7e3c1a5b4a"
