openapi: 3.1.0
info:
  title: ValueOS API
  version: 1.0.0
  contact:
    name: ValueOS Support
    email: support@valueos.com
    url: https://docs.valueos.com
  description: |
    OpenAPI specification for the ValueOS backend API.

    Canonical production base URL: https://api.valueos.com
    Canonical docs URL: https://docs.valueos.com
    Support: support@valueos.com

    All endpoints require a Bearer JWT unless marked as public.
    Every response uses a consistent envelope: `{ data }` on success,
    `{ error: { code, message, requestId } }` on failure.

    Tenant isolation is enforced server-side via RLS. Clients must not
    pass `organization_id` in request bodies — it is derived from the
    authenticated JWT.
servers:
  - url: https://api.valueos.com
    description: Production
  - url: http://localhost:3001
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication — login, signup, session management
  - name: Value Cases
    description: Value case lifecycle (create, read, update, delete)
  - name: Agents
    description: Agent invocation and job management
  - name: LLM
    description: LLM chat and proxy
  - name: Projects
    description: Project management
  - name: Admin
    description: Admin and tenant management endpoints (DLQ management, diagnostics)
  - name: Integrations
    description: CRM and enterprise integration connections
  - name: Compliance
    description: DSR (GDPR), compliance evidence, and audit
  - name: Analytics
    description: Value loop analytics and metrics
  - name: MCP
    description: Model Context Protocol discovery
paths:

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------

  /api/auth/login:
    post:
      summary: Log in with email and password
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                otpCode:
                  type: string
                  description: TOTP code when MFA is enabled
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  session:
                    $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/signup:
    post:
      summary: Create a new account
      operationId: signup
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                organizationName:
                  type: string
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  session:
                    $ref: "#/components/schemas/Session"
                    nullable: true
                    description: Null when email verification is required
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/logout:
    post:
      summary: Invalidate the current session
      operationId: logout
      tags: [Auth]
      responses:
        "204":
          description: Session invalidated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/session:
    get:
      summary: Get the current session
      operationId: getSession
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Current session or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                    nullable: true
                  session:
                    $ref: "#/components/schemas/Session"
                    nullable: true
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      summary: Refresh the access token
      operationId: refreshToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/password/reset:
    post:
      summary: Request a password reset email
      operationId: requestPasswordReset
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "204":
          description: Reset email sent (always 204 to prevent email enumeration)
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/password/update:
    post:
      summary: Update password using a reset token
      operationId: updatePassword
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        "204":
          description: Password updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Value Cases
  # ---------------------------------------------------------------------------

  /api/v1/cases:
    post:
      summary: Create a value case
      operationId: createValueCase
      tags: [Value Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValueCaseCreateRequest"
      responses:
        "201":
          description: Value case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: List value cases for the authenticated tenant
      operationId: listValueCases
      tags: [Value Cases]
      parameters:
        - in: query
          name: stage
          schema:
            $ref: "#/components/schemas/ValueCaseStage"
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Value case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get a value case
      operationId: getValueCase
      tags: [Value Cases]
      responses:
        "200":
          description: Value case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      summary: Update a value case
      operationId: updateValueCase
      tags: [Value Cases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValueCaseUpdateRequest"
      responses:
        "200":
          description: Updated value case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueCaseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Delete a value case
      operationId: deleteValueCase
      tags: [Value Cases]
      responses:
        "204":
          description: Value case deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/hypothesis:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get the latest hypothesis output for a case
      operationId: getHypothesis
      tags: [Value Cases]
      responses:
        "200":
          description: Hypothesis output
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/HypothesisOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/integrity:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get the latest integrity output for a case
      operationId: getIntegrity
      tags: [Value Cases]
      responses:
        "200":
          description: Integrity output
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntegrityOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/integrity/run:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Run the IntegrityAgent for a case
      operationId: runIntegrity
      tags: [Value Cases]
      responses:
        "202":
          description: Integrity run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/IntegrityOutput"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/narrative:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get the latest narrative draft for a case
      operationId: getNarrative
      tags: [Value Cases]
      responses:
        "200":
          description: Narrative draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NarrativeDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/narrative/run:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Run the NarrativeAgent for a case
      operationId: runNarrative
      tags: [Value Cases]
      responses:
        "202":
          description: Narrative run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NarrativeDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/realization:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get the latest realization report for a case
      operationId: getRealization
      tags: [Value Cases]
      responses:
        "200":
          description: Realization report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RealizationReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/realization/run:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Run the RealizationAgent for a case
      operationId: runRealization
      tags: [Value Cases]
      responses:
        "202":
          description: Realization run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RealizationReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/expansion:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    get:
      summary: Get expansion opportunities for a case
      operationId: getExpansion
      tags: [Value Cases]
      responses:
        "200":
          description: Expansion opportunities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpansionOpportunity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/expansion/run:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Run the ExpansionAgent for a case
      operationId: runExpansion
      tags: [Value Cases]
      responses:
        "202":
          description: Expansion run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpansionOpportunity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/run-loop:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Run the full HypothesisLoop for a case
      operationId: runHypothesisLoop
      tags: [Value Cases]
      description: |
        Executes the full agent loop (opportunity → model → integrity → narrative).
        Streams progress via SSE when `Accept: text/event-stream` is set;
        otherwise returns a JSON summary on completion.
      responses:
        "200":
          description: Loop completed (JSON mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  finalState: { type: string }
                  revisionCount: { type: integer }
                  error: { type: string }
            text/event-stream:
              schema:
                type: string
                description: "SSE stream of LoopProgress events, terminated by `{ done: true }`."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/export/pptx:
    parameters:
      - $ref: "#/components/parameters/CaseId"
    post:
      summary: Export a value case as a PPTX presentation
      operationId: exportCasePptx
      tags: [Value Cases]
      responses:
        "200":
          description: PPTX file stream
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/cases/{caseId}/provenance/{claimId}:
    parameters:
      - $ref: "#/components/parameters/CaseId"
      - name: claimId
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get the provenance chain for a claim
      operationId: getClaimProvenance
      tags: [Value Cases]
      responses:
        "200":
          description: Provenance chain (empty array if no records)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        claimId: { type: string }
                        valueCaseId: { type: string }
                        sourceType: { type: string }
                        sourceId: { type: string }
                        derivedAt: { type: string, format: date-time }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/admin/dlq:
    get:
      summary: List dead-letter queue tasks
      operationId: listDlqTasks
      tags: [Admin]
      responses:
        "200":
          description: DLQ task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        taskId: { type: string }
                        payload: { type: object }
                        failedAt: { type: string, format: date-time }
                        retryCount: { type: integer }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/dlq/{taskId}/retry:
    parameters:
      - name: taskId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Retry a dead-letter queue task
      operationId: retryDlqTask
      tags: [Admin]
      responses:
        "200":
          description: Task requeued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  taskId: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Agents
  # ---------------------------------------------------------------------------

  /api/agents/{agentId}/invoke:
    post:
      summary: Invoke an agent directly
      operationId: invokeAgent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInvokeRequest"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/agents/{agentId}/info:
    get:
      summary: Get agent metadata
      operationId: getAgentInfo
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/agents/jobs/{jobId}:
    get:
      summary: Poll an async agent job
      operationId: getAgentJob
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job status and result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/agents/jobs/{jobId}/stream:
    get:
      summary: Stream agent job output (SSE)
      operationId: streamAgentJob
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # LLM
  # ---------------------------------------------------------------------------

  /api/llm/chat:
    post:
      summary: Send a prompt to the LLM
      operationId: llmChat
      tags: [LLM]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LLMChatRequest"
      responses:
        "200":
          description: LLM response (or SSE stream when stream=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMChatResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Projects (existing)
  # ---------------------------------------------------------------------------

  /api/v1/projects:
    post:
      summary: Create a project
      operationId: createProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
            examples:
              createProject:
                value:
                  name: "AI Migration"
                  description: "Plan and execute AI platform migration."
                  status: "active"
                  tags: ["ai", "migration"]
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
              examples:
                created:
                  value:
                    data:
                      id: "proj_2b1b5d45-acde-4e2f-8c69-5efec4ff8c2c"
                      name: "AI Migration"
                      description: "Plan and execute AI platform migration."
                      status: "active"
                      tags: ["ai", "migration"]
                      ownerId: "user_123"
                      createdAt: "2024-06-11T10:20:30.000Z"
                      updatedAt: "2024-06-11T10:20:30.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: List projects
      operationId: listProjects
      tags:
        - Projects
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
