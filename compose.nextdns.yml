services:
  nextdns:
    image: nextdns/nextdns:latest
    container_name: nextdns
    command: >
      run
      -config ${NEXTDNS_CONFIG_ID}
      -listen 0.0.0.0:53
      -cache-size 10MB
      -max-ttl 3600
      -report-client-info
      -device-name ${NEXTDNS_DEVICE_NAME}
    environment:
      - NEXTDNS_CONFIG_ID=${NEXTDNS_CONFIG_ID}
      - NEXTDNS_DEVICE_NAME=${NEXTDNS_DEVICE_NAME}
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      devnet:
        ipv4_address: 172.28.0.53
    restart: unless-stopped

  # Example: add to your app and db services
  app:
    # ...your existing config...
    dns:
      - 172.28.0.53
    networks:
      - devnet

  postgres:
    # ...your existing config...
    dns:
      - 172.28.0.53
    networks:
      - devnet

networks:
  devnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
