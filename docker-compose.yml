# NOTE: Deprecated alias of docker-compose.full.yml (kept for backward compatibility).
services:
  # PostgreSQL database for Supabase
  postgres:
    image: postgres:15-alpine
    container_name: valueos-postgres
    environment:
      POSTGRES_DB: valuecanvas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos-network

  # Redis cache layer
  redis:
    image: redis:7-alpine
    container_name: valueos-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - valueos-network

  # Build validation service - runs before other services
  build-validator:
    image: node:20-alpine
    container_name: valueos-build-validator
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "build:validate"]
    profiles: ["validate"]

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: valueos-backend
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
    environment:
      - NODE_ENV=development
      - API_PORT=${API_PORT:-3001}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:dev_password@postgres:${POSTGRES_PORT:-5432}/valuecanvas_dev
      - DB_URL=postgresql://postgres:dev_password@postgres:${POSTGRES_PORT:-5432}/valuecanvas_dev
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
    env_file:
      - .env.ports
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - node_modules:/app/node_modules
    networks:
      - valueos-network
    restart: unless-stopped

  # Frontend (Nginx + React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: valueos-frontend
    ports:
      - "${VITE_PORT:-5173}:80"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=http://backend:${API_PORT:-3001}
    env_file:
      - .env.ports
    depends_on:
      - backend
    networks:
      - valueos-network
    restart: unless-stopped

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: valueos-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - valueos-network
    profiles: ["observability"]
    restart: unless-stopped

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: valueos-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - valueos-network
    profiles: ["observability"]
    restart: unless-stopped

networks:
  valueos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  node_modules:
  valueos-node-modules:
