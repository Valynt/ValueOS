name: valueos

volumes:
  postgres-data:
  postgres_data:
  redis_data:
  storage-data:
  pnpm-store:
  node_modules:
  vite-cache:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_logs:
  istiod_data:
  istio_gateway_data:
  istio_ca_data:

networks:
  valueos-network:
    name: valueos-network
    driver: bridge

services:
  ###########################################################################
  # Devcontainer App Service
  ###########################################################################
  app:
    profiles: ["devcontainer"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.optimized
      args:
        NODE_VERSION: "20"
        PNPM_VERSION: "9.15.0"
    volumes:
      - .:/workspaces/ValueOS:cached
      - pnpm-store:/home/vscode/.local/share/pnpm
      - node_modules:/workspaces/ValueOS/node_modules
      - vite-cache:/workspaces/ValueOS/.cache
    working_dir: /workspaces/ValueOS
    command: sleep infinity
    networks:
      - valueos-network
    environment:
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: http://kong:8000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres?sslmode=disable
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres_shadow?sslmode=disable
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzA2NzQ1NjAwLCJleHAiOjE4NjQ1MTIwMDB9.d-kmeoRU5c053mXKcFaY2SfiauyJPL6S9nqlTh191cE}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDY3NDU2MDAsImV4cCI6MTg2NDUxMjAwMH0.kzgm3XUHH2lZqaKCX7iqlUlsNvUZu6Ny5_STx2fIPJI}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      NODE_ENV: development
      DEV_SEED: ${DEV_SEED:-0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kong:
        condition: service_healthy
      auth:
        condition: service_healthy
      rest-healthcheck:
        condition: service_healthy

  ###########################################################################
  # Shared Redis
  ###########################################################################
  redis:
    profiles: ["devcontainer", "dev"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  ###########################################################################
  # Supabase/Postgres (Devcontainer)
  ###########################################################################
  db:
    profiles: ["devcontainer"]
    image: supabase/postgres:15.1.1.78
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_min_messages=warning
      -c wal_level=logical
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-54322}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - .devcontainer/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres && psql -U postgres -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ###########################################################################
  # Kong API Gateway
  ###########################################################################
  kong:
    profiles: ["devcontainer"]
    build:
      context: .devcontainer/kong
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_LOG_LEVEL: warn
    networks:
      - valueos-network
    ports:
      - "${KONG_PORT:-54321}:8000"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      auth:
        condition: service_healthy
      rest-healthcheck:
        condition: service_healthy
      realtime:
        condition: service_started
      storage:
        condition: service_started

  ###########################################################################
  # GoTrue Authentication Service
  ###########################################################################
  auth:
    profiles: ["devcontainer"]
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:postgres@db:5432/postgres?sslmode=disable&search_path=auth,public,extensions
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-http://localhost:5173,http://localhost:3001}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: http://localhost:54321
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  ###########################################################################
  # PostgREST API
  ###########################################################################
  rest:
    profiles: ["devcontainer"]
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://authenticator:postgres@db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - valueos-network
    healthcheck:
      test: ["NONE"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  ###########################################################################
  # PostgREST Health Check Proxy
  ###########################################################################
  rest-healthcheck:
    profiles: ["devcontainer"]
    image: curlimages/curl:8.5.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if curl -fsS http://rest:3000/ > /dev/null 2>&1; then
            echo "PostgREST healthy"
          else
            echo "PostgREST not ready"
          fi
          sleep 10
        done
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://rest:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      - rest

  ###########################################################################
  # Realtime Service
  ###########################################################################
  realtime:
    profiles: ["devcontainer"]
    image: supabase/realtime:v2.25.50
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: abcdefghijklmnop
      API_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      FLY_ALLOC_ID: abc123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-EixNiA+B8vTo7N1/EBRQ/uVoXnLwYyMIPvlTXinHVxD1rNInFVcJ9f4OPvoSNhGo}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - valueos-network
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    depends_on:
      db:
        condition: service_healthy

  ###########################################################################
  # Storage Service
  ###########################################################################
  storage:
    profiles: ["devcontainer"]
    image: supabase/storage-api:v0.46.4
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzA2NzQ1NjAwLCJleHAiOjE4NjQ1MTIwMDB9.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDY3NDU2MDAsImV4cCI6MTg2NDUxMjAwMH0.YI5mC4lgC5wJMvBRu-GZxXgRmXxMGk9wB7nHI55HXD8}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgresql://supabase_storage_admin:postgres@db:5432/postgres?sslmode=disable
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage-data:/var/lib/storage
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      rest-healthcheck:
        condition: service_healthy

  ###########################################################################
  # Postgres Meta
  ###########################################################################
  meta:
    profiles: ["devcontainer"]
    image: supabase/postgres-meta:v0.80.0
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
    networks:
      - valueos-network
    depends_on:
      db:
        condition: service_healthy

  ###########################################################################
  # Supabase Studio
  ###########################################################################
  studio:
    profiles: ["studio"]
    image: supabase/studio:latest
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_NAME: ValueOS
      DEFAULT_PROJECT_NAME: Development
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzA2NzQ1NjAwLCJleHAiOjE4NjQ1MTIwMDB9.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDY3NDU2MDAsImV4cCI6MTg2NDUxMjAwMH0.YI5mC4lgC5wJMvBRu-GZxXgRmXxMGk9wB7nHI55HXD8}
    networks:
      - valueos-network
    ports:
      - "${STUDIO_PORT:-54323}:3000"
    healthcheck:
      disable: true
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_started

  ###########################################################################
  # Development Postgres (Host Dev)
  ###########################################################################
  postgres:
    profiles: ["dev"]
    image: postgres:15-alpine
    container_name: valueos-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M
    environment:
      POSTGRES_DB: valuecanvas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    ports:
      - "${DB_PORT:-${POSTGRES_PORT:-5432}}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos-network

  zookeeper:
    profiles: ["dev"]
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: valueos-zookeeper
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - valueos-network

  kafka:
    profiles: ["dev"]
    image: confluentinc/cp-kafka:7.4.0
    container_name: valueos-kafka
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos-network

  schema-registry:
    profiles: ["dev"]
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: valueos-schema-registry
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos-network

  kafka-ui:
    profiles: ["observability"]
    image: provectuslabs/kafka-ui:latest
    container_name: valueos-kafka-ui
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: valueos-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - valueos-network

  backend:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
    container_name: valueos-backend
    ports:
      - "${API_PORT:-3001}:3001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:dev_password@postgres:${DB_PORT:-${POSTGRES_PORT:-5432}}/valuecanvas_dev?sslmode=disable
      DB_URL: postgresql://postgres:dev_password@postgres:${DB_PORT:-${POSTGRES_PORT:-5432}}/valuecanvas_dev?sslmode=disable
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    env_file:
      - path: .env.ports
        required: false
      - path: .env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/sdui/src:/app/packages/sdui/src
    tmpfs:
      - /tmp:noexec,nosuid,size=100m,uid=1001,gid=1001
    networks:
      - valueos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:${VITE_PORT:-5173}}
    container_name: valueos-frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "${WEB_PORT:-${VITE_PORT:-5173}}:5173"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_API_BASE_URL: http://backend:${API_PORT:-3001}
      HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_PROTOCOL: ${VITE_HMR_PROTOCOL:-ws}
    env_file:
      - path: .env.ports
        required: false
      - path: .env.local
        required: false
    depends_on:
      backend:
        condition: service_healthy
    tmpfs:
      - /tmp:noexec,nosuid,size=50m,uid=1001,gid=1001
    networks:
      - valueos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    profiles: ["dev"]
    image: caddy:2-alpine
    container_name: valueos-caddy-dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_ADMIN_PORT:-2019}:2019"
    environment:
      DEV_DOMAIN: ${DEV_DOMAIN:-localhost}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:5173}
      CADDY_ADMIN: ${CADDY_ADMIN:-0.0.0.0:${CADDY_ADMIN_PORT:-2019}}
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-DEBUG}
      AUTO_HTTPS: ${AUTO_HTTPS:-off}
    volumes:
      - ./infra/caddy/Caddyfile.dev:/etc/caddy/Caddyfile.dev
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
    networks:
      - valueos-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    profiles: ["observability", "istio"]
    image: prom/prometheus:latest
    container_name: valueos-prometheus
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - .devcontainer/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - valueos-network
    depends_on:
      istiod:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    profiles: ["observability", "istio"]
    image: grafana/grafana:latest
    container_name: valueos-grafana
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - valueos-network
    restart: unless-stopped

  istiod:
    profiles: ["istio"]
    image: istio/pilot:latest
    container_name: valueos-istiod
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    ports:
      - "15010:15010"
      - "15017:15017"
    volumes:
      - istiod_data:/var/lib/istio/data
    command:
      - "discovery"
      - "--mesh"
      - "valueos-mesh"
    environment:
      - ISTIO_META_MESH_ID=valueos-mesh
      - ISTIO_META_CLUSTER_ID=valueos-cluster
      - ISTIO_META_AUTO_REGISTER_GROUP=workloads
      - ISTIO_METAJSON_ANNOTATIONS={"security.alpha.kubernetes.io/credential-provider":"istio"}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 15010"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - valueos-network
    restart: unless-stopped

  istio-gateway:
    profiles: ["istio"]
    image: istio/proxyv2:latest
    container_name: valueos-istio-gateway
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - istio_gateway_data:/var/lib/istio/data
    command:
      - "proxy"
      - "router"
      - "--mesh"
      - "valueos-mesh"
    environment:
      - ISTIO_META_MESH_ID=valueos-mesh
      - ISTIO_META_CLUSTER_ID=valueos-cluster
      - ISTIO_META_AUTO_REGISTER_GROUP=workloads
      - ISTIO_METAJSON_ANNOTATIONS={"security.alpha.kubernetes.io/credential-provider":"istio"}
    networks:
      - valueos-network
    depends_on:
      istiod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  istio-ca:
    profiles: ["istio"]
    image: istio/citadel:latest
    container_name: valueos-istio-ca
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - istio_ca_data:/var/lib/istio/data
    command:
      - "ca"
      - "--mesh"
      - "valueos-mesh"
    environment:
      - ISTIO_META_MESH_ID=valueos-mesh
      - ISTIO_META_CLUSTER_ID=valueos-cluster
      - ISTIO_META_AUTO_REGISTER_GROUP=workloads
      - ISTIO_METAJSON_ANNOTATIONS={"security.alpha.kubernetes.io/credential-provider":"istio"}
    networks:
      - valueos-network
    depends_on:
      istiod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 443 || nc -z localhost 15017"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
