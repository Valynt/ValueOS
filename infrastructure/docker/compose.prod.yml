# ============================================================================
# ValueCanvas Production Docker Compose
# ============================================================================
# Production deployment with security hardening and monitoring
# ============================================================================

version: '3.8'

services:
  # ============================================================================
  # ValueCanvas Application (Production)
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: valuecanvas:latest
    container_name: valuecanvas-prod
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      # Supabase (use production values)
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      # LLM API
      - VITE_LLM_API_KEY=${VITE_LLM_API_KEY}
      - VITE_LLM_PROVIDER=${VITE_LLM_PROVIDER:-together}
      # Security
      - VITE_ENABLE_CIRCUIT_BREAKER=true
      - VITE_ENABLE_RATE_LIMITING=true
      - VITE_ENABLE_AUDIT_LOGGING=true
    networks:
      - frontend-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.npm

  # ============================================================================
  # Nginx Reverse Proxy (Production)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: valuecanvas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - frontend-network
      - backend-network
    depends_on:
      - app
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Backend API Service (Production)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    image: valuecanvas-backend:latest
    container_name: valuecanvas-backend-prod
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - backend-network
      - database-network
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # Redis (Production - for rate limiting and caching)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: valuecanvas-redis-prod
    volumes:
      - redis-data:/data
    networks:
      - database-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # PostgreSQL Database (Production)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: valuecanvas-postgres-prod
    environment:
      - POSTGRES_DB=valuecanvas
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - database-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d valuecanvas"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# ============================================================================
# Networks
# ============================================================================
networks:
  # Frontend network - for external access and reverse proxy
  frontend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
    internal: false

  # Backend network - for internal API communication
  backend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24
    internal: true

  # Database network - for database and caching services
  database-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
    internal: true

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  nginx-cache:
    driver: local
