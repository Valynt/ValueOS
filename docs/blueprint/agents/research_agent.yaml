apiVersion: v1
kind: AgentManifest
metadata:
  name: research-agent
  description: "Automates company intelligence research, persona analysis, and value discovery with transparent reasoning chains."
  version: "1.0.0"
spec:
  schema:
    input:
      type: object
      required:
        - companyName
      properties:
        companyName:
          type: string
          description: Company name or identifier to research
        companyUrl:
          type: string
          description: Optional company website URL
        industry:
          type: string
          description: Industry vertical for context
        companySize:
          type: string
          enum: [small, medium, large, enterprise]
        targetPersona:
          type: string
          description: Target persona role for fit analysis
        researchQuestions:
          type: array
          items:
            type: string
          description: Specific research questions to answer
    output:
      type: object
      required:
        - companyIntelligence
        - personaProfile
        - valueHypothesis
        - confidenceLevel
      properties:
        companyIntelligence:
          type: object
          description: Comprehensive company research data
        personaProfile:
          type: object
          description: Target persona analysis with fit score
        valueHypothesis:
          type: object
          description: Preliminary value opportunity with financials
        competitorLandscape:
          type: array
          description: Key competitors and positioning
        reasoning:
          type: string
          description: Transparent reasoning chain
        confidenceLevel:
          type: string
          enum: [high, medium, low]
  entrypoint:
    module: src/lib/agent-fabric/agents/ResearchAgent.ts
    class: ResearchAgent
    method: execute
    httpEndpoint: "/api/agents/research/execute"
  runtime:
    language: typescript
    memory: "512Mi"
    cpu: "250m"
    dependencies:
      - name: zod
        version: "^3.23.0"
      - name: "@supabase/supabase-js"
        version: "^2.57.0"
  permissions:
    roles:
      - reader: ["valueFabric.capabilities", "valueFabric.benchmarks"]
      - publisher: ["events.research.*"]
    securityPolicies:
      - enforceRoleSegregation: true
      - throttleRequests: true
  communication:
    subscribe:
      - topic: "events.opportunity.created"
    publish:
      - topic: "events.research.completed"
      - topic: "events.research.status"
  health:
    livenessProbe:
      httpGet:
        path: "/health/live"
        port: 8086
      intervalSeconds: 30
    readinessProbe:
      httpGet:
        path: "/health/ready"
        port: 8086
      intervalSeconds: 30
  monitoring:
    metricsEndpoint: "/metrics"
    logLevel: INFO
