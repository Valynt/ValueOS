version: '3.8'

# Enhanced Development environment monitoring stack
# Provides observability for local development with proper dependencies and ordering

services:
  # PostgreSQL - Database (starts first as other services depend on it)
  postgres:
    image: postgres:15-alpine
    container_name: valuecanvas-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-valuecanvas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-valuecanvas_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-valuecanvas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Priority: 100 (highest - starts first)

  # Redis - Caching and session storage (starts early)
  redis:
    image: redis:7-alpine
    container_name: valuecanvas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    # Priority: 90 (starts second)
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus - Metrics collection (depends on database for persistence)
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: valuecanvas-prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Priority: 80 (starts third)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Grafana - Metrics visualization (depends on Prometheus)
  grafana:
    image: grafana/grafana:10.1.0
    container_name: valuecanvas-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Priority: 70 (starts fourth)
    depends_on:
      prometheus:
        condition: service_healthy

  # Jaeger - Distributed tracing (independent but starts after core services)
  jaeger:
    image: jaegertracing/all-in-one:1.47.0
    container_name: valuecanvas-jaeger
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
      - "6831:6831/udp"  # UDP agent
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - SPAN_STORAGE_TYPE=memory
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Priority: 60 (starts fifth)
    depends_on:
      postgres:
        condition: service_healthy

  # Mailhog - Email testing (starts last, lowest priority)
  mailhog:
    image: mailhog/mailhog:1.0.1
    container_name: valuecanvas-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - valuecanvas-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Priority: 50 (lowest - starts last)
    depends_on:
      grafana:
        condition: service_healthy

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  valuecanvas-dev:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.22.0.0/16
