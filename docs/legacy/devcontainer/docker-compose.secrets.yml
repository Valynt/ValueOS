version: '3.8'

# Docker Compose configuration with secrets support
# Use this for production-like secret management in development

services:
  devcontainer:
    image: valuecanvas-dev:latest
    container_name: valuecanvas-dev-optimized
    
    # Mount secrets as files
    secrets:
      - supabase_token
      - jwt_secret
      - together_api_key
      - db_password
      - redis_password
    
    # Environment variables reference secret files
    environment:
      # Application
      NODE_ENV: development
      ENVIRONMENT: development
      
      # Secrets loaded from files
      SUPABASE_ACCESS_TOKEN_FILE: /run/secrets/supabase_token
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      TOGETHER_API_KEY_FILE: /run/secrets/together_api_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      
      # Non-sensitive configuration
      VITE_APP_ENV: development
      VITE_APP_URL: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:3000
      
    volumes:
      - ../:/workspace:cached
      - valuecanvas-node-modules:/workspace/node_modules
      - valuecanvas-npm-cache:/home/vscode/.npm
      - valuecanvas-build-cache:/workspace/.cache
      - valuecanvas-playwright:/home/vscode/.cache/ms-playwright
    
    networks:
      - valuecanvas-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '2'
          memory: 4G

# Define secrets
secrets:
  supabase_token:
    file: ./secrets/supabase_token.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  together_api_key:
    file: ./secrets/together_api_key.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

volumes:
  valuecanvas-node-modules:
  valuecanvas-npm-cache:
  valuecanvas-build-cache:
  valuecanvas-playwright:

networks:
  valuecanvas-network:
    driver: bridge
