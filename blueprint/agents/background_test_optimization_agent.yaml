apiVersion: v1
kind: AgentManifest
metadata:
  name: background-test-optimization-agent
  description: "Continuously evaluates and improves test coverage, variability, and reliability across the codebase."
  version: "1.0.0"
spec:
  schema:
    input:
      type: object
      required:
        - diff
        - coverageReport
      properties:
        diff:
          type: object
          description: The git diff or changeset to analyze.
        coverageReport:
          type: object
          description: Code coverage information (lines, branches, mutation results) from CI.
    output:
      type: object
      required:
        - analysis
        - recommendedPatches
      properties:
        analysis:
          type: object
          description: Summary of tests missing, flaky tests and coverage risks.
        recommendedPatches:
          type: array
          items:
            type: string
          description: Machine-readable patch diffs for suggested test files or changes.
  entrypoint:
    module: agents/background_test_optimization/main.py
    class: BackgroundTestOptimizationAgent
    method: handle
    httpEndpoint: "/api/agents/test-optimization/run"
  documentation:
    promptFile: "blueprint/agents/background_test_optimization/prompt.md"
    readme: "blueprint/agents/background_test_optimization/README.md"
    examples:
      - description: "Simple run against a small code diff and a coverage report"
        input: { diff: {}, coverageReport: {} }
        output: { analysis: { missing_tests: {} }, recommendedPatches: [] }
  runtime:
    language: python
    memory: "1024Mi"
    cpu: "500m"
    dependencies:
      - name: pytest
        version: "^7.0"
      - name: hypothesis
        version: "^6.0"
      - name: fastapi
        version: "^0.95"
      - name: requests
        version: "^2.0"
  permissions:
    roles:
      - reader: ["src", "test", "blueprint", "supabase"]
      - writer: ["test"]
      - publisher: ["events.testing.improvements"]
    securityPolicies:
      - principleOfLeastPrivilege: true
      - redactSecrets: true
  communication:
    subscribe:
      - topic: "events.git.diff.pushed"
      - topic: "events.ci.coverage.reported"
      - topic: "events.tests.flaky.detected"
    publish:
      - topic: "events.tests.improvement.recommended"
  health:
    livenessProbe:
      httpGet:
        path: "/health/live"
        port: 8085
      intervalSeconds: 30
    readinessProbe:
      httpGet:
        path: "/health/ready"
        port: 8085
      intervalSeconds: 30
  monitoring:
    metricsEndpoint: "/metrics"
    logLevel: INFO
