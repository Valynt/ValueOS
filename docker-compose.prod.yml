# docker-compose.prod.yml
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: valuecanvas-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_SERVICE_KEY_FILE=/run/secrets/supabase_service_key
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
    secrets:
      - supabase_service_key
      - openai_api_key
    ports:
      - "3000:3000"
    networks:
      - valuecanvas-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: valuecanvas-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - valuecanvas-network
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: valuecanvas-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - valuecanvas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  valuecanvas-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  redis_data:

secrets:
  supabase_service_key:
    file: ./secrets/supabase_service_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
