name: ValueOS Quality Governor

name: ValueOS Quality Governor

on:
  push:
    branches: [main]
  pull_request:

jobs:
  governor:
    name: 🛡️ Governor Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: valueos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Mock Env
        run: cp .env.example .env

      # STAGE 1: Determinism
      - name: 🛡️ Protocol A - Boot Verification
        run: pnpm dev:verify

      # STAGE 2: Green Islands (The Fortress)
      - name: 🛡️ Protocol B - Strict Zone Enforcement
        run: pnpm typecheck:strict-zones
      # STAGE 3: The Ratchet
      - name: 🛡️ Protocol C - Technical Debt Ratchet
        run: pnpm typecheck:ratchet
