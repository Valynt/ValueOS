# ============================================================================
# ValueOS Unified Deployment Pipeline (Dev -> Staging -> Prod)
# ============================================================================
name: Unified Deployment Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - production
      force_deploy:
        description: "Force deployment (bypasses some checks)"
        required: false
        default: false
        type: boolean
      canary_percentage:
        description: "Canary deployment percentage (0-100)"
        required: false
        default: "0"
        type: string

env:
  NODE_VERSION: "18"
  AWS_REGION: us-east-1
  REGISTRY: ghcr.io
  IMAGE_NAME: valueos
  PRAG_REPRO_DIR: pragmatic-reproducibility

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # For Cosign keyless signing

jobs:
  # ============================================================================
  # Phase 1: Validation and Quality Gates
  # ============================================================================
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.gates.outputs.should_deploy }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type checking
        run: npm run typecheck

      - name: Run security audit
        run: npm run security:scan

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Validate design tokens
        run: npm run lint:design-tokens

      - name: Determine target environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_OUTPUT
          fi

      - name: Deployment gates
        id: gates
        run: |
          SHOULD_DEPLOY="true"

          # Skip deployment for PRs
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_DEPLOY="false"
          fi

          # Production deployment requires main branch
          if [[ "${{ steps.env.outputs.environment }}" == "production" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            SHOULD_DEPLOY="false"
          fi

          # Force deploy can bypass some checks
          if [[ "${{ github.event.inputs.force_deploy }}" == "true" ]]; then
            SHOULD_DEPLOY="true"
          fi

          echo "should_deploy=${SHOULD_DEPLOY}" >> $GITHUB_OUTPUT
          echo "Environment: ${{ steps.env.outputs.environment }}"
          echo "Should deploy: ${SHOULD_DEPLOY}"

  drift-detection:
    name: Drift Detection (Terraform)
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run drift check
        run: |
          set -o pipefail
          SUMMARY_FILE="drift-summary.txt" bash scripts/check_drift.sh 2>&1 | tee drift-summary.log

      - name: Publish drift summary
        if: always()
        run: |
          if [ -f drift-summary.txt ]; then
            cat drift-summary.txt >> $GITHUB_STEP_SUMMARY
          elif [ -f drift-summary.log ]; then
            echo "## Drift Detection" >> $GITHUB_STEP_SUMMARY
            echo "\\`\\`\\`" >> $GITHUB_STEP_SUMMARY
            cat drift-summary.log >> $GITHUB_STEP_SUMMARY
            echo "\\`\\`\\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Drift Detection" >> $GITHUB_STEP_SUMMARY
            echo "- Status: ⚠️ Drift summary unavailable" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Phase 2: TurboRepo Matrix Planning
  # ============================================================================
  plan-matrix:
    name: Plan Build Matrix (TurboRepo)
    runs-on: ubuntu-latest
    needs: [validate, drift-detection]
    if: needs.validate.outputs.should_deploy == 'true'
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve base SHA
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.before }}" ]]; then
            echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
          else
            git fetch origin main --depth=1
            echo "base=$(git merge-base origin/main HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build matrix from TurboRepo changes
        id: matrix
        run: |
          BASE_SHA="${{ steps.base.outputs.base }}"

          npx turbo run build \
            --filter=apps/ValyntApp \
            --filter=packages/agents/* \
            --filter=...[${BASE_SHA}] \
            --dry=json > turbo-changes.json

          PACKAGES=$(jq -r '.tasks[].package' turbo-changes.json | sort -u || true)

          if [[ -z "$PACKAGES" ]]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MATRIX=$(printf '%s\n' "$PACKAGES" | jq -R . | jq -s '{include: map({package: .})}')
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
# ============================================================================
# Phase 3: Build & Sign Images (Matrix)
# ============================================================================
build-and-sign:
  name: Build & Sign (${{ matrix.package }})
  runs-on: ubuntu-latest
  needs: [validate, plan-matrix, drift-detection]
  if: needs.plan-matrix.outputs.has_changes == 'true'
  strategy:
    fail-fast: false
    matrix: ${{ fromJSON(needs.plan-matrix.outputs.matrix) }}

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Turbo build
      run: npx turbo run build --filter=${{ matrix.package }}

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.package }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build container image (pragmatic-reproducibility)
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./${{ env.PRAG_REPRO_DIR }}/templates/Dockerfile.optimized
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Resolve image references
      id: image
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.package }}"
        PROMOTED_TAG="${IMAGE}:${{ needs.validate.outputs.environment }}"
        echo "image=${IMAGE}" >> $GITHUB_OUTPUT
        echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
        echo "promoted_tag=${PROMOTED_TAG}" >> $GITHUB_OUTPUT

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Run cosign setup
      run: bash ops/scripts/cosign-setup.sh

    - name: Sign image with Cosign (keyless)
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: |
        IMAGE="${{ steps.image.outputs.image }}"
        DIGEST="${{ steps.image.outputs.digest }}"
        cosign sign --yes "${IMAGE}@${DIGEST}"

    - name: Promote image tag for deployment
      if: needs.validate.outputs.should_deploy == 'true'
      run: |
        IMAGE="${{ steps.image.outputs.image }}"
        DIGEST="${{ steps.image.outputs.digest }}"
        PROMOTED_TAG="${{ steps.image.outputs.promoted_tag }}"
        docker buildx imagetools create -t "${PROMOTED_TAG}" "${IMAGE}@${DIGEST}"

    - name: Sign promoted image tag with Cosign (keyless)
      if: needs.validate.outputs.should_deploy == 'true'
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: |
        PROMOTED_TAG="${{ steps.image.outputs.promoted_tag }}"
        DIGEST="${{ steps.image.outputs.digest }}"
        cosign sign --yes "${PROMOTED_TAG}@${DIGEST}"

# ============================================================================
# Phase 3.5: Devcontainer Build (Single Image)
# ============================================================================
devcontainer-build:
  name: Build Devcontainer Image
  runs-on: ubuntu-latest
  needs: validate
  if: needs.validate.outputs.should_deploy == 'true'
  outputs:
    image_ref: ${{ steps.outputs.outputs.image_ref }}
    image_digest: ${{ steps.outputs.outputs.image_digest }}
    image_tag: ${{ steps.outputs.outputs.image_tag }}

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push devcontainer image
      id: devcontainer
      uses: devcontainers/ci@v0.3
      with:
        configFile: .devcontainer/devcontainer.json
        imageName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-devcontainer
        imageTag: ${{ github.sha }}
        push: true

    - name: Capture image reference and digest
      id: outputs
      run: |
        IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-devcontainer:${{ github.sha }}"
        IMAGE_DIGEST="$(docker buildx imagetools inspect \"$IMAGE_REF\" --format '{{.Manifest.Digest}}')"
        echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT
        echo "image_digest=${IMAGE_DIGEST}" >> $GITHUB_OUTPUT
        echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ============================================================================
  # Phase 4: Environment Parity (Staging mirrors Production)
  # ============================================================================
  ensure-parity:
    name: Ensure Staging Parity with Production
    runs-on: ubuntu-latest
    needs: [validate, plan-matrix, build-and-sign, drift-detection]
    if: needs.validate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync tool versions (pragmatic-reproducibility)
        run: |
          bash ${{ env.PRAG_REPRO_DIR }}/scripts/sync-tool-versions.sh

      - name: Render parity manifests (Caddy + Prometheus)
        run: |
          echo "Ensuring staging uses same Caddy + Prometheus config as production"
          # Caddy parity
          ls infra/caddy/Caddyfile.prod infra/caddy/Caddyfile.staging
          # Prometheus parity
          ls infra/k8s/observability/prometheus/prometheus-config.yaml

  # ============================================================================
  # Phase 5: Deployment Gates and Approvals
  # ============================================================================
  deployment-gates:
    name: Deployment Gates
    runs-on: ubuntu-latest
    needs: [validate, ensure-parity, drift-detection]
    if: needs.validate.outputs.should_deploy == 'true'
    outputs:
      environment: ${{ steps.deployment.outputs.environment }}
      url: ${{ steps.deployment.outputs.url }}
      canary_percentage: ${{ steps.deployment.outputs.canary_percentage }}

    environment:
      name: ${{ needs.validate.outputs.environment }}
      url: ${{ steps.deployment.outputs.url }}

    steps:
      - name: Production approval check
        if: needs.validate.outputs.environment == 'production'
        run: |
          echo "🚨 Production deployment requires manual approval"
          echo "Check the Environment tab above for approval"

      - name: Canary deployment check
        id: canary
        run: |
          CANARY_PERCENTAGE="${{ github.event.inputs.canary_percentage || '0' }}"
          echo "canary_percentage=${CANARY_PERCENTAGE}" >> $GITHUB_OUTPUT

          if [[ "${CANARY_PERCENTAGE}" != "0" ]]; then
            echo "🚀 Canary deployment enabled: ${CANARY_PERCENTAGE}%"
          fi

      - name: Final deployment check
        id: deployment
        run: |
          ENVIRONMENT="${{ needs.validate.outputs.environment }}"
          CANARY="${{ steps.canary.outputs.canary_percentage }}"

          # Set deployment URL based on environment
          case $ENVIRONMENT in
            "production")
              URL="https://valueos.com"
              ;;
            "staging")
              URL="https://staging.valueos.com"
              ;;
            "dev")
              URL="https://dev.valueos.com"
              ;;
            *)
              URL="https://${ENVIRONMENT}.valueos.com"
              ;;
          esac

          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "canary_percentage=${CANARY}" >> $GITHUB_OUTPUT

  # ============================================================================
  # Phase 5.5: Promote Image (Staging/Prod)
  # ============================================================================
  promote-image:
    name: Promote Devcontainer Image
    runs-on: ubuntu-latest
    needs: [validate, devcontainer-build, deployment-gates]
    if: needs.validate.outputs.should_deploy == 'true'
    outputs:
      promoted_ref: ${{ steps.outputs.outputs.promoted_ref }}
      promoted_digest: ${{ steps.outputs.outputs.promoted_digest }}

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image tag for environment
        id: promote
        run: |
          ENVIRONMENT="${{ needs.deployment-gates.outputs.environment }}"
          BASE_REF="${{ needs.devcontainer-build.outputs.image_ref }}"
          BASE_DIGEST="${{ needs.devcontainer-build.outputs.image_digest }}"
          BASE_TAG="${{ needs.devcontainer-build.outputs.image_tag }}"

          if [[ "$ENVIRONMENT" == "staging" || "$ENVIRONMENT" == "production" ]]; then
            PROMOTED_TAG="${BASE_TAG}-${ENVIRONMENT}"
            PROMOTED_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-devcontainer:${PROMOTED_TAG}"
            docker buildx imagetools create --tag "${PROMOTED_REF}" "${BASE_REF}@${BASE_DIGEST}"
          else
            PROMOTED_REF="${BASE_REF}"
          fi

          echo "promoted_ref=${PROMOTED_REF}" >> $GITHUB_OUTPUT
          echo "promoted_digest=${BASE_DIGEST}" >> $GITHUB_OUTPUT

      - name: Capture promotion outputs
        id: outputs
        run: |
          echo "promoted_ref=${{ steps.promote.outputs.promoted_ref }}" >> $GITHUB_OUTPUT
          echo "promoted_digest=${{ steps.promote.outputs.promoted_digest }}" >> $GITHUB_OUTPUT

  # ============================================================================
  # Phase 6: Deploy to Environment (Dev -> Staging -> Prod)
  # ============================================================================
  deploy:
    name: Deploy to ${{ needs.deployment-gates.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate, plan-matrix, build-and-sign, ensure-parity, deployment-gates, promote-image]
    if: needs.validate.outputs.should_deploy == 'true'

    environment:
      name: ${{ needs.deployment-gates.outputs.environment }}
      url: ${{ needs.deployment-gates.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name valuecanvas-${{ needs.deployment-gates.outputs.environment }}-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy Caddy + Prometheus parity stack
        run: |
          kubectl apply -f infra/k8s/observability -n observability
          # Caddy manifests assumed to be applied via infra/k8s or external tooling;
          # stage/prod parity ensured by using the same Caddyfile base.
          kubectl create configmap caddy-config \
            --from-file=infra/caddy/Caddyfile.prod \
            -n edge --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application
        run: |
          ENVIRONMENT="${{ needs.deployment-gates.outputs.environment }}"
          CANARY="${{ needs.deployment-gates.outputs.canary_percentage }}"
          IMAGE_REF="${{ needs.promote-image.outputs.promoted_ref }}"
          IMAGE_DIGEST="${{ needs.promote-image.outputs.promoted_digest }}"
          IMAGE_WITH_DIGEST="${IMAGE_REF}@${IMAGE_DIGEST}"

          # Set environment-specific values
          case $ENVIRONMENT in
            "production")
              NAMESPACE="valueos-production"
              REPLICAS="3"
              ;;
            "staging")
              NAMESPACE="valueos-staging"
              REPLICAS="2"
              ;;
            *)
              NAMESPACE="valueos-${ENVIRONMENT}"
              REPLICAS="1"
              ;;
          esac

          echo "NAMESPACE=${NAMESPACE}" >> $GITHUB_ENV

          # Apply Kubernetes manifests
          kubectl apply -f infra/k8s/ -n $NAMESPACE

          # Handle canary deployment
          if [[ "$CANARY" != "0" ]]; then
            echo "🚀 Deploying canary: ${CANARY}%"
            kubectl patch deployment valueos-frontend -n $NAMESPACE -p '{"spec":{"template":{"metadata":{"annotations":{"canary":"true"}}}}}'
            kubectl patch deployment valueos-frontend -n $NAMESPACE -p '{"spec":{"replicas":'$(($REPLICAS * $CANARY / 100))'}}'
          else
            echo "🚀 Full deployment to $ENVIRONMENT"
            kubectl set image deployment/valueos-frontend valueos-frontend="${IMAGE_WITH_DIGEST}" -n $NAMESPACE
          fi

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/valueos-frontend -n $NAMESPACE --timeout=300s

  # ============================================================================
  # Phase 7: Post-Deployment Health Check Gate + Rollback
  # ============================================================================
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [validate, deployment-gates, deploy, drift-detection]
    if: needs.validate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Verify deployment health
        id: verify
        continue-on-error: true
        run: node scripts/verify-deployment.ts

      - name: Rollback on failed verification
        if: steps.verify.outcome == 'failure'
        run: |
          echo "🚨 Verification failed! Initiating rollback..."
          bash scripts/rollback.sh
          exit 1

  # ============================================================================
  # Phase 8: Cleanup and Notification
  # ============================================================================
  cleanup:
    name: Cleanup and Notify
    runs-on: ubuntu-latest
    needs: [validate, deployment-gates, deploy, post-deploy, drift-detection]
    if: always() && needs.validate.outputs.should_deploy == 'true'

    steps:
      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ needs.deployment-gates.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ needs.deployment-gates.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Canary**: ${{ needs.deployment-gates.outputs.canary_percentage }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed**: $(date -u)" >> $GITHUB_STEP_SUMMARY
