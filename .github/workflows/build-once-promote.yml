name: Build Once, Promote Everywhere

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "Dockerfile*"
      - "infra/docker/**"
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and use existing image'
        type: boolean
        default: false
      image_sha:
        description: 'Image SHA to promote (if skip_build=true)'
        required: false

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: us-east-1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ERROR_RATE_THRESHOLD: ${{ vars.ERROR_RATE_THRESHOLD || '10' }}

jobs:
  # Job 0: Pre-build validation and testing
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run type checking
        run: npm run type-check

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build applications (for testing)
        run: |
          npm run build:backend
          npm run build:frontend

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 30

  # Job 1a: Build backend (parallel)
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.skip_build != 'true'
    outputs:
      backend_image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to registries
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Build backend image
        id: build
        run: |
          chmod +x ops/build
          ./ops/build backend --push

  # Job 1b: Build frontend (parallel)
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.skip_build != 'true'
    outputs:
      frontend_image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to registries
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Build frontend image
        id: build
        run: |
          chmod +x ops/build
          ./ops/build frontend --push

  # Job 1c: Combine images (waits for both builds)
  build:
    name: Combine Images
    runs-on: ubuntu-latest
    needs: [validate, build-backend, build-frontend]
    if: github.event.inputs.skip_build != 'true'
    outputs:
      image_sha: ${{ steps.combine.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to registries
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.login-ecr.outputs.registry }}/valueos
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=valueos-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push unified production image
        id: combine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=ValueOS immutable artifact

      - name: Generate artifact manifest
        run: |
          cat > artifact-manifest.json <<EOF
          {
            "sha": "${{ steps.build.outputs.digest }}",
            "tags": "${{ steps.meta.outputs.tags }}",
            "commit": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: Upload artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: artifact-manifest
          path: artifact-manifest.json
          retention-days: 90

      - name: Output image details
        run: |
          echo "### 🎯 Immutable Artifact Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This artifact will be promoted through dev → staging → production" >> $GITHUB_STEP_SUMMARY

  # Job 2: Promote to Dev (automatic)
  promote-to-dev:
    name: Promote to Dev
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || github.event.inputs.skip_build == 'true')
    environment:
      name: development
      url: https://dev.valuecanvas.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-dev-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Set image digest
        id: image
        run: |
          if [ "${{ github.event.inputs.skip_build }}" == "true" ]; then
            echo "digest=${{ github.event.inputs.image_sha }}" >> $GITHUB_OUTPUT
          else
            echo "digest=${{ needs.build.outputs.image_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to dev (promote artifact)
        run: |
          kubectl set image deployment/valueos-app \
            app=${{ steps.image.outputs.digest }} \
            --namespace=dev \
            --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/valueos-app \
            --namespace=dev \
            --timeout=5m

      - name: Run smoke tests
        run: |
          curl -f https://dev.valuecanvas.app/health || exit 1
          echo "✅ Dev deployment successful"

      - name: Record promotion
        run: |
          cat > promotion-dev.json <<EOF
          {
            "environment": "dev",
            "image": "${{ steps.image.outputs.digest }}",
            "promoted_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "promoted_by": "${{ github.actor }}",
            "commit": "${{ github.sha }}"
          }
          EOF

      - name: Upload promotion record
        uses: actions/upload-artifact@v4
        with:
          name: promotion-dev
          path: promotion-dev.json

  # Job 3: Promote to Staging (automatic after dev success)
  promote-to-staging:
    name: Promote to Staging
    runs-on: ubuntu-latest
    needs: [build, promote-to-dev]
    if: always() && needs.promote-to-dev.result == 'success'
    environment:
      name: staging
      url: https://staging.valuecanvas.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-staging-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Set image digest
        id: image
        run: |
          if [ "${{ github.event.inputs.skip_build }}" == "true" ]; then
            echo "digest=${{ github.event.inputs.image_sha }}" >> $GITHUB_OUTPUT
          else
            echo "digest=${{ needs.build.outputs.image_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Run database migrations (staging)
        run: |
          kubectl exec -n staging deployment/valueos-app -- \
            npx supabase db push

      - name: Deploy to staging (promote artifact)
        run: |
          kubectl set image deployment/valueos-app \
            app=${{ steps.image.outputs.digest }} \
            --namespace=staging \
            --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/valueos-app \
            --namespace=staging \
            --timeout=10m

      - name: Run integration tests
        run: |
          npm ci
          npm run test:integration -- --base-url=https://staging.valuecanvas.app

      - name: Run E2E tests
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e -- --base-url=https://staging.valuecanvas.app

      - name: Run chaos tests
        run: |
          chmod +x scripts/chaos-test.sh
          ./scripts/chaos-test.sh run

      - name: Record promotion
        run: |
          cat > promotion-staging.json <<EOF
          {
            "environment": "staging",
            "image": "${{ steps.image.outputs.digest }}",
            "promoted_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "promoted_by": "${{ github.actor }}",
            "commit": "${{ github.sha }}",
            "tests_passed": true
          }
          EOF

      - name: Upload promotion record
        uses: actions/upload-artifact@v4
        with:
          name: promotion-staging
          path: promotion-staging.json

  # Job 4: Promote to Production (manual approval required)
  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: [build, promote-to-staging]
    if: always() && needs.promote-to-staging.result == 'success'
    environment:
      name: production
      url: https://app.valuecanvas.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-prod-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Set image digest
        id: image
        run: |
          if [ "${{ github.event.inputs.skip_build }}" == "true" ]; then
            echo "digest=${{ github.event.inputs.image_sha }}" >> $GITHUB_OUTPUT
          else
            echo "digest=${{ needs.build.outputs.image_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create database backup
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier valuecanvas-prod \
            --db-snapshot-identifier valuecanvas-prod-$(date +%Y%m%d-%H%M%S) \
            --region ${{ env.AWS_REGION }}

      - name: Run database migrations (production)
        run: |
          kubectl exec -n production deployment/valueos-app -- \
            npx supabase db push

      - name: Deploy to production (canary strategy)
        run: |
          chmod +x scripts/canary-deploy.sh
          ./scripts/canary-deploy.sh "${{ steps.image.outputs.digest }}" production

      - name: Run production smoke tests
        run: |
          curl -f https://app.valuecanvas.app/health || exit 1
          echo "✅ Production deployment successful"

      - name: Record promotion
        run: |
          cat > promotion-production.json <<EOF
          {
            "environment": "production",
            "image": "${{ steps.image.outputs.digest }}",
            "promoted_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "promoted_by": "${{ github.actor }}",
            "commit": "${{ github.sha }}",
            "approved_by": "${{ github.event.sender.login }}"
          }
          EOF

      - name: Upload promotion record
        uses: actions/upload-artifact@v4
        with:
          name: promotion-production
          path: promotion-production.json

      - name: Notify success
        if: success()
        run: |
          chmod +x scripts/notify-deployment.sh
          ./scripts/notify-deployment.sh success production "${{ steps.image.outputs.digest }}" "${{ github.sha }}" "${{ github.actor }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          kubectl rollout undo deployment/valueos-app \
            --namespace=production

          chmod +x scripts/notify-deployment.sh
          ./scripts/notify-deployment.sh failure production "${{ steps.image.outputs.digest }}" "${{ github.sha }}" "${{ github.actor }}"

  # Job 5: Generate deployment report
  report:
    name: Generate Deployment Report
    runs-on: ubuntu-latest
    needs: [build, promote-to-dev, promote-to-staging, promote-to-production]
    if: always()

    steps:
      - name: Download all promotion records
        uses: actions/download-artifact@v4
        with:
          path: promotions

      - name: Generate report
        run: |
          cat > deployment-report.md <<EOF
          # Deployment Report

          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Commit:** ${{ github.sha }}
          **Triggered by:** ${{ github.actor }}

          ## Artifact

          - **Image Digest:** \`${{ needs.build.outputs.image_sha }}\`
          - **Tags:** \`${{ needs.build.outputs.image_tag }}\`

          ## Promotion Status

          | Environment | Status | Time |
          |-------------|--------|------|
          | Dev | ${{ needs.promote-to-dev.result }} | $(date -u +%H:%M:%S) |
          | Staging | ${{ needs.promote-to-staging.result }} | $(date -u +%H:%M:%S) |
          | Production | ${{ needs.promote-to-production.result }} | $(date -u +%H:%M:%S) |

          ## Key Principle

          ✅ **Same artifact deployed to all environments**
          - No rebuilds between environments
          - Config-only differences
          - Immutable artifact guarantee
          EOF

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('deployment-report.md', 'utf8');

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: report
            });
