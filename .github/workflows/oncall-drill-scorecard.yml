name: On-Call Drill Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  publish-scorecard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14"

      - name: Generate drill scorecard and trend payload
        run: node scripts/ci/publish-oncall-drill-trends.mjs

      - name: Auto-publish trend updates
        run: |
          if git diff --quiet -- docs/operations/on-call-drill-scorecard.md .github/metrics/oncall-drill-trends.json; then
            echo "No scorecard changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/operations/on-call-drill-scorecard.md .github/metrics/oncall-drill-trends.json
          git commit -m "chore(ops): publish on-call drill scorecard trends"
          git push
