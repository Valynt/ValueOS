name: Release

# Runs on every push to main. If changesets are present, opens/updates a
# "Version Packages" PR. When that PR is merged, creates GitHub Releases and
# tags for each bumped package.
#
# Issue: #1149

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  reproducibility-build:
    name: Reproducibility Build (${{ matrix.run_id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run_id: [run-a, run-b]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend and frontend packaged artifacts
        run: pnpm run build

      - name: Capture packaged artifact manifests
        run: node scripts/ci/reproducibility-verify.mjs capture-manifests --output-dir reproducibility

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend container image
        id: backend-container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          outputs: type=oci,dest=/tmp/backend-reproducibility-${{ matrix.run_id }}.tar
          provenance: false
          sbom: false
          no-cache: true
          pull: true

      - name: Build frontend container image
        id: frontend-container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=/api
          outputs: type=oci,dest=/tmp/frontend-reproducibility-${{ matrix.run_id }}.tar
          provenance: false
          sbom: false
          no-cache: true
          pull: true

      - name: Persist container digests
        run: |
          test -n '${{ steps.backend-container.outputs.digest }}'
          test -n '${{ steps.frontend-container.outputs.digest }}'
          printf '%s\n' '${{ steps.backend-container.outputs.digest }}' > reproducibility/backend-image-digest.txt
          printf '%s\n' '${{ steps.backend-container.outputs.metadata }}' > reproducibility/backend-image-metadata.json
          printf '%s\n' '${{ steps.frontend-container.outputs.digest }}' > reproducibility/frontend-image-digest.txt
          printf '%s\n' '${{ steps.frontend-container.outputs.metadata }}' > reproducibility/frontend-image-metadata.json

      - name: Upload reproducibility build evidence
        uses: actions/upload-artifact@v7
        with:
          name: reproducibility-build-${{ matrix.run_id }}
          path: reproducibility/
          retention-days: 30

  reproducibility-compare:
    name: Reproducibility Compare
    runs-on: ubuntu-latest
    needs: [reproducibility-build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Download reproducibility build A
        uses: actions/download-artifact@v8
        with:
          name: reproducibility-build-run-a
          path: reproducibility/run-a

      - name: Download reproducibility build B
        uses: actions/download-artifact@v8
        with:
          name: reproducibility-build-run-b
          path: reproducibility/run-b

      - name: Compare reproducibility evidence
        run: |
          node scripts/ci/reproducibility-verify.mjs compare-runs \
            --run-a reproducibility/run-a \
            --run-b reproducibility/run-b \
            --output-dir release-artifacts/reproducibility \
            --allowlist scripts/ci/reproducibility-allowlist.json \
            --commit "${GITHUB_SHA}"

      - name: Upload reproducibility comparison evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-reproducibility-${{ github.run_id }}
          path: release-artifacts/reproducibility/
          retention-days: 30

      - name: Enforce reproducibility parity or allowlist-only drift
        run: |
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('release-artifacts/reproducibility/reproducibility-comparison.json','utf8')); if (report.blocking_diff_count > 0) { console.error('Blocking reproducibility diffs detected.'); process.exit(1); } console.log('Reproducibility status:', report.status);"

  await-upstream-release-gates:
    name: Await Upstream Release Gates
    runs-on: ubuntu-latest
    needs: [reproducibility-compare]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Wait for canonical upstream checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_GATE_LOCAL_RESULTS_JSON: "{}"
          RELEASE_GATE_POLL_TIMEOUT_SECONDS: "5400"
          RELEASE_GATE_POLL_INTERVAL_SECONDS: "30"
        run: |
          node scripts/ci/verify-release-gate-status.mjs

  manifest-maturity-release-gate:
    name: Manifest Maturity Release Gate
    runs-on: ubuntu-latest
    needs: [await-upstream-release-gates]
    steps:
      - uses: actions/checkout@v6

      - name: Block release if critical manifests lack evidence links
        run: |
          node scripts/ci/check-k8s-manifest-maturity.mjs             --mode=release-gate             --environment=production             --ledger-path=infra/k8s/manifest-maturity-ledger.json             --require-critical-evidence-links=true

  secret-rotation-evidence-release-gate:
    name: Secret Rotation Evidence Release Gate
    runs-on: ubuntu-latest
    needs: [manifest-maturity-release-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Block release when open critical secret incidents lack evidence
        run: node scripts/ci/check-secret-rotation-evidence.mjs

  release:
    name: Version or Release
    runs-on: ubuntu-latest
    needs:
      [
        reproducibility-compare,
        await-upstream-release-gates,
        manifest-maturity-release-gate,
        secret-rotation-evidence-release-gate,
      ]
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for changeset version to compute changelogs
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace package release/CI policy
        run: pnpm run check:workspace-package-governance

      - name: Build workspace
        run: pnpm run build --if-present

      - name: Download reproducibility comparison evidence
        uses: actions/download-artifact@v8
        with:
          name: release-reproducibility-${{ github.run_id }}
          path: release-artifacts/reproducibility

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend release image
        id: backend-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:sha-${{ github.sha }}
          provenance: true
          sbom: true

      - name: Resolve backend immutable image reference
        id: backend-image-ref
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.backend-image.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend release image
        id: frontend-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:sha-${{ github.sha }}
          provenance: true
          sbom: true

      - name: Verify and capture build attestations (provenance + SBOM)
        env:
          BACKEND_METADATA: ${{ steps.backend-image.outputs.metadata }}
          FRONTEND_METADATA: ${{ steps.frontend-image.outputs.metadata }}
        run: |
          mkdir -p release-artifacts/attestations
          printf '%s\n' "$BACKEND_METADATA" > release-artifacts/attestations/backend-build-metadata.json
          printf '%s\n' "$FRONTEND_METADATA" > release-artifacts/attestations/frontend-build-metadata.json

          node - <<'NODE'
          const fs = require('fs');

          const attestationOutputMap = {
            backend: 'release-artifacts/attestations/backend-attestations.json',
            frontend: 'release-artifacts/attestations/frontend-attestations.json',
          };

          const parseMetadata = (label, raw) => {
            if (!raw || !raw.trim()) {
              throw new Error(`${label}: docker/build-push-action metadata output is empty.`);
            }
            const metadata = JSON.parse(raw);
            const attestations = Object.entries(metadata).filter(([key]) => {
              const normalized = key.toLowerCase();
              return normalized.includes('provenance') || normalized.includes('sbom');
            });

            if (attestations.length === 0) {
              throw new Error(
                `${label}: no provenance/SBOM entries found in build metadata; refusing to continue to publish.`,
              );
            }

            const hasProvenance = attestations.some(([key]) => key.toLowerCase().includes('provenance'));
            const hasSbom = attestations.some(([key]) => key.toLowerCase().includes('sbom'));

            if (!hasProvenance || !hasSbom) {
              throw new Error(
                `${label}: expected both provenance and SBOM attestations, found keys: ${attestations
                  .map(([key]) => key)
                  .join(', ')}`,
              );
            }

            fs.writeFileSync(attestationOutputMap[label], JSON.stringify(Object.fromEntries(attestations), null, 2));
          };

          parseMetadata('backend', process.env.BACKEND_METADATA);
          parseMetadata('frontend', process.env.FRONTEND_METADATA);
          console.log('Verified provenance/SBOM attestations for backend and frontend container builds.');
          NODE

      - name: Resolve frontend immutable image reference
        id: frontend-image-ref
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.frontend-image.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p release-artifacts
          pnpm dlx @cyclonedx/cyclonedx-npm --output-file release-artifacts/sbom.cyclonedx.json --output-format JSON --ignore-npm-errors

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release container images with cosign + OIDC
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${{ steps.backend-image-ref.outputs.image_ref }}"
          cosign sign --yes "${{ steps.frontend-image-ref.outputs.image_ref }}"

      - name: Sign release security artifacts with cosign + OIDC
        run: |
          cosign sign-blob --yes release-artifacts/sbom.cyclonedx.json \
            --output-signature release-artifacts/sbom.cyclonedx.json.sig \
            --output-certificate release-artifacts/sbom.cyclonedx.json.pem

          cosign sign-blob --yes release-artifacts/sbom.spdx.json \
            --output-signature release-artifacts/sbom.spdx.json.sig \
            --output-certificate release-artifacts/sbom.spdx.json.pem

      - name: Verify generated SBOMs and signatures
        run: |
          test -s release-artifacts/sbom.cyclonedx.json
          test -s release-artifacts/sbom.spdx.json
          test -s release-artifacts/sbom.cyclonedx.json.sig
          test -s release-artifacts/sbom.spdx.json.sig
          test -s release-artifacts/sbom.cyclonedx.json.pem
          test -s release-artifacts/sbom.spdx.json.pem

          cosign verify-blob release-artifacts/sbom.cyclonedx.json \
            --signature release-artifacts/sbom.cyclonedx.json.sig \
            --certificate release-artifacts/sbom.cyclonedx.json.pem \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

          cosign verify-blob release-artifacts/sbom.spdx.json \
            --signature release-artifacts/sbom.spdx.json.sig \
            --certificate release-artifacts/sbom.spdx.json.pem \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify signed release container images
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            "${{ steps.backend-image-ref.outputs.image_ref }}"

          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            "${{ steps.frontend-image-ref.outputs.image_ref }}"

      - name: Dependency license policy check (optional)
        run: |
          if pnpm -s run | rg -q '^\s*license:check\b'; then
            pnpm run license:check
          else
            echo "license:check script not configured; skipping policy check."
          fi

      - name: Observability release gates
        run: |
          pnpm run check:telemetry-completeness
          pnpm run check:observability-deployment-gates

      - name: Generate release manifest artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          BACKEND_IMAGE_REF: ${{ steps.backend-image-ref.outputs.image_ref }}
          BACKEND_IMAGE_DIGEST: ${{ steps.backend-image.outputs.digest }}
          FRONTEND_IMAGE_REF: ${{ steps.frontend-image-ref.outputs.image_ref }}
          FRONTEND_IMAGE_DIGEST: ${{ steps.frontend-image.outputs.digest }}
          RELEASE_MANIFEST_OUTPUT: release-artifacts/release-manifest.json
          RELEASE_MANIFEST_ARTIFACT_NAME: release-manifest-${{ github.sha }}
        run: |
          node scripts/ci/generate-release-manifest.mjs

      - name: Generate release-control summary artifact
        env:
          RELEASE_MANIFEST_PATH: release-artifacts/release-manifest.json
          RELEASE_CONTROL_SUMMARY_JSON: release-artifacts/release-control-summary.json
          RELEASE_CONTROL_SUMMARY_MD: release-artifacts/release-control-summary.md
        run: |
          node scripts/ci/write-release-control-summary.mjs

      - name: Publish auditor-ready control dashboard artifact
        env:
          CONTROL_DASHBOARD_JSON: release-artifacts/compliance/control-dashboard.json
          CONTROL_DASHBOARD_MD: release-artifacts/compliance/control-dashboard.md
        run: |
          node scripts/ci/publish-control-dashboard.mjs

      - name: Upload release manifest bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest-${{ github.sha }}
          path: |
            release-artifacts/release-manifest.json
            release-artifacts/release-control-summary.json
            release-artifacts/release-control-summary.md
            release-artifacts/compliance/control-dashboard.json
            release-artifacts/compliance/control-dashboard.md
            release-artifacts/sbom.cyclonedx.json
            release-artifacts/sbom.cyclonedx.json.sig
            release-artifacts/sbom.cyclonedx.json.pem
            release-artifacts/sbom.spdx.json
            release-artifacts/sbom.spdx.json.sig
            release-artifacts/sbom.spdx.json.pem
            release-artifacts/attestations/backend-build-metadata.json
            release-artifacts/attestations/frontend-build-metadata.json
            release-artifacts/attestations/backend-attestations.json
            release-artifacts/attestations/frontend-attestations.json

      - name: Create Release PR or tag & publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Use the workspace-installed @changesets/cli to bump package versions and update changelogs.
          version: pnpm changeset version
          # This repository does not publish to npm from CI; the release artifact is the git tag + GitHub Release.
          publish: pnpm changeset tag
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate published packages against release policy
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/ci/check-workspace-package-governance.mjs --mode=release --published-packages-env=PUBLISHED_PACKAGES

      - name: Create GitHub Releases for tagged packages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const fs = require('fs');
            const artifacts = [
              'release-artifacts/sbom.cyclonedx.json',
              'release-artifacts/sbom.cyclonedx.json.sig',
              'release-artifacts/sbom.cyclonedx.json.pem',
              'release-artifacts/sbom.spdx.json',
              'release-artifacts/sbom.spdx.json.sig',
              'release-artifacts/sbom.spdx.json.pem',
              'release-artifacts/compliance/control-dashboard.json',
              'release-artifacts/compliance/control-dashboard.md',
              'release-artifacts/reproducibility/reproducibility-report.md',
              'release-artifacts/reproducibility/reproducibility-comparison.json',
              'release-artifacts/reproducibility/reproducibility-allowlisted-diff.json',
            ];
            const publishedPackages = JSON.parse(process.env.PUBLISHED_PACKAGES);
            for (const pkg of publishedPackages) {
              const tag = `${pkg.name}@${pkg.version}`;
              let release;
              try {
                const response = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                release = response.data;
                console.log(`Release for ${tag} already exists, skipping.`);
              } catch (err) {
                if (err.status !== 404) throw err;
                const response = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `${pkg.name} v${pkg.version}`,
                  generate_release_notes: true,
                  draft: false,
                  prerelease: false,
                });
                release = response.data;
                console.log(`Created release for ${tag}`);
              }

              const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                per_page: 100,
              });

              for (const artifactPath of artifacts) {
                const fileName = artifactPath.split('/').pop();
                const prior = existingAssets.find((asset) => asset.name === fileName);
                if (prior) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: prior.id,
                  });
                }

                const data = fs.readFileSync(artifactPath);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  name: fileName,
                  data,
                });
                console.log(`Uploaded ${fileName} to ${tag}`);
              }
            }

  control-plane-summary:
    name: control-plane-summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - reproducibility-compare
      - await-upstream-release-gates
      - manifest-maturity-release-gate
      - secret-rotation-evidence-release-gate
      - release
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Collect executed jobs for this run
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const normalized = jobs.map((job) => ({
              id: job.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''),
              name: job.name,
              status: job.status,
              conclusion: job.conclusion,
              html_url: job.html_url,
            }));
            fs.mkdirSync(path.join(process.cwd(), 'artifacts/ops'), { recursive: true });
            fs.writeFileSync(
              path.join(process.cwd(), 'artifacts/ops/workflow-jobs.json'),
              JSON.stringify(normalized, null, 2)
            );
      - name: Drift check (control matrix vs executed gates)
        run: |
          node scripts/ci/check-control-matrix-drift.mjs \
            --workflow-file=release.yml \
            --matrix-path=.github/workflows/CI_CONTROL_MATRIX.md \
            --jobs-json=artifacts/ops/workflow-jobs.json \
            --run-id=${{ github.run_id }} \
            --run-attempt=${{ github.run_attempt }}
      - name: Generate control plane summary artifact
        if: always()
        run: |
          node scripts/ci/generate-control-plane-summary.mjs \
            --workflow-file=release.yml \
            --matrix-path=.github/workflows/CI_CONTROL_MATRIX.md \
            --jobs-json=artifacts/ops/workflow-jobs.json \
            --output=artifacts/ops/control-plane-summary.json \
            --run-id=${{ github.run_id }} \
            --run-attempt=${{ github.run_attempt }}
      - name: Upload control plane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: control-plane-summary-release-${{ github.run_id }}
          path: artifacts/ops/**
          if-no-files-found: warn
          retention-days: 90
