name: Release - Blocking Integrity

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to verify (optional for manual runs)'
        required: false
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release-integrity:
    name: release-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build release artifacts
        run: pnpm run build --if-present
      - name: Validate workspace package release policy
        run: pnpm run check:workspace-package-governance
      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p release-artifacts
          pnpm dlx @cyclonedx/cyclonedx-npm --output-file release-artifacts/sbom.cyclonedx.json --output-format JSON --ignore-npm-errors
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/sbom.spdx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign release artifacts
        run: |
          cosign sign-blob --yes release-artifacts/sbom.cyclonedx.json \
            --output-signature release-artifacts/sbom.cyclonedx.json.sig \
            --output-certificate release-artifacts/sbom.cyclonedx.json.pem
          cosign sign-blob --yes release-artifacts/sbom.spdx.json \
            --output-signature release-artifacts/sbom.spdx.json.sig \
            --output-certificate release-artifacts/sbom.spdx.json.pem
      - name: Verify release manifest and signatures
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref_name }}
        run: |
          test -s release-artifacts/sbom.cyclonedx.json
          test -s release-artifacts/sbom.spdx.json
          test -s release-artifacts/sbom.cyclonedx.json.sig
          test -s release-artifacts/sbom.spdx.json.sig
          test -s release-artifacts/sbom.cyclonedx.json.pem
          test -s release-artifacts/sbom.spdx.json.pem
          cat > release-artifacts/release-manifest.json <<EOF
          {
            "release_tag": "${RELEASE_TAG}",
            "sha": "${GITHUB_SHA}",
            "artifacts": [
              "sbom.cyclonedx.json",
              "sbom.cyclonedx.json.sig",
              "sbom.cyclonedx.json.pem",
              "sbom.spdx.json",
              "sbom.spdx.json.sig",
              "sbom.spdx.json.pem"
            ]
          }
          EOF
          cosign verify-blob release-artifacts/sbom.cyclonedx.json \
            --signature release-artifacts/sbom.cyclonedx.json.sig \
            --certificate release-artifacts/sbom.cyclonedx.json.pem \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          cosign verify-blob release-artifacts/sbom.spdx.json \
            --signature release-artifacts/sbom.spdx.json.sig \
            --certificate release-artifacts/sbom.spdx.json.pem \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
      - name: Upload release integrity artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-integrity-${{ github.run_id }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30
