name: Migrations Check

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/rollbacks/**'
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/rollbacks/**'

jobs:
  migration-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run migration checks
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          git fetch origin "${BASE_BRANCH}" --depth=1 || true
          bash scripts/ci/check-migrations.sh
