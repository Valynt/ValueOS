name: Dependency Outdated Report

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-outdated-report:
    name: dependency-outdated-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Collect pnpm outdated report
        run: |
          mkdir -p ci-artifacts
          pnpm outdated --format=json > ci-artifacts/pnpm-outdated.json || true

      - name: Analyze dependency risk policy
        id: analyze
        env:
          OUTDATED_POLICY_MODE: warn
          OUTDATED_FAIL_ON_CRITICAL_AGE: "false"
          OUTDATED_CRITICAL_MAJOR_MAX_AGE_DAYS: "180"
          OUTDATED_CRITICAL_PACKAGES: react,react-dom,express,zod,vitest,@supabase/supabase-js
        run: |
          node scripts/ci/analyze-outdated-dependencies.mjs \
            --input ci-artifacts/pnpm-outdated.json \
            --summary ci-artifacts/dependency-outdated-summary.md \
            --report ci-artifacts/dependency-outdated-report.json

      - name: Export high-risk major count
        id: high-risk-count
        run: |
          COUNT=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('ci-artifacts/dependency-outdated-report.json','utf8'));process.stdout.write(String(data.highRiskMajors?.length ?? 0));")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload outdated artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-outdated-${{ github.run_id }}
          path: |
            ci-artifacts/pnpm-outdated.json
            ci-artifacts/dependency-outdated-summary.md
            ci-artifacts/dependency-outdated-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Comment PR for high-risk major upgrades
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && steps.high-risk-count.outputs.count != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('ci-artifacts/dependency-outdated-report.json', 'utf8'));
            const rows = report.highRiskMajors
              .map((pkg) => `| ${pkg.name} | ${pkg.current} | ${pkg.latest} | ${pkg.releaseAgeDays ?? 'n/a'} |`)
              .join('\n');
            const body = [
              '<!-- dependency-outdated-risk-comment -->',
              '## ⚠️ High-risk major dependency upgrades detected',
              '',
              '| Package | Current | Latest | Latest release age (days) |',
              '| --- | --- | --- | --- |',
              rows,
              '',
              'See `dependency-outdated-*` workflow artifact for full triage details.'
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find((comment) => comment.body.includes('dependency-outdated-risk-comment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
