name: Secure CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  packages: write

env:
  NODE_VERSION: '20.19.0'
  PNPM_VERSION: '9.15.0'

jobs:
  secrets-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install git-secrets
        run: |
          curl -s -L https://github.com/awslabs/git-secrets/archive/refs/tags/1.3.0.tar.gz | tar xz
          cd git-secrets-1.3.0 && sudo make install
          git secrets --register-aws
          git secrets --install
      - name: Run git-secrets
        run: git secrets --scan --recursive

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: .
          base: 'HEAD'
          head: ''

  ci-verify:
    name: Canonical quality gates (lint → typecheck → test → build)
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run canonical pipeline
        run: pnpm run ci:verify

  rls-multi-tenant:
    needs: ci-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Run Supabase RLS tests
        env:
          SUPABASE_TEST_TIMEOUT: 1200
        run: |
          supabase test db --workdir supabase --tests supabase/tests/database/rls_policies.test.sql supabase/tests/database/multi_tenant_rls.test.sql

  dependency-audit:
    needs: rls-multi-tenant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

  sbom-and-scan:
    needs: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.21.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-trivy
          path: |
            sbom.spdx.json
            trivy-results.sarif
