# Example workflow: Build Docker image using BuildKit / buildx with cache
# - Uses build-push-action with cache-from/cache-to (type=gha) to persist build cache across runs
# - Demonstrates building `.devcontainer/Dockerfile.optimized` with BuildKit enabled
# - Adjust `APP` build-arg or push settings as needed for your CI

name: Docker Build (BuildKit)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Ensures BuildKit is enabled for portability; buildx also enables BuildKit implicitly
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache local pnpm store (optional, host-side)
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Build (BuildKit + buildx cache, no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .devcontainer/Dockerfile.optimized
          push: false
          tags: valueos-valyntapp:ci
          platforms: linux/amd64
          build-args: |
            APP=ValyntApp
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Conditional push: only run when the workflow is triggered by a push or manual dispatch
      - name: Log in to GHCR using PAT (if provided)
        if: ${{ secrets.REGISTRY_PAT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PAT }}

      - name: Log in to GHCR using GITHUB_TOKEN
        if: ${{ !secrets.REGISTRY_PAT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GHCR) (only on push/workflow_dispatch)
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .devcontainer/Dockerfile.optimized
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/valueos-valyntapp:latest
            ghcr.io/${{ github.repository_owner }}/valueos-valyntapp:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP=ValyntApp
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show created image (optional)
        run: docker image ls --format "{{.Repository}}:{{.Tag}}\t{{.Size}}" | grep valueos || true

# Notes:
# - This workflow uses GitHub Actions cache for buildx (type=gha). For private registries or advanced caching
#   you can use `type=registry` or `type=local` with mount paths persisted between runs.
# - This workflow demonstrates pushing to GHCR (ghcr.io) using the repository `GITHUB_TOKEN`.
#   The job sets `permissions: packages: write` so the token can publish packages. If your org restricts
#   token permissions, either enable package write permissions or use a PAT with `write:packages` stored as a secret.
# - For increased parallelism or layers reuse, ensure DOCKER_BUILDKIT=1 is enabled in your runner environment.