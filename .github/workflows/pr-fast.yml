name: PR Fast

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: pr-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write  # for gitleaks SARIF upload

jobs:
  # ── Secret scan (diff) — must pass before any merge ─────────────────────────
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks on PR diff
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >-
            detect
            --config=.gitleaks.toml
            --log-opts="origin/${{ github.base_ref }}..HEAD"
            --redact
            --exit-code=1
            --report-format=sarif
            --report-path=gitleaks-pr.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-pr.sarif
          category: gitleaks-pr

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/secret-scan
          cat > artifacts/ci-lanes/secret-scan/summary.md <<EOF_SUMMARY
          # secret-scan
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-secret-scan-${{ github.run_id }}
          path: artifacts/ci-lanes/secret-scan/**
          if-no-files-found: warn
          retention-days: 30

  ts-type-ratchet:
    name: ts-type-ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript error ratchet
        run: node scripts/ci/ts-error-ratchet.mjs

      - name: ValyntApp TypeScript baseline ratchet + weekly debt report
        run: |
          node scripts/ci/valyntapp-ts-error-policy.mjs --enforce --report-file=artifacts/ci-lanes/ts-type-ratchet/valyntapp-ts-error-weekly.md

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/ts-type-ratchet
          cat > artifacts/ci-lanes/ts-type-ratchet/summary.md <<EOF_SUMMARY
          # ts-type-ratchet
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-ts-type-ratchet-${{ github.run_id }}
          path: artifacts/ci-lanes/ts-type-ratchet/**
          if-no-files-found: warn
          retention-days: 30

  lint-runtime-packages:
    name: lint-runtime-packages (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: backend
            lint_command: pnpm lint:ci:backend
            report_path: artifacts/eslint/backend.json
          - lane: valynt-app
            lint_command: pnpm lint:ci:valynt-app
            report_path: artifacts/eslint/valynt-app.json
          - lane: shared
            lint_command: pnpm lint:ci:shared
            report_path: artifacts/eslint/shared.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint lane
        run: ${{ matrix.lint_command }}
      - name: Lint ratchet guard
        run: node scripts/ci/lint-ratchet-check.mjs --lane "${{ matrix.lane }}" --report "${{ matrix.report_path }}"
      - name: A11y ESLint weekly warning ratchet
        if: matrix.lane == 'valynt-app'
        run: node scripts/ci/a11y-eslint-weekly-ratchet.mjs --report "${{ matrix.report_path }}"

  production-eslint-ratchet:
    name: production-eslint-ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run production lint profile
        run: pnpm lint:ci:production-profile
      - name: Enforce production lint allowlist and warning ratchet
        run: pnpm check:production-eslint-profile

  unit-component-schema:
    name: unit/component/schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install autoscaling manifest validation tools
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.7.1/kustomize_v5.7.1_linux_amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin"
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin" kubeconform
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Agent autoscaling manifest validation
        run: python3 scripts/ci/validate-agent-autoscaling-manifests.py
      - name: Kubernetes security policy render validation
        run: node scripts/ci/validate-k8s-security-policies.mjs

      - name: Canonical governance gate
        run: pnpm run typecheck:signal --verify

      - name: Canonical CI workflow self-check
        run: pnpm run ci:governance:self-check

      - name: Check runtime sentinels
        run: pnpm check:runtime-sentinels

      - name: Gateway CORS wildcard guard
        run: pnpm check:kong-cors-origins

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Backend request cast guardrails
        run: pnpm --filter @valueos/backend exec vitest run src/__tests__/req-as-any-guard.test.ts

      - name: Generated src artifacts guard
        run: node scripts/ci/check-generated-src-artifacts.mjs --base-sha="${{ github.event.pull_request.base.sha }}" --head-sha="${{ github.sha }}"
      - name: Kubernetes manifest maturity transition evidence gate
        run: node scripts/ci/check-k8s-manifest-maturity.mjs --mode=transition-check --ledger-path=infra/k8s/manifest-maturity-ledger.json --base-sha="${{ github.event.pull_request.base.sha }}" --head-sha="${{ github.sha }}"

      - name: Vitest workspace topology guard
        run: node scripts/ci/check-vitest-workspace-packages.mjs

      - name: Unit suite + schema guard
        run: |
          npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=json-summary --coverage.reporter=text-summary --coverage.thresholds.lines=75 --coverage.thresholds.functions=70 --coverage.thresholds.branches=70 --coverage.thresholds.statements=75
          node scripts/ci/check-migration-hygiene.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          node scripts/ci/check-migration-rollbacks.mjs
          node scripts/ci/verify-critical-architecture-migrations.mjs

      - name: Workflow DAG acyclicity guard
        run: pnpm run test:workflow-dag-validation

      - name: TypeScript any-count gate
        run: |
          node scripts/ci/any-ratchet.mjs
          bash scripts/check-any-count.sh

      - name: Backend debt summary artifact
        if: always()
        run: pnpm --filter @valueos/backend run debt:summary

      - name: Docs integrity
        run: node scripts/ci/docs-integrity.mjs
      - name: Docs date integrity + compliance artifact
        run: node scripts/ci/check-docs-date-integrity.mjs

      - name: Ownership metadata guard
        run: node scripts/ci/check-ownership-metadata.mjs

      - name: OpenAPI canonical path allowlist guard
        run: node scripts/ci/check-openapi-file-allowlist.mjs

      - name: OpenAPI single-root guard (canonical backend spec)
        run: node scripts/ci/check-openapi-single-root.mjs

      - name: OpenAPI structural validation (canonical backend spec)
        run: node scripts/ci/check-openapi-structure.mjs

      - name: Express ↔ OpenAPI route security posture gate
        run: node scripts/ci/express-openapi-security-check.mjs

      - name: Security owner signoff gate for unprotected route additions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/ci/require-security-signoff-if-unprotected-routes.mjs

      - name: Query fingerprint perf budget gate
        run: node scripts/ci/check-query-fingerprint-budgets.mjs --budgets=infra/observability/query-fingerprint-budgets.json --snapshot=infra/observability/query-fingerprint-latest.json

      - name: Latency target consistency gate
        run: node scripts/ci/check-latency-target-consistency.mjs --base-sha="${{ github.event.pull_request.base.sha }}" --head-sha="${{ github.sha }}"

      - name: Compose drift guard
        run: node scripts/ci/check-compose-drift.mjs

      - name: Compose DB binding guard
        run: node scripts/ci/check-compose-db-bindings.mjs

      - name: Runtime platform contract guard
        run: pnpm run check:runtime-platform-contract

      - name: Archived ECS guardrails
        run: pnpm run check:archived-ecs-guardrails

      - name: Env/port drift guard
        run: node scripts/ci/check-env-port-drift.mjs

      - name: Hardcoded port mismatch guard
        run: node scripts/ci/check-hardcoded-port-mismatches.mjs

      - name: TODO metadata guard (no untracked TODOs in production paths)
        run: node .github/scripts/check-todo-metadata.cjs

      - name: Direct LLM call guard
        run: node scripts/ci/check-direct-llm-calls.mjs

      - name: Security anti-pattern guard
        run: node scripts/ci/check-security-antipatterns.mjs

      - name: PodSecurityPolicy removal guard
        run: node scripts/ci/check-psp-references.mjs

      - name: Guard browser provider secrets
        run: pnpm check:browser-provider-secrets

      - name: Guard frontend bundle service-role identifiers
        run: pnpm check:frontend-bundle-service-role

      - name: Guard backend service-role boundaries
        run: pnpm check:backend-service-role-boundaries

      - name: Workflow/package script drift guard
        run: pnpm run check:workflow-package-script-drift

      - name: Workflow pnpm contract guard
        run: pnpm run check:workflow-pnpm-contract

      - name: Workspace package governance inventory
        run: pnpm run check:workspace-package-governance

      - name: LLM secrets hygiene guard
        run: node scripts/ci/check-llm-secrets-hygiene.mjs

      - name: LLM readiness contract guard
        run: node scripts/ci/check-llm-readiness-contract.mjs

      - name: Infra readiness contract guard
        run: node scripts/ci/check-infra-readiness-contract.mjs

      - name: Architecture doc / runtime drift guard
        run: node scripts/ci/check-architecture-doc-drift.mjs

      - name: Supabase tenant controls guard
        run: node scripts/ci/check-supabase-tenant-controls.mjs

      - name: Security baseline verification
        run: node scripts/ci/security-baseline-verification.mjs

      - name: CI security control-matrix guard
        run: node scripts/ci/check-ci-security-control-matrix.mjs

      - name: Required-check documentation/workflow consistency guard
        run: node scripts/ci/check-required-check-workflow-consistency.mjs

      - name: Deploy workflow release-gate consistency guard
        run: node scripts/ci/check-deploy-workflow-release-gate-consistency.mjs

      - name: CI scanner action version manifest guard
        run: node scripts/ci/check-ci-workflow-scanner-refs.mjs

      - name: Compliance control regression gate
        run: node scripts/ci/check-compliance-control-regressions.mjs

      - name: Critical control status gate (SOC2/HIPAA)
        run: node scripts/ci/check-control-status-critical.mjs

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/unit-component-schema
          cat > artifacts/ci-lanes/unit-component-schema/summary.md <<EOF_SUMMARY
          # unit/component/schema
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-unit-component-schema-${{ github.run_id }}
          path: |
            coverage/**
            artifacts/backend-debt/**
            artifacts/ci-lanes/unit-component-schema/**
            artifacts/security/**
          if-no-files-found: warn
          retention-days: 30

  tenant-isolation-static-gate:
    name: tenant-isolation-static-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Static tenant boundary guards
        run: |
          node scripts/ci/check-supabase-tenant-controls.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          bash scripts/ci/check-permissive-rls.sh
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/tenant-isolation-static-gate
          cat > artifacts/ci-lanes/tenant-isolation-static-gate/summary.md <<EOF_SUMMARY
          # tenant-isolation-static-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-tenant-isolation-static-gate-${{ github.run_id }}
          path: artifacts/ci-lanes/tenant-isolation-static-gate/**
          if-no-files-found: warn
          retention-days: 30

  tenant-isolation-gate:
    name: tenant-isolation-gate
    runs-on: ubuntu-latest
    # Runs on ALL PRs including forks. Live-DB steps are gated per-step on
    # secret availability so fork PRs still exercise static analysis.
    # Removing the job-level if: condition ensures this job is never silently
    # skipped — the pr-fast gate treats skipped as a failure for this lane.
    permissions:
      contents: read
      # id-token: write is only needed for OIDC-based secret access on non-fork PRs.
      # Fork PRs run without this permission; live-DB steps are skipped via per-step if:.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare compliance report directories
        run: |
          mkdir -p reports/compliance/rls
          mkdir -p reports/compliance/dsr
      - name: Tenant isolation + compliance tests (live DB — non-fork only)
        # Secrets are unavailable on fork PRs; skip only this step, not the whole job.
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts \
            packages/memory/tests/tenant-vector-isolation.test.ts \
            packages/memory/tests/tenant-semantic-retrieval-boundary.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=reports/compliance/rls/vitest-rls.junit.xml \
            --outputFile.json=reports/compliance/rls/vitest-rls.json
      - name: Tenant isolation static analysis (fork PRs — no live DB)
        # Runs on fork PRs where live-DB secrets are unavailable.
        # Only runs tests that do not require a real Supabase connection.
        # rls-tenant-isolation.test.ts and supabase-rls-policy-matrix.test.ts
        # require live DB and will throw if secrets are absent — they are
        # intentionally excluded here and run only in the non-fork step above.
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/api-tenant-isolation.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/compliance/rls/vitest-rls-fork.junit.xml
      - name: Assert RLS test count (non-fork only)
        # Fail if the live-DB run produced zero passing tests — guards against
        # a misconfigured suite that silently skips all assertions.
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          REPORT=reports/compliance/rls/vitest-rls.json
          if [ ! -f "$REPORT" ]; then
            echo "ERROR: RLS test report not found at $REPORT"
            exit 1
          fi
          PASSED=$(node -e "const r=require('./$REPORT'); console.log(r.numPassedTests ?? 0)")
          echo "RLS tests passed: $PASSED"
          if [ "$PASSED" -lt 10 ]; then
            echo "ERROR: Expected at least 10 RLS tests to pass, got $PASSED. Check that Supabase secrets are configured and tests are not being skipped."
            exit 1
          fi

      - name: Run DSR compliance tests (non-fork only)
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx vitest run tests/compliance/dsr-workflow.test.ts packages/backend/src/api/__tests__/dataSubjectRequests.piiTables.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/compliance/dsr/vitest-dsr.junit.xml
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/tenant-isolation-gate
          cat > artifacts/ci-lanes/tenant-isolation-gate/summary.md <<EOF_SUMMARY
          # tenant-isolation-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-tenant-isolation-gate-${{ github.run_id }}
          path: |
            reports/compliance/**
            artifacts/ci-lanes/tenant-isolation-gate/**
          if-no-files-found: warn
          retention-days: 30

  accessibility-audit:
    name: accessibility-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: |
          mkdir -p artifacts/bundle
          npx turbo run build --filter=valynt-app 2>&1 | tee artifacts/bundle/vite-build.log
      - name: Bundle regression gate
        run: |
          node scripts/ci/check-vite-bundle-regression.mjs \
            --log artifacts/bundle/vite-build.log \
            --metrics .github/metrics/vite-bundle-metrics.json \
            --summary-out artifacts/bundle/summary.md \
            --json-out artifacts/bundle/metrics.json \
            --history-out artifacts/bundle/history-comparison.json
          cat artifacts/bundle/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Run WCAG 2.2 AA accessibility tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: artifacts/accessibility/playwright-report.json
        run: |
          mkdir -p artifacts/accessibility
          npx playwright test tests/accessibility/axe-a11y.spec.ts tests/accessibility/wcag-compliance.test.ts \
            --reporter=html,json \
            --output=artifacts/accessibility
      - name: Accessibility trend gate
        if: always()
        run: |
          node scripts/ci/a11y-trend-gate.mjs \
            --report artifacts/accessibility/playwright-report.json \
            --baseline .github/metrics/accessibility-baseline.json \
            --metrics-out artifacts/accessibility/a11y-metrics.json \
            --summary-out artifacts/accessibility/a11y-trend-summary.md
      - name: Enforce WCAG severity budgets
        if: always()
        run: |
          node scripts/ci/check-a11y-severity-budgets.mjs \
            --report artifacts/accessibility/playwright-report.json \
            --budget .github/metrics/wcag-severity-budgets.json \
            --metrics-out artifacts/accessibility/wcag-severity-metrics.json
      - name: Generate i18n key extraction catalog
        if: always()
        run: node scripts/ci/extract-i18n-catalog.mjs --out artifacts/i18n/extracted-keys.json
      - name: Verify localization coverage
        if: always()
        run: node scripts/ci/check-i18n-keys.mjs --json-out artifacts/i18n/coverage-dashboard.json
      - name: Verify pseudo-localization readiness
        if: always()
        run: node scripts/ci/check-pseudo-localization.mjs --json-out artifacts/i18n/pseudo-localization-report.json
      - name: Async view completeness check (REQ-A2)
        if: always()
        run: pnpm run check:a11y-completeness
      - name: Design token contrast check (REQ-A3)
        if: always()
        run: pnpm run check:contrast
      - name: Build frontend quality dashboard artifacts
        if: always()
        run: |
          node scripts/ci/collect-frontend-quality-dashboard.mjs \
            --dashboard-out artifacts/frontend-quality/dashboard.md \
            --json-out artifacts/frontend-quality/dashboard.json
      - name: Upload accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-audit-${{ github.run_id }}
          path: |
            playwright-report/
            artifacts/accessibility/
            artifacts/i18n/
            artifacts/frontend-quality/
            artifacts/bundle/
          if-no-files-found: warn
          retention-days: 30

  e2e-critical:
    name: e2e-critical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npx turbo run build --filter=valynt-app

      - name: Run critical E2E suite
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: |
          mkdir -p artifacts/e2e
          npx playwright test \
            tests/e2e/auth-complete-flow.spec.ts \
            tests/e2e/critical-user-flow.spec.ts \
            --reporter=html,json \
            --output=artifacts/e2e \
            --retries=1

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/e2e-critical
          cat > artifacts/ci-lanes/e2e-critical/summary.md <<EOF_SUMMARY
          # e2e-critical
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-critical-${{ github.run_id }}
          path: |
            playwright-report/
            artifacts/e2e/
            artifacts/ci-lanes/e2e-critical/
          if-no-files-found: warn
          retention-days: 30

  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SCA — pnpm audit (fail on high/critical)
        run: pnpm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)
      - name: Dev routes static check — child_process must be behind dynamic import
        run: |
          set -euo pipefail
          # Verify dev.ts is only ever loaded via dynamic import() in devRoutes.ts,
          # never via a static top-level import in server.ts or any other entry point.
          if grep -rn "^import.*from.*['\"].*dev\.js['\"]" packages/backend/src/server.ts packages/backend/src/app.ts 2>/dev/null; then
            echo "FAIL: dev.ts is statically imported in a server entry point."
            echo "It must only be loaded via dynamic import() inside registerDevRoutes()."
            exit 1
          fi
          # Verify the dynamic import guard is still in place
          if ! grep -q "await import.*dev\.js" packages/backend/src/routes/devRoutes.ts; then
            echo "FAIL: Dynamic import guard for dev.ts not found in devRoutes.ts."
            echo "registerDevRoutes() must use dynamic import() to load dev.ts."
            exit 1
          fi
          echo "Dev routes static check: PASS"
      - name: Secret scan — gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: SAST — Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Build backend container image for Trivy
        run: docker build -f infra/docker/Dockerfile.backend -t valueos-backend:ci .
      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Trivy container image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: valueos-backend:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: SBOM — generate CycloneDX
        run: pnpm exec cyclonedx-npm --output-format json --output-file sbom.json
      - name: SBOM — verify artifact exists and is non-empty
        run: |
          if [ ! -s sbom.json ]; then
            echo "SBOM generation failed: sbom.json is missing or empty" >&2
            exit 1
          fi
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-gate-${{ github.run_id }}
          path: |
            npm-audit-report.json
            semgrep.sarif
            trivy-fs.sarif
            trivy-image.sarif
            sbom.json
          if-no-files-found: warn
          retention-days: 90

  # ── MFA production config gate ───────────────────────────────────────────────
  # Fails if any env file that could reach production has MFA_ENABLED=false.
  # MFA defaults to enabled in code; this gate catches explicit opt-outs.
  mfa-production-config-gate:
    name: mfa-production-config-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check MFA_ENABLED is not false in production-path env files
        run: |
          set -euo pipefail
          FAIL=0

          # Files that are explicitly for production or could reach production.
          # .env.example is excluded — it is documentation, not a deployed artifact.
          PROD_ENV_FILES=(
            ".env"
            "envs/production.env"
            "envs/prod.env"
            "ops/env/.env.prod"
            "ops/env/.env.production"
          )

          for f in "${PROD_ENV_FILES[@]}"; do
            if [ -f "$f" ]; then
              if grep -qE '^MFA_ENABLED=false\s*$' "$f"; then
                echo "FAIL: $f sets MFA_ENABLED=false — MFA must be enabled in production"
                FAIL=1
              fi
            fi
          done

          # Also scan Helm values and K8s manifests for explicit MFA_ENABLED=false
          if grep -rE 'MFA_ENABLED.*false' infra/k8s/ infra/helm/ 2>/dev/null | grep -v '#'; then
            echo "FAIL: K8s/Helm manifest sets MFA_ENABLED=false"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "MFA production config gate: FAIL"
            echo "MFA_ENABLED defaults to true in code. Remove MFA_ENABLED=false from"
            echo "production-path env files, or set it to true explicitly."
            exit 1
          fi

          echo "MFA production config gate: PASS"
  # ── Flake gate (REQ-C1) ──────────────────────────────────────────────────
  flake-gate:
    name: flake-gate
    runs-on: ubuntu-latest
    needs:
      - unit-component-schema
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download unit test report
        uses: actions/download-artifact@v4
        with:
          name: lane-unit-component-schema-${{ github.run_id }}
          path: artifacts/unit-report
      - name: Run flake gate
        run: |
          mkdir -p artifacts/ci-lanes/flake-report
          REPORT_PATH="artifacts/unit-report/vitest-report.json"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "ERROR: Vitest JSON report not found at $REPORT_PATH"
            echo "Ensure the unit-component-schema lane runs with --reporter=json and uploads vitest-report.json"
            exit 1
          fi
          node scripts/ci/flake-gate.mjs \
            --report "$REPORT_PATH" \
            --threshold 2 \
            --out artifacts/ci-lanes/flake-report/flake-summary.json
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/flake-gate
          cat > artifacts/ci-lanes/flake-gate/summary.md <<EOF_SUMMARY
          # flake-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY
      - name: Upload flake artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-flake-gate-${{ github.run_id }}
          path: |
            artifacts/ci-lanes/flake-report/**
            artifacts/ci-lanes/flake-gate/**
          if-no-files-found: warn
          retention-days: 30

  # ── Performance smoke (REQ-C4) ───────────────────────────────────────────
  performance-smoke:
    name: performance-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: npx turbo run build --filter=valynt-app
      - name: Run route load budget tests
        run: |
          mkdir -p artifacts/performance
          npx playwright test tests/performance/route-load-budgets.spec.ts \
            --reporter=json \
            --output=artifacts/performance
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: artifacts/performance/perf-report.json
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/performance-smoke
          cat > artifacts/ci-lanes/performance-smoke/summary.md <<EOF_SUMMARY
          # performance-smoke
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY
      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-performance-smoke-${{ github.run_id }}
          path: |
            artifacts/performance/**
            artifacts/ci-lanes/performance-smoke/**
          if-no-files-found: warn
          retention-days: 30

  # ── SLO alert rule validation (REQ-C5) ───────────────────────────────────
  slo-rule-validation:
    name: slo-rule-validation
    runs-on: ubuntu-latest
    # Always runs — the detect-changes step skips the expensive promtool
    # installation when no monitoring files changed. This avoids the broken
    # contains(changed_files, ...) pattern (changed_files is an integer count,
    # not a list of paths).
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect monitoring file changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}"
          if git diff --name-only "$BASE" HEAD -- 'infra/k8s/monitoring/' | grep -q .; then
            echo "monitoring_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "monitoring_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install promtool
        if: steps.changes.outputs.monitoring_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          PROM_VERSION="2.51.2"
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          promtool --version
      - name: Validate SLO recording rules
        if: steps.changes.outputs.monitoring_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          promtool check rules infra/k8s/monitoring/prometheus-slo-rules.yaml
      - name: Validate SLO alert rules
        if: steps.changes.outputs.monitoring_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          promtool check rules infra/k8s/monitoring/slo-alerts.yaml
      - name: Validate observability recording/alert rules
        if: steps.changes.outputs.monitoring_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          promtool check rules infra/k8s/monitoring/observability-recording-alerts.yaml
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/slo-rule-validation
          cat > artifacts/ci-lanes/slo-rule-validation/summary.md <<EOF_SUMMARY
          # slo-rule-validation
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-slo-rule-validation-${{ github.run_id }}
          path: artifacts/ci-lanes/slo-rule-validation/**
          if-no-files-found: warn
          retention-days: 30
  pr-fast:
    name: pr-fast
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - ts-type-ratchet
      - lint-runtime-packages
      - unit-component-schema
      - tenant-isolation-static-gate
      - tenant-isolation-gate
      - security-gate
      - accessibility-audit
      - e2e-critical
      - mfa-production-config-gate
      - flake-gate
      - performance-smoke
      - slo-rule-validation
    steps:
      - name: Enforce PR blockers
        run: |
          # secret-scan must never be skipped — it is a hard blocker.
          if [ "${{ needs.secret-scan.result }}" = "skipped" ]; then
            echo "Failing PR gate: secret-scan was skipped. This job must run on all PRs."
            exit 1
          fi

          tenant_static="${{ needs.tenant-isolation-static-gate.result }}"
          tenant_runtime="${{ needs.tenant-isolation-gate.result }}"

          # tenant-isolation-gate must always run (never skipped).
          # The job-level if: condition was removed so this should never be
          # skipped; treat it as a hard failure if it is.
          if [ "$tenant_runtime" = "skipped" ]; then
            echo "Failing PR gate: tenant-isolation-gate was skipped. This job must run on all PRs."
            exit 1
          fi

          if [ "$tenant_static" != "success" ] && [ "$tenant_runtime" != "success" ]; then
            echo "Failing PR gate: at least one tenant-isolation lane must be success."
            exit 1
          fi

          if [ "${{ needs.mfa-production-config-gate.result }}" != "success" ]; then
            echo "Failing PR gate: mfa-production-config-gate did not pass"
            exit 1
          fi

          for lane in \
            "secret-scan:${{ needs.secret-scan.result }}" \
            "ts-type-ratchet:${{ needs.ts-type-ratchet.result }}" \
            "lint-runtime-packages:${{ needs.lint-runtime-packages.result }}" \
            "unit-component-schema:${{ needs.unit-component-schema.result }}" \
            "tenant-isolation-static-gate:${{ needs.tenant-isolation-static-gate.result }}" \
            "tenant-isolation-gate:${{ needs.tenant-isolation-gate.result }}" \
            "security-gate:${{ needs.security-gate.result }}" \
            "accessibility-audit:${{ needs.accessibility-audit.result }}" \
            "e2e-critical:${{ needs.e2e-critical.result }}" \
            "mfa-production-config-gate:${{ needs.mfa-production-config-gate.result }}" \
            "flake-gate:${{ needs.flake-gate.result }}" \
            "performance-smoke:${{ needs.performance-smoke.result }}" \
            "slo-rule-validation:${{ needs.slo-rule-validation.result }}"; do
            status="${lane#*:}"
            lane_name="${lane%%:*}"
            # These gates must not be skipped — skipped means the check did not run.
            # All other lanes may be skipped (e.g. accessibility on draft PRs).
            if [ "$lane_name" = "secret-scan" ] || [ "$lane_name" = "tenant-isolation-gate" ] || [ "$lane_name" = "mfa-production-config-gate" ]; then
              if [ "$status" != "success" ] && [ "$status" != "failure" ]; then
                echo "Failing PR gate: $lane_name has unexpected status: $status"
                exit 1
              fi
            else
              if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
                echo "Failing PR gate due to lane status: $lane"
                exit 1
              fi
            fi
          done
