name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress jobs for the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Lint and Type Check
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  # ============================================================================
  # Unit Tests (Parallel Execution)
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # Split tests into chunks for parallel execution
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Shard ${{ matrix.shard }}/4)
        run: |
          npm test -- \
            --run \
            --coverage \
            --shard=${{ matrix.shard }}/4 \
            --reporter=json \
            --outputFile=test-results-${{ matrix.shard }}.json
        env:
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: test-results-${{ matrix.shard }}.json

      - name: Upload coverage
        if: matrix.shard == 1
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard }}
          path: coverage/

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: supabase/postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test tests/integration -- --run
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

  # ============================================================================
  # API Tests
  # ============================================================================
  api-tests:
    name: API Endpoint Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test tests/api -- --run
        env:
          NODE_ENV: test
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ============================================================================
  # Agent Error Handling Tests
  # ============================================================================
  agent-tests:
    name: Agent Error Handling Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run agent tests
        run: npm test tests/agents -- --run
        env:
          NODE_ENV: test

  # ============================================================================
  # RLS Leakage Hammer
  # ============================================================================
  rls-leakage-test:
    name: RLS Leakage Hammer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run RLS leakage tests
        run: npm run test:rls:leakage
        env:
          NODE_ENV: test
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ============================================================================
  # Accessibility Tests
  # ============================================================================
  accessibility-tests:
    name: Accessibility Tests (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  # ============================================================================
  # Developer Experience Checks
  # ============================================================================
  dx-check:
    name: Developer Experience Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Developer Experience checks
        run: npm run dx:check
        env:
          NODE_ENV: test
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk security scan
        if: ${{ secrets.SNYK_TOKEN }}
        run: npm run security:scan:snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # Coverage Merge & Quality Gate
  # ============================================================================
  coverage-check:
    name: Coverage Quality Gate
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage/

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from coverage report
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "
              const report = require('./coverage/coverage-summary.json');
              const total = report.total;
              console.log(total.lines.pct);
            ")

            echo "Current coverage: $COVERAGE%"

            # Fail if below threshold
            if (( $(echo "$COVERAGE < 50" | bc -l) )); then
              echo "❌ Coverage $COVERAGE% is below 50% threshold"
              exit 1
            fi

            echo "✅ Coverage $COVERAGE% meets threshold"
          else
            echo "⚠️  Coverage report not found"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  # ============================================================================
  # All Tests Pass Check
  # ============================================================================
  all-tests:
    name: All Tests Passed
    needs:
      [
        lint,
        unit-tests,
        integration-tests,
        api-tests,
        agent-tests,
        rls-leakage-test,
        accessibility-tests,
        e2e-tests,
        dx-check,
        coverage-check,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.api-tests.result }}" != "success" ]] || \
             [[ "${{ needs.agent-tests.result }}" != "success" ]] || \
             [[ "${{ needs.rls-leakage-test.result }}" != "success" ]] || \
             [[ "${{ needs.accessibility-tests.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]] || \
             [[ "${{ needs.coverage-check.result }}" != "success" ]]; then
            echo "❌ One or more test jobs failed"
            exit 1
          fi
          echo "✅ All tests passed"
