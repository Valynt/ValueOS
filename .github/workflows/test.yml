name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      filter:
        description: 'Optional package/file filter for an extra ad-hoc Vitest run'
        required: false
        default: ''
      coverage:
        description: 'Collect coverage for the ad-hoc filtered run'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']

concurrency:
  group: test-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vitest-package-matrix-config:
    name: vitest/package-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'
          cache-key-suffix: vitest-matrix

      - name: Emit Vitest package matrix
        id: matrix
        run: echo "matrix=$(node scripts/ci/emit-vitest-package-matrix.mjs)" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

  vitest-package:
    name: vitest/${{ matrix.package.label }}
    needs: vitest-package-matrix-config
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.vitest-package-matrix-config.outputs.matrix) }}
    uses: ./.github/workflows/_reusable-test.yml
    with:
      package_id: ${{ matrix.package.id }}
      package_label: ${{ matrix.package.label }}
      package_dir: ${{ matrix.package.dir }}
      coverage_dir: ${{ matrix.package.coverageDir }}
      coverage: true
      artifact_prefix: vitest

  adhoc-vitest:
    name: vitest/ad-hoc
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.filter != '' }}
    uses: ./.github/workflows/_reusable-test.yml
    with:
      filter: ${{ github.event.inputs.filter }}
      coverage: ${{ github.event.inputs.coverage == 'true' }}
      artifact_prefix: adhoc-coverage
