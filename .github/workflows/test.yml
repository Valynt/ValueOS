name: Test

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'Vitest file filter (e.g. packages/backend, tests/unit)'
        required: false
        default: ''
      coverage:
        description: 'Collect coverage'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: test-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: vitest
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      SUPABASE_JWT_ISSUER: http://localhost:54321/auth/v1
      SUPABASE_JWT_AUDIENCE: authenticated
      ALLOW_LOCAL_JWT_FALLBACK: 'true'
      DISABLE_REDIS: 'true'
      OPENAI_API_KEY: test-openai-key

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        env:
          FILTER: ${{ github.event.inputs.filter }}
          COVERAGE: ${{ github.event.inputs.coverage }}
        run: |
          # Build the argument list without string-concatenating user input into
          # a command string. Each element is a separate word so the shell never
          # interprets FILTER content as additional commands or flags.
          ARGS=()
          if [ "$COVERAGE" = "true" ]; then ARGS+=(--coverage); fi
          if [ -n "$FILTER" ]; then ARGS+=(-- "$FILTER"); fi
          echo "Running: npx vitest run ${ARGS[*]}"
          npx vitest run "${ARGS[@]}"

      - name: Upload coverage
        if: ${{ github.event.inputs.coverage == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14
