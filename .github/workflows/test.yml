name: Test

on:
  workflow_dispatch:
    inputs:
      filter:
        description: Optional package/file filter for an ad-hoc Vitest run
        required: true
        default: packages/backend/src/services/__tests__/integration/
        type: string
      coverage_mode:
        description: Coverage mode for the ad-hoc filtered run
        required: false
        default: summary
        type: choice
        options:
          - summary
          - off
      trust_context:
        description: Execution context label for reporting
        required: false
        default: trusted
        type: choice
        options:
          - trusted
          - untrusted

concurrency:
  group: test-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  adhoc-vitest:
    name: adhoc-vitest
    uses: ./.github/workflows/_reusable-test.yml
    with:
      scope: adhoc-filter
      adhoc_filter: ${{ inputs.filter }}
      coverage_mode: ${{ inputs.coverage_mode }}
      trust_context: ${{ inputs.trust_context }}
    secrets: inherit
