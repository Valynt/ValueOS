name: Playwright Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  playwright-verify:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 'latest'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers and deps
        run: pnpm playwright install --with-deps

      - name: Run Playwright CI tests
        run: pnpm run test:playwright:ci

      - name: Run shard smoke
        run: SHARD_COUNT=2 SHARD_INDEX=0 pnpm run test:shard
