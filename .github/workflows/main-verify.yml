name: Main Verify

on:
  push:
    branches: [main]

concurrency:
  group: main-verify-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  security-events: write  # for gitleaks SARIF upload

jobs:
  # ── Full-history secret scan — runs on every main push ───────────────────────
  secret-scan-history:
    name: secret-scan / full-history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt" \
            -o /tmp/gitleaks-checksums.txt
          grep "gitleaks_${VERSION}_linux_x64.tar.gz" /tmp/gitleaks-checksums.txt | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        run: |
          set -euo pipefail
          mkdir -p artifacts/secret-scan
          gitleaks detect \
            --config=.gitleaks.toml \
            --redact \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=artifacts/secret-scan/gitleaks-history.sarif \
            --log-level=warn \
            2>&1 | tee artifacts/secret-scan/gitleaks-history.log || {
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "FAIL: gitleaks detected secrets in git history."
              echo "Remediation:"
              echo "  1. Rotate the exposed credential immediately."
              echo "  2. Purge from history with git-filter-repo."
              echo "  3. Add an allowlist entry to .gitleaks.toml only for"
              echo "     confirmed false positives with documented justification."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            }

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/secret-scan/gitleaks-history.sarif
          category: gitleaks-history

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-history-${{ github.run_id }}
          path: artifacts/secret-scan/
          if-no-files-found: warn
          retention-days: 90

  lint-runtime-packages:
    name: lint-runtime-packages (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: backend
            lint_command: pnpm lint:ci:backend
            report_path: artifacts/eslint/backend.json
          - lane: valynt-app
            lint_command: pnpm lint:ci:valynt-app
            report_path: artifacts/eslint/valynt-app.json
          - lane: shared
            lint_command: pnpm lint:ci:shared
            report_path: artifacts/eslint/shared.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint lane
        run: ${{ matrix.lint_command }}
      - name: Lint ratchet guard
        run: node scripts/ci/lint-ratchet-check.mjs --lane "${{ matrix.lane }}" --report "${{ matrix.report_path }}"
      - name: A11y ESLint weekly warning ratchet
        if: matrix.lane == 'valynt-app'
        run: node scripts/ci/a11y-eslint-weekly-ratchet.mjs --report "${{ matrix.report_path }}"

  production-eslint-ratchet:
    name: production-eslint-ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run production lint profile
        run: pnpm lint:ci:production-profile
      - name: Enforce production lint allowlist and warning ratchet
        run: pnpm check:production-eslint-profile

  unit-component-schema:
    name: unit/component/schema
    runs-on: ubuntu-latest
    needs: [lint-runtime-packages, production-eslint-ratchet]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install autoscaling manifest validation tools
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.7.1/kustomize_v5.7.1_linux_amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin"
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP/bin" kubeconform
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Agent autoscaling manifest validation
        run: python3 scripts/ci/validate-agent-autoscaling-manifests.py
      - name: Kubernetes security policy render validation
        run: node scripts/ci/validate-k8s-security-policies.mjs
      - name: Canonical governance gate
        run: pnpm run typecheck:signal --verify
      - name: Canonical CI workflow self-check
        run: pnpm run ci:governance:self-check
      - name: Check runtime sentinels
        run: pnpm check:runtime-sentinels
      - name: Gateway CORS wildcard guard
        run: pnpm check:kong-cors-origins
      - name: Typecheck
        run: npx turbo run typecheck
      - name: Backend request cast guardrails
        run: pnpm --filter @valueos/backend exec vitest run src/__tests__/req-as-any-guard.test.ts
      - name: Generated src artifacts guard
        run: node scripts/ci/check-generated-src-artifacts.mjs --base-sha="${{ github.event.before }}" --head-sha="${{ github.sha }}"
      - name: Kubernetes manifest maturity transition evidence gate
        run: node scripts/ci/check-k8s-manifest-maturity.mjs --mode=transition-check --ledger-path=infra/k8s/manifest-maturity-ledger.json --base-sha="${{ github.event.before }}" --head-sha="${{ github.sha }}"
      - name: Vitest workspace topology guard
        run: node scripts/ci/check-vitest-workspace-packages.mjs
      - name: Unit suite + schema guard
        run: |
          npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=json-summary --coverage.reporter=text-summary --coverage.thresholds.lines=75 --coverage.thresholds.functions=70 --coverage.thresholds.branches=70 --coverage.thresholds.statements=75
          node scripts/ci/check-migration-hygiene.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          node scripts/ci/check-migration-rollbacks.mjs
          node scripts/ci/verify-critical-architecture-migrations.mjs
      - name: Workflow DAG acyclicity guard
        run: pnpm run test:workflow-dag-validation
      - name: TypeScript any-count gate
        run: bash scripts/check-any-count.sh
      - name: Backend debt summary artifact
        if: always()
        run: pnpm --filter @valueos/backend run debt:summary
      - name: Docs integrity
        run: node scripts/ci/docs-integrity.mjs
      - name: Docs canonical facts consistency
        run: pnpm run check:docs:consistency
      - name: Docs date integrity + compliance artifact
        run: node scripts/ci/check-docs-date-integrity.mjs
      - name: Eventing architecture matrix guard
        run: pnpm run check:eventing-architecture
      - name: Ownership metadata guard
        run: node scripts/ci/check-ownership-metadata.mjs
      - name: OpenAPI canonical path allowlist guard
        run: node scripts/ci/check-openapi-file-allowlist.mjs

      - name: OpenAPI single-root guard (canonical backend spec)
        run: node scripts/ci/check-openapi-single-root.mjs
      - name: OpenAPI structural validation (canonical backend spec)
        run: node scripts/ci/check-openapi-structure.mjs
      - name: Express ↔ OpenAPI route security posture gate
        run: node scripts/ci/express-openapi-security-check.mjs
      - name: Query fingerprint perf budget gate
        run: node scripts/ci/check-query-fingerprint-budgets.mjs --budgets=infra/observability/query-fingerprint-budgets.json --snapshot=infra/observability/query-fingerprint-latest.json
      - name: Latency target consistency gate
        run: node scripts/ci/check-latency-target-consistency.mjs --base-sha="${{ github.event.before }}" --head-sha="${{ github.sha }}"
      - name: Compose drift guard
        run: node scripts/ci/check-compose-drift.mjs
      - name: Compose DB binding guard
        run: node scripts/ci/check-compose-db-bindings.mjs
      - name: Runtime platform contract guard
        run: pnpm run check:runtime-platform-contract
      - name: Archived ECS guardrails
        run: pnpm run check:archived-ecs-guardrails
      - name: Env/port drift guard
        run: node scripts/ci/check-env-port-drift.mjs
      - name: Hardcoded port mismatch guard
        run: node scripts/ci/check-hardcoded-port-mismatches.mjs
      - name: TODO metadata guard (no untracked TODOs in production paths)
        run: node .github/scripts/check-todo-metadata.cjs
      - name: Direct LLM call guard
        run: node scripts/ci/check-direct-llm-calls.mjs
      - name: Security anti-pattern guard
        run: node scripts/ci/check-security-antipatterns.mjs

      - name: PodSecurityPolicy removal guard
        run: node scripts/ci/check-psp-references.mjs
      - name: Guard browser provider secrets
        run: pnpm check:browser-provider-secrets
      - name: Guard frontend bundle service-role identifiers
        run: pnpm check:frontend-bundle-service-role
      - name: Guard backend service-role boundaries
        run: pnpm check:backend-service-role-boundaries
      - name: Workflow/package script drift guard
        run: pnpm run check:workflow-package-script-drift
      - name: Required-check policy contract guard
        run: pnpm run check:required-checks-policy
      - name: Workflow pnpm contract guard
        run: pnpm run check:workflow-pnpm-contract
      - name: Workspace package governance inventory
        run: pnpm run check:workspace-package-governance
      - name: LLM secrets hygiene guard
        run: node scripts/ci/check-llm-secrets-hygiene.mjs
      - name: LLM readiness contract guard
        run: node scripts/ci/check-llm-readiness-contract.mjs

      - name: Infra readiness contract guard
        run: node scripts/ci/check-infra-readiness-contract.mjs

      - name: Queue tenant bootstrap guard
        run: node scripts/ci/check-queue-tenant-bootstrap.mjs

      - name: Architecture doc / runtime drift guard
        run: node scripts/ci/check-architecture-doc-drift.mjs
      - name: Supabase tenant controls guard
        run: node scripts/ci/check-supabase-tenant-controls.mjs
      - name: Security baseline verification
        run: node scripts/ci/security-baseline-verification.mjs
      - name: CI security control-matrix guard
        run: node scripts/ci/check-ci-security-control-matrix.mjs
      - name: Required-check documentation/workflow consistency guard
        run: node scripts/ci/check-required-check-workflow-consistency.mjs
      - name: Deploy workflow release-gate consistency guard
        run: node scripts/ci/check-deploy-workflow-release-gate-consistency.mjs
      - name: CI scanner action version manifest guard
        run: node scripts/ci/check-ci-workflow-scanner-refs.mjs
      - name: Compliance control regression gate
        run: node scripts/ci/check-compliance-control-regressions.mjs

      - name: Critical control status gate (SOC2/HIPAA)
        run: node scripts/ci/check-control-status-critical.mjs

  vitest-package-matrix-config:
    name: vitest/package-matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Emit Vitest package matrix
        id: matrix
        run: echo "matrix=$(node scripts/ci/emit-vitest-package-matrix.mjs)" >> "$GITHUB_OUTPUT"

  vitest-package:
    name: vitest/${{ matrix.package.label }}
    runs-on: ubuntu-latest
    needs: vitest-package-matrix-config
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.vitest-package-matrix-config.outputs.matrix) }}
    env:
      NODE_ENV: test
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      SUPABASE_JWT_ISSUER: http://localhost:54321/auth/v1
      SUPABASE_JWT_AUDIENCE: authenticated
      ALLOW_LOCAL_JWT_FALLBACK: 'true'
      DISABLE_REDIS: 'true'
      OPENAI_API_KEY: test-openai-key
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vitest workspace topology guard
        run: node scripts/ci/check-vitest-workspace-packages.mjs
      - name: Run package tests with coverage
        run: |
          npx vitest run \
            --root "${{ matrix.package.dir }}" \
            --config vitest.config.ts \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=json-summary \
            --coverage.reporter=text-summary \
            --coverage.reportsDirectory="${{ matrix.package.coverageDir }}"
      - name: Write coverage summary
        run: |
          node scripts/ci/write-vitest-coverage-summary.mjs \
            --package-id "${{ matrix.package.id }}" \
            --package-label "${{ matrix.package.label }}" \
            --package-dir "${{ matrix.package.dir }}" \
            --coverage-summary "${{ matrix.package.coverageDir }}/coverage-summary.json" \
            --output "artifacts/coverage/${{ matrix.package.id }}.md"
          cat "artifacts/coverage/${{ matrix.package.id }}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload package coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-${{ matrix.package.id }}-${{ github.run_id }}
          path: |
            ${{ matrix.package.coverageDir }}/coverage-summary.json
            artifacts/coverage/${{ matrix.package.id }}.md
          if-no-files-found: warn
          retention-days: 30

  tenant-isolation-static-gate:
    name: tenant-isolation-static-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Static tenant boundary guards
        run: |
          node scripts/ci/check-supabase-tenant-controls.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          bash scripts/ci/check-permissive-rls.sh
          bash scripts/ci/check-migration-rls-required.sh

  tenant-isolation-gate:
    name: tenant-isolation-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare compliance report directories
        run: |
          mkdir -p reports/compliance/rls
          mkdir -p reports/compliance/dsr
      - name: Tenant isolation + compliance tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts \
            packages/memory/tests/tenant-vector-isolation.test.ts \
            packages/memory/tests/tenant-semantic-retrieval-boundary.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=reports/compliance/rls/vitest-rls.junit.xml \
            --outputFile.json=reports/compliance/rls/vitest-rls.json
      - name: Run DSR compliance tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx vitest run tests/compliance/dsr-workflow.test.ts packages/backend/src/api/__tests__/dataSubjectRequests.piiTables.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/compliance/dsr/vitest-dsr.junit.xml

  critical-workflows-gate:
    name: critical-workflows-gate
    runs-on: ubuntu-latest
    needs:
      - unit-component-schema
      - tenant-isolation-gate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Critical workflow contracts
        run: |
          node scripts/ci/verify-critical-claims.mjs
          pnpm exec vitest run packages/backend/src/__tests__/versioning.contract.test.ts

  accessibility-audit:
    name: accessibility-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: |
          mkdir -p artifacts/bundle
          npx turbo run build --filter=valynt-app 2>&1 | tee artifacts/bundle/vite-build.log
      - name: Bundle regression gate
        run: |
          node scripts/ci/check-vite-bundle-regression.mjs \
            --log artifacts/bundle/vite-build.log \
            --metrics .github/metrics/vite-bundle-metrics.json \
            --summary-out artifacts/bundle/summary.md \
            --json-out artifacts/bundle/metrics.json \
            --history-out artifacts/bundle/history-comparison.json
          cat artifacts/bundle/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Run WCAG 2.2 AA accessibility tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: artifacts/accessibility/playwright-report.json
        run: |
          mkdir -p artifacts/accessibility
          npx playwright test tests/accessibility/axe-a11y.spec.ts tests/accessibility/wcag-compliance.test.ts \
            --reporter=html,json \
            --output=artifacts/accessibility
      - name: Accessibility trend gate
        if: always()
        run: |
          node scripts/ci/a11y-trend-gate.mjs \
            --report artifacts/accessibility/playwright-report.json \
            --baseline .github/metrics/accessibility-baseline.json \
            --metrics-out artifacts/accessibility/a11y-metrics.json \
            --summary-out artifacts/accessibility/a11y-trend-summary.md
      - name: Enforce WCAG severity budgets
        if: always()
        run: |
          node scripts/ci/check-a11y-severity-budgets.mjs \
            --report artifacts/accessibility/playwright-report.json \
            --budget .github/metrics/wcag-severity-budgets.json \
            --metrics-out artifacts/accessibility/wcag-severity-metrics.json
      - name: Generate i18n key extraction catalog
        if: always()
        run: node scripts/ci/extract-i18n-catalog.mjs --out artifacts/i18n/extracted-keys.json
      - name: Verify localization coverage
        if: always()
        run: node scripts/ci/check-i18n-keys.mjs --json-out artifacts/i18n/coverage-dashboard.json
      - name: Verify pseudo-localization readiness
        if: always()
        run: node scripts/ci/check-pseudo-localization.mjs --json-out artifacts/i18n/pseudo-localization-report.json
      - name: Build frontend quality dashboard artifacts
        if: always()
        run: |
          node scripts/ci/collect-frontend-quality-dashboard.mjs \
            --dashboard-out artifacts/frontend-quality/dashboard.md \
            --json-out artifacts/frontend-quality/dashboard.json
      - name: Upload accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-audit-${{ github.run_id }}
          path: |
            playwright-report/
            artifacts/accessibility/
            artifacts/i18n/
            artifacts/frontend-quality/
            artifacts/bundle/
          if-no-files-found: warn
          retention-days: 30

  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SCA — pnpm audit (fail on high/critical)
        run: pnpm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)
      - name: Secret scan — gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: SAST — Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Build backend container image for Trivy
        run: docker build -f infra/docker/Dockerfile.backend -t valueos-backend:ci .
      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Trivy container image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: valueos-backend:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: SBOM — generate CycloneDX
        run: pnpm exec cyclonedx-npm --output-format json --output-file sbom.json
      - name: SBOM — verify artifact exists and is non-empty
        run: |
          if [ ! -s sbom.json ]; then
            echo "SBOM generation failed: sbom.json is missing or empty" >&2
            exit 1
          fi
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-gate-${{ github.run_id }}
          path: |
            npm-audit-report.json
            semgrep.sarif
            trivy-fs.sarif
            trivy-image.sarif
            sbom.json
          if-no-files-found: warn
          retention-days: 90

  # ── Dev routes exclusion gate ────────────────────────────────────────────────
  # Builds the backend and verifies child_process is absent from production output.
  dev-routes-exclusion-gate:
    name: dev-routes-exclusion-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build backend (production)
        run: pnpm --filter @valueos/backend build
        env:
          NODE_ENV: production
      - name: Check dev routes excluded from production bundle
        run: node scripts/ci/check-backend-dev-routes-excluded.mjs packages/backend/dist

  # ── Compliance evidence completeness gate ────────────────────────────────────
  # Fails when required compliance evidence documents are absent or empty.
  # These documents are the human-readable proof that security controls have
  # been verified. Production promotion is blocked without them.
  compliance-evidence-completeness:
    name: compliance-evidence-completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify required compliance evidence documents exist and are non-empty
        run: |
          set -euo pipefail
          FAIL=0

          REQUIRED_DOCS=(
            "docs/security-compliance/secret-scan-evidence.md"
            "docs/security-compliance/audit-log-evidence.md"
            "docs/security-compliance/drift-gate-evidence.md"
          )

          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "FAIL: Missing evidence document: $doc"
              FAIL=1
            elif [ ! -s "$doc" ]; then
              echo "FAIL: Evidence document is empty: $doc"
              FAIL=1
            else
              echo "OK: $doc"
            fi
          done

          # Also verify secret-scan-evidence.md does not contain an unresolved
          # BLOCKED status — production promotion requires the block to be lifted.
          if grep -q "^\\*\\*Status: BLOCKED\\*\\*" docs/security-compliance/secret-scan-evidence.md 2>/dev/null; then
            echo "FAIL: Secret scan evidence is still BLOCKED — rotate all true positive credentials"
            echo "      and update docs/security-compliance/secret-scan-evidence.md before promoting."
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "Compliance evidence completeness gate: FAIL"
            echo "All required evidence documents must exist, be non-empty, and have no"
            echo "unresolved BLOCKED status before production promotion."
            exit 1
          fi

          echo "Compliance evidence completeness gate: PASS"

  # ── Log level production gate ─────────────────────────────────────────────
  log-level-production-gate:
    name: log-level-production-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check LOG_LEVEL is not warn/error/fatal in K8s base manifests
        run: |
          set -euo pipefail
          FAIL=0

          MANIFESTS=(
            "infra/k8s/base/backend-deployment.yaml"
            "infra/k8s/base/backend-blue-deployment.yaml"
            "infra/k8s/base/backend-green-deployment.yaml"
            "infra/k8s/base/frontend-blue-deployment.yaml"
            "infra/k8s/base/frontend-green-deployment.yaml"
          )

          for f in "${MANIFESTS[@]}"; do
            if [ -f "$f" ]; then
              level=$(grep -A1 'name: LOG_LEVEL' "$f" | grep 'value:' | sed 's/.*value: *"\?\([^"]*\)"\?.*/\1/' | tr -d ' ' | head -1)
              if [ -z "$level" ]; then
                echo "FAIL: $f does not set LOG_LEVEL — info or debug required for audit trail visibility"
                FAIL=1
              elif [ "$level" = "warn" ] || [ "$level" = "error" ] || [ "$level" = "fatal" ]; then
                echo "FAIL: $f sets LOG_LEVEL=$level — this suppresses info-level audit trail logs in production"
                FAIL=1
              else
                echo "OK: $f sets LOG_LEVEL=$level"
              fi
            else
              echo "FAIL: $f not found — expected manifest is missing"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "log-level-production-gate: FAIL"
            echo "Set LOG_LEVEL=info (or debug) in the listed manifests."
            exit 1
          fi

          echo "log-level-production-gate: PASS"

  staging-deploy-release-gates:
    name: main-verify
    runs-on: ubuntu-latest
    needs:
      - tenant-isolation-gate
      - critical-workflows-gate
      - security-gate
      - accessibility-audit
      - dev-routes-exclusion-gate
      - compliance-evidence-completeness
      - log-level-production-gate
    steps:
      - name: Enforce staging/deploy blockers
        env:
          STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
        run: |
          # Pre-existing lanes: skipped is acceptable (branch-conditional jobs)
          for lane in \
            "tenant-isolation-gate:${{ needs.tenant-isolation-gate.result }}" \
            "critical-workflows-gate:${{ needs.critical-workflows-gate.result }}" \
            "security-gate:${{ needs.security-gate.result }}" \
            "accessibility-audit:${{ needs.accessibility-audit.result }}"; do
            status="${lane#*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Gate failed: $lane"
              exit 1
            fi
          done

          # Security gates added in this change: must explicitly succeed — skipped is not acceptable.
          # A skipped security gate means the check did not run, which is equivalent to unknown.
          for lane in \
            "dev-routes-exclusion-gate:${{ needs.dev-routes-exclusion-gate.result }}" \
            "compliance-evidence-completeness:${{ needs.compliance-evidence-completeness.result }}" \
            "log-level-production-gate:${{ needs.log-level-production-gate.result }}"; do
            status="${lane#*:}"
            if [ "$status" != "success" ]; then
              echo "Security gate did not pass (status=$status): $lane"
              echo "These gates must explicitly succeed — skipped or failed results block promotion."
              exit 1
            fi
          done

          STAGING_HEALTHCHECK_URL="${STAGING_HEALTHCHECK_URL:-https://staging.valuecanvas.app/health}"
          case "$STAGING_HEALTHCHECK_URL" in
            http://localhost*|http://127.0.0.1*|http://\[::1\]*|https://localhost*|https://127.0.0.1*|https://\[::1\]*)
              echo "❌ STAGING_HEALTHCHECK_URL must target a deployed staging endpoint, not localhost: $STAGING_HEALTHCHECK_URL"
              exit 1
              ;;
          esac

          HEALTH_RESPONSE=$(curl --silent --show-error --location --max-time 20 --write-out "\n%{http_code}" "$STAGING_HEALTHCHECK_URL")
          HTTP_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed: expected 200 from $STAGING_HEALTHCHECK_URL, got $HTTP_CODE"
            exit 1
          fi

  devcontainer-build:
    name: devcontainer-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Copy env template
        run: cp .devcontainer/.env.template .devcontainer/.env
      - name: Build DevContainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.optimized
          push: false
          load: true
          tags: valueos-devcontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate container health
        run: |
          docker run --rm valueos-devcontainer:ci node --version
          docker run --rm valueos-devcontainer:ci pnpm --version
