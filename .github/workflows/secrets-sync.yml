name: Sync Secrets to AWS Secrets Manager

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      dry_run:
        description: 'Dry run (no actual changes)'
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  sync-secrets:
    name: Sync Secrets to AWS
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Define secret mappings
        id: secrets
        run: |
          cat > secrets-mapping.json <<EOF
          {
            "dev": {
              "valuecanvas/dev/database-url": "${{ secrets.DEV_DATABASE_URL }}",
              "valuecanvas/dev/supabase-url": "${{ secrets.DEV_SUPABASE_URL }}",
              "valuecanvas/dev/supabase-anon-key": "${{ secrets.DEV_SUPABASE_ANON_KEY }}",
              "valuecanvas/dev/supabase-service-key": "${{ secrets.DEV_SUPABASE_SERVICE_KEY }}",
              "valuecanvas/dev/together-api-key": "${{ secrets.TOGETHER_API_KEY }}",
              "valuecanvas/dev/openai-api-key": "${{ secrets.OPENAI_API_KEY }}",
              "valuecanvas/dev/jwt-secret": "${{ secrets.DEV_JWT_SECRET }}"
            },
            "staging": {
              "valuecanvas/staging/database-url": "${{ secrets.STAGING_DATABASE_URL }}",
              "valuecanvas/staging/supabase-url": "${{ secrets.STAGING_SUPABASE_URL }}",
              "valuecanvas/staging/supabase-anon-key": "${{ secrets.STAGING_SUPABASE_ANON_KEY }}",
              "valuecanvas/staging/supabase-service-key": "${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}",
              "valuecanvas/staging/together-api-key": "${{ secrets.TOGETHER_API_KEY }}",
              "valuecanvas/staging/openai-api-key": "${{ secrets.OPENAI_API_KEY }}",
              "valuecanvas/staging/jwt-secret": "${{ secrets.STAGING_JWT_SECRET }}"
            },
            "production": {
              "valuecanvas/production/database-url": "${{ secrets.PROD_DATABASE_URL }}",
              "valuecanvas/production/supabase-url": "${{ secrets.PROD_SUPABASE_URL }}",
              "valuecanvas/production/supabase-anon-key": "${{ secrets.PROD_SUPABASE_ANON_KEY }}",
              "valuecanvas/production/supabase-service-key": "${{ secrets.PROD_SUPABASE_SERVICE_KEY }}",
              "valuecanvas/production/together-api-key": "${{ secrets.PROD_TOGETHER_API_KEY }}",
              "valuecanvas/production/openai-api-key": "${{ secrets.PROD_OPENAI_API_KEY }}",
              "valuecanvas/production/jwt-secret": "${{ secrets.PROD_JWT_SECRET }}"
            }
          }
          EOF

      - name: Sync secrets to AWS Secrets Manager
        run: |
          ENV="${{ github.event.inputs.environment }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          
          echo "Syncing secrets for environment: $ENV"
          echo "Dry run: $DRY_RUN"
          
          # Read secrets for the environment
          SECRETS=$(cat secrets-mapping.json | jq -r ".${ENV} | to_entries[] | @base64")
          
          for secret in $SECRETS; do
            SECRET_NAME=$(echo $secret | base64 -d | jq -r '.key')
            SECRET_VALUE=$(echo $secret | base64 -d | jq -r '.value')
            
            if [ "$DRY_RUN" == "true" ]; then
              echo "[DRY RUN] Would create/update secret: $SECRET_NAME"
            else
              echo "Creating/updating secret: $SECRET_NAME"
              
              # Check if secret exists
              if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" 2>/dev/null; then
                # Update existing secret
                aws secretsmanager update-secret \
                  --secret-id "$SECRET_NAME" \
                  --secret-string "$SECRET_VALUE" \
                  --region ${{ env.AWS_REGION }}
              else
                # Create new secret
                aws secretsmanager create-secret \
                  --name "$SECRET_NAME" \
                  --secret-string "$SECRET_VALUE" \
                  --tags Key=Environment,Value=$ENV Key=ManagedBy,Value=GitHub \
                  --region ${{ env.AWS_REGION }}
              fi
              
              echo "✅ Secret $SECRET_NAME synced"
            fi
          done

      - name: Generate secret access policy
        run: |
          ENV="${{ github.event.inputs.environment }}"
          
          cat > secret-access-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "secretsmanager:GetSecretValue",
                  "secretsmanager:DescribeSecret"
                ],
                "Resource": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:*:secret:valuecanvas/${ENV}/*"
              }
            ]
          }
          EOF
          
          echo "Generated IAM policy for secret access:"
          cat secret-access-policy.json

      - name: Upload policy
        uses: actions/upload-artifact@v4
        with:
          name: secret-access-policy-${{ github.event.inputs.environment }}
          path: secret-access-policy.json

      - name: Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Secrets Sync Summary
          
          **Environment:** ${{ github.event.inputs.environment }}
          **Dry Run:** ${{ github.event.inputs.dry_run }}
          **Region:** ${{ env.AWS_REGION }}
          
          ## Next Steps
          
          1. Attach the generated IAM policy to your EKS service account
          2. Update Kubernetes deployments to use External Secrets Operator
          3. Remove secrets from GitHub (keep only in AWS Secrets Manager)
          
          ## Example Kubernetes Configuration
          
          \`\`\`yaml
          apiVersion: external-secrets.io/v1beta1
          kind: SecretStore
          metadata:
            name: aws-secrets-manager
            namespace: ${{ github.event.inputs.environment }}
          spec:
            provider:
              aws:
                service: SecretsManager
                region: ${{ env.AWS_REGION }}
                auth:
                  jwt:
                    serviceAccountRef:
                      name: valuecanvas-app
          ---
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: valuecanvas-secrets
            namespace: ${{ github.event.inputs.environment }}
          spec:
            refreshInterval: 1h
            secretStoreRef:
              name: aws-secrets-manager
              kind: SecretStore
            target:
              name: valuecanvas-secrets
              creationPolicy: Owner
            data:
            - secretKey: database-url
              remoteRef:
                key: valuecanvas/${{ github.event.inputs.environment }}/database-url
            - secretKey: supabase-url
              remoteRef:
                key: valuecanvas/${{ github.event.inputs.environment }}/supabase-url
            - secretKey: supabase-anon-key
              remoteRef:
                key: valuecanvas/${{ github.event.inputs.environment }}/supabase-anon-key
            - secretKey: together-api-key
              remoteRef:
                key: valuecanvas/${{ github.event.inputs.environment }}/together-api-key
            - secretKey: jwt-secret
              remoteRef:
                key: valuecanvas/${{ github.event.inputs.environment }}/jwt-secret
          \`\`\`
          EOF
