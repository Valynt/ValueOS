name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write # For OIDC authentication

jobs:
  build-and-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.build.outputs.backend_digest }}
      frontend_digest: ${{ steps.build.outputs.frontend_digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting and type checking
        run: |
          npm run lint
          npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Generate SBOM
        run: npm run sbom

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/valuecanvas-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/valuecanvas-frontend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Scan images for vulnerabilities
        run: |
          # Install Trivy for vulnerability scanning
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

          # Scan images
          trivy image --exit-code 1 --no-progress --format sarif --output backend-scan.sarif ${{ env.ECR_REGISTRY }}/valuecanvas-backend:${{ github.sha }}
          trivy image --exit-code 1 --no-progress --format sarif --output frontend-scan.sarif ${{ env.ECR_REGISTRY }}/valuecanvas-frontend:${{ github.sha }}

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-scan.sarif

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-scan.sarif

      - name: Set output variables
        id: build
        run: |
          echo "backend_digest=${{ env.ECR_REGISTRY }}/valuecanvas-backend@${{ steps.build-backend.outputs.digest }}" >> $GITHUB_OUTPUT
          echo "frontend_digest=${{ env.ECR_REGISTRY }}/valuecanvas-frontend@${{ steps.build-frontend.outputs.digest }}" >> $GITHUB_OUTPUT

  stage:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDC-Staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-staging-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Deploy backend with digest
        run: |
          kubectl set image deployment/backend-staging backend=${{ needs.build-and-scan.outputs.backend_digest }} -n valuecanvas-staging

      - name: Deploy frontend with digest
        run: |
          kubectl set image deployment/frontend-staging frontend=${{ needs.build-and-scan.outputs.frontend_digest }} -n valuecanvas-staging

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend-staging -n valuecanvas-staging --timeout=10m

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend-staging -n valuecanvas-staging --timeout=10m

      - name: Run smoke tests
        run: |
          # Health check with authentication
          kubectl wait --for=condition=ready pod -l app=backend -n valuecanvas-staging --timeout=60s
          kubectl wait --for=condition=ready pod -l app=frontend -n valuecanvas-staging --timeout=60s

  promote:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://app.valuecanvas.com

    steps:
      - name: Awaiting manual approval
        run: |
          echo "🚀 Production deployment requires manual approval"
          echo "Please review the staging deployment and approve if ready"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDC-Production
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.28.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-production-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Deploy backend to production
        run: |
          kubectl set image deployment/backend-production backend=${{ needs.build-and-scan.outputs.backend_digest }} -n valuecanvas-production

      - name: Deploy frontend to production
        run: |
          kubectl set image deployment/frontend-production frontend=${{ needs.build-and-scan.outputs.frontend_digest }} -n valuecanvas-production

      - name: Wait for production backend rollout
        run: |
          kubectl rollout status deployment/backend-production -n valuecanvas-production --timeout=15m

      - name: Wait for production frontend rollout
        run: |
          kubectl rollout status deployment/frontend-production -n valuecanvas-production --timeout=15m

      - name: Health verification
        run: |
          kubectl wait --for=condition=ready pod -l app=backend -n valuecanvas-production --timeout=300s
          kubectl wait --for=condition=ready pod -l app=frontend -n valuecanvas-production --timeout=300s

  rollback:
    name: Rollback Monitor
    runs-on: ubuntu-latest
    needs: promote
    if: failure() && needs.promote.result == 'failure'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsOIDC-Production
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-production-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Rollback deployment
        run: |
          echo "🚨 Production deployment failed - initiating rollback"
          kubectl rollout undo deployment/backend-production -n valuecanvas-production
          kubectl rollout undo deployment/frontend-production -n valuecanvas-production

          # Wait for rollback completion
          kubectl rollout status deployment/backend-production -n valuecanvas-production --timeout=10m
          kubectl rollout status deployment/frontend-production -n valuecanvas-production --timeout=10m

      - name: Notify failure
        run: |
          echo "🔄 Rollback completed - reverted to previous deployment"
