name: CI - Tests and Smoke E2E

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  env-validation:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate env for local mode
        run: node scripts/dx/env-compiler.js --mode local --force

      - name: Validate local mode env
        run: node scripts/dx/env-compiler.js --mode local --validate

      - name: Generate env for docker mode
        run: node scripts/dx/env-compiler.js --mode docker --force

      - name: Validate docker mode env
        run: node scripts/dx/env-compiler.js --mode docker --validate

      - name: Verify no mode contradictions possible
        run: |
          # Ensure env-compiler catches contradictions
          echo "Testing contradiction detection..."
          node scripts/dx/env-compiler.js --mode local --force
          # This should fail if we try to validate as docker mode
          if node scripts/dx/env-compiler.js --mode docker --validate 2>/dev/null; then
            echo "ERROR: Should have detected mode contradiction"
            exit 1
          fi
          echo "Contradiction detection working correctly"

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: env-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make dev script executable
        run: chmod +x dev

      - name: Run Smoke Test Script
        run: |
          chmod +x scripts/ci/smoke.sh
          ./scripts/ci/smoke.sh

  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: env-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate environment
        run: node scripts/dx/env-compiler.js --mode local --force

      - name: Run CI verification suite
        run: pnpm run ci:verify

      - name: Generate unit coverage report
        run: pnpm run test:unit:coverage

      - name: Enforce strict-zone coverage thresholds
        run: pnpm run coverage:strict-zones

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
            coverage/baseline-summary.md
            coverage/strict-zone-summary.json
            coverage/index.html

  playwright-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    needs: unit-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run smoke specs
        run: pnpm exec playwright test test/playwright/critical-flows.spec.ts --reporter=line

  testcafe-smoke:
    name: TestCafe Smoke
    runs-on: ubuntu-latest
    needs: unit-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TestCafe smoke tests
        run: pnpm run test:testcafe

  deps-outdated-report:
    name: Dependency Outdated Report
    runs-on: ubuntu-latest
    needs: env-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate outdated report
        run: |
          mkdir -p reports
          pnpm run --silent deps:outdated > reports/npm-outdated.json || true

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-outdated-report
          path: reports/npm-outdated.json
