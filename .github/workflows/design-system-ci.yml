name: Design System CI

on:
  push:
    paths:
      - "packages/components/design-system/**"
  pull_request:
    paths:
      - "packages/components/design-system/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build design-system
        run: pnpm --filter @valueos/design-system build
      - name: Run tests
        run: pnpm --filter @valueos/design-system test
      - name: Create changeset (if present)
        uses: changesets/action@v1
        with:
          publish: false
