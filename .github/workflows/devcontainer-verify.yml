name: Devcontainer verification

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

jobs:
  verify-devcontainer:
    name: Verify DevContainer (compose + verify.sh)
    runs-on: ubuntu-latest
    env:
      # Values that should be set as repository secrets in Settings → Secrets
      # SUPABASE values are required by the verify.sh script
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Optional: pass through some compose-time envs for supabase/postgres
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ANON_KEY: ${{ secrets.ANON_KEY }}
      SERVICE_ROLE_KEY: ${{ secrets.SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity: show Docker and Compose versions
        run: |
          docker --version || true
          docker compose version || true

      - name: Create .env.local from secrets
        run: |
          echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" > .env.local
          echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" >> .env.local
          # Service role required for seeding demo user
          echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> .env.local
          # Optional values to make compose services deterministic
          if [ -n "${POSTGRES_PASSWORD}" ]; then echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> .env.local; fi
          if [ -n "${ANON_KEY}" ]; then echo "ANON_KEY=${ANON_KEY}" >> .env.local; fi
          if [ -n "${SERVICE_ROLE_KEY}" ]; then echo "SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> .env.local; fi
          if [ -n "${JWT_SECRET}" ]; then echo "JWT_SECRET=${JWT_SECRET}" >> .env.local; fi
          if [ -n "${REDIS_PASSWORD}" ]; then echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> .env.local; fi
          echo "Written .env.local (sensitive values omitted in logs)"

      - name: Start services (docker-compose)
        run: |
          # Use the top-level compose file to ensure all services are available
          docker compose -f docker-compose.yml up --build -d postgres redis supabase caddy kong dev

      - name: Wait for Supabase to be reachable
        run: |
          set -euo pipefail
          url="${VITE_SUPABASE_URL:-http://localhost:54321}"
          max_attempts=60
          sleep_s=5
          attempt=1
          until curl -fsS --connect-timeout 5 "${url}/auth/v1/settings" >/dev/null 2>&1 || [ $attempt -ge $max_attempts ]; do
            echo "Waiting for Supabase (${attempt}/${max_attempts})..."
            attempt=$((attempt + 1))
            sleep ${sleep_s}
          done
          curl -fsS --connect-timeout 5 "${url}/auth/v1/settings" || (echo "Supabase did not become reachable in time" && exit 1)

      - name: Make verify script executable
        run: chmod +x .devcontainer/verify.sh

      - name: Run verification
        id: run_verify
        run: |
          set -euo pipefail
          ./.devcontainer/verify.sh

      - name: Show verify result
        run: |
          echo "Contents of .devcontainer/verify.result.json:" || true
          sed -n '1,200p' .devcontainer/verify.result.json || true

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: devcontainer-verify-results
          path: .devcontainer/verify.result.json

      - name: Fail if verification failed
        run: |
          status=$(jq -r '.status // "failed"' .devcontainer/verify.result.json)
          if [ "$status" != "ok" ]; then
            echo "Verification failed:$(jq -c . .devcontainer/verify.result.json)" >&2
            exit 1
          fi
        shell: bash

    # Always try to bring services down to not leave dangling resources
      - name: Cleanup Docker Compose
        if: always()
        run: docker compose -f docker-compose.yml down -v || true
