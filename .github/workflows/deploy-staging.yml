name: Deploy Staging
# active-runtime-platform: kubernetes

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write
  packages: write
  id-token: write
  checks: read

env:
  NODE_VERSION: "20.19.0"
  SLO_ALERT_NAME_REGEX: "SLOBurnRateTooHigh"

jobs:
  release-manifest-gate:
    name: Release Manifest Gate
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.sha.outputs.source_sha }}
      release_run_id: ${{ steps.find-release-run.outputs.result }}
      backend_image_ref: ${{ steps.manifest-outputs.outputs.backend_image_ref }}
      frontend_image_ref: ${{ steps.manifest-outputs.outputs.frontend_image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve source SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "source_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find successful release workflow run for source SHA
        id: find-release-run
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = '${{ steps.sha.outputs.source_sha }}';
            const workflowId = 'release.yml';
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner, repo, workflow_id: workflowId, head_sha: headSha, status: 'success', per_page: 100,
            });
            if (runs.length === 0) {
              core.setFailed(`No successful ${workflowId} workflow run found for ${headSha}.`);
              return;
            }
            const selected = runs
              .filter((run) => run.head_sha === headSha)
              .sort((l, r) => new Date(r.created_at) - new Date(l.created_at))[0];
            if (!selected) {
              core.setFailed(`Unable to resolve a successful ${workflowId} workflow run for ${headSha}.`);
              return;
            }
            core.setOutput('result', String(selected.id));

      - name: Download release manifest bundle
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-release-run.outputs.result }}
          name: release-manifest-${{ steps.sha.outputs.source_sha }}
          path: release-manifest

      - name: Validate release manifest contents
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.source_sha }}
          RELEASE_GATE_MANIFEST_PATH: release-manifest/release-artifacts/release-manifest.json
          RELEASE_GATE_LOCAL_RESULTS_JSON: '{"release-manifest-gate":"success","dast-gate":"success","emergency-skip-audit":"success"}'
        run: node scripts/ci/verify-release-gate-status.mjs

      - name: Export release manifest outputs
        id: manifest-outputs
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path("release-manifest/release-artifacts/release-manifest.json").read_text(encoding="utf-8"))
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"backend_image_ref={manifest['images']['backend']['ref']}\n")
            handle.write(f"frontend_image_ref={manifest['images']['frontend']['ref']}\n")
          PY

  dast-gate:
    name: DAST Gate
    runs-on: ubuntu-latest
    needs: [release-manifest-gate]
    env:
      DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL != '' && vars.DAST_TARGET_URL || 'https://staging.valueos.app' }}
      DAST_FAIL_ON_HIGH: "1"
      DAST_FAIL_ON_MEDIUM: "5"
    steps:
      - uses: actions/checkout@v6
      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p artifacts/dast
          docker run --rm -v "${PWD}:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t "${DAST_TARGET_URL}" -J /zap/wrk/artifacts/dast/zap-report.json -r /zap/wrk/artifacts/dast/zap-report.html -w /zap/wrk/artifacts/dast/zap-report.md -m 5 -d || true
      - name: Enforce DAST severity thresholds
        run: |
          python3 - <<'PY2'
          import json, os, pathlib, sys
          report_path = pathlib.Path("artifacts/dast/zap-report.json")
          if not report_path.exists():
            print("Missing ZAP JSON report", file=sys.stderr); sys.exit(1)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          counts = {"high":0,"medium":0,"low":0,"info":0}
          severity_map = {"3":"high","2":"medium","1":"low","0":"info"}
          for site in report.get("site", []):
            for alert in site.get("alerts", []):
              counts[severity_map.get(str(alert.get("riskcode", "0")), "info")] += 1
          if counts["high"] > int(os.environ.get("DAST_FAIL_ON_HIGH", "0")) or counts["medium"] > int(os.environ.get("DAST_FAIL_ON_MEDIUM", "0")):
            print("DAST threshold breached", file=sys.stderr); sys.exit(1)
          PY2

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [release-manifest-gate]
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify signed backend image
        env:
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.backend_image_ref }}
        run: |
          cosign verify --certificate-oidc-issuer "https://token.actions.githubusercontent.com" --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" "${IMAGE_REF}"
      - name: Verify signed frontend image
        env:
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.frontend_image_ref }}
        run: |
          cosign verify --certificate-oidc-issuer "https://token.actions.githubusercontent.com" --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" "${IMAGE_REF}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [release-manifest-gate, verify-supply-chain, dast-gate]
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v6
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1
      - name: Run database migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::STAGING_DATABASE_URL secret is required for staging deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${{ needs.release-manifest-gate.outputs.backend_image_ref }}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${{ needs.release-manifest-gate.outputs.frontend_image_ref }}"
          kustomize build . | kubectl apply -f -
          kubectl -n valynt-staging rollout status deployment/backend-staging --timeout=300s
          kubectl -n valynt-staging rollout status deployment/worker-staging --timeout=300s

  publish-promotion-manifest:
    name: Publish Promotion Manifest
    runs-on: ubuntu-latest
    needs: [deploy-staging, release-manifest-gate, verify-supply-chain, dast-gate]
    steps:
      - name: Create immutable promotion artifacts
        run: |
          cat > promotion-manifest.json <<JSON
          {
            "source_sha": "${{ needs.release-manifest-gate.outputs.source_sha }}",
            "backend_image_ref": "${{ needs.release-manifest-gate.outputs.backend_image_ref }}",
            "frontend_image_ref": "${{ needs.release-manifest-gate.outputs.frontend_image_ref }}",
            "promotion_reference": "staging-run:${{ github.run_id }}"
          }
          JSON
          cat > promotion-release-snippet.md <<MD
          ## Production Promotion Payload

          - source_sha: `${{ needs.release-manifest-gate.outputs.source_sha }}`
          - backend_image_ref: `${{ needs.release-manifest-gate.outputs.backend_image_ref }}`
          - frontend_image_ref: `${{ needs.release-manifest-gate.outputs.frontend_image_ref }}`
          - promotion_reference: `staging-run:${{ github.run_id }}`
          MD
      - name: Upload promotion artifacts
        uses: actions/upload-artifact@v7
        with:
          name: promotion-manifest-${{ github.run_id }}
          path: |
            promotion-manifest.json
            promotion-release-snippet.md
