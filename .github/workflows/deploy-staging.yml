name: Deploy Staging
# active-runtime-platform: kubernetes

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Main Verify"]
    types: [completed]

permissions:
  contents: read
  packages: write
  id-token: write
  checks: read

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  NODE_VERSION: "20.19.0"
  SLO_ALERT_NAME_REGEX: "SLOBurnRateTooHigh"

concurrency:
  group: deploy-staging-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  promotion-context:
    name: Promotion Context
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.context.outputs.should_run }}
      source_sha: ${{ steps.context.outputs.source_sha }}
      source_ref_name: ${{ steps.context.outputs.source_ref_name }}
      short_sha: ${{ steps.context.outputs.short_sha }}
      source_run_url: ${{ steps.context.outputs.source_run_url }}
    steps:
      - name: Resolve staging deployment context
        id: context
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            SOURCE_SHA="${{ github.sha }}"
            SOURCE_REF_NAME="${{ github.ref_name }}"
            SHOULD_RUN="true"
            SOURCE_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
            SOURCE_REF_NAME="${{ github.event.workflow_run.head_branch }}"
            SOURCE_RUN_URL="${{ github.event.workflow_run.html_url }}"
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ] && [ "${SOURCE_REF_NAME}" = "main" ]; then
              SHOULD_RUN="true"
            else
              SHOULD_RUN="false"
            fi
          fi

          SHORT_SHA="$(printf '%s' "${SOURCE_SHA}" | cut -c1-12)"

          printf 'should_run=%s\n' "${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          printf 'source_sha=%s\n' "${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          printf 'source_ref_name=%s\n' "${SOURCE_REF_NAME}" >> "$GITHUB_OUTPUT"
          printf 'short_sha=%s\n' "${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          printf 'source_run_url=%s\n' "${SOURCE_RUN_URL}" >> "$GITHUB_OUTPUT"

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [promotion-context]
    if: needs.promotion-context.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + Typecheck + Test
        run: |
          npx turbo run lint typecheck test

      - name: Observability deployment gates
        run: |
          pnpm run check:telemetry-completeness
          pnpm run check:observability-deployment-gates

  dast-gate:
    name: DAST Gate
    runs-on: ubuntu-latest
    needs: [promotion-context]
    if: needs.promotion-context.outputs.should_run == 'true'
    env:
      DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL != '' && vars.DAST_TARGET_URL || 'https://staging.valueos.app' }}
      DAST_FAIL_ON_HIGH: "0"
      DAST_FAIL_ON_MEDIUM: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p artifacts/dast
          docker run --rm \
            -v "${PWD}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${DAST_TARGET_URL}" \
            -J /zap/wrk/artifacts/dast/zap-report.json \
            -r /zap/wrk/artifacts/dast/zap-report.html \
            -w /zap/wrk/artifacts/dast/zap-report.md \
            -m 5 -d || true

      - name: Enforce DAST severity thresholds
        run: |
          python3 - <<'PY2'
          import json
          import os
          import pathlib
          import sys

          report_path = pathlib.Path("artifacts/dast/zap-report.json")
          summary_path = pathlib.Path("artifacts/dast/dast-summary.md")
          if not report_path.exists():
            summary_path.write_text("# DAST Gate Summary\n\n- status: failed\n- reason: zap-report.json not generated\n", encoding="utf-8")
            print("Missing ZAP JSON report", file=sys.stderr)
            sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          counts = {"high": 0, "medium": 0, "low": 0, "info": 0}
          severity_map = {"3": "high", "2": "medium", "1": "low", "0": "info"}

          for site in report.get("site", []):
            for alert in site.get("alerts", []):
              severity = severity_map.get(str(alert.get("riskcode", "0")), "info")
              counts[severity] += 1

          max_high = int(os.environ.get("DAST_FAIL_ON_HIGH", "0"))
          max_medium = int(os.environ.get("DAST_FAIL_ON_MEDIUM", "0"))

          breached = []
          if counts["high"] > max_high:
            breached.append(f"high({counts['high']} > {max_high})")
          if counts["medium"] > max_medium:
            breached.append(f"medium({counts['medium']} > {max_medium})")

          status = "failed" if breached else "passed"
          lines = [
            "# DAST Gate Summary",
            "",
            f"- target: {os.environ.get('DAST_TARGET_URL', '')}",
            f"- status: {status}",
            f"- thresholds: high<={max_high}, medium<={max_medium}",
            f"- findings: high={counts['high']}, medium={counts['medium']}, low={counts['low']}, info={counts['info']}",
          ]
          if breached:
            lines.append(f"- breached: {', '.join(breached)}")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if breached:
            print(f"DAST threshold breached: {', '.join(breached)}", file=sys.stderr)
            sys.exit(1)
          PY2

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-dast-gate-${{ github.run_id }}
          path: |
            artifacts/dast/zap-report.json
            artifacts/dast/zap-report.html
            artifacts/dast/zap-report.md
            artifacts/dast/dast-summary.md
          if-no-files-found: warn
          retention-days: 30

  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [promotion-context, quality-gate, dast-gate]
    if: >-
      needs.promotion-context.outputs.should_run == 'true' &&
      needs.quality-gate.result == 'success' &&
      needs.dast-gate.result == 'success'
    outputs:
      image_tag: ${{ steps.image-vars.outputs.image_tag }}
      image_digest: ${{ steps.backend-build.outputs.digest }}
      image_ref: ${{ steps.backend-image-ref.outputs.image_ref }}
      frontend_image_ref: ${{ steps.frontend-image-ref.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - name: Define immutable image tags
        id: image-vars
        run: |
          IMAGE_TAG="sha-${{ needs.promotion-context.outputs.short_sha }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: backend-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.image-vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ needs.promotion-context.outputs.source_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve backend immutable image reference
        id: backend-image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.backend-build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign backend image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ steps.backend-image-ref.outputs.image_ref }}"

      - name: Build and push frontend image
        id: frontend-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.image-vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ needs.promotion-context.outputs.source_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve frontend immutable image reference
        id: frontend-image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.frontend-build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Sign frontend image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ steps.frontend-image-ref.outputs.image_ref }}"

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [promotion-context, build-images]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.build-images.result == 'success'
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed backend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy-staging.yml@.*$" \
            "${IMAGE_REF}"

      - name: Verify signed frontend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.frontend_image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy-staging.yml@.*$" \
            "${IMAGE_REF}"

  stability-seal:
    name: Stability Seal
    runs-on: ubuntu-latest
    needs: [promotion-context, build-images, verify-supply-chain]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.verify-supply-chain.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run stability seal
        run: pnpm run stability-seal

      - name: Upload stability-seal artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: stability-seal-${{ github.run_id }}
          path: |
            stability-seal-report-*.json

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [promotion-context, build-images, verify-supply-chain]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.verify-supply-chain.result == 'success'
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1

      - name: Run database migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::STAGING_DATABASE_URL secret is required for staging deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          cd overlays/staging
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          kubectl -n valynt-staging rollout status deployment/backend-staging --timeout=300s
          kubectl -n valynt-staging rollout status deployment/worker-staging --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

      - name: Capture staging operational verification artifact
        env:
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
          FRONTEND_IMAGE_REF: ${{ needs.build-images.outputs.frontend_image_ref }}
          SOURCE_SHA: ${{ needs.promotion-context.outputs.source_sha }}
          SOURCE_RUN_URL: ${{ needs.promotion-context.outputs.source_run_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "staging",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": os.environ.get("SOURCE_SHA", ""),
            "source_run_url": os.environ.get("SOURCE_RUN_URL", ""),
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "frontend_image_ref": os.environ.get("FRONTEND_IMAGE_REF", ""),
            "mandatory_verification_checklist": {
              "health": {"endpoint": "https://staging.valueos.app/api/health", "status": "passed"},
              "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
              "key_metrics": {"load_test": "infra/testing/load-test.k6.js", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"}
            }
          }

          with open("post-deploy-verification-staging-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)
          PY

      - name: Upload staging operational verification artifact
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: post-deploy-verification-staging-${{ github.run_id }}.json

  staging-performance-benchmarks:
    name: Staging Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [promotion-context, deploy-staging]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.deploy-staging.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - name: Run standardized k6 benchmark suites against staging
        env:
          BASE_URL: https://staging.valueos.app
          AUTH_TOKEN: ${{ secrets.STAGING_PERF_AUTH_TOKEN }}
          VUS: "100"
          DURATION: "5m"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e BASE_URL \
            -e AUTH_TOKEN \
            -e VUS \
            -e DURATION \
            grafana/k6:0.53.0 run infra/testing/load-test.k6.js

      - name: Build benchmark artifact with infra correlation
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          K6_SUMMARY_PATH: load-test-summary.json
          BENCHMARK_OUTPUT_DIR: benchmark-artifacts
        run: |
          set -euo pipefail
          python3 scripts/perf/analyze-k6-benchmark.py

      - name: Enforce latency-class promotion gates
        run: |
          set -euo pipefail
          INTERACTIVE_P95=$(jq -r '.interactive_completion_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)
          ORCHESTRATION_ACK_P95=$(jq -r '.orchestration_acknowledgment_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)
          ORCHESTRATION_COMPLETION_P95=$(jq -r '.orchestration_completion_exception_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)

          if awk "BEGIN { exit !(${INTERACTIVE_P95} > 200) }"; then
            echo "Interactive completion p95 ${INTERACTIVE_P95}ms exceeded the 200ms target. Blocking promotion."
            exit 1
          fi

          if awk "BEGIN { exit !(${ORCHESTRATION_ACK_P95} > 200) }"; then
            echo "Orchestration acknowledgment p95 ${ORCHESTRATION_ACK_P95}ms exceeded the 200ms target. Blocking promotion."
            exit 1
          fi

          if awk "BEGIN { exit !(${ORCHESTRATION_COMPLETION_P95} > 3000) }"; then
            echo "Orchestration completion p95 ${ORCHESTRATION_COMPLETION_P95}ms exceeded the 3000ms exception policy. Blocking promotion."
            exit 1
          fi

          echo "Latency-class promotion gates passed."

      - name: Upload per-commit benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staging-benchmark-${{ needs.promotion-context.outputs.source_sha }}-${{ github.run_id }}
          path: |
            load-test-summary.json
            load-test-results.json
            benchmark-artifacts/benchmark-summary.json
            benchmark-artifacts/benchmark-report.md

  preprod-slo-guard:
    name: Pre-Prod SLO Guard
    runs-on: ubuntu-latest
    needs: [promotion-context, deploy-staging, staging-performance-benchmarks]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.staging-performance-benchmarks.result == 'success'
    steps:
      - name: Check pre-production burn-rate alerts
        env:
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_STAGING_URL }}
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_STAGING_TOKEN }}
          ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
        run: |
          if [ -z "${ALERTMANAGER_URL}" ]; then
            echo "ALERTMANAGER_STAGING_URL secret is required for SLO guard"
            exit 1
          fi

          AUTH_HEADER=()
          if [ -n "${ALERTMANAGER_TOKEN}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          ALERTS_JSON=$(curl -fsSL "${AUTH_HEADER[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts")

          ACTIVE_SLO_ALERTS=$(echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '[.[] | select(.status.state == "active" and (.labels.alertname | test($pattern)))] | length')

          if [ "${ACTIVE_SLO_ALERTS}" -gt 0 ]; then
            echo "Found ${ACTIVE_SLO_ALERTS} active SLO burn-rate alerts. Blocking production promotion."
            echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '.[] | select(.status.state == "active" and (.labels.alertname | test($pattern))) | {alertname: .labels.alertname, severity: .labels.severity, summary: .annotations.summary}'
            exit 1
          fi

          echo "No active SLO burn-rate alerts in pre-production."

  error-budget-policy-gate:
    name: Error Budget Policy Gate
    runs-on: ubuntu-latest
    needs: [promotion-context, deploy-staging, preprod-slo-guard]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.preprod-slo-guard.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - name: Evaluate SLO error budget burn policy
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          SLO_FAST_BURN_THRESHOLD: "14.4"
          SLO_SLOW_BURN_THRESHOLD: "6"
          SLO_GATE_OUTPUT_DIR: artifacts/slo-gate
        run: |
          if [ -z "${PROMETHEUS_BASE_URL}" ]; then
            echo "PROMETHEUS_STAGING_URL secret is required for error budget policy gate"
            exit 1
          fi
          bash scripts/ci/observability-slo-gate.sh

      - name: Upload error budget gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: error-budget-gate-${{ github.run_id }}
          path: |
            artifacts/slo-gate/slo-gate-report.json
            artifacts/slo-gate/slo-gate-summary.md
          if-no-files-found: warn

  preprod-launch-gate:
    name: Pre-Production Launch Gate
    runs-on: ubuntu-latest
    needs: [promotion-context, deploy-staging, preprod-slo-guard, error-budget-policy-gate, dast-gate]
    if: needs.promotion-context.outputs.should_run == 'true' && needs.error-budget-policy-gate.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.promotion-context.outputs.source_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blocking tenant-isolation hard-gate suites
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing required Supabase secrets for blocking tenant-isolation hard-gate suites." >&2
            exit 1
          fi

          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts

      - name: Run entitlements + billing regression tests
        run: |
          pnpm --filter @valueos/backend exec vitest run \
            src/services/billing/__tests__/EntitlementSnapshotService.test.ts \
            src/services/billing/__tests__/RatingEngine.test.ts \
            src/services/billing/__tests__/security/sensitive-data.test.ts

      - name: Run localization smoke checks
        run: |
          node scripts/ci/check-pseudo-localization.mjs \
            --json-out artifacts/i18n/preprod-localization-smoke-${{ github.run_id }}.json

      - name: Run tenant/region feature-toggle validation
        run: |
          node --test tests/integration/multi-tenant-chaos-invariants.test.mjs
          pnpm --filter @valueos/backend exec vitest run src/config/__tests__/environment.test.ts
          pnpm --filter ./apps/ValyntApp exec vitest run src/config/__tests__/sprint0-feature-flags.test.ts

      - name: Install Playwright browsers for tenant branding verification
        run: |
          pnpm --filter ./apps/ValyntApp exec playwright install --with-deps chromium

      - name: Run tenant branding render verification
        run: |
          node scripts/ci/verify-tenant-branding-render.mjs

      - name: Upload pre-production launch gate artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: preprod-launch-gate-${{ github.run_id }}
          path: |
            artifacts/i18n/preprod-localization-smoke-${{ github.run_id }}.json
            artifacts/branding/tenant-branding-preview.png
            artifacts/branding/tenant-branding-playwright-report.json
            artifacts/branding/tenant-branding-summary.json
            artifacts/branding/tenant-branding-summary.md

  publish-promotion-manifest:
    name: Publish Promotion Manifest
    runs-on: ubuntu-latest
    needs:
      [
        promotion-context,
        build-images,
        verify-supply-chain,
        stability-seal,
        deploy-staging,
        staging-performance-benchmarks,
        preprod-slo-guard,
        error-budget-policy-gate,
        preprod-launch-gate,
      ]
    if: >-
      needs.promotion-context.outputs.should_run == 'true' &&
      needs.build-images.result == 'success' &&
      needs.verify-supply-chain.result == 'success' &&
      needs.stability-seal.result == 'success' &&
      needs.deploy-staging.result == 'success' &&
      needs.staging-performance-benchmarks.result == 'success' &&
      needs.preprod-slo-guard.result == 'success' &&
      needs.error-budget-policy-gate.result == 'success' &&
      needs.preprod-launch-gate.result == 'success'
    steps:
      - name: Create immutable promotion manifest
        env:
          SOURCE_SHA: ${{ needs.promotion-context.outputs.source_sha }}
          BACKEND_IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
          FRONTEND_IMAGE_REF: ${{ needs.build-images.outputs.frontend_image_ref }}
          SOURCE_RUN_URL: ${{ needs.promotion-context.outputs.source_run_url }}
        run: |
          cat > promotion-manifest.json <<JSON
          {
            "source_sha": "${SOURCE_SHA}",
            "backend_image_ref": "${BACKEND_IMAGE_REF}",
            "frontend_image_ref": "${FRONTEND_IMAGE_REF}",
            "promotion_reference": "${SOURCE_RUN_URL}",
            "generated_by_workflow": "deploy-staging.yml",
            "generated_run_id": "${{ github.run_id }}"
          }
          JSON

      - name: Create release body snippet
        env:
          SOURCE_SHA: ${{ needs.promotion-context.outputs.source_sha }}
          BACKEND_IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
          FRONTEND_IMAGE_REF: ${{ needs.build-images.outputs.frontend_image_ref }}
          SOURCE_RUN_URL: ${{ needs.promotion-context.outputs.source_run_url }}
        run: |
          cat > promotion-release-snippet.md <<MARKDOWN
          source_sha: ${SOURCE_SHA}
          backend_image_ref: ${BACKEND_IMAGE_REF}
          frontend_image_ref: ${FRONTEND_IMAGE_REF}
          promotion_reference: ${SOURCE_RUN_URL}
          MARKDOWN

      - name: Upload promotion manifest artifacts
        uses: actions/upload-artifact@v7
        with:
          name: promotion-manifest-${{ github.run_id }}
          path: |
            promotion-manifest.json
            promotion-release-snippet.md
