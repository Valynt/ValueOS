name: Lint and Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci-verify:
    name: Unified CI Verify Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unified CI verification
        run: pnpm run ci:verify

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for high severity vulnerabilities
        run: npm audit --audit-level=high

  format-check:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

  lint-baseline:
    name: Lint Baseline Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate current lint baseline
        run: node scripts/lint-analysis.js

      - name: Compare with main branch baseline
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');

          try {
            // Get current branch issues for backend
            const current = JSON.parse(fs.readFileSync('.lint/backend.json', 'utf8'));
            const currentCount = current.reduce((sum, file) => sum + file.messages.length, 0);

            // Try to get main branch baseline
            let baselineCount = currentCount; // Default to current if no baseline
            try {
              execSync('git fetch origin main --depth=1');
              const baselineCmd = 'git show origin/main:.lint/backend.json 2>/dev/null || echo \"[]\"';
              const baselineOutput = execSync(baselineCmd, { encoding: 'utf8' }).trim();
              if (baselineOutput && baselineOutput !== '[]') {
                const baseline = JSON.parse(baselineOutput);
                baselineCount = baseline.reduce((sum, file) => sum + file.messages.length, 0);
              }
            } catch (e) {
              console.log('Could not fetch main branch baseline, using current count');
            }

            console.log('Current branch issues:', currentCount);
            console.log('Main branch baseline:', baselineCount);

            if (currentCount > baselineCount) {
              const newIssues = currentCount - baselineCount;
              console.log(\`❌ \${newIssues} new lint issues introduced. Please fix or update baseline.\`);
              process.exit(1);
            } else if (currentCount < baselineCount) {
              const fixedIssues = baselineCount - currentCount;
              console.log(\`✅ \${fixedIssues} lint issues fixed!\`);
            } else {
              console.log('✅ No change in lint issues');
            }
          } catch (e) {
            console.log('Warning: Lint comparison failed:', e.message);
            // Allow to continue if comparison fails
          }
          "

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: .lint/
        if: always()
