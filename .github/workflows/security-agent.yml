name: Security Agent

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]

jobs:
  security-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run Security Agent
        run: node .github/security-agent/index.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECURITY_AGENT_CONFIG: .github/security-agent/config.json
