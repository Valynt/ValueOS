name: Advisory - Nightly Validation Trends

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  reproducibility-rebuild:
    name: advisory-reproducibility-rebuild
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run_id: [run-a, run-b]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm run build
      - name: Capture packaged artifact manifests
        run: node scripts/ci/reproducibility-verify.mjs capture-manifests --output-dir reproducibility
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend container image
        id: backend-container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          outputs: type=oci,dest=/tmp/backend-reproducibility-${{ matrix.run_id }}.tar
          provenance: false
          sbom: false
          no-cache: true
          pull: true
      - name: Build frontend container image
        id: frontend-container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=/api
          outputs: type=oci,dest=/tmp/frontend-reproducibility-${{ matrix.run_id }}.tar
          provenance: false
          sbom: false
          no-cache: true
          pull: true
      - name: Persist container digests
        run: |
          mkdir -p reproducibility
          printf '%s\n' '${{ steps.backend-container.outputs.digest }}' > reproducibility/backend-image-digest.txt
          printf '%s\n' '${{ steps.backend-container.outputs.metadata }}' > reproducibility/backend-image-metadata.json
          printf '%s\n' '${{ steps.frontend-container.outputs.digest }}' > reproducibility/frontend-image-digest.txt
          printf '%s\n' '${{ steps.frontend-container.outputs.metadata }}' > reproducibility/frontend-image-metadata.json
      - name: Upload reproducibility build evidence
        uses: actions/upload-artifact@v7
        with:
          name: advisory-reproducibility-build-${{ matrix.run_id }}
          path: reproducibility/
          retention-days: 30

  reproducibility-compare:
    name: advisory-reproducibility-compare
    runs-on: ubuntu-latest
    needs: [reproducibility-rebuild]
    steps:
      - uses: actions/checkout@v6
      - name: Download reproducibility build A
        uses: actions/download-artifact@v7
        with:
          name: advisory-reproducibility-build-run-a
          path: reproducibility/run-a
      - name: Download reproducibility build B
        uses: actions/download-artifact@v7
        with:
          name: advisory-reproducibility-build-run-b
          path: reproducibility/run-b
      - name: Compare reproducibility evidence
        run: |
          node scripts/ci/reproducibility-verify.mjs compare-runs \
            --run-a reproducibility/run-a \
            --run-b reproducibility/run-b \
            --output-dir advisory-artifacts/reproducibility \
            --allowlist scripts/ci/reproducibility-allowlist.json \
            --commit "${GITHUB_SHA}"
      - name: Upload advisory reproducibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: advisory-reproducibility-${{ github.run_id }}
          path: advisory-artifacts/reproducibility/
          retention-days: 30

  accessibility-trends:
    name: advisory-accessibility-trends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: npx turbo run build --filter=valynt-app
      - name: Collect advisory accessibility trend data
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: advisory-artifacts/accessibility/playwright-report.json
        run: |
          mkdir -p advisory-artifacts/accessibility
          npx playwright test tests/accessibility/axe-a11y.spec.ts --reporter=json --output=advisory-artifacts/accessibility
          node scripts/ci/a11y-trend-gate.mjs --report advisory-artifacts/accessibility/playwright-report.json --baseline .github/metrics/accessibility-baseline.json --metrics-out advisory-artifacts/accessibility/a11y-metrics.json --summary-out advisory-artifacts/accessibility/a11y-trend-summary.md
      - name: Upload accessibility advisory artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: advisory-accessibility-trends-${{ github.run_id }}
          path: advisory-artifacts/accessibility/
          if-no-files-found: warn
          retention-days: 30

  deep-image-security-scan:
    name: advisory-deep-image-security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Build backend container image
        run: docker build -f infra/docker/Dockerfile.backend -t valueos-backend:nightly .
      - name: Trivy image advisory scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: valueos-backend:nightly
          format: sarif
          output: advisory-trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload advisory Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: advisory-trivy-image.sarif
          category: advisory-trivy-image

  drift-and-trend-report:
    name: advisory-drift-and-trend-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate advisory drift report
        run: |
          mkdir -p advisory-artifacts/drift
          node scripts/ci/check-compose-drift.mjs | tee advisory-artifacts/drift/compose-drift.txt
          node scripts/ci/check-env-port-drift.mjs | tee advisory-artifacts/drift/env-port-drift.txt
      - name: Upload advisory drift artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: advisory-drift-report-${{ github.run_id }}
          path: advisory-artifacts/drift/
          if-no-files-found: warn
          retention-days: 30
