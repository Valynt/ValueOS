name: Production Security Scan

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan filesystem for vulnerabilities
        run: |
          trivy filesystem --exit-code 0 --no-progress --format sarif --output trivy-results.sarif .

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Lint Dockerfiles
        run: |
          curl -sSfL https://raw.githubusercontent.com/hadolint/hadolint/master/install.sh | sh -s -- -b /usr/local/bin
          hadolint infra/docker/Dockerfile.backend infra/docker/Dockerfile.frontend

  build-and-scan:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: valueos-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --no-progress valueos-backend:test

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: valueos-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image
        run: |
          trivy image --exit-code 1 --no-progress valueos-frontend:test

      - name: Clean up
        if: always()
        run: |
          docker rmi valueos-backend:test valueos-frontend:test || true
