name: Release Security Gate

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

jobs:
  sbom-and-vulnerability-gate:
    name: SBOM + Vulnerability Gate (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate SBOM
        run: pnpm run security:sbom

      - name: Verify SBOM artifact
        run: |
          if [ ! -s sbom.json ]; then
            echo "::error::SBOM artifact missing or empty."
            exit 1
          fi

      - name: Run vulnerability scan and capture output
        run: |
          set +e
          pnpm audit --json > security-audit.json
          AUDIT_EXIT=$?
          set -e

          if [ ! -s security-audit.json ]; then
            echo "::error::Security scan output missing or empty."
            exit 1
          fi

          HIGH_COUNT=$(jq '[.. | objects | select(.severity? == "high")] | length' security-audit.json)
          CRITICAL_COUNT=$(jq '[.. | objects | select(.severity? == "critical")] | length' security-audit.json)

          {
            echo "# Release Vulnerability Gate"
            echo
            echo "- High findings: ${HIGH_COUNT}"
            echo "- Critical findings: ${CRITICAL_COUNT}"
            echo "- Audit exit code: ${AUDIT_EXIT}"
          } > security-gate-summary.md

          cat security-gate-summary.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Release blocked due to high/critical dependency vulnerabilities."
            exit 1
          fi

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::error::Dependency audit failed with exit code ${AUDIT_EXIT}."
            exit "$AUDIT_EXIT"
          fi

      - name: Upload SBOM and security scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-security-artifacts-${{ github.sha }}
          path: |
            sbom.json
            security-audit.json
            security-gate-summary.md
          if-no-files-found: error
