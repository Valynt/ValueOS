name: Release Security Gate

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

jobs:
  sbom-and-vulnerability-gate:
    name: SBOM + Vulnerability Gate (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate SBOM
        run: pnpm run security:sbom

      - name: Verify SBOM artifact
        run: |
          if [ ! -s sbom.json ]; then
            echo "::error::SBOM artifact missing or empty."
            exit 1
          fi

      - name: Run dependency vulnerability audit (high+)
        run: |
          pnpm audit --audit-level=high --json > dependency-audit.json || true
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('dependency-audit.json','utf8'));const meta=data.metadata?.vulnerabilities || {};const high=(meta.high||0)+(meta.critical||0);if(high>0){console.error('High/Critical vulnerabilities detected:',meta);process.exit(1);}console.log('✅ No high/critical vulnerabilities:',meta);"

      - name: Upload release security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-security-${{ github.sha }}
          path: |
            sbom.json
            dependency-audit.json
          if-no-files-found: error
