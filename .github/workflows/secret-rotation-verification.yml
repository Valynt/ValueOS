name: Secret Rotation Verification

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment whose secret metadata should be verified"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: "Environment whose secret metadata should be verified"
        required: false
        default: production
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  verify-secret-rotation:
    name: Verify Secret Rotation
    runs-on: ubuntu-latest
    environment: ${{ github.event_name != 'schedule' && inputs.target_environment || 'production' }}
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name != 'schedule' && inputs.target_environment || 'production' }}
      SECRET_ROTATION_PROVIDERS: ${{ vars.SECRET_ROTATION_PROVIDERS }}
      SECRET_ROTATION_MAX_AGE_DAYS: ${{ vars.SECRET_ROTATION_MAX_AGE_DAYS != '' && vars.SECRET_ROTATION_MAX_AGE_DAYS || '90' }}
      SECRET_ROTATION_AWS_ROLE_TO_ASSUME: ${{ vars.SECRET_ROTATION_AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ vars.SECRET_ROTATION_AWS_REGION }}
      AWS_SECRET_IDS: ${{ vars.SECRET_ROTATION_AWS_SECRET_IDS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SECRET_ROTATION_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ROTATION_AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.SECRET_ROTATION_AWS_SESSION_TOKEN }}
      VAULT_ADDR: ${{ vars.SECRET_ROTATION_VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.SECRET_ROTATION_VAULT_TOKEN }}
      VAULT_KV_MOUNT: ${{ vars.SECRET_ROTATION_VAULT_KV_MOUNT }}
      VAULT_SECRET_PATHS: ${{ vars.SECRET_ROTATION_VAULT_SECRET_PATHS }}
      # Fetch Infisical secrets via OIDC (no long-lived tokens)
      INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_IDENTITY_ID }}
      INFISICAL_PROJECT_ID: ${{ vars.SECRET_ROTATION_INFISICAL_PROJECT_ID }}
      INFISICAL_ENVIRONMENT: ${{ vars.SECRET_ROTATION_INFISICAL_ENVIRONMENT }}
      INFISICAL_SECRET_PATHS: ${{ vars.SECRET_ROTATION_INFISICAL_SECRET_PATHS }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Fetch secrets from Infisical via OIDC
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG || 'valueos' }}
          env-slug: ${{ vars.SECRET_ROTATION_INFISICAL_ENVIRONMENT || 'prod' }}

      - name: Configure AWS credentials for secret metadata lookup
        if: ${{ (contains(env.SECRET_ROTATION_PROVIDERS, 'aws') || env.AWS_SECRET_IDS != '') && env.SECRET_ROTATION_AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.SECRET_ROTATION_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify secret rotation metadata age
        env:
          ROTATION_EVIDENCE_TIMESTAMP: ${{ format('{0}-run-{1}-attempt-{2}', github.event_name != 'schedule' && inputs.target_environment || 'production', github.run_id, github.run_attempt) }}
          ROTATION_EVIDENCE_DIR: artifacts/security/secret-rotation
        run: |
          set -euo pipefail
          mkdir -p artifacts/security/secret-rotation
          LOG_FILE="artifacts/security/secret-rotation/verify-secret-rotation-${TARGET_ENVIRONMENT}-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}.txt"
          node scripts/security/verify-secret-rotation.mjs 2>&1 | tee "${LOG_FILE}"

      - name: Upload secret rotation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: secret-rotation-evidence-${{ github.event_name != 'schedule' && inputs.target_environment || 'production' }}-${{ github.run_id }}
          path: |
            artifacts/security/secret-rotation/*.json
            artifacts/security/secret-rotation/*.txt
          if-no-files-found: error
          retention-days: 30
