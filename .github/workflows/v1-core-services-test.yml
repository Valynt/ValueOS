name: V1 Core Services Test Suite with Security Hardening

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/backend/src/services/**/*.ts"
      - "packages/backend/src/services/__tests__/**/*.ts"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/backend/src/services/**/*.ts"
      - "packages/backend/src/services/__tests__/**/*.ts"

jobs:
  security-hardening:
    name: Security Hardening Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Remediation Critical Issues Script
        run: |
          chmod +x scripts/remediation-critical-issues.sh
          ./scripts/remediation-critical-issues.sh
        continue-on-error: false

      - name: Check for Security Vulnerabilities
        run: |
          # Check for hardcoded secrets
          if grep -r "password\|secret\|key" --include="*.ts" packages/backend/src/services/ | grep -v "test\|mock\|fixture" | grep -E "(=\s*['\"][^'\"]+['\"]|:\s*['\"][^'\"]+['\"])"; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          fi

      - name: Validate ESLint Agent Patterns
        run: |
          cd packages/backend
          pnpm exec eslint src/services/ --ext .ts --rule 'no-restricted-imports: [error, {paths: [{name: "llmGateway", message: "Use secureInvoke only"}]}]' || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-hardening
    strategy:
      matrix:
        service:
          - value/HypothesisGenerator
          - value/ScenarioBuilder
          - value/SensitivityAnalyzer
          - integrity/ReadinessScorer
          - integrity/PlausibilityClassifier
          - integrity/HallucinationChecker
          - export/ArtifactGeneratorService
          - export/ArtifactEditService
          - deal/CRMConnector
          - deal/TranscriptParser
          - realization/PromiseBaselineService
          - realization/CheckpointScheduler
          - integrity/SECEdgarClient

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd packages/backend
          pnpm vitest run src/services/__tests__/${{ matrix.service }}.test.ts --reporter=verbose
        env:
          NODE_ENV: test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-key

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: security-hardening
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Run integration tests
        run: |
          cd packages/backend
          pnpm vitest run src/services/__tests__/integration/ --reporter=verbose
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

  security-fixture-tests:
    name: Security Fixture Tests
    runs-on: ubuntu-latest
    needs: security-hardening
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Run security fixture tests
        run: |
          cd packages/backend
          pnpm vitest run src/services/__tests__/security/ --reporter=verbose

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          cd packages/backend
          pnpm install

      - name: Generate coverage report
        run: |
          cd packages/backend
          pnpm vitest run --coverage --reporter=verbose

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: packages/backend/coverage/lcov.info
          fail_ci_if_error: true
