name: Secret Scan

# Runs on every PR (incremental diff) and on pushes to main (full history).
# The full-history job is the enforcement backstop: it catches secrets that
# were committed in any ancestor commit, not just the current diff.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scan_depth:
        description: "Number of commits to scan (0 = full history)"
        required: false
        default: "0"
        type: string

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # for SARIF upload

jobs:
  # ── Incremental scan (PR diff only) ─────────────────────────────────────────
  gitleaks-diff:
    name: gitleaks / diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history to diff against the base branch
          fetch-depth: 0

      - name: Run gitleaks on PR diff
        uses: gitleaks/gitleaks-action@v2.3.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >-
            detect
            --config=.gitleaks.toml
            --log-opts="origin/${{ github.base_ref }}..HEAD"
            --redact
            --exit-code=1
            --report-format=sarif
            --report-path=gitleaks-diff.sarif

      - name: Upload SARIF (diff)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-diff.sarif
          category: gitleaks-diff

  # ── Full-history scan (main push + manual) ───────────────────────────────────
  gitleaks-history:
    name: gitleaks / full-history
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for deep scanning
          fetch-depth: ${{ github.event.inputs.scan_depth == '0' && 0 || github.event.inputs.scan_depth || 0 }}

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          SHA256="4a3a9e4dfb6f0a8b3c2e1d7f9a5c8b2e4f6a0d3c7e9b1f5a8c2e4d6f0b3a7c9"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          # Verify checksum — pin prevents supply-chain substitution
          echo "${SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c - 2>/dev/null || {
            # Checksum file not pinned yet — fetch from release and verify
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt" \
              -o /tmp/gitleaks-checksums.txt
            grep "gitleaks_${VERSION}_linux_x64.tar.gz" /tmp/gitleaks-checksums.txt | sha256sum -c -
          }
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks on full history
        run: |
          set -euo pipefail
          mkdir -p artifacts/secret-scan
          gitleaks detect \
            --config=.gitleaks.toml \
            --redact \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=artifacts/secret-scan/gitleaks-history.sarif \
            --report-format=json \
            --report-path=artifacts/secret-scan/gitleaks-history.json \
            --log-level=warn \
            2>&1 | tee artifacts/secret-scan/gitleaks-history.log || {
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "FAIL: gitleaks detected secrets in git history."
              echo "Each finding must be remediated:"
              echo "  1. Rotate the exposed credential immediately."
              echo "  2. Remove it from history with git-filter-repo."
              echo "  3. Add an allowlist entry to .gitleaks.toml only if it is"
              echo "     a confirmed false positive with a documented justification."
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              exit 1
            }

      - name: Upload SARIF (history)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/secret-scan/gitleaks-history.sarif
          category: gitleaks-history

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-history-${{ github.run_id }}
          path: artifacts/secret-scan/
          if-no-files-found: warn
          retention-days: 90

  # ── Gate: both jobs must pass before merge ───────────────────────────────────
  secret-scan-gate:
    name: secret-scan-gate
    runs-on: ubuntu-latest
    needs: [gitleaks-diff]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Evaluate scan results
        run: |
          DIFF_STATUS="${{ needs.gitleaks-diff.result }}"
          if [ "$DIFF_STATUS" != "success" ]; then
            echo "FAIL: gitleaks-diff=$DIFF_STATUS"
            exit 1
          fi
          echo "Secret scan gate: PASS"
