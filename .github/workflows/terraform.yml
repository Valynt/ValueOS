name: Terraform
# active-runtime-platform: kubernetes

on:
  push:
    branches: [main, develop]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read

jobs:
  terraform-checks:
    name: infra-plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform module placeholder guard
        run: node ../../scripts/ci/check-terraform-no-stubs.mjs

      - name: Terraform/K8s scaling parity check
        run: node ../../scripts/ci/check-terraform-k8s-scaling-parity.mjs

      - name: Runtime platform contract guard
        run: node ../../scripts/ci/check-runtime-platform-contract.mjs

      - name: Archived ECS guardrails
        run: node ../../scripts/ci/check-archived-ecs-guardrails.mjs

      - name: Run Checkov custom secret policies
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          quiet: true
          soft_fail: false
          external_checks_dir: .checkov/custom_policies


      - name: Terraform Plan (dry run)
        if: github.event_name == 'pull_request'
        env:
          # Provide required variables for plan without real credentials
          TF_VAR_environment: "staging"
          TF_VAR_domain_name: "staging.valueos.example.com"
          TF_VAR_frontend_image: "ghcr.io/valynt/valueos-frontend:latest"
          TF_VAR_backend_image: "ghcr.io/valynt/valueos-backend:latest"
          TF_VAR_alert_email: "alerts@valueos.dev"
          TF_VAR_slack_webhook_url: "https://hooks.slack.com/services/dry-run-placeholder"
        run: terraform plan -input=false -no-color
        continue-on-error: true
