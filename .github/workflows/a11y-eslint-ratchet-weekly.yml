name: a11y-eslint-ratchet-weekly

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  a11y-eslint-ratchet:
    name: a11y-eslint-ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate ValyntApp lint report
        run: pnpm lint:ci:valynt-app
      - name: Enforce weekly a11y warning ratchet
        run: node scripts/ci/a11y-eslint-weekly-ratchet.mjs --report artifacts/eslint/valynt-app.json
