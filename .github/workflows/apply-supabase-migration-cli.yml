name: Apply Supabase Migration (CLI)

on:
  workflow_dispatch:

jobs:
  apply-migration-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run supabase CLI push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret"; exit 1;
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret"; exit 1;
          fi
          echo "Linking project in infra/supabase"
          pnpm exec -- supabase link --workdir infra/supabase --project-ref "$SUPABASE_PROJECT_REF"
          echo "Pushing migrations"
          pnpm exec -- supabase db push --workdir infra/supabase

      - name: Done
        run: echo "Supabase migration job finished"
