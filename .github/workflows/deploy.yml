name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test gate (non-production emergency only)"
        required: false
        default: false
        type: boolean
      incident_ticket_id:
        description: "Incident ticket ID (required when skip_tests=true, e.g. INC-1234)"
        required: false
        type: string
      incident_reference:
        description: "Incident reference (ticket ID or incident URL; required when skip_tests=true)"
        required: false
        type: string
      skip_tests_reason:
        description: "Emergency justification for skipping tests (required when skip_tests=true)"
        required: false
        type: string
      post_deploy_validation_checklist:
        description: "Post-deploy validation checklist (required when skip_tests=true)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  issues: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  NODE_VERSION: "20.19.0"
  PNPM_VERSION: "9.15.0"
  SLO_ALERT_NAME_REGEX: "SLOBurnRateTooHigh"

jobs:
  # Guardrail: if tests are bypassed, require evidence fields.
  # Additional restriction: skip_tests may ONLY be used for non-production emergency deploys.
  emergency-bypass-authorization:
    name: Emergency Test Bypass Authorization
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
    outputs:
      audit_file: ${{ steps.audit.outputs.audit_file }}
    steps:
      - name: Validate emergency bypass inputs
        run: |
          set -euo pipefail

          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "skip_tests is not permitted for production deploys; use the dedicated break-glass workflow." >&2
            exit 1
          fi

          if [ -z "${{ inputs.incident_ticket_id }}" ]; then
            if [ -z "${{ inputs.incident_reference }}" ]; then
              echo "incident_ticket_id or incident_reference is required when skip_tests=true." >&2
              exit 1
            fi
          fi

          INCIDENT_REFERENCE="${{ inputs.incident_reference }}"
          if [ -z "${INCIDENT_REFERENCE}" ]; then
            INCIDENT_REFERENCE="${{ inputs.incident_ticket_id }}"
          fi
          if [ "${#INCIDENT_REFERENCE}" -lt 5 ]; then
            echo "incident reference must be explicit (ticket or URL)." >&2
            exit 1
          fi

          if [ -z "${{ inputs.skip_tests_reason }}" ]; then
            echo "skip_tests_reason is required when skip_tests=true." >&2
            exit 1
          fi

          if [ -z "${{ inputs.post_deploy_validation_checklist }}" ]; then
            echo "post_deploy_validation_checklist is required when skip_tests=true." >&2
            exit 1
          fi

      - name: Create emergency bypass audit log
        id: audit
        run: |
          set -euo pipefail
          AUDIT_FILE="emergency_test_bypass_audit-${{ github.run_id }}.json"

          cat > "${AUDIT_FILE}" <<EOF
          {
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "approver_identity": "${{ github.triggering_actor }}",
            "workflow_actor": "${{ github.actor }}",
            "reason": ${{ toJSON(inputs.skip_tests_reason) }},
            "incident_reference": ${{ toJSON(inputs.incident_reference != '' && inputs.incident_reference || inputs.incident_ticket_id) }},
            "post_deploy_validation_checklist": ${{ toJSON(inputs.post_deploy_validation_checklist) }}
          }
          EOF

          echo "audit_file=${AUDIT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload emergency bypass audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: emergency_test_bypass_audit-${{ github.run_id }}
          path: ${{ steps.audit.outputs.audit_file }}

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Quality gate — must pass before any deploy (unless emergency bypass)
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' && !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + Typecheck + Test
        run: |
          npx turbo run lint typecheck test

      - name: Observability deployment gates
        run: |
          pnpm check:telemetry-completeness
          pnpm check:observability-deployment-gates


  dast-gate:
    name: DAST Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' && !inputs.skip_tests }}
    env:
      DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL != '' && vars.DAST_TARGET_URL || 'https://staging.valueos.app' }}
      DAST_FAIL_ON_HIGH: "0"
      DAST_FAIL_ON_MEDIUM: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p artifacts/dast
          docker run --rm \
            -v "${PWD}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${DAST_TARGET_URL}" \
            -J /zap/wrk/artifacts/dast/zap-report.json \
            -r /zap/wrk/artifacts/dast/zap-report.html \
            -w /zap/wrk/artifacts/dast/zap-report.md \
            -m 5 -d || true

      - name: Enforce DAST severity thresholds
        run: |
          python3 - <<'PY2'
          import json
          import os
          import pathlib
          import sys

          report_path = pathlib.Path("artifacts/dast/zap-report.json")
          summary_path = pathlib.Path("artifacts/dast/dast-summary.md")
          if not report_path.exists():
            summary_path.write_text("# DAST Gate Summary\n\n- status: failed\n- reason: zap-report.json not generated\n", encoding="utf-8")
            print("Missing ZAP JSON report", file=sys.stderr)
            sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          counts = {"high": 0, "medium": 0, "low": 0, "info": 0}
          severity_map = {"3": "high", "2": "medium", "1": "low", "0": "info"}

          for site in report.get("site", []):
            for alert in site.get("alerts", []):
              severity = severity_map.get(str(alert.get("riskcode", "0")), "info")
              counts[severity] += 1

          max_high = int(os.environ.get("DAST_FAIL_ON_HIGH", "0"))
          max_medium = int(os.environ.get("DAST_FAIL_ON_MEDIUM", "0"))

          breached = []
          if counts["high"] > max_high:
            breached.append(f"high({counts['high']} > {max_high})")
          if counts["medium"] > max_medium:
            breached.append(f"medium({counts['medium']} > {max_medium})")

          status = "failed" if breached else "passed"
          lines = [
            "# DAST Gate Summary",
            "",
            f"- target: {os.environ.get('DAST_TARGET_URL', '')}",
            f"- status: {status}",
            f"- thresholds: high<={max_high}, medium<={max_medium}",
            f"- findings: high={counts['high']}, medium={counts['medium']}, low={counts['low']}, info={counts['info']}",
          ]
          if breached:
            lines.append(f"- breached: {', '.join(breached)}")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if breached:
            print(f"DAST threshold breached: {', '.join(breached)}", file=sys.stderr)
            sys.exit(1)
          PY2

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-dast-gate-${{ github.run_id }}
          path: |
            artifacts/dast/zap-report.json
            artifacts/dast/zap-report.html
            artifacts/dast/zap-report.md
            artifacts/dast/dast-summary.md
          if-no-files-found: warn
          retention-days: 30

  # Always emit a deployment audit artifact for non-scheduled runs.
  emergency-skip-audit:
    name: Emergency Skip Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' }}
    outputs:
      incident_ticket_id: ${{ steps.collect.outputs.incident_ticket_id }}
      incident_reference: ${{ steps.collect.outputs.incident_reference }}
      skip_tests: ${{ steps.collect.outputs.skip_tests }}
    steps:
      - name: Validate skip requirements and create audit artifact
        id: collect
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          INCIDENT_TICKET_ID: ${{ inputs.incident_ticket_id }}
          INCIDENT_REFERENCE: ${{ inputs.incident_reference }}
          SKIP_TESTS_REASON: ${{ inputs.skip_tests_reason }}
          POST_DEPLOY_VALIDATION_CHECKLIST: ${{ inputs.post_deploy_validation_checklist }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # If skip_tests is set, enforce evidence fields.
          if [ "${SKIP_TESTS}" = "true" ]; then
            if [ -z "${INCIDENT_REFERENCE:-}" ] && [ -z "${INCIDENT_TICKET_ID:-}" ]; then
              echo "skip_tests=true requires incident_reference or incident_ticket_id" >&2
              exit 1
            fi
            if [ -z "${SKIP_TESTS_REASON:-}" ]; then
              echo "skip_tests=true requires skip_tests_reason" >&2
              exit 1
            fi
            if [ -z "${POST_DEPLOY_VALIDATION_CHECKLIST:-}" ]; then
              echo "skip_tests=true requires post_deploy_validation_checklist" >&2
              exit 1
            fi
          fi

          EFFECTIVE_INCIDENT_REFERENCE="${INCIDENT_REFERENCE:-${INCIDENT_TICKET_ID:-}}"
          printf 'incident_ticket_id=%s\n' "${INCIDENT_TICKET_ID:-}" >> "$GITHUB_OUTPUT"
          printf 'incident_reference=%s\n' "${EFFECTIVE_INCIDENT_REFERENCE}" >> "$GITHUB_OUTPUT"
          printf 'skip_tests=%s\n' "${SKIP_TESTS}" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": os.environ["RUN_ID"],
            "run_attempt": os.environ["RUN_ATTEMPT"],
            "actor": os.environ["ACTOR"],
            "event_name": os.environ["EVENT_NAME"],
            "ref_name": os.environ["REF_NAME"],
            "sha": os.environ["SHA"],
            "skip_tests": os.environ.get("SKIP_TESTS", "false") == "true",
            "incident_ticket_id": os.environ.get("INCIDENT_TICKET_ID", ""),
            "incident_reference": os.environ.get("INCIDENT_REFERENCE") or os.environ.get("INCIDENT_TICKET_ID", ""),
            "skip_tests_reason": os.environ.get("SKIP_TESTS_REASON", ""),
            "post_deploy_validation_checklist": os.environ.get("POST_DEPLOY_VALIDATION_CHECKLIST", ""),
          }

          with open(f"emergency-skip-audit-{os.environ['RUN_ID']}.json", "w", encoding="utf-8") as handle:
            json.dump(payload, handle, indent=2)
          PY

      - name: Upload emergency skip audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: emergency-skip-audit-${{ github.run_id }}
          path: emergency-skip-audit-${{ github.run_id }}.json

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build and push container images
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [quality-gate, dast-gate, emergency-bypass-authorization, emergency-skip-audit]
    if: >-
      github.event_name != 'schedule' &&
      always() &&
      (needs.quality-gate.result == 'success' || (needs.quality-gate.result == 'skipped' && github.event_name == 'workflow_dispatch' && inputs.environment != 'production')) &&
      (needs.dast-gate.result == 'success' || (needs.dast-gate.result == 'skipped' && github.event_name == 'workflow_dispatch' && inputs.environment != 'production')) &&
      (needs.emergency-skip-audit.result == 'success' || needs.emergency-skip-audit.result == 'skipped') &&
      (!inputs.skip_tests || needs.emergency-bypass-authorization.result == 'success')
    outputs:
      image_tag: ${{ steps.backend-meta.outputs.version }}
      image_digest: ${{ steps.backend-build.outputs.digest }}
      image_ref: ${{ steps.backend-image-ref.outputs.image_ref }}
      frontend_image_ref: ${{ steps.frontend-image-ref.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Backend Docker metadata
        id: backend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: backend-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve backend immutable image reference
        id: backend-image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.backend-build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign backend image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.backend-build.outputs.digest }}"

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Frontend Docker metadata
        id: frontend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        id: frontend-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          target: runtime
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve frontend immutable image reference
        id: frontend-image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.frontend-build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Sign frontend image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}@${{ steps.frontend-build.outputs.digest }}"

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name != 'schedule'
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed backend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

      - name: Verify signed frontend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.frontend_image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

  # ──────────────────────────────────────────────────────────────────────────
  # 3.5 Stability Seal - Quality gate to run full stability checks before promotion
  # This runs after images are built and supply-chain verified and must pass to promote to production.
  # ──────────────────────────────────────────────────────────────────────────
  stability-seal:
    name: Stability Seal
    runs-on: ubuntu-latest
    needs: [build-images, verify-supply-chain]
    if: ${{ github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run stability seal
        run: pnpm run stability-seal

      - name: Upload stability-seal artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: stability-seal-${{ github.run_id }}
          path: |
            stability-seal-report-*.json

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, verify-supply-chain, emergency-skip-audit]
    if: github.event_name != 'schedule'
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1

      - name: Run database migrations (staging)
        env:
          # [Secret] STAGING_DATABASE_URL: Staging DB connection string for migrations and app config
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::STAGING_DATABASE_URL secret is required for staging deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          # [Secret] KUBE_CONFIG_STAGING: Base64-encoded kubeconfig for staging cluster authentication
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Update image tags in staging overlay
          cd overlays/staging
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for rollout
          kubectl -n valynt-staging rollout status deployment/backend-staging --timeout=300s
          kubectl -n valynt-staging rollout status deployment/worker-staging --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1


      - name: Capture staging operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "staging",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "mandatory_verification_checklist": {
              "health": {"endpoint": "https://staging.valueos.app/api/health", "status": "passed"},
              "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
              "key_metrics": {"load_test": "infra/testing/load-test.k6.js", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"}
            },
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-staging-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)

          with open("post-deploy-verification-staging-${{ github.run_id }}.md", "w", encoding="utf-8") as handle:
            handle.write("\n".join([
              "# Post-Deploy Mandatory Verification Checklist (Staging)",
              "",
              "- [x] Health check: https://staging.valueos.app/api/health returned 200",
              "- [x] Rollback readiness confirmed (blue-green)",
              "- [x] Key metrics captured (load test + SLO alert baseline)",
              f"- [x] Incident reference documented: {os.environ.get('INCIDENT_REFERENCE', 'n/a')}",
            ]))
          PY

      - name: Upload staging operational verification artifact
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: |
            post-deploy-verification-staging-${{ github.run_id }}.json
            post-deploy-verification-staging-${{ github.run_id }}.md


  staging-performance-benchmarks:
    name: Staging Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Run standardized k6 benchmark suites against staging
        env:
          BASE_URL: https://staging.valueos.app
          AUTH_TOKEN: ${{ secrets.STAGING_PERF_AUTH_TOKEN }}
          VUS: "100"
          DURATION: "5m"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e BASE_URL \
            -e AUTH_TOKEN \
            -e VUS \
            -e DURATION \
            grafana/k6:0.53.0 run infra/testing/load-test.k6.js

      - name: Build benchmark artifact with infra correlation
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          K6_SUMMARY_PATH: load-test-summary.json
          BENCHMARK_OUTPUT_DIR: benchmark-artifacts
        run: |
          set -euo pipefail
          python3 scripts/perf/analyze-k6-benchmark.py

      - name: Enforce sustained critical route p95 <= 200ms promotion gate
        run: |
          set -euo pipefail
          CRITICAL_P95=$(jq -r '.critical_route_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)
          if awk "BEGIN { exit !(${CRITICAL_P95} > 200) }"; then
            echo "Critical route p95 ${CRITICAL_P95}ms exceeded 200ms sustained threshold. Blocking promotion."
            exit 1
          fi
          echo "Critical route p95 ${CRITICAL_P95}ms is within threshold."

      - name: Upload per-commit benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staging-benchmark-${{ github.sha }}-${{ github.run_id }}
          path: |
            load-test-summary.json
            load-test-results.json
            benchmark-artifacts/benchmark-summary.json
            benchmark-artifacts/benchmark-report.md

  preprod-slo-guard:
    name: Pre-Prod SLO Guard
    runs-on: ubuntu-latest
    needs: [deploy-staging, staging-performance-benchmarks]
    if: github.event_name != 'schedule'
    steps:
      - name: Check pre-production burn-rate alerts
        env:
          # [Secret] ALERTMANAGER_STAGING_URL: Staging Alertmanager endpoint for SLO notifications
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_STAGING_URL }}
          # [Secret] ALERTMANAGER_STAGING_TOKEN: Staging Alertmanager API token for authentication
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_STAGING_TOKEN }}
          ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
        run: |
          if [ -z "${ALERTMANAGER_URL}" ]; then
            echo "ALERTMANAGER_STAGING_URL secret is required for SLO guard"
            exit 1
          fi

          AUTH_HEADER=()
          if [ -n "${ALERTMANAGER_TOKEN}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          ALERTS_JSON=$(curl -fsSL "${AUTH_HEADER[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts")

          ACTIVE_SLO_ALERTS=$(echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '[.[] | select(.status.state == "active" and (.labels.alertname | test($pattern)))] | length')

          if [ "${ACTIVE_SLO_ALERTS}" -gt 0 ]; then
            echo "Found ${ACTIVE_SLO_ALERTS} active SLO burn-rate alerts. Blocking production promotion."
            echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '.[] | select(.status.state == "active" and (.labels.alertname | test($pattern))) | {alertname: .labels.alertname, severity: .labels.severity, summary: .annotations.summary}'
            exit 1
          fi

          echo "No active SLO burn-rate alerts in pre-production."

  error-budget-policy-gate:
    name: Error Budget Policy Gate
    runs-on: ubuntu-latest
    needs: [deploy-staging, preprod-slo-guard]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Evaluate SLO error budget burn policy
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          SLO_FAST_BURN_THRESHOLD: "14.4"
          SLO_SLOW_BURN_THRESHOLD: "6"
          SLO_GATE_OUTPUT_DIR: artifacts/slo-gate
        run: |
          if [ -z "${PROMETHEUS_BASE_URL}" ]; then
            echo "PROMETHEUS_STAGING_URL secret is required for error budget policy gate"
            exit 1
          fi
          bash scripts/ci/observability-slo-gate.sh

      - name: Upload error budget gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: error-budget-gate-${{ github.run_id }}
          path: |
            artifacts/slo-gate/slo-gate-report.json
            artifacts/slo-gate/slo-gate-summary.md
          if-no-files-found: warn

  preprod-launch-gate:
    name: Pre-Production Launch Gate
    runs-on: ubuntu-latest
    needs: [deploy-staging, preprod-slo-guard, error-budget-policy-gate, dast-gate]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blocking tenant-isolation hard-gate suites
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing required Supabase secrets for blocking tenant-isolation hard-gate suites." >&2
            exit 1
          fi

          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts

      - name: Run entitlements + billing regression tests
        run: |
          pnpm --filter @valueos/backend exec vitest run \
            src/services/billing/__tests__/EntitlementSnapshotService.test.ts \
            src/services/billing/__tests__/RatingEngine.test.ts \
            src/services/billing/__tests__/security/sensitive-data.test.ts

      - name: Run localization smoke checks
        run: |
          node scripts/ci/check-pseudo-localization.mjs \
            --json-out artifacts/i18n/preprod-localization-smoke-${{ github.run_id }}.json

      - name: Run tenant/region feature-toggle validation
        run: |
          node --test tests/integration/multi-tenant-chaos-invariants.test.mjs
          pnpm --filter @valueos/backend exec vitest run src/config/__tests__/environment.test.ts
          pnpm --filter ./apps/ValyntApp exec vitest run src/config/__tests__/sprint0-feature-flags.test.ts

      - name: Run co-branding asset/render checks (if applicable)
        run: |
          if [ -d "docs/branding-assets" ] && [ "$(find docs/branding-assets -type f | wc -l)" -gt 0 ]; then
            test -f apps/ValyntApp/src/pages/settings/BrandingPage.tsx
            test -f apps/ValyntApp/src/components/marketing/Logo.tsx
            echo "Co-branding assets/configuration detected; basic asset/render checks passed."
          else
            echo "No co-branding assets detected; skipping co-branding checks."
          fi

      - name: Upload pre-production launch gate artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: preprod-launch-gate-${{ github.run_id }}
          path: |
            artifacts/i18n/preprod-localization-smoke-${{ github.run_id }}.json

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval via environment protection)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-gate, dast-gate, deploy-staging, staging-performance-benchmarks, preprod-slo-guard, preprod-launch-gate, build-images, verify-supply-chain, stability-seal, emergency-skip-audit]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push') && needs.quality-gate.result == 'success' && needs.dast-gate.result == 'success'
    environment:
      name: production
      url: https://app.valueos.app
    steps:
      - uses: actions/checkout@v6

      - name: Enforce production gate preconditions
        run: |
          if [ "${{ needs.quality-gate.result }}" != "success" ] || [ "${{ needs.dast-gate.result }}" != "success" ]; then
            echo "Production deployment blocked: quality-gate and dast-gate must both succeed." >&2
            exit 1
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1

      - name: Run database migrations (production)
        env:
          # [Secret] PRODUCTION_DATABASE_URL: Production DB connection string for migrations and app config
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::PRODUCTION_DATABASE_URL secret is required for production deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          # [Secret] KUBE_CONFIG_PRODUCTION: Base64-encoded kubeconfig for production cluster authentication
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Blue-green deploy
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Deploy to green (inactive) slot
          cd overlays/production
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for green rollout
          kubectl -n valynt rollout status deployment/backend-green-production --timeout=300s

          # Switch active services to green
          kubectl -n valynt patch service backend-active-production \
            -p '{"spec":{"selector":{"slot":"green"}}}'
          kubectl -n valynt patch service frontend-active-production \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "Production deploy complete — green slot is now active"

      - name: Smoke test production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://app.valueos.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed — consider rollback"
          exit 1


      - name: Capture production operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "production",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "mandatory_verification_checklist": {
              "health": {"endpoint": "https://app.valueos.app/api/health", "status": "passed"},
              "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
              "key_metrics": {"preprod_slo_guard": "passed", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"}
            },
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-production-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)

          with open("post-deploy-verification-production-${{ github.run_id }}.md", "w", encoding="utf-8") as handle:
            handle.write("\n".join([
              "# Post-Deploy Mandatory Verification Checklist (Production)",
              "",
              "- [x] Health check: https://app.valueos.app/api/health returned 200",
              "- [x] Rollback readiness confirmed (blue-green)",
              "- [x] Key metrics captured (preprod SLO guard + alert baseline)",
              f"- [x] Incident reference documented: {os.environ.get('INCIDENT_REFERENCE', 'n/a')}",
            ]))
          PY

      - name: Upload production operational verification artifact
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-verification-production-${{ github.run_id }}
          path: |
            post-deploy-verification-production-${{ github.run_id }}.json
            post-deploy-verification-production-${{ github.run_id }}.md


  weekly-reliability-report:
    name: Weekly Reliability Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Generate weekly SLO and incident report
        env:
          # [Secret] PROMETHEUS_PRODUCTION_URL: Production Prometheus endpoint for monitoring integration
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_PRODUCTION_URL }}
          # [Secret] PROMETHEUS_PRODUCTION_TOKEN: Production Prometheus API token for authentication
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_PRODUCTION_TOKEN }}
          # [Secret] ALERTMANAGER_PRODUCTION_URL: Production Alertmanager endpoint for notifications
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_PRODUCTION_URL }}
          # [Secret] ALERTMANAGER_PRODUCTION_TOKEN: Production Alertmanager API token for authentication
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_PRODUCTION_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PROMETHEUS_URL}" ] || [ -z "${ALERTMANAGER_URL}" ]; then
            echo "PROMETHEUS_PRODUCTION_URL and ALERTMANAGER_PRODUCTION_URL are required"
            exit 1
          fi

          prom_query() {
            local query="$1"
            local auth_header=()
            if [ -n "${PROMETHEUS_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${PROMETHEUS_TOKEN}")
            fi
            curl -fsSL "${auth_header[@]}" --get --data-urlencode "query=${query}" "${PROMETHEUS_URL%/}/api/v1/query"
          }

          auth_header=()
          if [ -n "${ALERTMANAGER_TOKEN:-}" ]; then
            auth_header=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          API_AVAIL=$(prom_query 'slo:api_availability:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          API_LATENCY=$(prom_query 'slo:api_latency:good_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          AUTH_SUCCESS=$(prom_query 'slo:auth_success:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          QUEUE_HEALTH=$(prom_query 'slo:queue_health:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          LATENCY_P95_WEEK=$(prom_query 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api"}[7d])) by (le)) * 1000' | jq -r '.data.result[0].value[1] // "0"')
          LATENCY_P95_PREV_WEEK=$(prom_query 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api"}[14d])) by (le)) * 1000' | jq -r '.data.result[0].value[1] // "0"')
          LATENCY_BUDGET_BURN=$(prom_query 'clamp_min((histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api"}[7d])) by (le)) * 1000 - 200) / 200, 0)' | jq -r '.data.result[0].value[1] // "0"')

          ACTIVE_BURN_ALERTS=$(curl -fsSL "${auth_header[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts" | jq '[.[] | select(.status.state == "active" and (.labels.alertname | test("SLOBurnRateTooHigh")))] | length')

          INCIDENTS_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')
          INCIDENTS_PREV_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[14d])) - sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')

          REPORT_PATH="weekly-reliability-report.md"
          RUN_DATE=$(date -u +%Y-%m-%d)

          cat > "${REPORT_PATH}" <<REPORT
          # Weekly Reliability Report (${RUN_DATE})

          ## Current SLO Status (1h rolling)
          - API Availability: ${API_AVAIL}
          - API Latency (P95 <= 300ms good-event ratio): ${API_LATENCY}
          - Authentication Success: ${AUTH_SUCCESS}
          - Queue Health: ${QUEUE_HEALTH}

          ## Burn-Rate Alert Status
          - Active SLO burn-rate alerts: ${ACTIVE_BURN_ALERTS}

          ## Incident Trend
          - Incidents triggered in last 7d: ${INCIDENTS_7D}
          - Incidents triggered in previous 7d: ${INCIDENTS_PREV_7D}

          ## Weekly Latency Trend
          - Current 7d p95 (ms): ${LATENCY_P95_WEEK}
          - Previous 7d p95 (ms): ${LATENCY_P95_PREV_WEEK}

          ## Latency SLO Budget Burn-down
          - Burn ratio (0 = healthy, >0 means over budget): ${LATENCY_BUDGET_BURN}
          - Target threshold: p95 <= 200ms

          ## Notes
          - Incident trend uses Alertmanager received alert counts for `*SLOBurnRateTooHigh` alerts.
          - Burn-down is computed from 7d p95 latency against the 200ms latency SLO target.
          REPORT

      - name: Upload reliability report artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-reliability-report-${{ github.run_id }}
          path: weekly-reliability-report.md

   # ──────────────────────────────────────────────────────────────────────────
  # 5. Rollback (manual trigger)
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Switch back to blue slot
        run: |
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue slot"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Deferred validation follow-up (only when skip_tests emergency bypass was used)
  # ──────────────────────────────────────────────────────────────────────────
  create-deferred-validation-followup:
    name: Create Deferred Validation Follow-up
    runs-on: ubuntu-latest
    needs: [deploy-production, emergency-bypass-authorization]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.skip_tests && needs.emergency-bypass-authorization.result == 'success' }}
    steps:
      - name: Create follow-up issue for deferred validations
        uses: actions/github-script@v8
        with:
          script: |
            const deploymentStatus = '${{ needs.deploy-production.result }}';
            const title = `Emergency deploy deferred validations: ${{ github.run_id }}`;
            const body = [
              '## Deferred validation follow-up (auto-created)',
              '',
              `- **Incident**: ${{ inputs.incident_ticket_id }}`,
              `- **Workflow run**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              `- **Requested by**: @${{ github.triggering_actor }}`,
              `- **Deploy result**: ${deploymentStatus}`,
              '',
              '### Required post-deploy validation checklist',
              '${{ inputs.post_deploy_validation_checklist }}',
              '',
              '### Emergency bypass reason',
              '${{ inputs.skip_tests_reason }}',
              '',
              '### Execution tracking',
              '- [ ] Validation execution started immediately',
              '- [ ] Validation results linked back to this issue',
              '- [ ] Incident timeline updated with validation outcomes',
              '',
              '> This task was created automatically and must be executed immediately after the emergency deployment.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident-followup', 'deferred-validation', 'priority:high']
            });
