name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test gate (emergency only)"
        required: false
        default: false
        type: boolean
      incident_ticket_id:
        description: "Incident ticket ID authorizing the emergency deploy (required if skipping tests)"
        required: false
        type: string
      bypass_reason:
        description: "Reason for bypassing tests (required if skipping tests)"
        required: false
        type: string
      post_deploy_validation_checklist:
        description: "Post-deploy validation checklist (required if skipping tests)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20.19.0"
  PNPM_VERSION: "9.15.0"

jobs:
  emergency-bypass-controls:
    name: Emergency Skip-Test Controls
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests }}
    environment:
      name: emergency-test-bypass
    steps:
      - name: Validate emergency bypass inputs and approver
        env:
          APPROVER_ALLOWLIST: ${{ vars.EMERGENCY_SKIP_TEST_APPROVERS }}
          INCIDENT_TICKET_ID: ${{ inputs.incident_ticket_id }}
          BYPASS_REASON: ${{ inputs.bypass_reason }}
          POST_DEPLOY_VALIDATION_CHECKLIST: ${{ inputs.post_deploy_validation_checklist }}
          REQUESTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ -z "${INCIDENT_TICKET_ID}" ]; then
            echo "incident_ticket_id is required when skip_tests=true" >&2
            exit 1
          fi

          if [ -z "${BYPASS_REASON}" ]; then
            echo "bypass_reason is required when skip_tests=true" >&2
            exit 1
          fi

          if [ -z "${POST_DEPLOY_VALIDATION_CHECKLIST}" ]; then
            echo "post_deploy_validation_checklist is required when skip_tests=true" >&2
            exit 1
          fi

          if [ -z "${APPROVER_ALLOWLIST}" ]; then
            echo "Repository variable EMERGENCY_SKIP_TEST_APPROVERS must be configured" >&2
            exit 1
          fi

          NORMALIZED_ALLOWLIST=",$(echo "${APPROVER_ALLOWLIST}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]'),"
          REQUESTOR_LOWER=$(echo "${REQUESTOR}" | tr '[:upper:]' '[:lower:]')

          if [[ "${NORMALIZED_ALLOWLIST}" != *",${REQUESTOR_LOWER},"* ]]; then
            echo "${REQUESTOR} is not an approved emergency skip_tests approver" >&2
            exit 1
          fi

      - name: Write emergency bypass audit log
        run: |
          cat > emergency-bypass-audit-log.json <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "approver": "${{ github.actor }}",
            "incident_ticket_id": "${{ inputs.incident_ticket_id }}",
            "bypass_reason": "${{ inputs.bypass_reason }}",
            "post_deploy_validation_checklist": "${{ inputs.post_deploy_validation_checklist }}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload emergency bypass audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: emergency-bypass-audit-${{ github.run_id }}
          path: emergency-bypass-audit-log.json

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Quality gate — must pass before any deploy
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + Typecheck + Test
        run: |
          npx turbo run lint typecheck test

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build and push container images
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [quality-gate, emergency-bypass-controls]
    if: >-
      always() &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped') &&
      (needs.emergency-bypass-controls.result == 'success' || needs.emergency-bypass-controls.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.image-ref.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ValyntApp/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve immutable image reference
        id: image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM for container image
        run: |
          syft "${IMAGE_REF}" -o cyclonedx-json=sbom-${{ github.sha }}.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest image SBOM
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest --yes --type cyclonedx --predicate "sbom-${{ github.sha }}.cdx.json" "${IMAGE_REF}"

      - name: Download signatures and attestations for archival
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign download signature "${IMAGE_REF}" > signatures-${{ github.sha }}.json
          cosign download attestation "${IMAGE_REF}" > attestations-${{ github.sha }}.json

      - name: Upload SBOM and attestations
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}
          path: |
            sbom-${{ github.sha }}.cdx.json
            signatures-${{ github.sha }}.json
            attestations-${{ github.sha }}.json

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - name: Download SBOM and attestation artifacts
        uses: actions/download-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed image and attestations
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          test -s "sbom-${{ github.sha }}.cdx.json"
          jq -e '.bomFormat == "CycloneDX"' "sbom-${{ github.sha }}.cdx.json" >/dev/null

          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type cyclonedx \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, verify-supply-chain]
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Update image tag in staging overlay
          cd overlays/staging
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for rollout
          kubectl -n valynt rollout status deployment/backend-blue --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

      - name: Run load test against staging
        uses: grafana/k6-action@v0.3.1
        with:
          filename: infra/testing/load-test.k6.js
        env:
          BASE_URL: https://staging.valueos.app
          VUS: "20"
          DURATION: "1m"

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval via environment protection)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-images, verify-supply-chain]
    if: github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    environment:
      name: production
      url: https://app.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Blue-green deploy
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Deploy to green (inactive) slot
          cd overlays/production
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for green rollout
          kubectl -n valynt rollout status deployment/backend-green --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

          # Switch active service to green
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "Production deploy complete — green slot is now active"

      - name: Smoke test production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://app.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed — consider rollback"
          exit 1

  create-deferred-validation-follow-up:
    name: Create Deferred Validation Follow-up
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: ${{ always() && inputs.skip_tests && needs.deploy-production.result == 'success' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create follow-up issue for deferred validations
        uses: actions/github-script@v7
        with:
          script: |
            const checklist = `${{ toJson(inputs.post_deploy_validation_checklist) }}`;
            const issueBody = [
              'Emergency deployment used `skip_tests=true` and requires immediate deferred validation.',
              '',
              `- Incident Ticket: ${{ inputs.incident_ticket_id }}`,
              `- Approved By: @${{ github.actor }}`,
              `- Deployment Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '## Required Post-Deploy Validation Checklist',
              checklist,
              '',
              '> This issue is auto-created by the deployment workflow and should be completed immediately.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Emergency Deploy] Deferred validations required for ${context.sha.substring(0, 7)}`,
              body: issueBody,
              labels: ['deployment', 'emergency', 'deferred-validation']
            });

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Rollback (manual trigger)
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Switch back to blue slot
        run: |
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue slot"
