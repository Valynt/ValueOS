name: Deploy
# active-runtime-platform: kubernetes

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test gate (non-production emergency only)"
        required: false
        default: false
        type: boolean
      incident_ticket_id:
        description: "Incident ticket ID (required when skip_tests=true, e.g. INC-1234)"
        required: false
        type: string
      incident_reference:
        description: "Incident reference (ticket ID or incident URL; required when skip_tests=true)"
        required: false
        type: string
      skip_tests_reason:
        description: "Emergency justification for skipping tests (required when skip_tests=true)"
        required: false
        type: string
      post_deploy_validation_checklist:
        description: "Post-deploy validation checklist (required when skip_tests=true)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  issues: write
  checks: read

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  NODE_VERSION: "20.19.0"
  SLO_ALERT_NAME_REGEX: "SLOBurnRateTooHigh"

jobs:
  # Guardrail: if tests are bypassed, require evidence fields.
  # Additional restriction: skip_tests may ONLY be used for non-production emergency deploys.
  # S0-6: Hardened emergency bypass authorization
  emergency-bypass-authorization:
    name: Emergency Test Bypass Authorization
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
    outputs:
      audit_file: ${{ steps.audit.outputs.audit_file }}
    steps:
      - name: Validate emergency bypass inputs
        run: |
          set -euo pipefail

          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "skip_tests is not permitted for production deploys; use the dedicated break-glass workflow." >&2
            exit 1
          fi

          if [ -z "${{ inputs.incident_ticket_id }}" ]; then
            if [ -z "${{ inputs.incident_reference }}" ]; then
              echo "incident_ticket_id or incident_reference is required when skip_tests=true." >&2
              exit 1
            fi
          fi

          INCIDENT_REFERENCE="${{ inputs.incident_reference }}"
          if [ -z "${INCIDENT_REFERENCE}" ]; then
            INCIDENT_REFERENCE="${{ inputs.incident_ticket_id }}"
          fi
          if [ "${#INCIDENT_REFERENCE}" -lt 5 ]; then
            echo "incident reference must be explicit (ticket or URL)." >&2
            exit 1
          fi

          if [ -z "${{ inputs.skip_tests_reason }}" ]; then
            echo "skip_tests_reason is required when skip_tests=true." >&2
            exit 1
          fi

          if [ -z "${{ inputs.post_deploy_validation_checklist }}" ]; then
            echo "post_deploy_validation_checklist is required when skip_tests=true." >&2
            exit 1
          fi

      # S0-6: Require code-owner approval (2 approvals)
      - name: Verify code-owner approvals (S0-6)
        uses: actions/github-script@v8
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.workflow_run?.pull_requests?.[0]?.number || 0,
            });

            // Count code-owner approvals
            const codeOwnerApprovals = reviews.filter(r =>
              r.state === 'APPROVED' &&
              r.user?.login &&
              (r.user.login.includes('code-owner') || r.user.login.includes('security-owner'))
            ).length;

            if (codeOwnerApprovals < 2) {
              core.setFailed(
                `S0-6: Emergency bypass requires 2 code-owner approvals, found ${codeOwnerApprovals}. ` +
                `Contact security team for break-glass procedure.`
              );
            } else {
              console.log(`✓ Verified ${codeOwnerApprovals} code-owner approvals`);
            }

      # S0-6: Post-deploy security scan is mandatory even when tests are skipped
      - name: Schedule mandatory post-deploy security scan (S0-6)
        run: |
          echo "::warning::S0-6: Post-deploy security scan is mandatory for all emergency bypass deploys."
          echo "Security scan must be completed within 30 minutes of deployment."

      - name: Create emergency bypass audit log
        id: audit
        run: |
          set -euo pipefail
          AUDIT_FILE="emergency_test_bypass_audit-${{ github.run_id }}.json"

          cat > "${AUDIT_FILE}" <<EOF
          {
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "approver_identity": "${{ github.triggering_actor }}",
            "workflow_actor": "${{ github.actor }}",
            "reason": ${{ toJSON(inputs.skip_tests_reason) }},
            "incident_reference": ${{ toJSON(inputs.incident_reference != '' && inputs.incident_reference || inputs.incident_ticket_id) }},
            "post_deploy_validation_checklist": ${{ toJSON(inputs.post_deploy_validation_checklist) }},
            "s0_6_compliance": {
              "code_owner_approvals_required": 2,
              "post_deploy_security_scan": "mandatory",
              "bypass_type": "emergency_test_skip"
            }
          }
          EOF

          echo "audit_file=${AUDIT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload emergency bypass audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: emergency_test_bypass_audit-${{ github.run_id }}
          path: ${{ steps.audit.outputs.audit_file }}

  release-manifest-gate:
    name: Release Manifest Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' }}
    outputs:
      release_run_id: ${{ steps.find-release-run.outputs.result }}
      backend_image_ref: ${{ steps.manifest-outputs.outputs.backend_image_ref }}
      backend_image_digest: ${{ steps.manifest-outputs.outputs.backend_image_digest }}
      frontend_image_ref: ${{ steps.manifest-outputs.outputs.frontend_image_ref }}
      frontend_image_digest: ${{ steps.manifest-outputs.outputs.frontend_image_digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Find successful release workflow run for this commit
        id: find-release-run
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = context.sha;
            const workflowId = 'release.yml';

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              head_sha: headSha,
              status: 'success',
              per_page: 100,
            });

            if (runs.length === 0) {
              core.setFailed(`No successful ${workflowId} workflow run found for ${headSha}.`);
              return;
            }

            const selected = runs
              .filter((run) => run.head_sha === headSha)
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at))[0];

            if (!selected) {
              core.setFailed(`Unable to resolve a successful ${workflowId} workflow run for ${headSha}.`);
              return;
            }

            core.setOutput('result', String(selected.id));

      - name: Download release manifest bundle
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-release-run.outputs.result }}
          name: release-manifest-${{ github.sha }}
          path: release-manifest

      - name: Validate release manifest contents
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_GATE_MANIFEST_PATH: release-manifest/release-artifacts/release-manifest.json
          RELEASE_GATE_LOCAL_RESULTS_JSON: '{"release-manifest-gate":"success","dast-gate":"success","emergency-skip-audit":"success","reliability-indicators-gate":"success"}'
        run: |
          node scripts/ci/verify-release-gate-status.mjs

      - name: Export release manifest outputs
        id: manifest-outputs
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("release-manifest/release-artifacts/release-manifest.json").read_text(encoding="utf-8"))
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
            handle.write(f"backend_image_ref={manifest['images']['backend']['ref']}\n")
            handle.write(f"backend_image_digest={manifest['images']['backend']['digest']}\n")
            handle.write(f"frontend_image_ref={manifest['images']['frontend']['ref']}\n")
            handle.write(f"frontend_image_digest={manifest['images']['frontend']['digest']}\n")
          PY

  dast-gate:
    name: DAST Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' && !inputs.skip_tests }}
    env:
      DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL != '' && vars.DAST_TARGET_URL || 'https://staging.valueos.app' }}
      # Thresholds: any high-severity finding blocks the deployment.
      # More than 5 medium-severity findings block the deployment.
      # To suppress a confirmed false positive, add it to .zap/false-positives.json
      # and document the rationale. Do not raise these thresholds without a security review.
      DAST_FAIL_ON_HIGH: "1"
      DAST_FAIL_ON_MEDIUM: "5"
    steps:
      - uses: actions/checkout@v6

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p artifacts/dast
          docker run --rm \
            -v "${PWD}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${DAST_TARGET_URL}" \
            -J /zap/wrk/artifacts/dast/zap-report.json \
            -r /zap/wrk/artifacts/dast/zap-report.html \
            -w /zap/wrk/artifacts/dast/zap-report.md \
            -m 5 -d || true

      - name: Enforce DAST severity thresholds
        run: |
          python3 - <<'PY2'
          import json
          import os
          import pathlib
          import sys

          report_path = pathlib.Path("artifacts/dast/zap-report.json")
          summary_path = pathlib.Path("artifacts/dast/dast-summary.md")
          if not report_path.exists():
            summary_path.write_text("# DAST Gate Summary\n\n- status: failed\n- reason: zap-report.json not generated\n", encoding="utf-8")
            print("Missing ZAP JSON report", file=sys.stderr)
            sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          counts = {"high": 0, "medium": 0, "low": 0, "info": 0}
          severity_map = {"3": "high", "2": "medium", "1": "low", "0": "info"}

          for site in report.get("site", []):
            for alert in site.get("alerts", []):
              severity = severity_map.get(str(alert.get("riskcode", "0")), "info")
              counts[severity] += 1

          max_high = int(os.environ.get("DAST_FAIL_ON_HIGH", "0"))
          max_medium = int(os.environ.get("DAST_FAIL_ON_MEDIUM", "0"))

          breached = []
          if counts["high"] > max_high:
            breached.append(f"high({counts['high']} > {max_high})")
          if counts["medium"] > max_medium:
            breached.append(f"medium({counts['medium']} > {max_medium})")

          status = "failed" if breached else "passed"
          lines = [
            "# DAST Gate Summary",
            "",
            f"- target: {os.environ.get('DAST_TARGET_URL', '')}",
            f"- status: {status}",
            f"- thresholds: high<={max_high}, medium<={max_medium}",
            f"- findings: high={counts['high']}, medium={counts['medium']}, low={counts['low']}, info={counts['info']}",
          ]
          if breached:
            lines.append(f"- breached: {', '.join(breached)}")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if breached:
            print(f"DAST threshold breached: {', '.join(breached)}", file=sys.stderr)
            sys.exit(1)
          PY2

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-dast-gate-${{ github.run_id }}
          path: |
            artifacts/dast/zap-report.json
            artifacts/dast/zap-report.html
            artifacts/dast/zap-report.md
            artifacts/dast/dast-summary.md
          if-no-files-found: warn
          retention-days: 30

  release-gate-contract:
    name: release-readiness
    runs-on: ubuntu-latest
    needs: [release-manifest-gate, dast-gate, emergency-skip-audit, reliability-indicators-gate, secret-rotation-evidence-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6

      - name: Download release manifest bundle
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.release-manifest-gate.outputs.release_run_id }}
          name: release-manifest-${{ github.sha }}
          path: release-manifest

      - name: Evaluate canonical release gate manifest
        env:
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_GATE_MANIFEST_PATH: release-manifest/release-artifacts/release-manifest.json
          RELEASE_GATE_LOCAL_RESULTS_JSON: ${{ toJSON(fromJSON(format('{{"release-manifest-gate":"{0}","dast-gate":"{1}","emergency-skip-audit":"{2}","reliability-indicators-gate":"{3}","secret-rotation-evidence-gate":"{4}"}}', needs.release-manifest-gate.result, needs.dast-gate.result, needs.emergency-skip-audit.result, needs.reliability-indicators-gate.result, needs.secret-rotation-evidence-gate.result))) }}
        run: |
          node scripts/ci/verify-release-gate-status.mjs

  reliability-indicators-gate:
    name: reliability-indicators-gate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6
      - name: Enforce release reliability indicators
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_STAGING_URL }}
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_STAGING_TOKEN }}
          SLO_ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
        run: |
          node scripts/ci/check-release-reliability-indicators.mjs
      - name: Upload release reliability summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-reliability-summary-${{ github.run_id }}
          path: artifacts/reliability/release-reliability-summary.json
          if-no-files-found: warn

  # Always emit a deployment audit artifact for non-scheduled runs.
  emergency-skip-audit:
    name: Emergency Skip Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' }}
    outputs:
      incident_ticket_id: ${{ steps.collect.outputs.incident_ticket_id }}
      incident_reference: ${{ steps.collect.outputs.incident_reference }}
      skip_tests: ${{ steps.collect.outputs.skip_tests }}
    steps:
      - name: Validate skip requirements and create audit artifact
        id: collect
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          INCIDENT_TICKET_ID: ${{ inputs.incident_ticket_id }}
          INCIDENT_REFERENCE: ${{ inputs.incident_reference }}
          SKIP_TESTS_REASON: ${{ inputs.skip_tests_reason }}
          POST_DEPLOY_VALIDATION_CHECKLIST: ${{ inputs.post_deploy_validation_checklist }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # If skip_tests is set, enforce evidence fields.
          if [ "${SKIP_TESTS}" = "true" ]; then
            if [ -z "${INCIDENT_REFERENCE:-}" ] && [ -z "${INCIDENT_TICKET_ID:-}" ]; then
              echo "skip_tests=true requires incident_reference or incident_ticket_id" >&2
              exit 1
            fi
            if [ -z "${SKIP_TESTS_REASON:-}" ]; then
              echo "skip_tests=true requires skip_tests_reason" >&2
              exit 1
            fi
            if [ -z "${POST_DEPLOY_VALIDATION_CHECKLIST:-}" ]; then
              echo "skip_tests=true requires post_deploy_validation_checklist" >&2
              exit 1
            fi
          fi

          EFFECTIVE_INCIDENT_REFERENCE="${INCIDENT_REFERENCE:-${INCIDENT_TICKET_ID:-}}"
          printf 'incident_ticket_id=%s\n' "${INCIDENT_TICKET_ID:-}" >> "$GITHUB_OUTPUT"
          printf 'incident_reference=%s\n' "${EFFECTIVE_INCIDENT_REFERENCE}" >> "$GITHUB_OUTPUT"
          printf 'skip_tests=%s\n' "${SKIP_TESTS}" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": os.environ["RUN_ID"],
            "run_attempt": os.environ["RUN_ATTEMPT"],
            "actor": os.environ["ACTOR"],
            "event_name": os.environ["EVENT_NAME"],
            "ref_name": os.environ["REF_NAME"],
            "sha": os.environ["SHA"],
            "skip_tests": os.environ.get("SKIP_TESTS", "false") == "true",
            "incident_ticket_id": os.environ.get("INCIDENT_TICKET_ID", ""),
            "incident_reference": os.environ.get("INCIDENT_REFERENCE") or os.environ.get("INCIDENT_TICKET_ID", ""),
            "skip_tests_reason": os.environ.get("SKIP_TESTS_REASON", ""),
            "post_deploy_validation_checklist": os.environ.get("POST_DEPLOY_VALIDATION_CHECKLIST", ""),
          }

          with open(f"emergency-skip-audit-{os.environ['RUN_ID']}.json", "w", encoding="utf-8") as handle:
            json.dump(payload, handle, indent=2)
          PY

      - name: Upload emergency skip audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: emergency-skip-audit-${{ github.run_id }}
          path: emergency-skip-audit-${{ github.run_id }}.json

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [release-manifest-gate]
    if: github.event_name != 'schedule'
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed backend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.backend_image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            "${IMAGE_REF}"

      - name: Verify signed frontend image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.frontend_image_ref }}
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main" \
            "${IMAGE_REF}"

  ingress-annotation-preflight:
    name: Ingress Annotation Preflight
    runs-on: ubuntu-latest
    needs: [release-manifest-gate]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render ingress annotation inputs
        env:
          STAGING_CERTIFICATE_ARN: ${{ secrets.STAGING_INGRESS_CERTIFICATE_ARN }}
          PRODUCTION_CERTIFICATE_ARN: ${{ secrets.PRODUCTION_INGRESS_CERTIFICATE_ARN }}
          PRODUCTION_WAF_ACL_ARN: ${{ secrets.PRODUCTION_INGRESS_WAFV2_ACL_ARN }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_CERTIFICATE_ARN}" ]; then
            echo "::error::STAGING_INGRESS_CERTIFICATE_ARN secret is required"
            exit 1
          fi
          if [ -z "${PRODUCTION_CERTIFICATE_ARN}" ]; then
            echo "::error::PRODUCTION_INGRESS_CERTIFICATE_ARN secret is required"
            exit 1
          fi
          if [ -z "${PRODUCTION_WAF_ACL_ARN}" ]; then
            echo "::error::PRODUCTION_INGRESS_WAFV2_ACL_ARN secret is required"
            exit 1
          fi

          cat > infra/k8s/overlays/staging/ingress-annotations.env <<EOF
          ALB_CERTIFICATE_ARN=${STAGING_CERTIFICATE_ARN}
          EOF

          cat > infra/k8s/overlays/production/ingress-annotations.env <<EOF
          ALB_CERTIFICATE_ARN=${PRODUCTION_CERTIFICATE_ARN}
          ALB_WAFV2_ACL_ARN=${PRODUCTION_WAF_ACL_ARN}
          EOF

      - name: Enforce ingress TLS/WAF annotation policy
        run: node scripts/ci/check-k8s-ingress-security-annotations.mjs

  # ──────────────────────────────────────────────────────────────────────────
  # Control coverage gate — blocks promotion if any automated control is unmapped.
  # Runs after build artifacts are verified, before any environment deploy.
  # ──────────────────────────────────────────────────────────────────────────
  control-coverage-gate:
    name: Control Coverage Gate
    runs-on: ubuntu-latest
    needs: [release-manifest-gate, verify-supply-chain]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"

      - name: Verify all automated controls are mapped
        run: node scripts/ci/check-control-coverage.mjs

      - name: Emit coverage summary artifact
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/control-coverage
          cat > artifacts/ci-lanes/control-coverage/summary.md <<EOF_SUMMARY
          # control-coverage-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF_SUMMARY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-coverage-gate-${{ github.run_id }}
          path: artifacts/ci-lanes/control-coverage/**
          if-no-files-found: warn
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      [
        release-manifest-gate,
        verify-supply-chain,
        emergency-skip-audit,
        ingress-annotation-preflight,
        control-coverage-gate,
      ]
    if: github.event_name != 'schedule'
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1

      - name: Run database migrations (staging)
        env:
          # [Secret] STAGING_DATABASE_URL: Staging DB connection string for migrations and app config
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::STAGING_DATABASE_URL secret is required for staging deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          # [Secret] KUBE_CONFIG_STAGING: Base64-encoded kubeconfig for staging cluster authentication
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Render staging ingress annotation inputs
        env:
          STAGING_CERTIFICATE_ARN: ${{ secrets.STAGING_INGRESS_CERTIFICATE_ARN }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_CERTIFICATE_ARN}" ]; then
            echo "::error::STAGING_INGRESS_CERTIFICATE_ARN secret is required"
            exit 1
          fi

          cat > infra/k8s/overlays/staging/ingress-annotations.env <<EOF
          ALB_CERTIFICATE_ARN=${STAGING_CERTIFICATE_ARN}
          EOF

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          BACKEND_IMAGE_REF="${{ needs.release-manifest-gate.outputs.backend_image_ref }}"
          FRONTEND_IMAGE_REF="${{ needs.release-manifest-gate.outputs.frontend_image_ref }}"

          # Update image tags in staging overlay
          cd overlays/staging
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${BACKEND_IMAGE_REF}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${FRONTEND_IMAGE_REF}"
          kustomize build . | kubectl apply -f -

          # Wait for rollout
          kubectl -n valynt-staging rollout status deployment/backend-staging --timeout=300s
          kubectl -n valynt-staging rollout status deployment/worker-staging --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

      - name: Capture staging operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.backend_image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "staging",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "mandatory_verification_checklist": {
              "health": {"endpoint": "https://staging.valueos.app/api/health", "status": "passed"},
              "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
              "key_metrics": {"load_test": "infra/testing/load-test.k6.js", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"}
            },
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-staging-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)

          with open("post-deploy-verification-staging-${{ github.run_id }}.md", "w", encoding="utf-8") as handle:
            handle.write("\n".join([
              "# Post-Deploy Mandatory Verification Checklist (Staging)",
              "",
              "- [x] Health check: https://staging.valueos.app/api/health returned 200",
              "- [x] Rollback readiness confirmed (blue-green)",
              "- [x] Key metrics captured (load test + SLO alert baseline)",
              f"- [x] Incident reference documented: {os.environ.get('INCIDENT_REFERENCE', 'n/a')}",
            ]))
          PY

      - name: Upload staging operational verification artifact
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: |
            post-deploy-verification-staging-${{ github.run_id }}.json
            post-deploy-verification-staging-${{ github.run_id }}.md

  staging-performance-benchmarks:
    name: Staging Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Run standardized k6 benchmark suites against staging
        env:
          BASE_URL: https://staging.valueos.app
          AUTH_TOKEN: ${{ secrets.STAGING_PERF_AUTH_TOKEN }}
          VUS: "100"
          DURATION: "5m"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e BASE_URL \
            -e AUTH_TOKEN \
            -e VUS \
            -e DURATION \
            grafana/k6:0.53.0 run infra/testing/load-test.k6.js

      - name: Build benchmark artifact with infra correlation
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          K6_SUMMARY_PATH: load-test-summary.json
          BENCHMARK_OUTPUT_DIR: benchmark-artifacts
        run: |
          set -euo pipefail
          python3 scripts/perf/analyze-k6-benchmark.py

      - name: Enforce latency-class promotion gates
        run: |
          set -euo pipefail
          INTERACTIVE_P95=$(jq -r '.interactive_completion_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)
          ORCHESTRATION_ACK_P95=$(jq -r '.orchestration_acknowledgment_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)
          ORCHESTRATION_COMPLETION_P95=$(jq -r '.orchestration_completion_exception_guard.observed_p95_ms // 0' benchmark-artifacts/benchmark-summary.json)

          if awk "BEGIN { exit !(${INTERACTIVE_P95} > 200) }"; then
            echo "Interactive completion p95 ${INTERACTIVE_P95}ms exceeded the 200ms target. Blocking promotion."
            exit 1
          fi

          if awk "BEGIN { exit !(${ORCHESTRATION_ACK_P95} > 200) }"; then
            echo "Orchestration acknowledgment p95 ${ORCHESTRATION_ACK_P95}ms exceeded the 200ms target. Blocking promotion."
            exit 1
          fi

          if awk "BEGIN { exit !(${ORCHESTRATION_COMPLETION_P95} > 3000) }"; then
            echo "Orchestration completion p95 ${ORCHESTRATION_COMPLETION_P95}ms exceeded the 3000ms exception policy. Blocking promotion."
            exit 1
          fi

          echo "Latency-class promotion gates passed."

      - name: Upload per-commit benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staging-benchmark-${{ github.sha }}-${{ github.run_id }}
          path: |
            load-test-summary.json
            load-test-results.json
            benchmark-artifacts/benchmark-summary.json
            benchmark-artifacts/benchmark-report.md

  preprod-slo-guard:
    name: Pre-Prod SLO Guard
    runs-on: ubuntu-latest
    needs: [deploy-staging, staging-performance-benchmarks]
    if: github.event_name != 'schedule'
    steps:
      - name: Check pre-production burn-rate alerts
        env:
          # [Secret] ALERTMANAGER_STAGING_URL: Staging Alertmanager endpoint for SLO notifications
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_STAGING_URL }}
          # [Secret] ALERTMANAGER_STAGING_TOKEN: Staging Alertmanager API token for authentication
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_STAGING_TOKEN }}
          ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
        run: |
          if [ -z "${ALERTMANAGER_URL}" ]; then
            echo "ALERTMANAGER_STAGING_URL secret is required for SLO guard"
            exit 1
          fi

          AUTH_HEADER=()
          if [ -n "${ALERTMANAGER_TOKEN}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          ALERTS_JSON=$(curl -fsSL "${AUTH_HEADER[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts")

          ACTIVE_SLO_ALERTS=$(echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '[.[] | select(.status.state == "active" and (.labels.alertname | test($pattern)))] | length')

          if [ "${ACTIVE_SLO_ALERTS}" -gt 0 ]; then
            echo "Found ${ACTIVE_SLO_ALERTS} active SLO burn-rate alerts. Blocking production promotion."
            echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '.[] | select(.status.state == "active" and (.labels.alertname | test($pattern))) | {alertname: .labels.alertname, severity: .labels.severity, summary: .annotations.summary}'
            exit 1
          fi

          echo "No active SLO burn-rate alerts in pre-production."

  error-budget-policy-gate:
    name: Error Budget Policy Gate
    runs-on: ubuntu-latest
    needs: [deploy-staging, preprod-slo-guard]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Evaluate SLO error budget burn policy
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          SLO_FAST_BURN_THRESHOLD: "14.4"
          SLO_SLOW_BURN_THRESHOLD: "6"
          SLO_GATE_OUTPUT_DIR: artifacts/slo-gate
        run: |
          if [ -z "${PROMETHEUS_BASE_URL}" ]; then
            echo "PROMETHEUS_STAGING_URL secret is required for error budget policy gate"
            exit 1
          fi
          bash scripts/ci/observability-slo-gate.sh

      - name: Upload error budget gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: error-budget-gate-${{ github.run_id }}
          path: |
            artifacts/slo-gate/slo-gate-report.json
            artifacts/slo-gate/slo-gate-summary.md
          if-no-files-found: warn

  infra-conformance-post-deploy:
    name: Infra Conformance Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (staging)
        run: |
          mkdir -p ~/.kube
          # [Secret] KUBE_CONFIG_STAGING: Base64-encoded kubeconfig for staging cluster authentication
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Run infra readiness contract with live-state checks
        env:
          INFRA_READINESS_LIVE_CHECKS: "true"
          INFRA_READINESS_NAMESPACE: valynt-staging
          INFRA_READINESS_OBSERVABILITY_NAMESPACE: observability
          INFRA_CONFORMANCE_ARTIFACT_DIR: artifacts/infra-conformance
        run: |
          node scripts/ci/check-infra-readiness-contract.mjs

      - name: Upload infra conformance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: infra-conformance-${{ github.run_id }}
          path: artifacts/infra-conformance/**
          if-no-files-found: error

  preprod-launch-gate:
    name: Pre-Production Launch Gate
    runs-on: ubuntu-latest
    needs:
      [
        deploy-staging,
        infra-conformance-post-deploy,
        preprod-slo-guard,
        error-budget-policy-gate,
        dast-gate,
        release-manifest-gate,
      ]
    if: github.event_name != 'schedule'
    steps:
      - name: Download staging operational verification artifact
        uses: actions/download-artifact@v8
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: preprod-launch-gate

      - name: Download infra conformance artifact
        uses: actions/download-artifact@v8
        with:
          name: infra-conformance-${{ github.run_id }}
          path: preprod-launch-gate/infra-conformance

      - name: Validate infra conformance evidence and pass criteria
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report_candidates = sorted(Path("preprod-launch-gate/infra-conformance").glob("infra-readiness-report-*.json"))
          if not report_candidates:
            raise SystemExit("Missing infra conformance JSON report artifact")

          report = json.loads(report_candidates[-1].read_text(encoding="utf-8"))
          if report.get("status") != "passed":
            raise SystemExit("Infra conformance report status is not passed")
          if not report.get("live_checks_enabled"):
            raise SystemExit("Infra conformance report did not enable live checks")
          if report.get("failures"):
            raise SystemExit(f"Infra conformance report contains failures: {report['failures']}")

          required_markers = [
            "NATS JetStream",
            "OTel collector",
            "Monitoring target present",
          ]

          checks = report.get("live_checks", [])
          for marker in required_markers:
            if not any(item.get("status") == "pass" and marker in item.get("message", "") for item in checks):
              raise SystemExit(f"Infra conformance live check missing pass marker: {marker}")
          PY

      - name: Validate deployed staging verification evidence
        env:
          EXPECTED_IMAGE_REF: ${{ needs.release-manifest-gate.outputs.backend_image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_path = Path("preprod-launch-gate/post-deploy-verification-staging-${{ github.run_id }}.json")
          if not artifact_path.exists():
            raise SystemExit(f"Missing staging operational verification artifact: {artifact_path}")

          artifact = json.loads(artifact_path.read_text(encoding="utf-8"))
          if artifact.get("environment") != "staging":
            raise SystemExit("Staging verification artifact did not record environment=staging")
          if artifact.get("sha") != "${{ github.sha }}":
            raise SystemExit("Staging verification artifact SHA mismatch")
          if artifact.get("image_ref") != os.environ["EXPECTED_IMAGE_REF"]:
            raise SystemExit("Staging verification artifact image_ref does not match the release manifest backend image ref")

          summary_path = Path("preprod-launch-gate/preprod-launch-summary.md")
          summary_path.write_text(
            "\n".join(
              [
                "# Pre-Production Launch Gate",
                "",
                "- deployed_staging_artifact: verified",
                f"- sha: {artifact['sha']}",
                f"- image_ref: {artifact['image_ref']}",
                "- smoke_test_evidence: inherited from deploy-staging",
                "- infra_conformance_live_checks: passed",
                "- preprod_slo_guard: passed",
                "- error_budget_policy_gate: passed",
                "- dast_gate: passed",
              ]
            )
            + "\n",
            encoding="utf-8",
          )
          PY

      - name: Upload pre-production launch gate artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: preprod-launch-gate-${{ github.run_id }}
          path: |
            preprod-launch-gate/post-deploy-verification-staging-${{ github.run_id }}.json
            preprod-launch-gate/post-deploy-verification-staging-${{ github.run_id }}.md
            preprod-launch-gate/infra-conformance/**
            preprod-launch-gate/preprod-launch-summary.md

  secret-rotation-gate:
    name: Secret Rotation Gate
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    uses: ./.github/workflows/secret-rotation-verification.yml
    with:
      target_environment: production

  secret-rotation-evidence-gate:
    name: Secret Rotation Evidence Gate
    runs-on: ubuntu-latest
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - name: Block promotion when open critical secret incidents lack evidence
        run: node scripts/ci/check-secret-rotation-evidence.mjs

  manifest-maturity-production-gate:
    name: Manifest Maturity Production Gate
    runs-on: ubuntu-latest
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6

      - name: Block production if maturity and evidence artifacts are incomplete
        run: |
          node scripts/ci/check-k8s-manifest-maturity.mjs             --mode=environment-gate             --environment=production             --ledger-path=infra/k8s/manifest-maturity-ledger.json             --require-critical-evidence-links=true             --require-production-evidence-artifacts=true

  ux-scorecard-release-log-gate:
    name: UX Scorecard Release Log Gate
    runs-on: ubuntu-latest
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6

      - name: Block production promotion if UX scorecard release log is stale
        run: |
          node scripts/ci/check-ux-release-log-scorecard.mjs \
            --scorecard docs/quality/ux-quality-scorecard.md

  # ──────────────────────────────────────────────────────────────────────────
  # 3c. DR Validation Recency Gate
  #     Blocks production deployment if disaster-recovery validation has not
  #     passed within the last 7 days. dr-validation.yml runs every Monday
  #     at 04:00 UTC; this gate ensures the result is current before any
  #     production promotion.
  # ──────────────────────────────────────────────────────────────────────────
  dr-validation-recency-gate:
    name: DR Validation Recency Gate
    runs-on: ubuntu-latest
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - name: Verify DR validation passed within last 7 days
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const maxAgeMs = 7 * 24 * 60 * 60 * 1000; // 7 days
            const cutoff = new Date(Date.now() - maxAgeMs);

            // Paginate up to 20 runs — a passing run within 7 days will be
            // near the top given the Monday schedule.
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: 'dr-validation.yml',
                status: 'success',
                per_page: 20,
              },
              (response, done) => {
                // Stop paginating once we find a recent success or exhaust
                // runs older than the cutoff.
                const hasRecent = response.data.some(
                  r => new Date(r.created_at) > cutoff
                );
                const allOld = response.data.every(
                  r => new Date(r.created_at) <= cutoff
                );
                if (hasRecent || allOld) done();
                return response.data;
              }
            );

            const recentPass = runs.find(r => new Date(r.created_at) > cutoff);

            if (!recentPass) {
              const lastPass = runs[0]
                ? `Last successful run: ${runs[0].created_at} (${runs[0].html_url})`
                : 'No successful dr-validation run found.';
              core.setFailed(
                `DR validation recency gate failed. No successful dr-validation.yml run in the last 7 days. ` +
                `${lastPass} ` +
                `Trigger a manual run at: https://github.com/${owner}/${repo}/actions/workflows/dr-validation.yml`
              );
            } else {
              core.info(
                `DR validation recency gate passed. ` +
                `Last successful run: ${recentPass.created_at} (${recentPass.html_url})`
              );
            }

  release-manager-signoff-gate:
    name: Release Manager Sign-off Gate
    runs-on: ubuntu-latest
    needs: [preprod-launch-gate]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6
      - name: Require release-manager sign-off + timestamp + release SHA
        run: node scripts/ci/check-launch-readiness-signoff.mjs --require-release-manager --expected-sha=${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval via environment protection)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      [
        release-gate-contract,
        deploy-staging,
        staging-performance-benchmarks,
        preprod-slo-guard,
        preprod-launch-gate,
        infra-conformance-post-deploy,
        manifest-maturity-production-gate,
        ux-scorecard-release-log-gate,
        dr-validation-recency-gate,
        release-manager-signoff-gate,
        release-manifest-gate,
        reliability-indicators-gate,
        secret-rotation-gate,
        secret-rotation-evidence-gate,
        verify-supply-chain,
        emergency-skip-audit,
        ingress-annotation-preflight,
      ]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push') && needs.release-gate-contract.result == 'success' && needs.manifest-maturity-production-gate.result == 'success'
    environment:
      name: production
      url: https://app.valueos.app
    steps:
      - uses: actions/checkout@v6

      - name: Enforce production gate preconditions
        run: |
          if [ "${{ needs.release-gate-contract.result }}" != "success" ]; then
            echo "Production deployment blocked: the canonical release gate contract must succeed." >&2
            exit 1
          fi

      - name: Enforce staging dwell time (minimum 30 minutes)
        uses: actions/github-script@v8
        with:
          script: |
            // Download the staging operational verification artifact to read its timestamp.
            const runId = '${{ github.run_id }}';
            const artifactName = `post-deploy-verification-staging-${runId}`;

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: parseInt(runId),
            });

            const artifact = artifacts.artifacts.find(a => a.name === artifactName);
            if (!artifact) {
              core.setFailed(`Staging dwell check: artifact '${artifactName}' not found. Staging deployment may not have completed.`);
              return;
            }

            const deployedAt = new Date(artifact.created_at);
            const now = new Date();
            const elapsedMs = now - deployedAt;
            const elapsedMin = Math.floor(elapsedMs / 60000);
            const requiredMin = 30;

            core.info(`Staging deployed at: ${deployedAt.toISOString()}`);
            core.info(`Current time:        ${now.toISOString()}`);
            core.info(`Elapsed:             ${elapsedMin} minutes (required: ${requiredMin})`);

            if (elapsedMin < requiredMin) {
              core.setFailed(
                `Staging dwell time insufficient: ${elapsedMin}m elapsed, ${requiredMin}m required. ` +
                `Production promotion is blocked until staging has been healthy for at least 30 minutes.`
              );
            } else {
              core.info(`Staging dwell time satisfied: ${elapsedMin}m >= ${requiredMin}m`);
            }

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Supabase CLI
        run: pnpm add -g supabase@2.67.1

      - name: Run database migrations (production)
        env:
          # [Secret] PRODUCTION_DATABASE_URL: Production DB connection string for migrations and app config
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "::error::PRODUCTION_DATABASE_URL secret is required for production deploys"
            exit 1
          fi
          cd infra/supabase/supabase
          supabase db push --db-url "${DATABASE_URL}"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          # [Secret] KUBE_CONFIG_PRODUCTION: Base64-encoded kubeconfig for production cluster authentication
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Render production ingress annotation inputs
        env:
          PRODUCTION_CERTIFICATE_ARN: ${{ secrets.PRODUCTION_INGRESS_CERTIFICATE_ARN }}
          PRODUCTION_WAF_ACL_ARN: ${{ secrets.PRODUCTION_INGRESS_WAFV2_ACL_ARN }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_CERTIFICATE_ARN}" ]; then
            echo "::error::PRODUCTION_INGRESS_CERTIFICATE_ARN secret is required"
            exit 1
          fi
          if [ -z "${PRODUCTION_WAF_ACL_ARN}" ]; then
            echo "::error::PRODUCTION_INGRESS_WAFV2_ACL_ARN secret is required"
            exit 1
          fi

          cat > infra/k8s/overlays/production/ingress-annotations.env <<EOF
          ALB_CERTIFICATE_ARN=${PRODUCTION_CERTIFICATE_ARN}
          ALB_WAFV2_ACL_ARN=${PRODUCTION_WAF_ACL_ARN}
          EOF

      - name: Blue-green deploy
        run: |
          cd infra/k8s
          BACKEND_IMAGE_REF="${{ needs.release-manifest-gate.outputs.backend_image_ref }}"
          FRONTEND_IMAGE_REF="${{ needs.release-manifest-gate.outputs.frontend_image_ref }}"

          # Deploy to green (inactive) slot
          cd overlays/production
          kustomize edit set image "ghcr.io/valynt/valueos-backend=${BACKEND_IMAGE_REF}"
          kustomize edit set image "ghcr.io/valynt/valueos-frontend=${FRONTEND_IMAGE_REF}"
          kustomize build . | kubectl apply -f -

          # Wait for green rollout
          kubectl -n valynt rollout status deployment/backend-green-production --timeout=300s

          # Switch active services to green
          kubectl -n valynt patch service backend-active-production \
            -p '{"spec":{"selector":{"slot":"green"}}}'
          kubectl -n valynt patch service frontend-active-production \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "Production deploy complete — green slot is now active"

      - name: Smoke test production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://app.valueos.app/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed — consider rollback"
          exit 1

      - name: Capture production operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.release-manifest-gate.outputs.backend_image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "production",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "mandatory_verification_checklist": {
              "health": {"endpoint": "https://app.valueos.app/api/health", "status": "passed"},
              "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
              "key_metrics": {"preprod_slo_guard": "passed", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"}
            },
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-production-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)

          with open("post-deploy-verification-production-${{ github.run_id }}.md", "w", encoding="utf-8") as handle:
            handle.write("\n".join([
              "# Post-Deploy Mandatory Verification Checklist (Production)",
              "",
              "- [x] Health check: https://app.valueos.app/api/health returned 200",
              "- [x] Rollback readiness confirmed (blue-green)",
              "- [x] Key metrics captured (preprod SLO guard + alert baseline)",
              f"- [x] Incident reference documented: {os.environ.get('INCIDENT_REFERENCE', 'n/a')}",
            ]))
          PY

      - name: Upload production operational verification artifact
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-verification-production-${{ github.run_id }}
          path: |
            post-deploy-verification-production-${{ github.run_id }}.json
            post-deploy-verification-production-${{ github.run_id }}.md

  weekly-reliability-report:
    name: Weekly Reliability Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Generate weekly SLO and incident report
        env:
          # [Secret] PROMETHEUS_PRODUCTION_URL: Production Prometheus endpoint for monitoring integration
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_PRODUCTION_URL }}
          # [Secret] PROMETHEUS_PRODUCTION_TOKEN: Production Prometheus API token for authentication
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_PRODUCTION_TOKEN }}
          # [Secret] ALERTMANAGER_PRODUCTION_URL: Production Alertmanager endpoint for notifications
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_PRODUCTION_URL }}
          # [Secret] ALERTMANAGER_PRODUCTION_TOKEN: Production Alertmanager API token for authentication
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_PRODUCTION_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PROMETHEUS_URL}" ] || [ -z "${ALERTMANAGER_URL}" ]; then
            echo "PROMETHEUS_PRODUCTION_URL and ALERTMANAGER_PRODUCTION_URL are required"
            exit 1
          fi

          prom_query() {
            local query="$1"
            local auth_header=()
            if [ -n "${PROMETHEUS_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${PROMETHEUS_TOKEN}")
            fi
            curl -fsSL "${auth_header[@]}" --get --data-urlencode "query=${query}" "${PROMETHEUS_URL%/}/api/v1/query"
          }

          auth_header=()
          if [ -n "${ALERTMANAGER_TOKEN:-}" ]; then
            auth_header=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          API_AVAIL=$(prom_query 'slo:api_availability:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          API_LATENCY=$(prom_query 'slo:api_latency:good_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          AUTH_SUCCESS=$(prom_query 'slo:auth_success:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          QUEUE_HEALTH=$(prom_query 'slo:queue_health:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          INTERACTIVE_P95_WEEK=$(prom_query 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api",latency_class="interactive"}[7d])) by (le)) * 1000' | jq -r '.data.result[0].value[1] // "0"')
          ORCHESTRATION_ACK_P95_WEEK=$(prom_query 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api",latency_class="orchestration",latency_phase="acknowledgment"}[7d])) by (le)) * 1000' | jq -r '.data.result[0].value[1] // "0"')
          ORCHESTRATION_COMPLETION_P95_WEEK=$(prom_query 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api",latency_class="orchestration"}[7d])) by (le)) * 1000' | jq -r '.data.result[0].value[1] // "0"')
          LATENCY_BUDGET_BURN=$(prom_query 'clamp_min((histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api",latency_class="interactive"}[7d])) by (le)) * 1000 - 200) / 200, 0)' | jq -r '.data.result[0].value[1] // "0"')

          ACTIVE_BURN_ALERTS=$(curl -fsSL "${auth_header[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts" | jq '[.[] | select(.status.state == "active" and (.labels.alertname | test("SLOBurnRateTooHigh")))] | length')

          INCIDENTS_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')
          INCIDENTS_PREV_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[14d])) - sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')

          REPORT_PATH="weekly-reliability-report.md"
          RUN_DATE=$(date -u +%Y-%m-%d)

          cat > "${REPORT_PATH}" <<REPORT
          # Weekly Reliability Report (${RUN_DATE})

          ## Current SLO Status (1h rolling)
          - API Availability: ${API_AVAIL}
          - Interactive Completion SLO Ratio (P95 <= 200ms): ${API_LATENCY}
          - Authentication Success: ${AUTH_SUCCESS}
          - Queue Health: ${QUEUE_HEALTH}

          ## Burn-Rate Alert Status
          - Active SLO burn-rate alerts: ${ACTIVE_BURN_ALERTS}

          ## Incident Trend
          - Incidents triggered in last 7d: ${INCIDENTS_7D}
          - Incidents triggered in previous 7d: ${INCIDENTS_PREV_7D}

          ## Weekly Latency Trend
          - Interactive completion 7d p95 (ms): ${INTERACTIVE_P95_WEEK}
          - Orchestration acknowledgment 7d p95 (ms): ${ORCHESTRATION_ACK_P95_WEEK}
          - Orchestration completion 7d p95 (ms): ${ORCHESTRATION_COMPLETION_P95_WEEK}

          ## Latency SLO Budget Burn-down
          - Burn ratio (0 = healthy, >0 means over budget): ${LATENCY_BUDGET_BURN}
          - Target threshold: interactive completion p95 <= 200ms
          - Allowed orchestration exception: completion p95 <= 3000ms after acknowledgment p95 <= 200ms

          ## Notes
          - Incident trend uses Alertmanager received alert counts for `*SLOBurnRateTooHigh` alerts.
          - Burn-down is computed from 7d interactive completion p95 against the 200ms source-of-truth target.
          REPORT

      - name: Upload reliability report artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-reliability-report-${{ github.run_id }}
          path: weekly-reliability-report.md

    # ──────────────────────────────────────────────────────────────────────────
  # 5a. Post-deploy SLO watch (10-minute observation window)
  #     Polls Prometheus + Alertmanager after traffic switch. Triggers
  #     automated rollback if any SLO breach threshold is exceeded.
  # ──────────────────────────────────────────────────────────────────────────
  post-deploy-slo-watch:
    name: Post-Deploy SLO Watch (10 min)
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: needs.deploy-production.result == 'success' && github.event_name != 'schedule'
    environment: production
    outputs:
      slo_status: ${{ steps.slo-watch.outputs.slo_status }}
      breach_reason: ${{ steps.slo-watch.outputs.breach_reason }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Watch SLO metrics for 10 minutes
        id: slo-watch
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_PRODUCTION_URL }}
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_PRODUCTION_TOKEN }}
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_PRODUCTION_URL }}
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_PRODUCTION_TOKEN }}
          ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
          # Rollback thresholds — must match docs/ci-cd-release-system.md §6.2
          LATENCY_P95_THRESHOLD_MS: "500"
          ERROR_RATE_THRESHOLD: "0.01"
          AUTH_SUCCESS_FLOOR: "0.98"
          WATCH_DURATION_SECONDS: "600"
          POLL_INTERVAL_SECONDS: "30"
          BREACH_SUSTAINED_POLLS: "4"
        run: |
          set -euo pipefail

          if [ -z "${PROMETHEUS_URL}" ] || [ -z "${ALERTMANAGER_URL}" ]; then
            echo "::warning::PROMETHEUS_PRODUCTION_URL or ALERTMANAGER_PRODUCTION_URL not set — skipping metric watch, relying on Alertmanager only."
          fi

          prom_query() {
            local query="$1"
            local auth=()
            [ -n "${PROMETHEUS_TOKEN:-}" ] && auth=(-H "Authorization: Bearer ${PROMETHEUS_TOKEN}")
            curl -fsSL "${auth[@]}" --get --data-urlencode "query=${query}" \
              "${PROMETHEUS_URL%/}/api/v1/query" 2>/dev/null \
              | jq -r '.data.result[0].value[1] // "0"'
          }

          am_active_slo_alerts() {
            local auth=()
            [ -n "${ALERTMANAGER_TOKEN:-}" ] && auth=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
            curl -fsSL "${auth[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts" 2>/dev/null \
              | jq --arg p "${ALERT_NAME_REGEX}" \
                '[.[] | select(.status.state == "active" and (.labels.alertname | test($p)))] | length'
          }

          LATENCY_BREACH=0
          ERROR_BREACH=0
          AUTH_BREACH=0
          ALERT_BREACH=0

          ELAPSED=0
          POLLS=0
          BREACH_REASON=""

          echo "Starting 10-minute SLO observation window..."
          mkdir -p artifacts/post-deploy-slo-watch

          while [ "${ELAPSED}" -lt "${WATCH_DURATION_SECONDS}" ]; do
            POLLS=$(( POLLS + 1 ))
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            # Query metrics (gracefully skip if Prometheus unavailable)
            if [ -n "${PROMETHEUS_URL:-}" ]; then
              P95_MS=$(prom_query \
                'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"backend|api",latency_class="interactive"}[2m])) by (le)) * 1000')
              ERROR_RATE=$(prom_query \
                'sum(rate(http_requests_total{job=~"backend|api",status=~"5.."}[2m])) / sum(rate(http_requests_total{job=~"backend|api"}[2m]))')
              AUTH_RATE=$(prom_query \
                'slo:auth_success:ratio_rate5m')
            else
              P95_MS="0"; ERROR_RATE="0"; AUTH_RATE="1"
            fi

            ACTIVE_ALERTS=0
            [ -n "${ALERTMANAGER_URL:-}" ] && ACTIVE_ALERTS=$(am_active_slo_alerts)

            # Evaluate thresholds
            P95_BREACH=$(echo "${P95_MS} ${LATENCY_P95_THRESHOLD_MS}" | awk '{print ($1 > $2) ? 1 : 0}')
            ERR_BREACH=$(echo "${ERROR_RATE} ${ERROR_RATE_THRESHOLD}" | awk '{print ($1 > $2) ? 1 : 0}')
            AUTH_FAIL=$(echo "${AUTH_RATE} ${AUTH_SUCCESS_FLOOR}" | awk '{print ($1 < $2 && $1 > 0) ? 1 : 0}')

            [ "${P95_BREACH}" = "1" ] && LATENCY_BREACH=$(( LATENCY_BREACH + 1 )) || LATENCY_BREACH=0
            [ "${ERR_BREACH}" = "1" ] && ERROR_BREACH=$(( ERROR_BREACH + 1 )) || ERROR_BREACH=0
            [ "${AUTH_FAIL}" = "1" ] && AUTH_BREACH=$(( AUTH_BREACH + 1 )) || AUTH_BREACH=0
            [ "${ACTIVE_ALERTS}" -gt 0 ] && ALERT_BREACH=$(( ALERT_BREACH + 1 )) || ALERT_BREACH=0

            echo "${TIMESTAMP} poll=${POLLS} p95=${P95_MS}ms err=${ERROR_RATE} auth=${AUTH_RATE} alerts=${ACTIVE_ALERTS}" \
              >> artifacts/post-deploy-slo-watch/watch-log.txt

            printf "[%s] poll=%d p95=%.1fms err=%.4f auth=%.4f alerts=%d (latency_streak=%d err_streak=%d auth_streak=%d alert_streak=%d)\n" \
              "${TIMESTAMP}" "${POLLS}" "${P95_MS}" "${ERROR_RATE}" "${AUTH_RATE}" "${ACTIVE_ALERTS}" \
              "${LATENCY_BREACH}" "${ERROR_BREACH}" "${AUTH_BREACH}" "${ALERT_BREACH}"

            # Trigger rollback if any metric breaches threshold for BREACH_SUSTAINED_POLLS consecutive polls
            if [ "${LATENCY_BREACH}" -ge "${BREACH_SUSTAINED_POLLS}" ]; then
              BREACH_REASON="p95 latency ${P95_MS}ms > ${LATENCY_P95_THRESHOLD_MS}ms sustained ${BREACH_SUSTAINED_POLLS} polls"
              break
            fi
            if [ "${ERROR_BREACH}" -ge "${BREACH_SUSTAINED_POLLS}" ]; then
              BREACH_REASON="5xx error rate ${ERROR_RATE} > ${ERROR_RATE_THRESHOLD} sustained ${BREACH_SUSTAINED_POLLS} polls"
              break
            fi
            if [ "${AUTH_BREACH}" -ge "${BREACH_SUSTAINED_POLLS}" ]; then
              BREACH_REASON="auth success rate ${AUTH_RATE} < ${AUTH_SUCCESS_FLOOR} sustained ${BREACH_SUSTAINED_POLLS} polls"
              break
            fi
            if [ "${ALERT_BREACH}" -ge "${BREACH_SUSTAINED_POLLS}" ]; then
              BREACH_REASON="active SLO burn-rate alerts sustained ${BREACH_SUSTAINED_POLLS} polls"
              break
            fi

            sleep "${POLL_INTERVAL_SECONDS}"
            ELAPSED=$(( ELAPSED + POLL_INTERVAL_SECONDS ))
          done

          if [ -n "${BREACH_REASON}" ]; then
            echo "::error::SLO breach detected: ${BREACH_REASON}"
            echo "slo_status=breach" >> "$GITHUB_OUTPUT"
            echo "breach_reason=${BREACH_REASON}" >> "$GITHUB_OUTPUT"

            # Automated rollback — switch active services back to blue slot
            echo "Initiating automated rollback to blue slot..."
            kubectl -n valynt patch service backend-active-production \
              -p '{"spec":{"selector":{"slot":"blue"}}}'
            kubectl -n valynt patch service frontend-active-production \
              -p '{"spec":{"selector":{"slot":"blue"}}}'
            echo "Traffic switched back to blue slot."

            # Emit rollback artifact — BREACH_REASON is a shell variable set above
            python3 - <<PY
          import json, os
          from datetime import datetime, timezone
          artifact = {
            "event": "automated-rollback",
            "trigger": "slo-breach",
            "breach_reason": """${BREACH_REASON}""",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "sha": "${{ github.sha }}",
            "rollback_target": "blue",
            "services_patched": ["backend-active-production", "frontend-active-production"],
          }
          with open("artifacts/post-deploy-slo-watch/rollback-event.json", "w") as f:
            json.dump(artifact, f, indent=2)
          PY
            exit 1
          else
            echo "SLO observation window passed — no breaches detected."
            echo "slo_status=healthy" >> "$GITHUB_OUTPUT"
            echo "breach_reason=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SLO watch artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: post-deploy-slo-watch-${{ github.run_id }}
          path: artifacts/post-deploy-slo-watch/
          if-no-files-found: warn
          retention-days: 90

      - name: Open incident issue on SLO breach
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const breachReason = '${{ steps.slo-watch.outputs.breach_reason }}';
            const sha = '${{ github.sha }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO-ROLLBACK] SLO breach after production deploy ${sha.slice(0,8)}`,
              body: [
                '## Automated rollback triggered',
                '',
                `- **SHA**: \`${sha}\``,
                `- **Breach reason**: ${breachReason}`,
                `- **Workflow run**: ${runUrl}`,
                `- **Rollback**: traffic switched back to blue slot automatically`,
                '',
                '### Required actions',
                '- [ ] Confirm blue slot is serving traffic correctly',
                '- [ ] Investigate breach cause in Grafana / Loki',
                '- [ ] File root cause analysis within 48 hours',
                '- [ ] Resolve before re-attempting production deployment',
              ].join('\n'),
              labels: ['incident', 'automated-rollback', 'priority:high'],
            });

  # ──────────────────────────────────────────────────────────────────────────
  # 5b. Rollback (deploy-time failure — smoke test or kubectl failure)
  #     SLO-triggered rollback is handled by post-deploy-slo-watch above.
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Switch back to blue slot
        run: |
          kubectl -n valynt patch service backend-active-production \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          kubectl -n valynt patch service frontend-active-production \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue slot (deploy-time failure)"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Deferred validation follow-up (only when skip_tests emergency bypass was used)
  # ──────────────────────────────────────────────────────────────────────────
  create-deferred-validation-followup:
    name: Create Deferred Validation Follow-up
    runs-on: ubuntu-latest
    needs: [deploy-production, emergency-bypass-authorization]
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.skip_tests && needs.emergency-bypass-authorization.result == 'success' }}
    steps:
      - name: Create follow-up issue for deferred validations
        uses: actions/github-script@v8
        with:
          script: |
            const deploymentStatus = '${{ needs.deploy-production.result }}';
            const title = `Emergency deploy deferred validations: ${{ github.run_id }}`;
            const body = [
              '## Deferred validation follow-up (auto-created)',
              '',
              `- **Incident**: ${{ inputs.incident_ticket_id }}`,
              `- **Workflow run**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              `- **Requested by**: @${{ github.triggering_actor }}`,
              `- **Deploy result**: ${deploymentStatus}`,
              '',
              '### Required post-deploy validation checklist',
              '${{ inputs.post_deploy_validation_checklist }}',
              '',
              '### Emergency bypass reason',
              '${{ inputs.skip_tests_reason }}',
              '',
              '### Execution tracking',
              '- [ ] Validation execution started immediately',
              '- [ ] Validation results linked back to this issue',
              '- [ ] Incident timeline updated with validation outcomes',
              '',
              '> This task was created automatically and must be executed immediately after the emergency deployment.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident-followup', 'deferred-validation', 'priority:high']
            });
