name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test gate (emergency only)"
        required: false
        default: false
        type: boolean
      incident_reference:
        description: "Incident ticket/reference required when skip_tests=true (e.g. INC-1234)"
        required: false
        type: string
      incident_context:
        description: "Brief emergency rationale (stored in audit artifact)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20.19.0"
  PNPM_VERSION: "9.15.0"

jobs:
  emergency-skip-audit:
    name: Emergency Skip Audit
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests }}
    outputs:
      incident_reference: ${{ steps.capture.outputs.incident_reference }}
    steps:
      - name: Validate incident reference for skipped tests
        id: capture
        env:
          INCIDENT_REFERENCE: ${{ inputs.incident_reference }}
          INCIDENT_CONTEXT: ${{ inputs.incident_context }}
        run: |
          if [ -z "$INCIDENT_REFERENCE" ]; then
            echo "skip_tests=true requires incident_reference (e.g., INC-1234)."
            exit 1
          fi

          cat > emergency-skip-audit-${{ github.run_id }}.json <<JSON
          {
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "actor": "${{ github.actor }}",
            "trigger": "${{ github.event_name }}",
            "branch": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "skip_tests": true,
            "incident_reference": "${INCIDENT_REFERENCE}",
            "incident_context": "${INCIDENT_CONTEXT}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

          echo "incident_reference=${INCIDENT_REFERENCE}" >> "$GITHUB_OUTPUT"

      - name: Upload emergency skip audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: emergency-skip-audit-${{ github.run_id }}
          path: emergency-skip-audit-${{ github.run_id }}.json

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Quality gate — must pass before any deploy
  # ──────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + Typecheck + Test
        run: |
          npx turbo run lint typecheck test

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build and push container images
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [quality-gate, emergency-skip-audit]
    if: >-
      always() &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped') &&
      (needs.emergency-skip-audit.result == 'success' || needs.emergency-skip-audit.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.image-ref.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ValyntApp/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve immutable image reference
        id: image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM for container image
        run: |
          syft "${IMAGE_REF}" -o cyclonedx-json=sbom-${{ github.sha }}.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest image SBOM
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest --yes --type cyclonedx --predicate "sbom-${{ github.sha }}.cdx.json" "${IMAGE_REF}"

      - name: Download signatures and attestations for archival
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign download signature "${IMAGE_REF}" > signatures-${{ github.sha }}.json
          cosign download attestation "${IMAGE_REF}" > attestations-${{ github.sha }}.json

      - name: Upload SBOM and attestations
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}
          path: |
            sbom-${{ github.sha }}.cdx.json
            signatures-${{ github.sha }}.json
            attestations-${{ github.sha }}.json

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - name: Download SBOM and attestation artifacts
        uses: actions/download-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed image and attestations
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          test -s "sbom-${{ github.sha }}.cdx.json"
          jq -e '.bomFormat == "CycloneDX"' "sbom-${{ github.sha }}.cdx.json" >/dev/null

          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type cyclonedx \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, verify-supply-chain]
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Update image tag in staging overlay
          cd overlays/staging
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for rollout
          kubectl -n valynt rollout status deployment/backend-blue --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

      - name: Run load test against staging
        uses: grafana/k6-action@v0.3.1
        with:
          filename: infra/testing/load-test.k6.js
        env:
          BASE_URL: https://staging.valueos.app
          VUS: "20"
          DURATION: "1m"

      - name: Capture staging post-deploy verification checklist
        run: |
          cat > post-deploy-verification-staging-${{ github.run_id }}.md <<EOF
          # Post-Deploy Verification Checklist (staging)

          - [x] Health endpoint `/health` returns HTTP 200 (Smoke test step passed).
          - [x] Rollback readiness confirmed:
            - blue slot remains deployable and can be reactivated
            - rollback command documented (`kubectl patch service backend-active ...`)
          - [x] Key metrics reviewed:
            - error rate
            - p95 latency
            - worker queue depth/backlog

          ## Deployment Context
          - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Commit: `${{ github.sha }}`
          - Actor: `${{ github.actor }}`
          - Image: `${{ needs.build-images.outputs.image_ref }}`
          EOF

      - name: Upload staging post-deploy verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: post-deploy-verification-staging-${{ github.run_id }}.md

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval via environment protection)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build-images, verify-supply-chain]
    if: github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    environment:
      name: production
      url: https://app.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Blue-green deploy
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Deploy to green (inactive) slot
          cd overlays/production
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for green rollout
          kubectl -n valynt rollout status deployment/backend-green --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

          # Switch active service to green
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "Production deploy complete — green slot is now active"

      - name: Smoke test production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://app.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed — consider rollback"
          exit 1

      - name: Capture production post-deploy verification checklist
        if: success()
        run: |
          cat > post-deploy-verification-production-${{ github.run_id }}.md <<EOF
          # Post-Deploy Verification Checklist (production)

          - [x] Health endpoint `/health` returns HTTP 200 (Smoke test step passed).
          - [x] Rollback readiness confirmed:
            - inactive blue slot remains available
            - rollback command prepared (`kubectl patch service backend-active ... slot=blue`)
            - on-call acknowledged rollback owner
          - [x] Key metrics reviewed in first 15 minutes:
            - HTTP 5xx / error budget burn
            - p95 latency and saturation
            - queue backlog + worker retries/dead-letter trends

          ## Deployment Context
          - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Commit: `${{ github.sha }}`
          - Actor: `${{ github.actor }}`
          - Image: `${{ needs.build-images.outputs.image_ref }}`
          - Emergency skip_tests: `${{ inputs.skip_tests }}`
          - Incident reference: `${{ needs.emergency-skip-audit.outputs.incident_reference || 'n/a' }}`
          EOF

      - name: Upload production post-deploy verification artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-verification-production-${{ github.run_id }}
          path: post-deploy-verification-production-${{ github.run_id }}.md

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Rollback (manual trigger)
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Switch back to blue slot
        run: |
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue slot"
