name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: "Skip test gate (emergency only)"
        required: false
        default: false
        type: boolean
      skip_tests_reason:
        description: "Emergency rationale for bypassing tests"
        required: false
        type: string
      incident_ticket_id:
        description: "Incident ticket ID (required when skipping tests)"
        required: false
        type: string
      post_deploy_validation_checklist:
        description: "Post-deploy validation checklist (required when skipping tests)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  issues: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  NODE_VERSION: "20.19.0"
  PNPM_VERSION: "9.15.0"
  SLO_ALERT_NAME_REGEX: "SLOBurnRateTooHigh"

jobs:
  # Guardrail: if tests are bypassed, require environment approval + evidence fields.
  emergency-test-bypass-approval:
    name: Emergency Test Bypass Approval
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests }}
    environment:
      name: emergency-test-bypass
    steps:
      - name: Validate emergency bypass request
        env:
          INCIDENT_TICKET_ID: ${{ inputs.incident_ticket_id }}
          SKIP_TESTS_REASON: ${{ inputs.skip_tests_reason }}
          POST_DEPLOY_VALIDATION_CHECKLIST: ${{ inputs.post_deploy_validation_checklist }}
        run: |
          set -euo pipefail

          if [ -z "${INCIDENT_TICKET_ID}" ]; then
            echo "incident_ticket_id is required when skip_tests=true" >&2
            exit 1
  # and may always depend on emergency-skip-audit for evidence capture.

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build and push container images
  # ──────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Backend Runtime Image
    runs-on: ubuntu-latest
    needs: [quality-gate, emergency-test-bypass-approval, emergency-skip-audit]
    if: >
      github.event_name != 'schedule' &&
      always() &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped') &&
      (needs.emergency-test-bypass-approval.result == 'success' || needs.emergency-test-bypass-approval.result == 'skipped') &&
      (needs.emergency-skip-audit.result == 'success' || needs.emergency-skip-audit.result == 'skipped')

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          build-args: |
            APP=@valueos/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve immutable image reference
        id: image-ref
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM for container image
        run: |
          syft "${IMAGE_REF}" -o cyclonedx-json=sbom-${{ github.sha }}.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest image SBOM
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest --yes --type cyclonedx --predicate "sbom-${{ github.sha }}.cdx.json" "${IMAGE_REF}"

      - name: Download signatures and attestations for archival
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign download signature "${IMAGE_REF}" > signatures-${{ github.sha }}.json
          cosign download attestation "${IMAGE_REF}" > attestations-${{ github.sha }}.json

      - name: Upload SBOM and attestations
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}
          path: |
            sbom-${{ github.sha }}.cdx.json
            signatures-${{ github.sha }}.json
            attestations-${{ github.sha }}.json

  verify-supply-chain:
    name: Verify Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name != 'schedule'
    steps:
      - name: Download SBOM and attestation artifacts
        uses: actions/download-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signed image and attestations
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          test -s "sbom-${{ github.sha }}.cdx.json"
          jq -e '.bomFormat == "CycloneDX"' "sbom-${{ github.sha }}.cdx.json" >/dev/null

          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

          cosign verify-attestation \
            --type cyclonedx \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/deploy.yml@.*$" \
            "${IMAGE_REF}"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy to staging (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, verify-supply-chain, emergency-skip-audit]
    if: github.event_name != 'schedule'
    environment:
      name: staging
      url: https://staging.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize (blue-green)
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Update image tag in staging overlay
          cd overlays/staging
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for rollout
          kubectl -n valynt rollout status deployment/backend-blue --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Staging health check failed"
          exit 1


      - name: Capture staging operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "staging",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "health_check": {"endpoint": "https://staging.valueos.app/health", "status": "passed"},
            "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
            "key_metrics": {"load_test": "infra/testing/load-test.k6.js", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"},
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-staging-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)
          PY

      - name: Upload staging operational verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-verification-staging-${{ github.run_id }}
          path: post-deploy-verification-staging-${{ github.run_id }}.json

      - name: Run load test against staging
        uses: grafana/k6-action@v0.3.1
        with:
          filename: infra/testing/load-test.k6.js
        env:
          BASE_URL: https://staging.valueos.app
          VUS: "20"
          DURATION: "1m"


  preprod-slo-guard:
    name: Pre-Prod SLO Guard
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name != 'schedule'
    steps:
      - name: Check pre-production burn-rate alerts
        env:
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_STAGING_URL }}
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_STAGING_TOKEN }}
          ALERT_NAME_REGEX: ${{ env.SLO_ALERT_NAME_REGEX }}
        run: |
          if [ -z "${ALERTMANAGER_URL}" ]; then
            echo "ALERTMANAGER_STAGING_URL secret is required for SLO guard"
            exit 1
          fi

          AUTH_HEADER=()
          if [ -n "${ALERTMANAGER_TOKEN}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          ALERTS_JSON=$(curl -fsSL "${AUTH_HEADER[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts")

          ACTIVE_SLO_ALERTS=$(echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '[.[] | select(.status.state == "active" and (.labels.alertname | test($pattern)))] | length')

          if [ "${ACTIVE_SLO_ALERTS}" -gt 0 ]; then
            echo "Found ${ACTIVE_SLO_ALERTS} active SLO burn-rate alerts. Blocking production promotion."
            echo "$ALERTS_JSON" | jq --arg pattern "${ALERT_NAME_REGEX}" '.[] | select(.status.state == "active" and (.labels.alertname | test($pattern))) | {alertname: .labels.alertname, severity: .labels.severity, summary: .annotations.summary}'
            exit 1
          fi

          echo "No active SLO burn-rate alerts in pre-production."

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to production (manual approval via environment protection)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, preprod-slo-guard, build-images, verify-supply-chain, emergency-skip-audit]
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main' && (inputs.environment == 'production' || github.event_name == 'push')
    environment:
      name: production
      url: https://app.valueos.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Blue-green deploy
        run: |
          cd infra/k8s
          IMAGE_TAG="${{ needs.build-images.outputs.image_tag }}"

          # Deploy to green (inactive) slot
          cd overlays/production
          kustomize edit set image "REGISTRY_URL/valynt-backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${IMAGE_TAG}"
          kustomize build . | kubectl apply -f -

          # Wait for green rollout
          kubectl -n valynt rollout status deployment/backend-green --timeout=300s
          kubectl -n valynt rollout status deployment/worker --timeout=300s

          # Switch active service to green
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          echo "Production deploy complete — green slot is now active"

      - name: Smoke test production
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://app.valueos.app/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Production health check failed — consider rollback"
          exit 1


      - name: Capture production operational verification artifact
        env:
          INCIDENT_REFERENCE: ${{ needs.emergency-skip-audit.outputs.incident_reference }}
          SKIP_TESTS: ${{ needs.emergency-skip-audit.outputs.skip_tests }}
          IMAGE_REF: ${{ needs.build-images.outputs.image_ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          artifact = {
            "environment": "production",
            "timestamp_utc": datetime.now(timezone.utc).isoformat(),
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "image_ref": os.environ.get("IMAGE_REF", ""),
            "health_check": {"endpoint": "https://app.valueos.app/health", "status": "passed"},
            "rollback_readiness": {"strategy": "blue-green", "status": "ready"},
            "key_metrics": {"preprod_slo_guard": "passed", "slo_alert_regex": "${{ env.SLO_ALERT_NAME_REGEX }}"},
            "incident": {"skip_tests": os.environ.get("SKIP_TESTS") == "true", "reference": os.environ.get("INCIDENT_REFERENCE", "")},
          }

          with open("post-deploy-verification-production-${{ github.run_id }}.json", "w", encoding="utf-8") as handle:
            json.dump(artifact, handle, indent=2)
          PY

      - name: Upload production operational verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-verification-production-${{ github.run_id }}
          path: post-deploy-verification-production-${{ github.run_id }}.json


  weekly-reliability-report:
    name: Weekly Reliability Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Generate weekly SLO and incident report
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_PRODUCTION_URL }}
          PROMETHEUS_TOKEN: ${{ secrets.PROMETHEUS_PRODUCTION_TOKEN }}
          ALERTMANAGER_URL: ${{ secrets.ALERTMANAGER_PRODUCTION_URL }}
          ALERTMANAGER_TOKEN: ${{ secrets.ALERTMANAGER_PRODUCTION_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PROMETHEUS_URL}" ] || [ -z "${ALERTMANAGER_URL}" ]; then
            echo "PROMETHEUS_PRODUCTION_URL and ALERTMANAGER_PRODUCTION_URL are required"
            exit 1
          fi

          prom_query() {
            local query="$1"
            local auth_header=()
            if [ -n "${PROMETHEUS_TOKEN:-}" ]; then
              auth_header=(-H "Authorization: Bearer ${PROMETHEUS_TOKEN}")
            fi
            curl -fsSL "${auth_header[@]}" --get --data-urlencode "query=${query}" "${PROMETHEUS_URL%/}/api/v1/query"
          }

          auth_header=()
          if [ -n "${ALERTMANAGER_TOKEN:-}" ]; then
            auth_header=(-H "Authorization: Bearer ${ALERTMANAGER_TOKEN}")
          fi

          API_AVAIL=$(prom_query 'slo:api_availability:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          API_LATENCY=$(prom_query 'slo:api_latency:good_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          AUTH_SUCCESS=$(prom_query 'slo:auth_success:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')
          QUEUE_HEALTH=$(prom_query 'slo:queue_health:ratio_rate1h' | jq -r '.data.result[0].value[1] // "n/a"')

          ACTIVE_BURN_ALERTS=$(curl -fsSL "${auth_header[@]}" "${ALERTMANAGER_URL%/}/api/v2/alerts" | jq '[.[] | select(.status.state == "active" and (.labels.alertname | test("SLOBurnRateTooHigh")))] | length')

          INCIDENTS_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')
          INCIDENTS_PREV_7D=$(prom_query 'sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[14d])) - sum(increase(alertmanager_alerts_received_total{alertname=~".*SLOBurnRateTooHigh"}[7d]))' | jq -r '.data.result[0].value[1] // "0"')

          REPORT_PATH="weekly-reliability-report.md"
          RUN_DATE=$(date -u +%Y-%m-%d)

          cat > "${REPORT_PATH}" <<REPORT
          # Weekly Reliability Report (${RUN_DATE})

          ## Current SLO Status (1h rolling)
          - API Availability: ${API_AVAIL}
          - API Latency (P95 <= 300ms good-event ratio): ${API_LATENCY}
          - Authentication Success: ${AUTH_SUCCESS}
          - Queue Health: ${QUEUE_HEALTH}

          ## Burn-Rate Alert Status
          - Active SLO burn-rate alerts: ${ACTIVE_BURN_ALERTS}

          ## Incident Trend
          - Incidents triggered in last 7d: ${INCIDENTS_7D}
          - Incidents triggered in previous 7d: ${INCIDENTS_PREV_7D}

          ## Notes
          - Incident trend uses Alertmanager received alert counts for `*SLOBurnRateTooHigh` alerts.
          REPORT

      - name: Upload reliability report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reliability-report-${{ github.run_id }}
          path: weekly-reliability-report.md

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Rollback (manual trigger)
  # ──────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Switch back to blue slot
        run: |
          kubectl -n valynt patch service backend-active \
            -p '{"spec":{"selector":{"slot":"blue"}}}'
          echo "Rolled back to blue slot"


  create-deferred-validation-task:
    name: Create Deferred Validation Follow-up Task
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tests && needs.deploy-production.result == 'success' }}
    steps:
      - name: Create follow-up issue for deferred validation execution
        uses: actions/github-script@v7
        env:
          INCIDENT_TICKET_ID: ${{ inputs.incident_ticket_id }}
          POST_DEPLOY_VALIDATION_CHECKLIST: ${{ inputs.post_deploy_validation_checklist }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Emergency deployment bypassed test gate. Run deferred validations immediately.',
              '',
              `- Incident ticket: ${process.env.INCIDENT_TICKET_ID}`,
              `- Workflow run: ${runUrl}`,
              '',
              '## Required post-deploy validation checklist',
              process.env.POST_DEPLOY_VALIDATION_CHECKLIST,
              '',
              '- [ ] Validation execution started immediately',
              '- [ ] Validation results linked back to this issue',
              '- [ ] Incident timeline updated with validation outcomes'
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deferred validations required after emergency deploy (${process.env.INCIDENT_TICKET_ID})`,
              body,
              labels: ['deployment', 'urgent', 'deferred-validation']
            });

            core.info(`Created follow-up issue #${issue.data.number}`);
