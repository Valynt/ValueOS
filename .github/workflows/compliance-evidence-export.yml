name: Compliance Evidence Export

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 */3 *"

permissions:
  contents: read

jobs:
  export-evidence:
    name: Export Compliance Evidence Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare evidence directories
        run: |
          mkdir -p evidence/security-scans evidence/privacy evidence/rls evidence/metadata evidence/control-mappings

      - name: Copy canonical control mapping documents
        run: |
          cp docs/security-compliance/fedramp-control-mapping.md evidence/control-mappings/fedramp-control-mapping.md
          cp docs/security-compliance/fedramp-control-evidence-manifest.json evidence/control-mappings/fedramp-control-evidence-manifest.source.json

      - name: Capture immutable run metadata
        run: |
          cat <<JSON > evidence/metadata/run-metadata.json
          {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}",
            "exported_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "audit_status": "not_run",
            "audit_level": "high",
            "tool": "pnpm audit"
          }
          JSON

      - name: Run pnpm audit security scan (strict)
        id: pnpm_audit
        run: |
          set +e
          pnpm audit --audit-level=high --json > evidence/security-scans/pnpm-audit.json
          audit_exit_code=$?
          set -e

          if [ "$audit_exit_code" -eq 0 ]; then
            audit_status="pass"
          else
            audit_status="fail"
          fi

          python - <<PY
          import json

          with open("evidence/metadata/run-metadata.json", "r", encoding="utf-8") as f:
            metadata = json.load(f)

          metadata["audit_status"] = "$audit_status"
          metadata["audit_level"] = "high"
          metadata["tool"] = "pnpm audit"

          with open("evidence/metadata/run-metadata.json", "w", encoding="utf-8") as f:
            json.dump(metadata, f, indent=2)
            f.write("\n")
          PY

          echo "${audit_status}" > evidence/security-scans/pnpm-audit-status.txt
          exit "$audit_exit_code"

      - name: Collect pnpm audit artifacts
        if: always()
        run: |
          if [ ! -f evidence/security-scans/pnpm-audit.json ]; then
            echo "pnpm audit output was not generated." > evidence/security-scans/pnpm-audit-missing.txt
          fi

          if [ ! -f evidence/security-scans/pnpm-audit-status.txt ]; then
            echo "unknown" > evidence/security-scans/pnpm-audit-status.txt
          fi

      - name: Run Semgrep security scan
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"

      - name: Collect Semgrep SARIF output
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            cp semgrep.sarif evidence/security-scans/semgrep.sarif
          else
            echo "Semgrep SARIF output not found." > evidence/security-scans/semgrep-missing.txt
          fi

      - name: Run DSR/privacy compliance tests
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx vitest run tests/compliance/dsr-workflow.test.ts --reporter=json --outputFile=evidence/privacy/dsr-workflow.json

      - name: Run RLS validation tests
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npx vitest run tests/security/rls-tenant-isolation.test.ts --reporter=json --outputFile=evidence/rls/rls-validation.json

      - name: Generate FedRAMP evidence manifest
        if: always()
        run: |
          python - <<'PY'
          import json
          from copy import deepcopy

          source_path = "docs/security-compliance/fedramp-control-evidence-manifest.json"
          output_path = "evidence/metadata/fedramp-control-evidence-manifest.json"

          with open(source_path, "r", encoding="utf-8") as f:
            source_manifest = json.load(f)

          export_manifest = deepcopy(source_manifest)
          export_manifest["export_context"] = {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}"
          }
          export_manifest["bundle_documents"] = {
            "mapping_markdown": "evidence/control-mappings/fedramp-control-mapping.md",
            "source_manifest": "evidence/control-mappings/fedramp-control-evidence-manifest.source.json",
            "run_bound_manifest": output_path,
            "run_metadata": "evidence/metadata/run-metadata.json",
            "bundle_file_manifest": "evidence/metadata/evidence-manifest.txt"
          }

          with open(output_path, "w", encoding="utf-8") as f:
            json.dump(export_manifest, f, indent=2)
            f.write("\n")
          PY

      - name: Record evidence manifest
        if: always()
        run: |
          find evidence -type f | sort > evidence/metadata/evidence-manifest.txt

      - name: Create compressed evidence bundle
        if: always()
        run: |
          tar -czf compliance-evidence-bundle-${{ github.run_id }}.tar.gz evidence

      - name: Upload compliance evidence bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compliance-evidence-bundle-${{ github.run_id }}
          path: |
            compliance-evidence-bundle-${{ github.run_id }}.tar.gz
            evidence/
          retention-days: 365
