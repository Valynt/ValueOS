name: Compliance Evidence Export

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 */3 *'

permissions:
  contents: read

jobs:
  static-security-evidence:
    name: Static Security Evidence
    uses: ./.github/workflows/_reusable-security-static.yml
    with:
      run_audit: true
      run_gitleaks: true
      run_semgrep: true
      run_sbom: true
      upload_sarif: false
      artifact_prefix: compliance-static-security
      artifact_retention_days: 365
    secrets: inherit

  export-evidence:
    name: Export Compliance Evidence Bundle
    runs-on: ubuntu-latest
    needs: [static-security-evidence]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          cache-key-suffix: compliance-evidence

      - name: Download static security evidence
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.static-security-evidence.outputs.artifact_name }}
          path: artifacts/downloaded-security-static

      - name: Prepare evidence directories
        run: |
          mkdir -p evidence/security-scans evidence/privacy evidence/rls evidence/metadata evidence/control-mappings

      - name: Copy canonical control mapping documents
        run: |
          cp docs/security-compliance/fedramp-control-mapping.md evidence/control-mappings/fedramp-control-mapping.md
          cp docs/security-compliance/fedramp-control-evidence-manifest.json evidence/control-mappings/fedramp-control-evidence-manifest.source.json

      - name: Copy static security evidence inputs
        run: |
          cp -R artifacts/downloaded-security-static/. evidence/security-scans/
          if [ ! -f evidence/security-scans/pnpm-audit.exit-code ]; then
            echo '1' > evidence/security-scans/pnpm-audit.exit-code
          fi

      - name: Capture immutable run metadata
        run: |
          audit_status='fail'
          if [ "$(cat evidence/security-scans/pnpm-audit.exit-code)" = '0' ]; then
            audit_status='pass'
          fi
          cat <<JSON > evidence/metadata/run-metadata.json
          {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}",
            "exported_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "audit_status": "${audit_status}",
            "audit_level": "high",
            "tool": "pnpm audit"
          }
          JSON

      - name: Run DSR/privacy compliance tests
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx vitest run tests/compliance/dsr-workflow.test.ts --reporter=json --outputFile=evidence/privacy/dsr-workflow.json

      - name: Run RLS validation tests
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npx vitest run tests/security/rls-tenant-isolation.test.ts --reporter=json --outputFile=evidence/rls/rls-validation.json

      - name: Generate FedRAMP evidence manifest
        if: always()
        run: |
          python - <<'PY'
          import json
          from copy import deepcopy

          source_path = 'docs/security-compliance/fedramp-control-evidence-manifest.json'
          output_path = 'evidence/metadata/fedramp-control-evidence-manifest.json'

          with open(source_path, 'r', encoding='utf-8') as f:
            source_manifest = json.load(f)

          export_manifest = deepcopy(source_manifest)
          export_manifest['export_context'] = {
            'repository': '${{ github.repository }}',
            'workflow': '${{ github.workflow }}',
            'run_id': '${{ github.run_id }}',
            'run_attempt': '${{ github.run_attempt }}',
            'ref': '${{ github.ref }}',
            'commit_sha': '${{ github.sha }}'
          }
          export_manifest['bundle_documents'] = {
            'mapping_markdown': 'evidence/control-mappings/fedramp-control-mapping.md',
            'source_manifest': 'evidence/control-mappings/fedramp-control-evidence-manifest.source.json',
            'run_bound_manifest': output_path,
            'run_metadata': 'evidence/metadata/run-metadata.json',
            'bundle_file_manifest': 'evidence/metadata/evidence-manifest.txt'
          }

          with open(output_path, 'w', encoding='utf-8') as f:
            json.dump(export_manifest, f, indent=2)
            f.write('\n')
          PY

      - name: Record evidence manifest
        if: always()
        run: find evidence -type f | sort > evidence/metadata/evidence-manifest.txt

      - name: Create compressed evidence bundle
        if: always()
        run: tar -czf compliance-evidence-bundle-${{ github.run_id }}.tar.gz evidence

      - name: Upload compliance evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence-bundle-${{ github.run_id }}
          path: |
            compliance-evidence-bundle-${{ github.run_id }}.tar.gz
            evidence/
          retention-days: 365
