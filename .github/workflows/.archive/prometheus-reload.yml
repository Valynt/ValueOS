name: Prometheus Reload

on:
  workflow_dispatch:

jobs:
  reload-prometheus:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Prometheus reload
        env:
          PROMETHEUS_RELOAD_URL: ${{ secrets.PROMETHEUS_RELOAD_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_BEARER_TOKEN }}
        run: |
          if [ -z "$PROMETHEUS_RELOAD_URL" ]; then
            echo "Missing PROMETHEUS_RELOAD_URL secret. Set this to https://prometheus.example.com/-/reload";
            exit 1;
          fi
          echo "Calling Prometheus reload endpoint: $PROMETHEUS_RELOAD_URL";
          if [ -z "$PROMETHEUS_BEARER_TOKEN" ]; then
            curl -sSfX POST "$PROMETHEUS_RELOAD_URL" && echo "\nReload request sent." || (echo "Reload request failed" && exit 2)
          else
            curl -sSf -H "Authorization: Bearer $PROMETHEUS_BEARER_TOKEN" -X POST "$PROMETHEUS_RELOAD_URL" && echo "\nReload request sent." || (echo "Reload request failed" && exit 2)
          fi
