name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 9 AM UTC
  workflow_dispatch:
  workflow_call:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # R1.1: Secret Detection — zero tolerance, PR-blocking
  # ---------------------------------------------------------------------------
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: ${{ github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified --fail

  # ---------------------------------------------------------------------------
  # R1.2: SAST — CodeQL
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # R1.3: SAST — Semgrep
  # ---------------------------------------------------------------------------
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --config=auto --sarif --output=semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # R1.4: Dependency Audit
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

      - name: Dependency Review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Generate SBOM
        run: pnpm run security:sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # R1.5: Container Vulnerability Scanning — Trivy
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Filesystem scan
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: trivy-fs

      # Backend image scan
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.backend
          push: false
          load: true
          tags: valueos-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "valueos-backend:scan"
          format: "sarif"
          output: "trivy-backend-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy backend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend-results.sarif"
          category: trivy-backend-image

      # Frontend image scan
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.frontend
          push: false
          load: true
          tags: valueos-frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "valueos-frontend:scan"
          format: "sarif"
          output: "trivy-frontend-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend-results.sarif"
          category: trivy-frontend-image

      - name: Clean up images
        if: always()
        run: docker rmi valueos-backend:scan valueos-frontend:scan || true

  # ---------------------------------------------------------------------------
  # R1.6: Infrastructure as Code Scanning — Checkov
  # ---------------------------------------------------------------------------
  iac-scan:
    name: IaC Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform files
        id: check-tf
        run: |
          if [ -d "infra/terraform" ] && find infra/terraform -name "*.tf" | grep -q .; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Checkov
        if: steps.check-tf.outputs.has_tf == 'true'
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        if: always() && steps.check-tf.outputs.has_tf == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ---------------------------------------------------------------------------
  # R1.7: Dockerfile Linting — Hadolint
  # ---------------------------------------------------------------------------
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile.backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/Dockerfile.backend

      - name: Lint Dockerfile.frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/Dockerfile.frontend

  # ---------------------------------------------------------------------------
  # R1.8: Security Gate — summary job
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - secret-detection
      - codeql
      - semgrep
      - dependency-audit
      - container-scan
      - iac-scan
      - dockerfile-lint
    permissions:
      contents: read
      security-events: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate scan results
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SECRET_RESULT="${{ needs.secret-detection.result }}"
          CODEQL_RESULT="${{ needs.codeql.result }}"
          SEMGREP_RESULT="${{ needs.semgrep.result }}"
          DEP_RESULT="${{ needs.dependency-audit.result }}"
          CONTAINER_RESULT="${{ needs.container-scan.result }}"
          IAC_RESULT="${{ needs.iac-scan.result }}"
          LINT_RESULT="${{ needs.dockerfile-lint.result }}"

          HARD_FAIL="false"
          WARNINGS=""

          # Zero tolerance on secrets
          if [ "$SECRET_RESULT" = "failure" ]; then
            HARD_FAIL="true"
            echo "::error::Secret detection found verified secrets — merge blocked"
          fi

          # Hard fail on critical container vulnerabilities
          if [ "$CONTAINER_RESULT" = "failure" ]; then
            HARD_FAIL="true"
            echo "::error::Container scan found critical/high vulnerabilities — merge blocked"
          fi

          # Check code scanning alerts for critical/high SAST findings
          ALERTS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/code-scanning/alerts?state=open&severity=critical,high" \
            2>/dev/null || echo "[]")

          CRITICAL_COUNT=$(echo "$ALERTS" | jq '[.[] | select(.rule.severity == "critical" or .rule.security_severity_level == "critical")] | length')
          HIGH_COUNT=$(echo "$ALERTS" | jq '[.[] | select(.rule.severity == "high" or .rule.security_severity_level == "high")] | length')

          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            HARD_FAIL="true"
            echo "::error::Found $CRITICAL_COUNT critical and $HIGH_COUNT high SAST findings — merge blocked"
          fi

          # Dependabot high alerts — warning only
          VULN_ALERTS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/dependabot/alerts?state=open&severity=high" \
            2>/dev/null || echo "[]")
          DEPENDABOT_HIGH=$(echo "$VULN_ALERTS" | jq 'length')
          if [ "$DEPENDABOT_HIGH" -gt 0 ]; then
            echo "::warning::$DEPENDABOT_HIGH high Dependabot alerts open"
          fi

          # Build summary table
          {
            echo "## Security Gate Results"
            echo ""
            echo "| Check | Result | Policy |"
            echo "|-------|--------|--------|"
            echo "| Secret Detection | $SECRET_RESULT | Hard block |"
            echo "| CodeQL SAST | $CODEQL_RESULT | Hard block (critical/high) |"
            echo "| Semgrep SAST | $SEMGREP_RESULT | Hard block (critical/high) |"
            echo "| Dependency Audit | $DEP_RESULT | Informational |"
            echo "| Container Scan | $CONTAINER_RESULT | Hard block (critical) |"
            echo "| IaC Scan | $IAC_RESULT | Hard block |"
            echo "| Dockerfile Lint | $LINT_RESULT | Informational |"
            echo ""
            echo "**Code Scanning Alerts:** $CRITICAL_COUNT critical, $HIGH_COUNT high"
            echo "**Dependabot High Alerts:** $DEPENDABOT_HIGH"
            echo ""
            if [ "$HARD_FAIL" = "true" ]; then
              echo "### Result: BLOCKED"
              echo "Resolve all blocking findings before merging."
            else
              echo "### Result: PASSED"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "hard_fail=$HARD_FAIL" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_STEP_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.evaluate.outputs.summary }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Security Gate Results')
            );
            const body = summary;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Enforce gate
        if: steps.evaluate.outputs.hard_fail == 'true'
        run: |
          echo "::error::Security gate failed — see summary above"
          exit 1
