name: Rotation Health Monitor

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC (after K8s CronJob at 04:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-rotation-health:
    name: Check Rotation Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check rotation status
        id: check
        env:
          ROTATION_HEALTH_CHECK_URL: ${{ secrets.ROTATION_HEALTH_CHECK_URL }}
        run: |
          if [ -z "$ROTATION_HEALTH_CHECK_URL" ]; then
            echo "::warning::ROTATION_HEALTH_CHECK_URL not configured — skipping health check"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch rotation history from the API
          RESPONSE=$(curl -sf --max-time 30 \
            "${ROTATION_HEALTH_CHECK_URL}/api/security/rotate-keys" \
            2>/dev/null) || {
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=Failed to reach rotation health endpoint" >> "$GITHUB_OUTPUT"
            exit 0
          }

          NOW=$(date +%s)
          FAILURES=""

          # Check each provider's last rotation timestamp against expected intervals
          # API keys: 90 days, Supabase: 180 days
          check_provider() {
            local provider="$1"
            local max_days="$2"
            local last_rotation

            last_rotation=$(echo "$RESPONSE" | jq -r ".rotations.\"$provider\".lastRotated // empty")
            if [ -z "$last_rotation" ]; then
              FAILURES="${FAILURES}Provider '$provider': no rotation history found\n"
              return
            fi

            local last_ts
            last_ts=$(date -d "$last_rotation" +%s 2>/dev/null || echo "0")
            local age_days=$(( (NOW - last_ts) / 86400 ))

            if [ "$age_days" -gt "$max_days" ]; then
              FAILURES="${FAILURES}Provider '$provider': last rotated ${age_days} days ago (max: ${max_days})\n"
            fi

            # Check if last rotation succeeded
            local last_status
            last_status=$(echo "$RESPONSE" | jq -r ".rotations.\"$provider\".status // empty")
            if [ "$last_status" = "failed" ]; then
              FAILURES="${FAILURES}Provider '$provider': last rotation failed\n"
            fi
          }

          check_provider "api-keys" 90
          check_provider "supabase" 180
          check_provider "jwt" 90
          check_provider "stripe" 90

          if [ -n "$FAILURES" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            # Escape newlines for GitHub Actions output
            ESCAPED=$(echo -e "$FAILURES" | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "message=$ESCAPED" >> "$GITHUB_OUTPUT"
          else
            echo "status=healthy" >> "$GITHUB_OUTPUT"
            echo "message=All rotations within expected intervals" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub issue on failure
        if: steps.check.outputs.status == 'failure' || steps.check.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';
            const message = decodeURIComponent('${{ steps.check.outputs.message }}'.replace(/%0A/g, '\n'));

            // Check for existing open issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,rotation-failure',
              state: 'open',
            });

            const title = `Secret rotation health check ${status}`;
            const body = [
              `## Rotation Health Check — ${status.toUpperCase()}`,
              '',
              '**Date:** ' + new Date().toISOString(),
              '',
              '### Details',
              '',
              message,
              '',
              '### Action Required',
              '',
              '1. Check the rotation service logs',
              '2. Verify the K8s CronJob is running (`kubectl get cronjobs`)',
              '3. Manually trigger rotation if needed via `/api/security/rotate-keys`',
              '',
              '*Created by rotation-monitor workflow*',
            ].join('\n');

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `### Update — ${new Date().toISOString()}\n\n${message}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'rotation-failure'],
              });
            }

      - name: Send Slack alert
        if: (steps.check.outputs.status == 'failure' || steps.check.outputs.status == 'error') && vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Secret rotation health check ${{ steps.check.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Rotation Health Alert*\n\nStatus: ${{ steps.check.outputs.status }}\n\n${{ steps.check.outputs.message }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}

      - name: Summary
        run: |
          {
            echo "## Rotation Health Check"
            echo ""
            echo "**Status:** ${{ steps.check.outputs.status }}"
            echo ""
            echo "${{ steps.check.outputs.message }}"
          } >> "$GITHUB_STEP_SUMMARY"
