name: 🚀 One-Click Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  
permissions:
  contents: read
  id-token: write  # For OIDC authentication

jobs:
  # Determine environment
  setup:
    name: 📋 Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deploy_production: ${{ steps.env.outputs.deploy_production }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ inputs.environment }}" = "production" ]; then
            echo "deploy_production=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_production=false" >> $GITHUB_OUTPUT
          fi

  # Code quality checks
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Security scan
        run: |
          npm audit --audit-level=high
          npx snyk test --severity-threshold=high || true

  # Build Docker images
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [setup, quality]
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/valueos-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/valueos-${{ matrix.service }}:${{ needs.setup.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run tests
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: [setup, quality]
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            playwright-report/
            test-results/

  # Deploy to staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    if: needs.setup.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.valueos.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra/terraform-new/environments/staging
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform-new/environments/staging
        run: |
          terraform apply -auto-approve \
            -var="frontend_image=${{ env.ECR_REGISTRY }}/valueos-frontend:${{ github.sha }}" \
            -var="backend_image=${{ env.ECR_REGISTRY }}/valueos-backend:${{ github.sha }}"

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster valueos-staging \
            --task-definition valueos-staging-migration \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.MIGRATION_SG_ID }}]}"

      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster valueos-staging \
            --service valueos-staging-frontend \
            --force-new-deployment
          
          aws ecs update-service \
            --cluster valueos-staging \
            --service valueos-staging-backend \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster valueos-staging \
            --services valueos-staging-frontend valueos-staging-backend

  # Smoke tests
  smoke-test:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: [setup, deploy-staging]
    if: needs.setup.outputs.environment == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check - Frontend
        run: |
          curl -f https://staging.valueos.com/ || exit 1

      - name: Health check - Backend
        run: |
          curl -f https://api-staging.valueos.com/health || exit 1

      - name: Run smoke tests
        run: |
          npx playwright test tests/smoke/ --project=chromium

  # Deploy to production (with approval)
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    if: needs.setup.outputs.deploy_production == 'true'
    environment:
      name: production
      url: https://valueos.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra/terraform-new/environments/production
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform-new/environments/production
        run: |
          terraform apply -auto-approve \
            -var="frontend_image=${{ env.ECR_REGISTRY }}/valueos-frontend:${{ github.sha }}" \
            -var="backend_image=${{ env.ECR_REGISTRY }}/valueos-backend:${{ github.sha }}"

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster valueos-production \
            --task-definition valueos-production-migration \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS_PROD }}],securityGroups=[${{ secrets.MIGRATION_SG_ID_PROD }}]}"

      - name: Blue-Green Deployment
        run: |
          # Deploy to green environment
          aws ecs update-service \
            --cluster valueos-production \
            --service valueos-production-frontend-green \
            --force-new-deployment \
            --desired-count 2
          
          aws ecs update-service \
            --cluster valueos-production \
            --service valueos-production-backend-green \
            --force-new-deployment \
            --desired-count 2

          # Wait for green to be healthy
          aws ecs wait services-stable \
            --cluster valueos-production \
            --services valueos-production-frontend-green valueos-production-backend-green

          # Shift traffic gradually
          echo "Shifting 10% traffic to green..."
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.LISTENER_ARN }} \
            --default-actions Type=forward,ForwardConfig='{TargetGroups=[{TargetGroupArn=${{ secrets.BLUE_TG_ARN }},Weight=90},{TargetGroupArn=${{ secrets.GREEN_TG_ARN }},Weight=10}]}'
          
          sleep 300  # Monitor for 5 minutes
          
          echo "Shifting 50% traffic to green..."
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.LISTENER_ARN }} \
            --default-actions Type=forward,ForwardConfig='{TargetGroups=[{TargetGroupArn=${{ secrets.BLUE_TG_ARN }},Weight=50},{TargetGroupArn=${{ secrets.GREEN_TG_ARN }},Weight=50}]}'
          
          sleep 300  # Monitor for 5 minutes
          
          echo "Shifting 100% traffic to green..."
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.LISTENER_ARN }} \
            --default-actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TG_ARN }}

          # Scale down blue
          aws ecs update-service \
            --cluster valueos-production \
            --service valueos-production-frontend-blue \
            --desired-count 0
          
          aws ecs update-service \
            --cluster valueos-production \
            --service valueos-production-backend-blue \
            --desired-count 0

  # Verify production deployment
  verify-production:
    name: ✅ Verify Production
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - name: Health check - Frontend
        run: |
          curl -f https://valueos.com/ || exit 1

      - name: Health check - Backend
        run: |
          curl -f https://api.valueos.com/health || exit 1

      - name: Check error rate
        run: |
          # Query CloudWatch for error rate
          ERROR_RATE=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/ApplicationELB \
            --metric-name HTTPCode_Target_5XX_Count \
            --dimensions Name=LoadBalancer,Value=${{ secrets.ALB_NAME }} \
            --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text)
          
          if [ "$ERROR_RATE" -gt 10 ]; then
            echo "Error rate too high: $ERROR_RATE"
            exit 1
          fi

  # Notify
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [setup, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment ${{ job.status }}*\n\nEnvironment: ${{ needs.setup.outputs.environment }}\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Create deployment record
        run: |
          echo "Deployment completed at $(date)" >> deployment-log.txt
