name: Design Lint

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  design-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint --if-present
      - name: Run Stylelint (no-install fallback)
        run: |
          if npm run lint:css --silent 2>/dev/null; then
            npm run lint:css --silent
          else
            npx --yes stylelint 'src/**/*.{css,scss,tsx,ts}' || true
          fi
      - name: Check for inline style attributes
        run: node scripts/check-inline-styles.js
