name: CI - PR and Main Blocking

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      security: ${{ steps.filter.outputs.security }}
      release: ${{ steps.filter.outputs.release }}
      deploy: ${{ steps.filter.outputs.deploy }}
      shared: ${{ steps.filter.outputs.shared }}
      repo_meta: ${{ steps.filter.outputs.repo_meta }}
      frontend_required: ${{ steps.filter.outputs.frontend == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.repo_meta == 'true' }}
      backend_required: ${{ steps.filter.outputs.backend == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.repo_meta == 'true' }}
      any_code: ${{ steps.filter.outputs.frontend == 'true' || steps.filter.outputs.backend == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.security == 'true' || steps.filter.outputs.repo_meta == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/**'
              - 'packages/components/**'
              - 'packages/sdui/**'
              - 'packages/sdui-types/**'
              - 'tests/accessibility/**'
              - 'scripts/ci/check-a11y-*.mjs'
              - 'scripts/ci/check-i18n-*.mjs'
              - 'scripts/ci/collect-frontend-quality-dashboard.mjs'
              - '.github/metrics/**'
            backend:
              - 'packages/backend/**'
              - 'packages/memory/**'
              - 'packages/agents/**'
              - 'packages/agent-fabric/**'
              - 'packages/services/**'
              - 'infra/supabase/**'
              - 'tests/security/**'
              - 'tests/compliance/**'
              - 'scripts/ci/check-supabase-tenant-controls.mjs'
              - 'scripts/ci/check-migration-*.mjs'
              - 'scripts/ci/check-permissive-rls.sh'
              - 'scripts/ci/verify-critical-claims.mjs'
            security:
              - 'scripts/ci/check-security-*.mjs'
              - 'scripts/ci/security-baseline-verification.mjs'
              - 'scripts/ci/check-direct-llm-calls.mjs'
              - 'scripts/ci/check-llm-*.mjs'
              - 'scripts/security/**'
              - '.github/workflows/codeql.yml'
            release:
              - '.github/workflows/release.yml'
              - '.changeset/**'
              - 'scripts/ci/reproducibility-verify.mjs'
            deploy:
              - '.github/workflows/deploy.yml'
              - 'infra/k8s/**'
              - 'infra/docker/**'
              - 'scripts/ci/observability-slo-gate.sh'
            shared:
              - 'packages/shared/**'
              - 'packages/config-v2/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'vitest*.ts'
            repo_meta:
              - '.github/workflows/ci.yml'
              - '.github/workflows/README.md'
              - '.github/workflows/CI_CONTROL_MATRIX.md'
              - 'docs/testing/release-gates.md'

  pr-workspace-quality:
    name: pr-workspace-quality
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any_code == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Canonical governance gate
        run: pnpm run typecheck:signal --verify

      - name: Workflow governance self-check
        run: pnpm run ci:governance:self-check

      - name: Runtime contract guards
        run: |
          pnpm check:runtime-sentinels
          pnpm check:kong-cors-origins
          pnpm run check:workflow-package-script-drift
          pnpm run check:workflow-pnpm-contract
          pnpm run check:workspace-package-governance

      - name: Lint + typecheck + unit tests
        run: |
          npx turbo run lint typecheck test

      - name: Targeted repo invariants
        run: |
          pnpm --filter @valueos/backend exec vitest run src/__tests__/req-as-any-guard.test.ts
          node scripts/ci/check-generated-src-artifacts.mjs --base-sha="${{ github.event.pull_request.base.sha }}" --head-sha="${{ github.sha }}"
          node scripts/ci/check-vitest-workspace-packages.mjs
          bash scripts/check-any-count.sh
          node scripts/ci/docs-integrity.mjs
          node scripts/ci/check-ownership-metadata.mjs
          node scripts/ci/check-openapi-single-root.mjs
          node scripts/ci/check-openapi-structure.mjs
          node scripts/ci/check-query-fingerprint-budgets.mjs --budgets=infra/observability/query-fingerprint-budgets.json --snapshot=infra/observability/query-fingerprint-latest.json
          node scripts/ci/check-latency-target-consistency.mjs --base-sha="${{ github.event.pull_request.base.sha }}" --head-sha="${{ github.sha }}"
          node scripts/ci/check-compose-drift.mjs
          node scripts/ci/check-compose-db-bindings.mjs
          pnpm run check:runtime-platform-contract
          pnpm run check:archived-ecs-guardrails
          node scripts/ci/check-env-port-drift.mjs
          node scripts/ci/check-hardcoded-port-mismatches.mjs
          node .github/scripts/check-todo-metadata.cjs
          pnpm check:browser-provider-secrets
          pnpm check:frontend-bundle-service-role
          node scripts/ci/check-ci-security-control-matrix.mjs
          node scripts/ci/check-required-check-workflow-consistency.mjs
          node scripts/ci/check-deploy-workflow-release-gate-consistency.mjs
          node scripts/ci/check-ci-workflow-scanner-refs.mjs
          node scripts/ci/check-compliance-control-regressions.mjs

  pr-tenant-static-gate:
    name: pr-tenant-static-gate
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.backend_required == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Secret-free tenant static checks
        run: |
          node scripts/ci/check-supabase-tenant-controls.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          bash scripts/ci/check-permissive-rls.sh

  pr-lightweight-security-static:
    name: pr-lightweight-security-static
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any_code == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lightweight security static checks
        run: |
          node scripts/ci/check-direct-llm-calls.mjs
          node scripts/ci/check-security-antipatterns.mjs
          node scripts/ci/check-llm-secrets-hygiene.mjs
          node scripts/ci/check-llm-readiness-contract.mjs
          node scripts/ci/security-baseline-verification.mjs
      - name: Secret scan - gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  pr-frontend-conditional-checks:
    name: pr-frontend-conditional-checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.frontend_required == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        run: npx turbo run build --filter=valynt-app
      - name: Run frontend blocking checks
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: artifacts/accessibility/playwright-report.json
        run: |
          mkdir -p artifacts/accessibility artifacts/i18n artifacts/frontend-quality
          npx playwright test tests/accessibility/axe-a11y.spec.ts --reporter=html,json --output=artifacts/accessibility
          node scripts/ci/check-a11y-severity-budgets.mjs --report artifacts/accessibility/playwright-report.json --budget .github/metrics/wcag-severity-budgets.json --metrics-out artifacts/accessibility/wcag-severity-metrics.json
          node scripts/ci/extract-i18n-catalog.mjs --out artifacts/i18n/extracted-keys.json
          node scripts/ci/check-i18n-keys.mjs --json-out artifacts/i18n/coverage-dashboard.json
          node scripts/ci/check-pseudo-localization.mjs --json-out artifacts/i18n/pseudo-localization-report.json
          node scripts/ci/collect-frontend-quality-dashboard.mjs --dashboard-out artifacts/frontend-quality/dashboard.md --json-out artifacts/frontend-quality/dashboard.json
      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-frontend-conditional-checks-${{ github.run_id }}
          path: |
            playwright-report/
            artifacts/accessibility/
            artifacts/i18n/
            artifacts/frontend-quality/
          if-no-files-found: warn
          retention-days: 30

  pr-only-blocking-gate:
    name: pr-only-blocking-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - changes
      - pr-workspace-quality
      - pr-tenant-static-gate
      - pr-lightweight-security-static
      - pr-frontend-conditional-checks
    steps:
      - name: Enforce PR-only blockers
        run: |
          lanes=(
            "pr-workspace-quality:${{ needs.pr-workspace-quality.result }}"
            "pr-lightweight-security-static:${{ needs.pr-lightweight-security-static.result }}"
          )

          if [ "${{ needs.changes.outputs.backend_required }}" = "true" ]; then
            lanes+=("pr-tenant-static-gate:${{ needs.pr-tenant-static-gate.result }}")
          fi

          if [ "${{ needs.changes.outputs.frontend_required }}" = "true" ]; then
            lanes+=("pr-frontend-conditional-checks:${{ needs.pr-frontend-conditional-checks.result }}")
          fi

          for lane in "${lanes[@]}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ]; then
              echo "Failing PR-only blocking gate due to lane status: $lane"
              exit 1
            fi
          done

  main-tenant-runtime-gate:
    name: main-tenant-runtime-gate
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend_required == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Trusted tenant runtime suites
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts \
            packages/memory/tests/tenant-vector-isolation.test.ts \
            packages/memory/tests/tenant-semantic-retrieval-boundary.test.ts
          npx vitest run tests/compliance/dsr-workflow.test.ts packages/backend/src/api/__tests__/dataSubjectRequests.piiTables.test.ts

  main-critical-validation:
    name: main-critical-validation
    runs-on: ubuntu-latest
    needs: [changes, main-tenant-runtime-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend_required == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Full-repo trusted validation
        run: |
          node scripts/ci/verify-critical-claims.mjs
          pnpm exec vitest run packages/backend/src/__tests__/versioning.contract.test.ts

  main-deeper-security-verification:
    name: main-deeper-security-verification
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.any_code == 'true'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SCA - pnpm audit
        run: pnpm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)
      - name: Secret scan - gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      - name: SAST - Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: '1'
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Build backend container image for Trivy
        run: docker build -f infra/docker/Dockerfile.backend -t valueos-backend:ci .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: valueos-backend:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  main-devcontainer-build:
    name: main-devcontainer-build
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.any_code == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Copy env template
        run: cp .devcontainer/.env.template .devcontainer/.env
      - name: Build DevContainer image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile.optimized
          push: false
          load: true
          tags: valueos-devcontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Validate container health
        run: |
          docker run --rm valueos-devcontainer:ci node --version
          docker run --rm valueos-devcontainer:ci pnpm --version

  main-only-blocking-gate:
    name: main-only-blocking-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - changes
      - main-tenant-runtime-gate
      - main-critical-validation
      - main-deeper-security-verification
      - main-devcontainer-build
    steps:
      - name: Enforce main-only blockers
        run: |
          lanes=(
            "main-deeper-security-verification:${{ needs.main-deeper-security-verification.result }}"
            "main-devcontainer-build:${{ needs.main-devcontainer-build.result }}"
          )

          if [ "${{ needs.changes.outputs.backend_required }}" = "true" ]; then
            lanes+=("main-tenant-runtime-gate:${{ needs.main-tenant-runtime-gate.result }}")
            lanes+=("main-critical-validation:${{ needs.main-critical-validation.result }}")
          fi

          for lane in "${lanes[@]}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ]; then
              echo "Failing main-only blocking gate due to lane status: $lane"
              exit 1
            fi
          done
