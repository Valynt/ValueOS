name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    tags:
      - "v*"
  release:
    types: [published]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_nightly:
        description: "Run nightly matrix/chaos/replay lane"
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-component-schema:
    name: unit/component/schema
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check runtime sentinels
        run: pnpm check:runtime-sentinels

      - name: Legacy surface freeze guard
        run: node scripts/ci/check-legacy-surface-freeze.mjs

      - name: Lint
        run: npx turbo run lint

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Unit suite + schema guard
        run: |
          npx vitest run --coverage --coverage.thresholds.lines=60 --coverage.thresholds.functions=50 --coverage.thresholds.branches=50 --coverage.thresholds.statements=60
          node scripts/ci/check-migration-hygiene.mjs
          node scripts/ci/check-migration-schema-consistency.mjs
          node scripts/ci/verify-critical-architecture-migrations.mjs

      - name: Docs integrity
        run: node scripts/ci/docs-integrity.mjs

      - name: Doc path guard
        run: bash scripts/check-doc-paths.sh

      - name: Legacy path import guard
        run: bash scripts/ci/check-legacy-path-imports.sh

      - name: Query fingerprint perf budget gate
        run: node scripts/ci/check-query-fingerprint-budgets.mjs --budgets=infra/observability/query-fingerprint-budgets.json --snapshot=infra/observability/query-fingerprint-latest.json

      - name: Compose drift guard
        run: node scripts/ci/check-compose-drift.mjs

      - name: Compose DB binding guard
        run: node scripts/ci/check-compose-db-bindings.mjs

      - name: Env/port drift guard
        run: node scripts/ci/check-env-port-drift.mjs

      - name: Supabase security controls
        run: node scripts/ci/check-supabase-security-controls.mjs

      - name: Upload security controls summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-controls-summary-${{ github.sha }}
          path: ci-artifacts/security-controls-summary.json
          if-no-files-found: error

      - name: i18n key integrity
        run: node scripts/ci/check-i18n-keys.mjs

      - name: Hardcoded port mismatch guard
        run: node scripts/ci/check-hardcoded-port-mismatches.mjs

      - name: TODO metadata guard (no untracked TODOs in production paths)
        run: node .github/scripts/check-todo-metadata.cjs

      - name: Critical-path skipped/focused test guard
        run: node scripts/ci/check-critical-skip-only.mjs

      - name: Release-critical focused-test guard
        run: pnpm check:release-critical-focused-tests

      - name: Direct LLM call guard
        run: node scripts/ci/check-direct-llm-calls.mjs

      - name: Runtime test placement guard
        run: node scripts/ci/check-runtime-test-placement.mjs

      - name: Security anti-pattern guard
        run: node scripts/ci/check-security-antipatterns.mjs

      - name: Guard browser provider secrets
        run: pnpm check:browser-provider-secrets

      - name: Guard frontend bundle service-role identifiers
        run: pnpm check:frontend-bundle-service-role

      - name: LLM secrets hygiene guard
        run: node scripts/ci/check-llm-secrets-hygiene.mjs

      - name: LLM readiness contract guard
        run: node scripts/ci/check-llm-readiness-contract.mjs

      - name: Supabase tenant controls guard
        run: node scripts/ci/check-supabase-tenant-controls.mjs

      - name: Security baseline verification
        run: node scripts/ci/security-baseline-verification.mjs

      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/unit-component-schema
          cat > artifacts/ci-lanes/unit-component-schema/failure-summary.md <<EOF
          # unit/component/schema failure
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/unit-component-schema
          cat > artifacts/ci-lanes/unit-component-schema/summary.md <<EOF
          # unit/component/schema
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-unit-component-schema-${{ github.run_id }}
          path: |
            coverage/**
            artifacts/ci-lanes/unit-component-schema/**
          if-no-files-found: warn
          retention-days: 30

  tenant-isolation-gate:
    name: tenant-isolation-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Tenant isolation tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p reports/compliance/rls
          npx vitest run --config tests/security/vitest.security.config.ts \
            tests/security/rls-tenant-isolation.test.ts \
            tests/security/api-tenant-isolation.test.ts \
            tests/security/supabase-rls-policy-matrix.test.ts \
            tests/security/agent-invocation-tenant-boundary.test.ts \
            packages/memory/tests/tenant-vector-isolation.test.ts \
            packages/memory/tests/tenant-semantic-retrieval-boundary.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=reports/compliance/rls/vitest-rls.junit.xml \
            --outputFile.json=reports/compliance/rls/vitest-rls.json
      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/tenant-isolation-gate
          cat > artifacts/ci-lanes/tenant-isolation-gate/failure-summary.md <<EOF
          # tenant-isolation-gate failure
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/tenant-isolation-gate
          cat > artifacts/ci-lanes/tenant-isolation-gate/summary.md <<EOF
          # tenant-isolation-gate
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-tenant-isolation-gate-${{ github.run_id }}
          path: |
            reports/compliance/rls/**
            artifacts/ci-lanes/tenant-isolation-gate/**
          if-no-files-found: warn
          retention-days: 30

  ui-truthfulness-gate:
    name: ui-truthfulness-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: UI truthfulness checks
        run: |
          mkdir -p artifacts/ui-truthfulness
          pnpm exec vitest run tests/ux/user-experience.test.ts tests/views/AuditTrailDashboard.test.tsx \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=artifacts/ui-truthfulness/vitest-ui-truthfulness.junit.xml
      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/ui-truthfulness-gate
          cat > artifacts/ci-lanes/ui-truthfulness-gate/failure-summary.md <<EOF
          # ui-truthfulness-gate failure
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/ui-truthfulness-gate
          cat > artifacts/ci-lanes/ui-truthfulness-gate/summary.md <<EOF
          # ui-truthfulness-gate
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-ui-truthfulness-gate-${{ github.run_id }}
          path: |
            artifacts/ui-truthfulness/**
            artifacts/ci-lanes/ui-truthfulness-gate/**
          if-no-files-found: warn
          retention-days: 30

  migration-verification:
    name: migration-verification
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Migration verification suite
        run: |
          mkdir -p artifacts/migration-verification
          node scripts/ci/check-migration-hygiene.mjs | tee artifacts/migration-verification/check-migration-hygiene.log
          node scripts/ci/check-migration-schema-consistency.mjs | tee artifacts/migration-verification/check-migration-schema-consistency.log
          node scripts/ci/verify-critical-architecture-migrations.mjs | tee artifacts/migration-verification/verify-critical-architecture-migrations.log
      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/migration-verification
          cat > artifacts/ci-lanes/migration-verification/failure-summary.md <<EOF
          # migration-verification failure
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/migration-verification
          cat > artifacts/ci-lanes/migration-verification/summary.md <<EOF
          # migration-verification
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-migration-verification-${{ github.run_id }}
          path: |
            artifacts/migration-verification/**
            artifacts/ci-lanes/migration-verification/**
          if-no-files-found: warn
          retention-days: 30

  critical-workflows-gate:
    name: critical-workflows-gate
    runs-on: ubuntu-latest
    needs:
      - migration-verification
    if: github.event_name == 'push' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Critical workflow contracts
        run: |
          mkdir -p artifacts/critical-workflows
          node scripts/ci/verify-critical-claims.mjs | tee artifacts/critical-workflows/verify-critical-claims.log
          pnpm exec vitest run packages/backend/src/__tests__/versioning.contract.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=artifacts/critical-workflows/versioning-contract.junit.xml
      - name: Reload durability checks
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pnpm exec playwright test \
            tests/e2e/workflows/wf-1.spec.ts \
            tests/e2e/workflows/wf-2.spec.ts \
            tests/e2e/workflows/wf-3.spec.ts \
            tests/e2e/workflows/wf-4.spec.ts \
            tests/e2e/workflows/wf-5.spec.ts \
            --reporter=line,json \
            --output=artifacts/critical-workflows/playwright
      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/critical-workflows-gate
          cat > artifacts/ci-lanes/critical-workflows-gate/failure-summary.md <<EOF
          # critical-workflows-gate failure
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - upstream_migration_verification: ${{ needs.migration-verification.result }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/critical-workflows-gate
          cat > artifacts/ci-lanes/critical-workflows-gate/summary.md <<EOF
          # critical-workflows-gate
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - upstream_migration_verification: ${{ needs.migration-verification.result }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-critical-workflows-gate-${{ github.run_id }}
          path: |
            artifacts/critical-workflows/**
            artifacts/ci-lanes/critical-workflows-gate/**
          if-no-files-found: warn
          retention-days: 30

  nightly-matrix-chaos-replay:
    name: nightly matrix/chaos/replay
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)
    strategy:
      fail-fast: false
      matrix:
        suite: [matrix, chaos, replay]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run nightly suite (${{ matrix.suite }})
        run: |
          mkdir -p artifacts/nightly/${{ matrix.suite }}
          if [ "${{ matrix.suite }}" = "matrix" ]; then
            pnpm exec vitest run \
              --config tests/vitest.shared.config.ts \
              tests/matrix/infra-mode.matrix.test.ts \
              tests/matrix/infra-mode.pilot.test.ts \
              tests/matrix/messaging-mode.pilot.test.ts \
              tests/matrix/kafka-streaming-combinations.test.ts \
              --reporter=verbose \
              --reporter=junit \
              --outputFile.junit=artifacts/nightly/${{ matrix.suite }}/vitest-matrix.junit.xml
          elif [ "${{ matrix.suite }}" = "chaos" ]; then
            node scripts/chaos/launch-chaos-smoke.mjs | tee artifacts/nightly/${{ matrix.suite }}/chaos-smoke.log
          else
            pnpm exec vitest run tests/integration/message-bus-communication.test.ts tests/integration/security-flows.test.ts \
              --testNamePattern="replay" \
              --reporter=verbose \
              --reporter=junit \
              --outputFile.junit=artifacts/nightly/${{ matrix.suite }}/vitest-replay.junit.xml
          fi
      - name: Emit failure summary
        if: failure()
        run: |
          mkdir -p artifacts/ci-lanes/nightly-${{ matrix.suite }}
          cat > artifacts/ci-lanes/nightly-${{ matrix.suite }}/failure-summary.md <<EOF
          # nightly matrix/chaos/replay failure (${{ matrix.suite }})
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/nightly-${{ matrix.suite }}
          cat > artifacts/ci-lanes/nightly-${{ matrix.suite }}/summary.md <<EOF
          # nightly matrix/chaos/replay (${{ matrix.suite }})
          - lane_status: ${{ job.status }}
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - workflow_run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-nightly-${{ matrix.suite }}-${{ github.run_id }}
          path: |
            artifacts/nightly/${{ matrix.suite }}/**
            artifacts/ci-lanes/nightly-${{ matrix.suite }}/**
          if-no-files-found: warn
          retention-days: 30

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/accessibility-audit
          cat > artifacts/ci-lanes/accessibility-audit/summary.md <<EOF
          # accessibility-audit
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF

  # Security gate: SAST, SCA, secret scan, SBOM — required on every PR
  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: SCA — pnpm audit (fail on high/critical)
        run: pnpm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)

      - name: Secret scan — gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: SAST — Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: SBOM — generate CycloneDX
        run: |
          npm install -g @cyclonedx/cyclonedx-npm@latest --silent
          cyclonedx-npm --output-format json --output-file sbom.json
        continue-on-error: true

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-gate-${{ github.run_id }}
          path: |
            npm-audit-report.json
            semgrep.sarif
            sbom.json
          if-no-files-found: warn
          retention-days: 90

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/security-gate
          cat > artifacts/ci-lanes/security-gate/summary.md <<EOF
          # security-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-security-gate-${{ github.run_id }}
          path: artifacts/ci-lanes/security-gate/**
          if-no-files-found: warn
          retention-days: 30

  verify-secret-rotation-metadata-age:
    name: Verify secret rotation metadata age
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release' || github.event.pull_request.head.repo.full_name == github.repository
    environment: security-compliance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: Verify secret rotation metadata age
        env:
          SECRET_ROTATION_PROVIDERS: ${{ secrets.SECRET_ROTATION_PROVIDERS }}
          SECRET_ROTATION_MAX_AGE_DAYS: ${{ secrets.SECRET_ROTATION_MAX_AGE_DAYS }}
          AWS_REGION: ${{ secrets.SECRET_ROTATION_AWS_REGION }}
          AWS_SECRET_IDS: ${{ secrets.SECRET_ROTATION_AWS_SECRET_IDS }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SECRET_ROTATION_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ROTATION_AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.SECRET_ROTATION_AWS_SESSION_TOKEN }}
          VAULT_ADDR: ${{ secrets.SECRET_ROTATION_VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.SECRET_ROTATION_VAULT_TOKEN }}
          VAULT_KV_MOUNT: ${{ secrets.SECRET_ROTATION_VAULT_KV_MOUNT }}
          VAULT_SECRET_PATHS: ${{ secrets.SECRET_ROTATION_VAULT_SECRET_PATHS }}
          ROTATION_EVIDENCE_DIR: artifacts/security/rotation
          ROTATION_EVIDENCE_TIMESTAMP: rotation-evidence-latest
        run: node scripts/security/verify-secret-rotation.mjs

      - name: Upload secret rotation evidence artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: secret-rotation-evidence-${{ github.run_id }}
          path: artifacts/security/rotation/rotation-evidence-latest.json
          if-no-files-found: error
          retention-days: 90

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/verify-secret-rotation-metadata-age
          cat > artifacts/ci-lanes/verify-secret-rotation-metadata-age/summary.md <<EOF
          # verify-secret-rotation-metadata-age
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          - evidence_path: artifacts/security/rotation/rotation-evidence-latest.json
          EOF

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lane-verify-secret-rotation-metadata-age-${{ github.run_id }}
          path: artifacts/ci-lanes/verify-secret-rotation-metadata-age/**
          if-no-files-found: warn
          retention-days: 30

  # DAST gate: OWASP ZAP baseline scan against deterministic staging target
  dast-gate:
    name: dast-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    env:
      DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL != '' && vars.DAST_TARGET_URL || 'https://staging.valueos.app' }}
      DAST_FAIL_ON_HIGH: "0"
      DAST_FAIL_ON_MEDIUM: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p artifacts/dast
          docker run --rm \
            -v "${PWD}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${DAST_TARGET_URL}" \
            -J /zap/wrk/artifacts/dast/zap-report.json \
            -r /zap/wrk/artifacts/dast/zap-report.html \
            -w /zap/wrk/artifacts/dast/zap-report.md \
            -m 5 -d || true

      - name: Enforce DAST severity thresholds
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          report_path = pathlib.Path("artifacts/dast/zap-report.json")
          summary_path = pathlib.Path("artifacts/dast/dast-summary.md")
          if not report_path.exists():
            summary_path.write_text("# DAST Gate Summary\n\n- status: failed\n- reason: zap-report.json not generated\n", encoding="utf-8")
            print("Missing ZAP JSON report", file=sys.stderr)
            sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          sites = report.get("site", [])
          counts = {"high": 0, "medium": 0, "low": 0, "info": 0}
          severity_map = {"3": "high", "2": "medium", "1": "low", "0": "info"}

          for site in sites:
            for alert in site.get("alerts", []):
              severity = severity_map.get(str(alert.get("riskcode", "0")), "info")
              counts[severity] += 1

          max_high = int(os.environ.get("DAST_FAIL_ON_HIGH", "0"))
          max_medium = int(os.environ.get("DAST_FAIL_ON_MEDIUM", "0"))

          breached = []
          if counts["high"] > max_high:
            breached.append(f"high({counts['high']} > {max_high})")
          if counts["medium"] > max_medium:
            breached.append(f"medium({counts['medium']} > {max_medium})")

          status = "failed" if breached else "passed"
          lines = [
            "# DAST Gate Summary",
            "",
            f"- target: {os.environ.get('DAST_TARGET_URL', '')}",
            f"- status: {status}",
            f"- thresholds: high<={max_high}, medium<={max_medium}",
            f"- findings: high={counts['high']}, medium={counts['medium']}, low={counts['low']}, info={counts['info']}",
          ]
          if breached:
            lines.append(f"- breached: {', '.join(breached)}")

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if breached:
            print(f"DAST threshold breached: {', '.join(breached)}", file=sys.stderr)
            sys.exit(1)
          PY

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dast-gate-${{ github.run_id }}
          path: |
            artifacts/dast/zap-report.json
            artifacts/dast/zap-report.html
            artifacts/dast/zap-report.md
            artifacts/dast/dast-summary.md
          if-no-files-found: warn
          retention-days: 30

      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/dast-gate
          cat > artifacts/ci-lanes/dast-gate/summary.md <<EOF
          # dast-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          - target: ${{ env.DAST_TARGET_URL }}
          EOF

  # PR gate: blocks merge until critical lanes pass

  pr-fast-blocking-subsets:
    name: pr-fast-blocking-subsets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - unit-component-schema
      - tenant-isolation-gate
      - security-gate
      - dast-gate
      - verify-secret-rotation-metadata-age
      - accessibility-audit
      - ui-truthfulness-gate
    steps:
      - name: Enforce PR blockers
        run: |
          echo "workflow=${{ github.workflow }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"
          echo "workflow_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          for lane in \
            "unit-component-schema:${{ needs.unit-component-schema.result }}" \
            "tenant-isolation-gate:${{ needs.tenant-isolation-gate.result }}" \
            "security-gate:${{ needs.security-gate.result }}" \
            "dast-gate:${{ needs.dast-gate.result }}" \
            "verify-secret-rotation-metadata-age:${{ needs.verify-secret-rotation-metadata-age.result }}" \
            "accessibility-audit:${{ needs.accessibility-audit.result }}" \
            "ui-truthfulness-gate:${{ needs.ui-truthfulness-gate.result }}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Failing PR gate due to lane status: $lane"
              exit 1
            fi
          done

  error-budget-release-gate:
    name: error-budget release gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Enforce SLO error budget policy
        env:
          PROMETHEUS_BASE_URL: ${{ secrets.PROMETHEUS_STAGING_URL }}
          PROMETHEUS_BEARER_TOKEN: ${{ secrets.PROMETHEUS_STAGING_TOKEN }}
          SLO_FAST_BURN_THRESHOLD: "14.4"
          SLO_SLOW_BURN_THRESHOLD: "6"
          SLO_GATE_OUTPUT_DIR: artifacts/slo-gate
        run: |
          if [ -z "${PROMETHEUS_BASE_URL}" ]; then
            echo "PROMETHEUS_STAGING_URL secret is required for release gate"
            exit 1
          fi
          bash scripts/ci/observability-slo-gate.sh

      - name: Upload SLO gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-error-budget-gate-${{ github.run_id }}
          path: |
            artifacts/slo-gate/slo-gate-report.json
            artifacts/slo-gate/slo-gate-summary.md
          if-no-files-found: warn

  staging-deploy-release-gates:
    name: staging/deploy release gates
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    needs:
      - migration-verification
      - critical-workflows-gate
      - security-gate
      - dast-gate
      - verify-secret-rotation-metadata-age
      - accessibility-audit
      - error-budget-release-gate
    steps:
      - name: Enforce staging/deploy blockers
        run: |
          echo "workflow=${{ github.workflow }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"
          echo "workflow_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          for lane in \
            "migration-verification:${{ needs.migration-verification.result }}" \
            "critical-workflows-gate:${{ needs.critical-workflows-gate.result }}" \
            "security-gate:${{ needs.security-gate.result }}" \
            "dast-gate:${{ needs.dast-gate.result }}" \
            "verify-secret-rotation-metadata-age:${{ needs.verify-secret-rotation-metadata-age.result }}" \
            "accessibility-audit:${{ needs.accessibility-audit.result }}" \
            "error-budget-release-gate:${{ needs.error-budget-release-gate.result }}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Failing release gate due to lane status: $lane"
              exit 1
            fi
          done
