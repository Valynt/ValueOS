name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  release:
    types: [published]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-component-schema:
    name: unit/component/schema
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Lint + Typecheck
        run: |
          npx turbo run lint
          npx turbo run typecheck
      - name: Unit suite + schema guard
        run: |
          npx vitest run --coverage --coverage.thresholds.lines=60 --coverage.thresholds.functions=50 --coverage.thresholds.branches=50 --coverage.thresholds.statements=60
          node scripts/ci/check-migration-hygiene.mjs
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/unit-component-schema
          cat > artifacts/ci-lanes/unit-component-schema/summary.md <<EOF
          # unit/component/schema
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-unit-component-schema-${{ github.run_id }}
          path: |
            coverage/**
            artifacts/ci-lanes/unit-component-schema/**
          if-no-files-found: warn
          retention-days: 30

  tenant-isolation-gate:
    name: tenant-isolation-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Tenant isolation + compliance tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p reports/tenant-isolation
          npx vitest run tests/security/rls-tenant-isolation.test.ts tests/integration/workflow_rls.integration.test.ts \
            --reporter=verbose \
            --reporter=junit \
            --outputFile.junit=reports/tenant-isolation/vitest.junit.xml
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/tenant-isolation-gate
          cat > artifacts/ci-lanes/tenant-isolation-gate/summary.md <<EOF
          # tenant-isolation-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - sha: ${{ github.sha }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-tenant-isolation-gate-${{ github.run_id }}
          path: |
            reports/tenant-isolation/**
            artifacts/ci-lanes/tenant-isolation-gate/**
          if-no-files-found: warn
          retention-days: 30

  critical-workflows-gate:
    name: critical-workflows-gate
    runs-on: ubuntu-latest
    needs:
      - unit-component-schema
      - tenant-isolation-gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Critical workflow contracts
        run: |
          node scripts/ci/verify-critical-claims.mjs
          pnpm exec vitest run packages/backend/src/__tests__/versioning.contract.test.ts apps/ValyntApp/src/backend/__tests__/versioning.contract.test.ts
      - name: Reload durability + chaos smoke
        run: |
          node --test tests/integration/multi-tenant-chaos-invariants.test.mjs
          node scripts/chaos/launch-chaos-smoke.mjs
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/critical-workflows-gate
          cat > artifacts/ci-lanes/critical-workflows-gate/summary.md <<EOF
          # critical-workflows-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - upstream_unit_component_schema: ${{ needs.unit-component-schema.result }}
          - upstream_tenant_isolation: ${{ needs.tenant-isolation-gate.result }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-critical-workflows-gate-${{ github.run_id }}
          path: |
            artifacts/chaos-launch/**
            artifacts/ci-lanes/critical-workflows-gate/**
          if-no-files-found: warn
          retention-days: 30

  ui-truthfulness-gate:
    name: ui-truthfulness-gate
    runs-on: ubuntu-latest
    needs:
      - unit-component-schema
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Truthfulness checks
        run: |
          node scripts/ci/check-i18n-keys.mjs --json-out artifacts/i18n/coverage-dashboard.json
          node scripts/ci/check-pseudo-localization.mjs --json-out artifacts/i18n/pseudo-localization-report.json
      - name: Localization visual smoke
        run: |
          if [ -x ./node_modules/.bin/playwright ]; then
            ./node_modules/.bin/playwright test scripts/test/playwright/visual-regression.spec.ts --grep "Localization Overflow"
          else
            echo "Playwright binary not installed; skipping localization overflow visual regression in this environment."
          fi
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/ui-truthfulness-gate
          cat > artifacts/ci-lanes/ui-truthfulness-gate/summary.md <<EOF
          # ui-truthfulness-gate
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - upstream_unit_component_schema: ${{ needs.unit-component-schema.result }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-ui-truthfulness-gate-${{ github.run_id }}
          path: |
            artifacts/i18n/**
            artifacts/ci-lanes/ui-truthfulness-gate/**
          if-no-files-found: warn
          retention-days: 30

  migration-verification:
    name: migration-verification
    runs-on: ubuntu-latest
    needs:
      - unit-component-schema
      - tenant-isolation-gate
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Migration verification gates
        run: |
          node scripts/ci/check-migration-hygiene.mjs
          node scripts/ci/verify-critical-architecture-migrations.mjs
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/migration-verification
          cat > artifacts/ci-lanes/migration-verification/summary.md <<EOF
          # migration-verification
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - upstream_unit_component_schema: ${{ needs.unit-component-schema.result }}
          - upstream_tenant_isolation: ${{ needs.tenant-isolation-gate.result }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-migration-verification-${{ github.run_id }}
          path: artifacts/ci-lanes/migration-verification/**
          retention-days: 30

  nightly-matrix-chaos-replay:
    name: nightly matrix/chaos/replay
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19.0, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Chaos + replay workload
        run: |
          node scripts/chaos/launch-chaos-smoke.mjs
          npx vitest run tests/integration/security-flows.test.ts tests/integration/message-bus-communication.test.ts --reporter=verbose
      - name: Emit lane summary
        if: always()
        run: |
          mkdir -p artifacts/ci-lanes/nightly-matrix-chaos-replay/${{ matrix.node-version }}
          cat > artifacts/ci-lanes/nightly-matrix-chaos-replay/${{ matrix.node-version }}/summary.md <<EOF
          # nightly matrix/chaos/replay
          - workflow: ${{ github.workflow }}
          - run_id: ${{ github.run_id }}
          - run_attempt: ${{ github.run_attempt }}
          - lane_status: ${{ job.status }}
          - node_version: ${{ matrix.node-version }}
          EOF
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-nightly-matrix-chaos-replay-${{ matrix.node-version }}-${{ github.run_id }}
          path: |
            artifacts/chaos-launch/**
            artifacts/ci-lanes/nightly-matrix-chaos-replay/${{ matrix.node-version }}/**
          if-no-files-found: warn
          retention-days: 30

  pr-fast-blocking-subsets:
    name: PR fast blocking subsets
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs:
      - unit-component-schema
      - tenant-isolation-gate
      - ui-truthfulness-gate
      - migration-verification
    steps:
      - name: Enforce PR release blockers
        run: |
          echo "workflow=${{ github.workflow }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"
          for lane in \
            "unit-component-schema:${{ needs.unit-component-schema.result }}" \
            "tenant-isolation-gate:${{ needs.tenant-isolation-gate.result }}" \
            "ui-truthfulness-gate:${{ needs.ui-truthfulness-gate.result }}" \
            "migration-verification:${{ needs.migration-verification.result }}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Failing PR gate due to lane status: $lane"
              exit 1
            fi
          done

  staging-deploy-release-gates:
    name: staging/deploy release gates
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    needs:
      - critical-workflows-gate
      - migration-verification
    steps:
      - name: Enforce staging/deploy blockers
        run: |
          echo "workflow=${{ github.workflow }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"
          for lane in \
            "critical-workflows-gate:${{ needs.critical-workflows-gate.result }}" \
            "migration-verification:${{ needs.migration-verification.result }}"; do
            echo "$lane"
            status="${lane#*:}"
            if [ "$status" != "success" ] && [ "$status" != "skipped" ]; then
              echo "Failing release gate due to lane status: $lane"
              exit 1
            fi
          done
