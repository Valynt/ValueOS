name: Build Agent Images

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "packages/agents/**"
      - "infra/docker/**"
      - ".github/workflows/build-agent-images.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "packages/agents/**"
      - "infra/docker/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      agent_type:
        description: "Specific agent type to build (leave empty for all)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

jobs:
  build-agent:
    name: Build ${{ matrix.agent_type }} Agent Image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent_type:
          - opportunity
          - target
          - realization
          - expansion
          - integrity
          - company-intelligence
          - financial-modeling
          - value-mapping
          - system-mapper
          - intervention-designer
          - outcome-engineer
          - coordinator
          - value-eval
          - communicator
          - research
          - benchmark
          - narrative
          - groundtruth
        exclude:
          # Exclude specific agents if needed
          - agent_type: ${{ github.event.inputs.agent_type }}
            # Only build specific agent if specified in workflow_dispatch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/valuecanvas-${{ matrix.agent_type }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Copy Dockerfile template
        run: |
          mkdir -p packages/agents/${{ matrix.agent_type }}
          cp packages/agents/base/Dockerfile.template packages/agents/${{ matrix.agent_type }}/Dockerfile
          # Customize Dockerfile if needed (e.g., replace placeholders)

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/agents/${{ matrix.agent_type }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          scan-ref: ${{ env.ECR_REGISTRY }}/valuecanvas-${{ matrix.agent_type }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Check vulnerability threshold
        run: |
          # Parse Trivy results and fail if critical vulnerabilities found
          if [ -f trivy-results.sarif ]; then
            critical_count=$(jq '.runs[0].results[] | select(.level == "error") | .message.text' trivy-results.sarif | wc -l)
            if [ "$critical_count" -gt 0 ]; then
              echo "Found $critical_count critical vulnerabilities"
              exit 1
            fi
          fi

  deploy-staging:
    name: Deploy to Staging
    needs: build-agent
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update staging deployments
        run: |
          # Use kubectl or helm to update agent deployments in staging
          # This would trigger rolling updates for all agents
          echo "Deploying agents to staging..."
          # Placeholder for actual deployment commands

  deploy-production:
    name: Deploy to Production
    needs: build-agent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update production deployments
        run: |
          # Use kubectl or helm to update agent deployments in production
          # This would trigger rolling updates for all agents
          echo "Deploying agents to production..."
          # Placeholder for actual deployment commands
