# LEGACY WRAPPER — canonical compose lives in ops/compose/.
# Thin passthrough wrapper for backward compatibility only.
# Optional stacks are available under ops/compose/profiles/*.yml.

include:
  - ../ops/compose/compose.yml

services:
  backend:
    environment:
      # Canonical database connection string.
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.local}
      # Legacy alias for older tooling; keep this derived from DATABASE_URL only.
      DB_URL: ${DB_URL:-${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.local}}
