# HA Load Balancer Configuration
# Nginx with upstream health checks, failover, and geographic routing

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enhanced logging for HA monitoring
    log_format ha_main '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'upstream_addr=$upstream_addr upstream_status=$upstream_status';

    log_format health '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent rt=$request_time';

    access_log /var/log/nginx/access.log ha_main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=health:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;

    # Upstream configuration for frontend instances
    upstream frontend_cluster {
        least_conn;
        server frontend-primary:8080 max_fails=3 fail_timeout=30s weight=3;
        server frontend-secondary:8080 max_fails=3 fail_timeout=30s weight=2;
        keepalive 32;
    }

    # Backend upstream with health checks
    upstream backend_cluster {
        least_conn;
        server backend:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Geo-based routing map
    geo $geo_region {
        default default;
        192.168.1.0/24 us-east;
        10.0.0.0/8 eu-west;
        172.16.0.0/12 ap-southeast;
    }

    # Map region to upstream
    map $geo_region $frontend_upstream {
        us-east frontend-primary;
        eu-west frontend-secondary;
        default frontend_cluster;
    }

    # Health check configuration
    upstream health_check {
        server 127.0.0.1:80; # Dummy for health checks
    }

    # Main server block
    server {
        listen 80;
        server_name _;
        
        # Global rate limiting
        limit_req zone=global burst=1000 nodelay;

        # Health check endpoint for load balancer
        location /lb-health {
            limit_req zone=health burst=5 nodelay;
            access_log /var/log/nginx/health.log health;
            return 200 "OK";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache";
        }

        # Application health check
        location = /health {
            limit_req zone=health burst=5 nodelay;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Health check response validation
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }

        # Maintenance mode check
        location = /maintenance-status {
            internal;
            proxy_pass http://$frontend_upstream/maintenance;
            proxy_intercept_errors on;
            error_page 502 503 504 = @maintenance_active;
        }

        location @maintenance_active {
            return 503 "Maintenance Mode Active";
            add_header Content-Type text/plain;
        }

        # Static assets with CDN caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webm|mp4)$ {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Cache settings
            proxy_cache_valid 200 1y;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            
            # CDN headers
            add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=86400, stale-if-error=604800";
            add_header X-CDN-Cache-Status "HIT";
            add_header X-Geo-Region $geo_region;
        }

        # API proxy with enhanced failover
        location /api {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Geo-Region $geo_region;
            
            # Enhanced timeout and retry settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Retry configuration
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 /api-failover;
        }

        # API failover endpoint
        location = /api-failover {
            internal;
            root /usr/share/nginx/html/error-pages;
            try_files /503-api.html =503;
            
            add_header Content-Type application/json;
            return 503 '{"error":"Service temporarily unavailable","retry":true}';
        }

        # WebSocket proxy
        location /ws {
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific settings
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 5s;
            proxy_buffering off;
        }

        # Application routes with failover
        location / {
            # Check maintenance mode first
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Geo-Region $geo_region;
            
            # Failover settings
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
            
            # Cache settings for HTML
            proxy_cache_valid 200 1h;
            proxy_cache_valid 404 1m;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        # Fallback handling
        location @fallback {
            # Try maintenance page first
            try_files /usr/share/nginx/html/error-pages/503.html =503;
            
            add_header Content-Type text/html;
            add_header Retry-After "30";
        }

        # Error pages
        error_page 404 /usr/share/nginx/html/error-pages/404.html;
        error_page 500 502 503 504 /usr/share/nginx/html/error-pages/503.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Geo-Region $geo_region always;
    }

    # HTTPS server (if SSL certificates are available)
    server {
        listen 443 ssl http2;
        server_name _;
        
        # SSL configuration (placeholder)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Include same location blocks as HTTP
        include /etc/nginx/conf.d/locations/*.conf;
    }
}
