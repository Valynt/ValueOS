# HA Server Configuration for ValueOS Frontend
# Includes health checks, failover, and CDN integration

server {
    listen 8080;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Enhanced security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health check endpoint with rate limiting
    location /health {
        limit_req zone=health burst=5 nodelay;
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Readiness probe for Kubernetes
    location /ready {
        limit_req zone=health burst=5 nodelay;
        access_log off;
        try_files $uri $uri/ /index.html;
        add_header Content-Type text/plain;
        if ($uri = /ready) {
            return 200 "ready\n";
        }
    }

    # Liveness probe with deeper checks
    location /live {
        limit_req zone=health burst=5 nodelay;
        access_log off;
        # Check if critical files exist
        if (!-f $document_root/index.html) {
            return 503 "Service Unavailable\n";
        }
        # Check if nginx is running properly
        return 200 "live\n";
        add_header Content-Type text/plain;
    }

    # Maintenance mode endpoint
    location /maintenance {
        internal;
        root /usr/share/nginx/html;
        try_files /maintenance.html =503;
    }

    # Static assets with aggressive caching and CDN headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webm|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-CDN-Cache-Status "HIT";
        add_header X-Content-Digest "";
        
        # Bypass cache for development
        if ($http_x_forwarded_proto = "http") {
            add_header Cache-Control "public, max-age=300";
        }
        
        # Enable stale-while-revalidate for CDN
        add_header Cache-Control "public, max-age=31536000, stale-while-revalidate=86400, stale-if-error=604800";
        
        # CORS for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # HTML files with shorter cache for updates
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate, stale-while-revalidate=300";
    }

    # API proxy with enhanced error handling and retries
    location /api {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Enhanced timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Retry configuration
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 /api-unavailable;
    }

    # API unavailable fallback
    location = /api-unavailable {
        internal;
        root /usr/share/nginx/html/error-pages;
        try_files /503.html =503;
    }

    # WebSocket proxy with enhanced settings
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific settings
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 5s;
        
        # Buffering disabled for WebSocket
        proxy_buffering off;
    }

    # Metrics endpoint for monitoring
    location /metrics {
        deny all;
        return 404;
    }

    # Application state endpoint for load balancer
    location /app-state {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","version":"$http_host"}';
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache";
    }

    # Error pages with custom responses
    error_page 404 /error-pages/404.html;
    error_page 500 502 503 504 /error-pages/503.html;

    location = /error-pages/404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /error-pages/503.html {
        root /usr/share/nginx/html;
        internal;
    }

    # SPA fallback with error handling
    location / {
        try_files $uri $uri/ @fallback;
    }

    location @fallback {
        # Check if maintenance mode should be enabled
        if (-f $document_root/maintenance.enabled) {
            return 503;
        }
        
        try_files /index.html =503;
        
        # Add cache control for SPA
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Handle maintenance mode
    if (-f $document_root/maintenance.enabled) {
        return 503;
    }

    # Custom error handling for 503 (maintenance/unavailable)
    error_page 503 @maintenance;
    
    location @maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html /error-pages/503.html =503;
    }
}
