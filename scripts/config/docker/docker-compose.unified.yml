version: "3.8"

services:
  # PostgreSQL database with enhanced health checks
  postgres:
    image: postgres:15-alpine
    container_name: valueos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valuecanvas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-valuecanvas_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - valueos-net
    restart: unless-stopped
    labels:
      - "com.valueos.service=database"
      - "com.valueos.tier=storage"

  # Redis with persistence and health checks
  redis:
    image: redis:7-alpine
    container_name: valueos-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - valueos-net
    restart: unless-stopped
    labels:
      - "com.valueos.service=cache"
      - "com.valueos.tier=storage"

  # Backend API with health checks and monitoring
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: valueos-backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-valuecanvas_dev}
      - REDIS_URL=redis://redis:6379
      - API_PORT=3001
      - LOG_LEVEL=info
    env_file:
      - .env.ports
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - valueos-net
    restart: unless-stopped
    labels:
      - "com.valueos.service=backend"
      - "com.valueos.tier=application"

  # Frontend development server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: valueos-frontend
    environment:
      - VITE_API_BASE_URL=http://backend:${API_PORT:-3001}
      - VITE_HOST=0.0.0.0
      - VITE_PORT=5173
    env_file:
      - .env.ports
      - .env.local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./vite.config.ts:/app/vite.config.ts
      - node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - valueos-net
    restart: unless-stopped
    labels:
      - "com.valueos.service=frontend"
      - "com.valueos.tier=application"

  # Observability stack (optional, enabled via profile)
  prometheus:
    image: prom/prometheus:latest
    container_name: valueos-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - valueos-net
    profiles: ["observability"]
    restart: unless-stopped
    labels:
      - "com.valueos.service=monitoring"
      - "com.valueos.tier=observability"

  grafana:
    image: grafana/grafana:latest
    container_name: valueos-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - valueos-net
    profiles: ["observability"]
    restart: unless-stopped
    labels:
      - "com.valueos.service=monitoring"
      - "com.valueos.tier=observability"

networks:
  valueos-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    labels:
      - "com.valueos.network=development"

volumes:
  postgres_data:
    driver: local
    labels:
      - "com.valueos.volume=database"
  redis_data:
    driver: local
    labels:
      - "com.valueos.volume=cache"
  prometheus_data:
    driver: local
    labels:
      - "com.valueos.volume=metrics"
  grafana_data:
    driver: local
    labels:
      - "com.valueos.volume=dashboard"
  node_modules:
    driver: local
    labels:
      - "com.valueos.volume=dependencies"
