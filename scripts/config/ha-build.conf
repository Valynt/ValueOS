# HA Build Configuration
# Configure dual registry setup and build parameters

# Primary Container Registry (US-East)
PRIMARY_REGISTRY="docker.io/valueos"
PRIMARY_REGISTRY_URL="https://index.docker.io/v1/"

# Secondary Container Registry (Europe-West)  
SECONDARY_REGISTRY="ghcr.io/valueos"
SECONDARY_REGISTRY_URL="https://ghcr.io"

# Image Configuration
IMAGE_NAME="valueos-frontend"
BUILD_PLATFORM="linux/amd64,linux/arm64"

# Build Settings
ENABLE_SECURITY_SCAN=true
ENABLE_VULNERABILITY_SCAN=true
HEALTH_CHECK_TIMEOUT=30
HEALTH_CHECK_RETRIES=3

# Registry Credentials (set in environment or CI/CD)
# PRIMARY_REGISTRY_USERNAME=
# PRIMARY_REGISTRY_PASSWORD=
# SECONDARY_REGISTRY_USERNAME=
# SECONDARY_REGISTRY_PASSWORD=

# LKG (Last Known Good) Settings
LKG_RETENTION_DAYS=30
LKG_MAX_VERSIONS=10
ENABLE_AUTO_ROLLBACK=true
ROLLBACK_THRESHOLD=3

# Geographic Distribution
REGIONS="us-east-1,eu-west-1,ap-southeast-1"
CDN_ENABLED=true
CDN_PROVIDER="cloudflare"

# Monitoring and Alerting
ENABLE_BUILD_NOTIFICATIONS=true
SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL:-}"
ENABLE_PROMETHEUS_METRICS=true
METRICS_PORT=9090
