name: Apply Supabase Migration

on:
  workflow_dispatch:

jobs:
  apply-migration:
    name: Apply migration via psql
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply SQL migration
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing SUPABASE_DATABASE_URL secret. Set this to the target Postgres connection string.";
            exit 1;
          fi
          echo "Applying migration infra/supabase/migrations/20260128120000_add_idx_opportunities_value_case_tenant.sql";
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/supabase/migrations/20260128120000_add_idx_opportunities_value_case_tenant.sql

      - name: Verify index exists (quick check)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -c "\dt public.opportunities" || true

      - name: Done
        run: echo "Migration applied (if psql connected)."
