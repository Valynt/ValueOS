name: Canary Deployment to Production

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: "Image digest to deploy (from build-once-promote)"
        required: true
      canary_percentage:
        description: "Initial canary percentage (1-100)"
        required: false
        default: "10"
        type: choice
        options:
          - "5"
          - "10"
          - "25"
          - "50"
      auto_promote:
        description: "Auto-promote if metrics are healthy"
        type: boolean
        default: true
      canary_target_group:
        description: "Target group name for canary deployment"
        required: false
        default: "valuecanvas-canary"
      stable_target_group:
        description: "Target group name for stable deployment"
        required: false
        default: "valuecanvas-stable"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  # Stage 1: Deploy canary
  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    environment:
      name: production-canary
      url: https://app.valuecanvas.app
    outputs:
      canary_deployed: ${{ steps.deploy.outputs.deployed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-prod-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Create canary deployment
        id: deploy
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: valuecanvas-app-canary
            namespace: production
            labels:
              app: valuecanvas
              version: canary
          spec:
            replicas: 1  # Start with 1 replica
            selector:
              matchLabels:
                app: valuecanvas
                version: canary
            template:
              metadata:
                labels:
                  app: valuecanvas
                  version: canary
                annotations:
                  prometheus.io/scrape: "true"
                  prometheus.io/port: "3000"
                  prometheus.io/path: "/metrics"
              spec:
                containers:
                - name: app
                  image: ${{ github.event.inputs.image_digest }}
                  ports:
                  - containerPort: 3000
                    name: http
                  envFrom:
                  - secretRef:
                      name: valuecanvas-secrets
                  env:
                  - name: DEPLOYMENT_TYPE
                    value: "canary"
                  - name: CANARY_PERCENTAGE
                    value: "${{ github.event.inputs.canary_percentage }}"
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "500m"
                    limits:
                      memory: "1Gi"
                      cpu: "1000m"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 3000
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 3000
                    initialDelaySeconds: 10
                    periodSeconds: 5
          EOF

          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Wait for canary rollout
        run: |
          kubectl rollout status deployment/valuecanvas-app-canary \
            --namespace=production \
            --timeout=5m

      - name: Configure traffic split
        run: |
          # Update Istio VirtualService for traffic splitting
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: VirtualService
          metadata:
            name: valuecanvas-app
            namespace: production
          spec:
            hosts:
            - app.valuecanvas.app
            http:
            - match:
              - headers:
                  x-canary:
                    exact: "true"
              route:
              - destination:
                  host: valuecanvas-app
                  subset: canary
                weight: 100
            - route:
              - destination:
                  host: valuecanvas-app
                  subset: stable
                weight: ${{ 100 - github.event.inputs.canary_percentage }}
              - destination:
                  host: valuecanvas-app
                  subset: canary
                weight: ${{ github.event.inputs.canary_percentage }}
          ---
          apiVersion: networking.istio.io/v1beta1
          kind: DestinationRule
          metadata:
            name: valuecanvas-app
            namespace: production
          spec:
            host: valuecanvas-app
            subsets:
            - name: stable
              labels:
                version: stable
            - name: canary
              labels:
                version: canary
          EOF

      - name: Verify canary traffic
        run: |
          echo "Verifying canary receives traffic..."

          # Test canary endpoint
          for i in {1..10}; do
            curl -H "x-canary: true" https://app.valuecanvas.app/health
            sleep 1
          done

          echo "✅ Canary is receiving traffic"

      - name: Output canary details
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🐤 Canary Deployment Started

          **Image:** \`${{ github.event.inputs.image_digest }}\`
          **Canary %:** ${{ github.event.inputs.canary_percentage }}%
          **Auto-promote:** ${{ github.event.inputs.auto_promote }}

          ## Traffic Split
          - Stable: ${{ 100 - github.event.inputs.canary_percentage }}%
          - Canary: ${{ github.event.inputs.canary_percentage }}%

          ## Monitoring
          - [Grafana Dashboard](https://grafana.valuecanvas.app/d/canary)
          - [Datadog APM](https://app.datadoghq.com/apm/services)

          ## Next Steps
          1. Monitor metrics for 10 minutes
          2. Auto-promote if healthy (or manual approval)
          3. Gradually increase traffic
          EOF

  # Stage 2: Monitor canary metrics
  monitor-canary:
    name: Monitor Canary Metrics
    runs-on: ubuntu-latest
    needs: deploy-canary
    if: needs.deploy-canary.outputs.canary_deployed == 'true'
    outputs:
      metrics_healthy: ${{ steps.evaluate.outputs.healthy }}
      error_rate: ${{ steps.metrics.outputs.error_rate }}
      latency_p99: ${{ steps.metrics.outputs.latency_p99 }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Monitor for 10 minutes
        run: |
          echo "Monitoring canary metrics for 10 minutes..."
          sleep 600

      - name: Collect metrics
        id: metrics
        run: |
          # Query CloudWatch for error rate
          ERROR_RATE=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/ApplicationELB \
            --metric-name HTTPCode_Target_5XX_Count \
            --dimensions Name=TargetGroup,Value=${{ github.event.inputs.canary_target_group }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 600 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text)

          # Query for latency
          LATENCY_P99=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/ApplicationELB \
            --metric-name TargetResponseTime \
            --dimensions Name=TargetGroup,Value=${{ github.event.inputs.canary_target_group }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 600 \
            --statistics p99 \
            --query 'Datapoints[0].ExtendedStatistics.p99' \
            --output text)

          echo "error_rate=${ERROR_RATE}" >> $GITHUB_OUTPUT
          echo "latency_p99=${LATENCY_P99}" >> $GITHUB_OUTPUT

      - name: Compare with stable
        id: compare
        run: |
          # Get stable metrics
          STABLE_ERROR_RATE=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/ApplicationELB \
            --metric-name HTTPCode_Target_5XX_Count \
            --dimensions Name=TargetGroup,Value=${{ github.event.inputs.stable_target_group }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 600 \
            --statistics Sum \
            --query 'Datapoints[0].Sum' \
            --output text)

          STABLE_LATENCY=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/ApplicationELB \
            --metric-name TargetResponseTime \
            --dimensions Name=TargetGroup,Value=${{ github.event.inputs.stable_target_group }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 600 \
            --statistics p99 \
            --query 'Datapoints[0].ExtendedStatistics.p99' \
            --output text)

          echo "stable_error_rate=${STABLE_ERROR_RATE}" >> $GITHUB_OUTPUT
          echo "stable_latency=${STABLE_LATENCY}" >> $GITHUB_OUTPUT

      - name: Evaluate health
        id: evaluate
        run: |
          CANARY_ERRORS=${{ steps.metrics.outputs.error_rate }}
          STABLE_ERRORS=${{ steps.compare.outputs.stable_error_rate }}
          CANARY_LATENCY=${{ steps.metrics.outputs.latency_p99 }}
          STABLE_LATENCY=${{ steps.compare.outputs.stable_latency }}

          # Health criteria
          HEALTHY=true

          # Check error rate (canary should not exceed stable by >20%)
          if awk -v ce="$CANARY_ERRORS" -v se="$STABLE_ERRORS" 'BEGIN { exit !(ce > se * 1.2) }'; then
            echo "❌ Canary error rate too high: $CANARY_ERRORS vs $STABLE_ERRORS"
            HEALTHY=false
          fi

          # Check latency (canary should not exceed stable by >20%)
          if awk -v cl="$CANARY_LATENCY" -v sl="$STABLE_LATENCY" 'BEGIN { exit !(cl > sl * 1.2) }'; then
            echo "❌ Canary latency too high: $CANARY_LATENCY vs $STABLE_LATENCY"
            HEALTHY=false
          fi

          # Check absolute thresholds
          if awk -v ce="$CANARY_ERRORS" 'BEGIN { exit !(ce > 10) }'; then
            echo "❌ Canary error count exceeds threshold: $CANARY_ERRORS"
            HEALTHY=false
          fi

          if awk -v cl="$CANARY_LATENCY" 'BEGIN { exit !(cl > 2.0) }'; then
            echo "❌ Canary latency exceeds threshold: ${CANARY_LATENCY}s"
            HEALTHY=false
          fi

          if [ "$HEALTHY" == "true" ]; then
            echo "✅ Canary metrics are healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Canary metrics are unhealthy"
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate metrics report
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 📊 Canary Metrics Report

          ## Canary vs Stable

          | Metric | Canary | Stable | Status |
          |--------|--------|--------|--------|
          | Error Rate | ${{ steps.metrics.outputs.error_rate }} | ${{ steps.compare.outputs.stable_error_rate }} | ${{ steps.evaluate.outputs.healthy == 'true' && '✅' || '❌' }} |
          | Latency (p99) | ${{ steps.metrics.outputs.latency_p99 }}s | ${{ steps.compare.outputs.stable_latency }}s | ${{ steps.evaluate.outputs.healthy == 'true' && '✅' || '❌' }} |

          ## Health Status

          ${{ steps.evaluate.outputs.healthy == 'true' && '✅ **HEALTHY** - Ready for promotion' || '❌ **UNHEALTHY** - Rollback recommended' }}
          EOF

  # Stage 3: Promote or rollback
  promote-or-rollback:
    name: Promote or Rollback
    runs-on: ubuntu-latest
    needs: [deploy-canary, monitor-canary]
    if: always() && needs.deploy-canary.outputs.canary_deployed == 'true'
    environment:
      name: production
      url: https://app.valuecanvas.app

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name valuecanvas-prod-cluster \
            --region ${{ env.AWS_REGION }}

      - name: Decide action
        id: decision
        run: |
          HEALTHY="${{ needs.monitor-canary.outputs.metrics_healthy }}"
          AUTO_PROMOTE="${{ github.event.inputs.auto_promote }}"

          if [ "$HEALTHY" == "true" ] && [ "$AUTO_PROMOTE" == "true" ]; then
            echo "action=promote" >> $GITHUB_OUTPUT
          elif [ "$HEALTHY" == "false" ]; then
            echo "action=rollback" >> $GITHUB_OUTPUT
          else
            echo "action=manual" >> $GITHUB_OUTPUT
          fi

      - name: Promote canary to stable
        if: steps.decision.outputs.action == 'promote'
        run: |
          echo "🚀 Promoting canary to stable..."

          # Update stable deployment with canary image
          kubectl set image deployment/valuecanvas-app \
            app=${{ github.event.inputs.image_digest }} \
            --namespace=production \
            --record

          # Wait for rollout
          kubectl rollout status deployment/valuecanvas-app \
            --namespace=production \
            --timeout=10m

          # Remove canary deployment
          kubectl delete deployment valuecanvas-app-canary \
            --namespace=production

          # Reset traffic to 100% stable
          kubectl delete virtualservice valuecanvas-app \
            --namespace=production

          echo "✅ Canary promoted to stable"

      - name: Rollback canary
        if: steps.decision.outputs.action == 'rollback'
        run: |
          echo "⚠️ Rolling back canary..."

          # Delete canary deployment
          kubectl delete deployment valuecanvas-app-canary \
            --namespace=production

          # Reset traffic to 100% stable
          kubectl delete virtualservice valuecanvas-app \
            --namespace=production

          echo "✅ Canary rolled back"

      - name: Notify Slack
        if: always()
        run: |
          ACTION="${{ steps.decision.outputs.action }}"

          if [ "$ACTION" == "promote" ]; then
            MESSAGE="🚀 Canary promoted to production"
            COLOR="good"
          elif [ "$ACTION" == "rollback" ]; then
            MESSAGE="⚠️ Canary rolled back due to unhealthy metrics"
            COLOR="danger"
          else
            MESSAGE="⏸️ Canary deployment awaiting manual approval"
            COLOR="warning"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"title\": \"${MESSAGE}\",
                \"fields\": [
                  {
                    \"title\": \"Image\",
                    \"value\": \"\`${{ github.event.inputs.image_digest }}\`\",
                    \"short\": false
                  },
                  {
                    \"title\": \"Error Rate\",
                    \"value\": \"${{ needs.monitor-canary.outputs.error_rate }}\",
                    \"short\": true
                  },
                  {
                    \"title\": \"Latency (p99)\",
                    \"value\": \"${{ needs.monitor-canary.outputs.latency_p99 }}s\",
                    \"short\": true
                  }
                ]
              }]
            }"

      - name: Final summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🎯 Canary Deployment Complete

          **Action:** ${{ steps.decision.outputs.action }}
          **Image:** \`${{ github.event.inputs.image_digest }}\`

          ## Results

          ${{ steps.decision.outputs.action == 'promote' && '✅ Canary successfully promoted to production' || '' }}
          ${{ steps.decision.outputs.action == 'rollback' && '⚠️ Canary rolled back due to unhealthy metrics' || '' }}
          ${{ steps.decision.outputs.action == 'manual' && '⏸️ Awaiting manual approval for promotion' || '' }}
          EOF
