name: Dev Environment Check

# Validates dev environment setup on PRs
# Ensures all developers have consistent environment

on:
  pull_request:
    branches: [main, develop]
    paths:
      - ".devcontainer/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "vitest.config.ts"
  workflow_dispatch:

jobs:
  validate-devcontainer:
    name: Validate Dev Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate devcontainer.json
        run: |
          # Check if devcontainer.json is valid JSON
          for file in .devcontainer/*.json; do
            echo "Validating $file..."
            jq empty "$file" || exit 1
          done

      - name: Check Dockerfile syntax
        run: |
          # Validate Dockerfile syntax
          docker run --rm -i hadolint/hadolint < .devcontainer/Dockerfile.optimized || true

      - name: Test dev container build
        run: |
          docker build -f .devcontainer/Dockerfile.optimized -t test-devcontainer .

      - name: Test dev container health
        run: |
          docker run --rm test-devcontainer /usr/local/bin/healthcheck

  validate-dependencies:
    name: Validate Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Verify Node.js major matches .nvmrc
        run: |
          NVMRC_VERSION="$(tr -d 'v[:space:]' < .nvmrc)"
          NVMRC_MAJOR="${NVMRC_VERSION%%.*}"
          NODE_VERSION="$(node -p "process.versions.node")"
          NODE_MAJOR="${NODE_VERSION%%.*}"

          if [ "$NVMRC_MAJOR" != "$NODE_MAJOR" ]; then
            echo "❌ Node.js major version mismatch: .nvmrc specifies ${NVMRC_MAJOR}.x, but actions/setup-node installed ${NODE_MAJOR}.x (${NODE_VERSION})."
            echo "   Update .nvmrc or the workflow to use a matching Node.js major version."
            exit 1
          fi

      - name: Validate package.json
        run: |
          # Check if package.json is valid
          node -e "const pkg=require('./package.json'); if(!pkg.name||!pkg.version){process.exit(1)}"

      - name: Check for dependency conflicts (Lockfile Sync)
        run: |
          # pnpm install fails if pnpm-lock.yaml is out of sync
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Audit dependencies
        run: |
          pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: |
          pnpm outdated || true

  validate-scripts:
    name: Validate Automation Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          # Validate shell scripts
          for script in .devcontainer/scripts/*.sh scripts/dev-automation/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script" || exit 1
            fi
          done

      - name: Make scripts executable (prep)
        run: |
          for script in .devcontainer/scripts/*.sh scripts/dev-automation/*.sh; do
            if [ -f "$script" ]; then
              chmod +x "$script" || true
            fi
          done

      - name: Check script permissions
        run: |
          # Ensure scripts are executable
          for script in .devcontainer/scripts/*.sh scripts/dev-automation/*.sh; do
            if [ -f "$script" ] && [ ! -x "$script" ]; then
              echo "❌ $script is not executable"
              exit 1
            fi
          done

  validate-configuration:
    name: Validate Configuration Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate TypeScript config
        run: |
          # Check if tsconfig.json is valid
          cat tsconfig.json | jq empty

      - name: Validate Vite config
        run: |
          # Check if vite.config.ts exists for the main app
          [ -f "apps/ValyntApp/vite.config.ts" ] || exit 1

      - name: Validate Vitest config
        run: |
          # Check if vitest.config.ts exists
          [ -f "vitest.config.ts" ] || exit 1

      - name: Validate ESLint config
        run: |
          # Check if ESLint config exists
          [ -f "eslint.config.js" ] || [ -f ".eslintrc.json" ] || exit 1

  drift-tripwires:
    name: Drift Tripwires
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Verify Node version
        run: node scripts/ci/check-node-version.js

      - name: Check lockfile policy
        run: node scripts/ci/check-lockfile-policy.js

      - name: Check line endings
        run: node scripts/ci/check-line-endings.js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Validate web-vitals exports
        run: node scripts/ci/verify-web-vitals.js

      - name: Typecheck
        run: pnpm run typecheck

      - name: Prepare env files
        run: |
          cp .env.example .env.local
          node scripts/dx/ports.js

      - name: Run DX doctor
        run: DX_DOCTOR_ALLOW_PLACEHOLDERS=1 DX_SOFT_DOCTOR=1 node scripts/dx/doctor.js --mode local

      - name: Validate Docker Compose configs
        run: |
          docker compose --env-file .env.ports -f infra/docker/docker-compose.dev.yml config
          docker compose --env-file .env.ports -f docker-compose.deps.yml config

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs:
      [
        validate-devcontainer,
        validate-dependencies,
        validate-scripts,
        validate-configuration,
        drift-tripwires,
      ]
    if: always()

    steps:
      - name: Generate report
        run: |
          echo "## Dev Environment Validation Report 📋" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate-devcontainer.result }}" == "success" ]; then
            echo "- ✅ Dev Container: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Dev Container: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.validate-dependencies.result }}" == "success" ]; then
            echo "- ✅ Dependencies: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Dependencies: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.validate-scripts.result }}" == "success" ]; then
            echo "- ✅ Scripts: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Scripts: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.validate-configuration.result }}" == "success" ]; then
            echo "- ✅ Configuration: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Configuration: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.drift-tripwires.result }}" == "success" ]; then
            echo "- ✅ Drift Tripwires: Valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Drift Tripwires: Failed" >> $GITHUB_STEP_SUMMARY
          fi
