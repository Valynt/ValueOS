name: VALYNT Design Token Validation

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - 'src/**/*.{ts,tsx,js,jsx,css}'
      - '.design-tokens.config.json'
      - 'scripts/validate-design-tokens.cjs'
  push:
    branches: ["main"]
    paths:
      - 'src/**/*.{ts,tsx,js,jsx,css}'

jobs:
  validate-design-tokens:
    name: Validate VALYNT Design Tokens
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run design token validation
        id: validate
        run: |
          echo "::group::VALYNT Design Token Validation"
          npm run lint:design-tokens
          echo "::endgroup::"
        continue-on-error: true

      - name: Check validation result
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Design token validation failed. Please fix the violations above."
          echo ""
          echo "Common fixes:"
          echo "  - Replace hex colors with semantic tokens (bg-primary, text-foreground)"
          echo "  - Replace raw px values with spacing tokens (p-vc-2, m-vc-3)"
          echo "  - Use className instead of inline styles"
          echo "  - Use VALYNT tokens instead of Tailwind color scales"
          echo ""
          echo "See .design-tokens.config.json for full rules and examples."
          echo "See docs/development/SHADCN_THEME_INTEGRATION_ANALYSIS.md for VALYNT design system documentation."
          exit 1

      - name: Post validation summary
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" == "success" ]; then
            echo "✅ All files pass VALYNT design token validation"
          else
            echo "❌ Design token validation failed"
          fi

  # Optional: Check for design token drift
  check-token-drift:
    name: Check Design Token Drift
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for CSS variable changes
        run: |
          echo "::group::Checking for design token changes"
          
          if ! diff -u base/src/index.css src/index.css > /tmp/css-diff.txt; then
            echo "⚠️ Design token changes detected in src/index.css"
            echo ""
            echo "Changed CSS variables:"
            grep "^[-+].*--" /tmp/css-diff.txt || echo "No variable changes"
            echo ""
            echo "::warning::Design tokens have been modified. Please ensure this is intentional and documented."
          else
            echo "✅ No design token changes detected"
          fi
          
          echo "::endgroup::"

      - name: Check for Tailwind config changes
        run: |
          echo "::group::Checking for Tailwind config changes"
          
          if ! diff -u base/tailwind.config.cjs tailwind.config.cjs > /tmp/tailwind-diff.txt; then
            echo "⚠️ Tailwind configuration changes detected"
            echo ""
            echo "::warning::Tailwind config has been modified. Please ensure VALYNT tokens are preserved."
          else
            echo "✅ No Tailwind config changes detected"
          fi
          
          echo "::endgroup::"

  # Optional: Generate design token report
  generate-token-report:
    name: Generate Design Token Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate token usage report
        run: |
          echo "::group::Design Token Usage Report"
          
          echo "## VALYNT Design Token Usage"
          echo ""
          
          echo "### Surface Tokens"
          grep -r "vc-surface-[123]" src --include="*.tsx" --include="*.ts" | wc -l | xargs echo "  - Surface tokens used:"
          
          echo ""
          echo "### Brand Colors"
          grep -r "vc-teal-\|vc-grey-" src --include="*.tsx" --include="*.ts" | wc -l | xargs echo "  - Brand color tokens used:"
          
          echo ""
          echo "### Spacing Tokens"
          grep -r "vc-[1-8]" src --include="*.tsx" --include="*.ts" | wc -l | xargs echo "  - Spacing tokens used:"
          
          echo ""
          echo "### Semantic Tokens"
          grep -r "bg-primary\|text-foreground\|bg-card" src --include="*.tsx" --include="*.ts" | wc -l | xargs echo "  - Semantic tokens used:"
          
          echo "::endgroup::"

      - name: Check for non-compliant patterns
        run: |
          echo "::group::Non-Compliant Pattern Check"
          
          echo "Checking for potential violations..."
          
          # Check for hex colors
          HEX_COUNT=$(grep -r "#[0-9A-Fa-f]\{6\}" src --include="*.tsx" --include="*.ts" --exclude="*.test.*" --exclude="*.stories.*" | grep -v "index.css" | wc -l || echo "0")
          echo "  - Potential hex color violations: $HEX_COUNT"
          
          # Check for raw px values
          PX_COUNT=$(grep -r "[0-9]\+px" src --include="*.tsx" --include="*.ts" --exclude="*.test.*" --exclude="*.stories.*" | grep -v "font-size\|line-height" | wc -l || echo "0")
          echo "  - Potential raw px violations: $PX_COUNT"
          
          # Check for Tailwind color scales
          COLOR_COUNT=$(grep -r "bg-\(blue\|red\|green\|gray\|slate\)-[0-9]" src --include="*.tsx" --include="*.ts" --exclude="*.test.*" --exclude="*.stories.*" | wc -l || echo "0")
          echo "  - Potential non-semantic color violations: $COLOR_COUNT"
          
          echo "::endgroup::"
