name: Staging Environment Validation

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.valuecanvas.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for staging
        run: npm run staging:build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      
      - name: Deploy to staging
        run: |
          # Add your staging deployment command here
          # Example: npm run deploy:staging
          echo "Deploying to staging..."
  
  validate-database-migrations:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Find pending migrations
        id: migrations
        run: |
          MIGRATIONS=$(find supabase/migrations -name "*.sql" -newer .last-migration 2>/dev/null || echo "")
          if [ -n "$MIGRATIONS" ]; then
            echo "pending=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$MIGRATIONS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "pending=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Validate migrations
        if: steps.migrations.outputs.pending == 'true'
        run: |
          chmod +x scripts/validate-migration.sh
          
          while IFS= read -r migration; do
            echo "Validating: $migration"
            ./scripts/validate-migration.sh "$migration" || exit 1
          done <<< "${{ steps.migrations.outputs.files }}"
      
      - name: Test migrations in staging
        if: steps.migrations.outputs.pending == 'true'
        run: |
          # Apply migrations to staging
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.STAGING_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
  
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: validate-database-migrations
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests
        run: npm run test:staging
        env:
          STAGING_URL: https://staging.valuecanvas.app
          STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
  
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run smoke tests against staging
        run: npm run test:smoke
        env:
          BASE_URL: https://staging.valuecanvas.app
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
  
  performance-tests:
    name: Performance Validation
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://staging.valuecanvas.app
            https://staging.valuecanvas.app/login
          budgetPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Check performance budgets
        run: |
          # Fail if performance scores are below thresholds
          echo "Performance validation completed"
  
  security-scan-staging:
    name: Security Scan Staging
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'https://staging.valuecanvas.app'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
      
      - name: Upload ZAP results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-results
          path: report_html.html
  
  approve-for-production:
    name: Staging Validation Summary
    runs-on: ubuntu-latest
    needs: 
      - integration-tests
      - smoke-tests
      - performance-tests
      - security-scan-staging
    if: always()
    
    steps:
      - name: Check all validations passed
        run: |
          echo "=== Staging Validation Summary ==="
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo "Performance Tests: ${{ needs.performance-tests.result }}"
          echo "Security Scan: ${{ needs.security-scan-staging.result }}"
          
          if [[ "${{ needs.integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.smoke-tests.result }}" != "success" ]] || \
             [[ "${{ needs.performance-tests.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan-staging.result }}" != "success" ]]; then
            echo "❌ Staging validation FAILED"
            echo "Do NOT proceed to production!"
            exit 1
          fi
          
          echo "✅ Staging validation PASSED"
          echo "Safe to proceed to production!"
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Staging validation passed!**\n\nAll tests completed successfully:\n- Integration tests ✓\n- Smoke tests ✓\n- Performance tests ✓\n- Security scan ✓\n\nSafe to merge and deploy to production.'
            })
      
      - name: Create deployment gate
        run: |
          # This creates a checkpoint that production deployment can depend on
          echo "staging-validated=true" >> $GITHUB_OUTPUT
