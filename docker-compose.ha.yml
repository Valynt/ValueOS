# HA Docker Compose Configuration
# High availability deployment with replicas, health checks, and failover

version: "3.8"

services:
  # HA Load Balancer (Nginx/HAProxy)
  load-balancer:
    image: nginx:alpine
    container_name: valueos-ha-lb
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/ha-lb.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/error-pages:/usr/share/nginx/html/error-pages:ro
    depends_on:
      frontend-primary:
        condition: service_healthy
      frontend-secondary:
        condition: service_healthy
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Primary Frontend Instance
  frontend-primary:
    build:
      context: .
      dockerfile: Dockerfile.ha-frontend
      target: production
    container_name: valueos-frontend-primary
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=http://backend:3001
      - INSTANCE_ID=primary
      - REGION=${REGION:-us-east-1}
    volumes:
      - nginx_logs_primary:/var/log/nginx
      - maintenance_flag:/usr/share/nginx/html/maintenance.enabled:ro
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Secondary Frontend Instance (Geographic Redundancy)
  frontend-secondary:
    build:
      context: .
      dockerfile: Dockerfile.ha-frontend
      target: production
    container_name: valueos-frontend-secondary
    environment:
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=http://backend:3001
      - INSTANCE_ID=secondary
      - REGION=${REGION:-eu-west-1}
    volumes:
      - nginx_logs_secondary:/var/log/nginx
      - maintenance_flag:/usr/share/nginx/html/maintenance.enabled:ro
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Backend API with HA
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: valueos-backend
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
    volumes:
      - backend_logs:/app/logs
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  # Redis Cache with HA
  redis:
    image: redis:7-alpine
    container_name: valueos-redis-ha
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_ha_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL Database with HA
  postgres:
    image: postgres:15-alpine
    container_name: valueos-postgres-ha
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valueos_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_ha_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: valueos-prometheus-ha
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/ha-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_ha_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 1G

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: valueos-grafana-ha
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_ha_data:/var/lib/grafana
      - ./docker/grafana/ha-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/ha-datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          memory: 512M

  # Health Check Orchestrator
  health-orchestrator:
    image: alpine:latest
    container_name: valueos-health-orchestrator
    volumes:
      - ./scripts/health-orchestrator.sh:/health-orchestrator.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: sh /health-orchestrator.sh
    networks:
      - valueos-ha-network
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

networks:
  valueos-ha-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  nginx_logs_primary:
    driver: local
  nginx_logs_secondary:
    driver: local
  backend_logs:
    driver: local
  redis_ha_data:
    driver: local
  postgres_ha_data:
    driver: local
  prometheus_ha_data:
    driver: local
  grafana_ha_data:
    driver: local
  maintenance_flag:
    driver: local
