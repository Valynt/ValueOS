version: "3.9"

services:
  # Message Bus (NATS) for agent communication
  nats:
    image: nats:2-alpine
    container_name: valueos-nats
    restart: unless-stopped
    command: -DV -m 8222
    networks:
      - agent-network
      - messagebus-network
    expose:
      - "4222"  # Client port
      - "8222"  # Monitoring port
    healthcheck:
      test: ["CMD", "nats", "server", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"
        reservations:
          cpus: "0.05"
          memory: "32M"

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: valueos-redis-agents
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    networks:
      - agent-network
    expose:
      - "6379"
    volumes:
      - redis-agent-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "256M"
        reservations:
          cpus: "0.05"
          memory: "64M"

  # PostgreSQL for agent state persistence
  postgres:
    image: postgres:15-alpine
    container_name: valueos-postgres-agents
    restart: unless-stopped
    environment:
      POSTGRES_DB: valueos_agents
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: valueos
    networks:
      - agent-network
    expose:
      - "5432"
    volumes:
      - postgres-agent-data:/var/lib/postgresql/data
      - ./scripts/init-agent-db.sh:/docker-entrypoint-initdb.d/init-agent-db.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U valueos -d valueos_agents
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.1"
          memory: "128M"

  # Agent: Opportunity (Discovery Phase)
  opportunity-agent:
    build:
      context: ../..
      dockerfile: packages/agents/opportunity/Dockerfile
      args:
        AGENT_NAME: opportunity
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
        EXPOSE_PORT: "8081"
    container_name: valueos-opportunity-agent
    user: agent
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    networks:
      - agent-network
      - messagebus-network
    environment:
      NODE_ENV: production
      AGENT_NAME: opportunity
      MESSAGE_BUS_URL: nats://nats:4222
      DATABASE_URL: postgresql://valueos:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/valueos_agents
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SUPABASE_SERVICE_KEY_FILE: /run/secrets/supabase_service_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      CONFIDENCE_THRESHOLDS: '{"low":0.5,"target":0.7,"critical":0.8}'
      RISK_CATEGORY: "discovery"
      LIFECYCLE_STAGE: "discovery"
    secrets:
      - supabase_service_key
      - openai_api_key
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
