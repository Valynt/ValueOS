secrets:
  supabase_service_key:
    file: ./secrets/supabase_service_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt

networks:
  agent-network:
    internal: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  messagebus-network:
    internal: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  redis-agent-data:
    driver: local
  postgres-agent-data:
    driver: local

x-common:
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-file: "3"
      max-size: "10m"

x-network:
  networks:
    - agent-network
    - messagebus-network

x-security:
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=64m

x-health:
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:${EXPOSE_PORT:-8080}/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 60s

x-resources:
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: "512M"
      reservations:
        cpus: "0.1"
        memory: "128M"

x-secrets:
  secrets:
    - supabase_service_key
    - openai_api_key
  environment:
    SUPABASE_SERVICE_KEY_FILE: /run/secrets/supabase_service_key
    OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
