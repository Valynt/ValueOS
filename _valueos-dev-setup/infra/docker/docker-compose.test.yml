# Docker Compose for Testing Environment
# Provides stable services for integration tests with proper health checks

version: "3.8"

services:
  # PostgreSQL for integration tests
  postgres-test:
    image: postgres:15-alpine
    container_name: valueos-postgres-test
    environment:
      POSTGRES_DB: valueos_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_test
      POSTGRES_INITDB_ARGS: "--auth-host=scram"
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ../../scripts/test-db-init.sql:/docker-entrypoint-initdb.d/01-test-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d valueos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - valueos-test-network
    restart: unless-stopped

  # Redis for integration tests
  redis-test:
    image: redis:7-alpine
    container_name: valueos-redis-test
    ports:
      - "${TEST_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - valueos-test-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Wait for services to be ready (helper service)
  test-ready:
    image: alpine:latest
    container_name: valueos-test-ready
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - valueos-test-network
    command: |
      sh -c "
        echo '✅ All test services are healthy and ready'
        echo 'PostgreSQL: postgres-test:5432'
        echo 'Redis: redis-test:6379'
        sleep infinity
      "
    restart: "no"

volumes:
  postgres_test_data:
    driver: local
  redis_test_data:
    driver: local

networks:
  valueos-test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
