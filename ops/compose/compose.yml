name: valueos
include:
  - ./profiles/observability.yml
  - ./profiles/supabase.yml
  - ./profiles/tools.yml

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valuecanvas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${DB_PORT:-${POSTGRES_PORT:-5432}}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valueos-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - valueos-network

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_HOST: ${DB_HOST:-${POSTGRES_HOST:-postgres}}
      DB_PORT: ${DB_PORT:-${POSTGRES_PORT:-5432}}
      DB_NAME: ${DB_NAME:-${POSTGRES_DB:-valuecanvas_dev}}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-postgres}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-dev_password}}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@${POSTGRES_HOST:-postgres}:${DB_PORT:-${POSTGRES_PORT:-5432}}/${POSTGRES_DB:-valuecanvas_dev}?sslmode=disable}
      DB_URL: ${DB_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@${POSTGRES_HOST:-postgres}:${DB_PORT:-${POSTGRES_PORT:-5432}}/${POSTGRES_DB:-valuecanvas_dev}?sslmode=disable}
      SUPABASE_URL: ${SUPABASE_URL:-http://${DOCKER_HOSTNAME:-host.docker.internal}:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - valueos-network
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
    ports:
      - "${WEB_PORT:-${VITE_PORT:-5173}}:5173"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://${DOCKER_HOSTNAME:-host.docker.internal}:${SUPABASE_API_PORT:-54321}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:${API_PORT:-3001}}
      HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_PROTOCOL: ${VITE_HMR_PROTOCOL:-ws}
    depends_on:
      - backend
    networks:
      - valueos-network
    restart: unless-stopped

networks:
  valueos-network:
    name: valueos-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
