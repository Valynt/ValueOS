# Canonical compose entrypoint for ValueOS local development.
# Core services are always available; optional stacks live under ./profiles and are activated with --profile.

include:
  - ./profiles/supabase.yml
  - ./profiles/observability.yml
  - ./profiles/tools.yml

x-common: &common
  restart: unless-stopped
  networks: [valueos-network]
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: valueos-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}@postgres:5432/${POSTGRES_DB:-valueos_dev}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
    container_name: valueos-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://backend:3001}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

  postgres:
    <<: *common
    image: postgres:15-alpine
    container_name: valueos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valueos_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: valueos-redis
    command: >-
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your local env file before starting compose}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in your local env file before starting compose}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  valueos-network:
    name: ${VALUEOS_NETWORK_NAME:-valueos-network}
