services:
  backend:
    image: node:20-slim
    command: sleep infinity
    working_dir: /workspaces/ValueOS
    volumes:
      - ../..:/workspaces/ValueOS:cached
    environment:
      NODE_ENV: development

  frontend:
    image: node:20-slim
    command: sleep infinity
    working_dir: /workspaces/ValueOS
    volumes:
      - ../..:/workspaces/ValueOS:cached
    environment:
      NODE_ENV: development

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
