# Canonical ValueOS compose entrypoint.
# Optional stacks are split into profiles under ops/compose/profiles/*.yml.

x-common: &common
  restart: unless-stopped
  networks:
    - valueos-network

services:
  backend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: ${NODE_VERSION:-20.19.0}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.0}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-dev_password}@redis:6379}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-valueos_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-dev_password}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-valueos_dev}?sslmode=disable}
      DB_URL: ${DB_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-dev_password}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-valueos_dev}?sslmode=disable}
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    env_file:
      - ../../ops/env/.env.ports
      - ../../ops/env/.env.local
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NODE_VERSION: ${NODE_VERSION:-20.19.0}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.0}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-3001}}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    env_file:
      - ../../ops/env/.env.ports
      - ../../ops/env/.env.local
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_started

  postgres:
    <<: *common
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-valueos_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-dev_password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  valueos-network:
    name: valueos-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
