# Canonical compose file for ValueOS core services.
# Optional stacks live in ops/compose/profiles/.
#
# Core stack includes:
# - backend
# - frontend
# - redis
# - postgres (minimal local DB service)

x-common: &common
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: valueos-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_CONTAINER_PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}@postgres:5432/${POSTGRES_DB:-valueos_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in your local env file before starting compose}@redis:6379
    ports:
      - "${API_PORT:-3001}:${API_CONTAINER_PORT:-3001}"

  frontend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
    container_name: valueos-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_CONTAINER_PORT:-5173}
      VITE_HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_CLIENT_PORT: ${VITE_HMR_CLIENT_PORT:-24678}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-false}
    ports:
      - "${WEB_PORT:-5173}:${WEB_CONTAINER_PORT:-5173}"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"

  postgres:
    <<: *common
    image: postgres:15-alpine
    container_name: valueos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valueos_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: valueos-redis
    command: >-
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your local env file before starting compose}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in your local env file before starting compose}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-network}
