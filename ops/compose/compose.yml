# Canonical compose file for ValueOS core services.
# Optional stacks live in ops/compose/profiles/.

x-common: &common
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  backend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-8000}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-5173}}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.local (example: postgresql://valueos_dev:change-me-dev-password@postgres:5432/valueos)}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in ops/env/.env.local}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in ops/env/.env.local}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in ops/env/.env.local}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"

  frontend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
    depends_on:
      - backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-5173}}
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://localhost:${BACKEND_PORT:-8000}}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      VITE_SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in ops/env/.env.local}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in ops/env/.env.local}
      VITE_HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_CLIENT_PORT: ${VITE_HMR_CLIENT_PORT:-24678}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-false}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"

  postgres:
    <<: *common
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${PGDATABASE:-valueos}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in ops/env/.env.local}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      # Local development only: bind Postgres to loopback so it is not reachable externally.
      - "127.0.0.1:${PGPORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    <<: *common
    image: redis:7-alpine
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-network}
