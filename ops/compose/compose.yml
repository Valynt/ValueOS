name: valueos

# Canonical Compose base for ValueOS.
# Optional stacks are defined in ops/compose/profiles/*.yml.
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valuecanvas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${DB_PORT:-${POSTGRES_PORT:-5432}}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-valuecanvas_dev}?sslmode=disable
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-valuecanvas_dev}?sslmode=disable
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
    env_file:
      - ../../ops/env/.env.ports
      - ../../ops/env/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-${VITE_PORT:-5173}}:5173"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_API_BASE_URL: http://backend:${API_PORT:-3001}
      HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_PROTOCOL: ${VITE_HMR_PROTOCOL:-ws}
    env_file:
      - ../../ops/env/.env.ports
      - ../../ops/env/.env.local
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  dev_pnpm_store:
