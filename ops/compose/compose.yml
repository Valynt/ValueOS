name: valueos

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - valueos-network

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
    ports:
      - "${API_PORT:-3001}:3001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: redis://redis:6379
      # CRITICAL: sslmode=disable required - container postgres has no TLS
      DATABASE_URL: postgresql://postgres:postgres@db:${DB_PORT:-5432}/postgres?sslmode=disable
      DB_URL: postgresql://postgres:postgres@db:${DB_PORT:-5432}/postgres?sslmode=disable
      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
    env_file:
      - ../../.env.ports
      - ../../.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../packages/backend/src:/app/packages/backend/src
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/sdui/src:/app/packages/sdui/src
    tmpfs:
      - /tmp:noexec,nosuid,size=100m,uid=1001,gid=1001
    networks:
      - valueos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:${VITE_PORT:-5173}}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "${WEB_PORT:-${VITE_PORT:-5173}}:5173"
      - "${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}"
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_API_BASE_URL: http://backend:${API_PORT:-3001}
      HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_PROTOCOL: ${VITE_HMR_PROTOCOL:-ws}
    env_file:
      - ../../.env.ports
      - ../../.env.local
    depends_on:
      backend:
        condition: service_healthy
    tmpfs:
      - /tmp:noexec,nosuid,size=50m,uid=1001,gid=1001
    networks:
      - valueos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  valueos-network:
    name: valueos-network
    driver: bridge

volumes:
  redis_data:
