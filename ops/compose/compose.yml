name: valueos

x-common: &common
  restart: unless-stopped
  networks:
    - valueos-network

services:
  backend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: ${NODE_VERSION:-20.19.0}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.0}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-valueos_dev}?sslmode=disable}
      DB_URL: ${DB_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-valueos_dev}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-dev_password}@redis:6379}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    <<: *common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NODE_VERSION: ${NODE_VERSION:-20.19.0}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-3001}}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:${SUPABASE_REST_PORT:-3000}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:${FRONTEND_PORT:-5173}}
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_started

  postgres:
    <<: *common
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-valueos_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    command: >-
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-dev_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  valueos-network:
    name: valueos-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
