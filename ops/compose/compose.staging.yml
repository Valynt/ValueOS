# Staging compose for ValueOS -- production-parity with relaxed resource limits.
#
# Bootstrap usage (non-secret settings only):
#   docker compose -f ops/compose/compose.staging.yml \
#     --env-file ops/env/.env.staging.bootstrap up -d --build
#
# IMPORTANT:
# - `ops/env/.env.staging.bootstrap` is for non-production bootstrap values only.
# - Do not persist production-class secrets in `ops/env/` flat files.
# - Backend secrets must come from the managed secret path documented in
#   `ops/env/README.md` and `ops/STAGING_DEPLOY_CHECKLIST.md`.
# - Export secrets into the deploy shell/CI runtime only when a value cannot yet
#   be hydrated automatically by `packages/backend/src/config/secrets/`.
#
# This file is self-contained (does NOT extend the dev compose) so that staging
# mirrors production topology: Caddy + nginx-served frontend + compiled backend.

x-staging-common: &staging-common
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "15m"
      max-file: "4"

services:
  # -- Caddy reverse proxy (ACME staging CA) ---------------------------------
  caddy:
    <<: *staging-common
    image: caddy:2-alpine
    container_name: valueos-caddy-staging
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../infra/caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - ../../infra/caddy/Caddyfile:/etc/caddy/Caddyfile.base:ro
      - ../../infra/caddy/snippets:/etc/caddy/snippets:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in ops/env/.env.staging.bootstrap}
      ACME_EMAIL: ${ACME_EMAIL:-}
      TLS_MODE: ${TLS_MODE:-staging}
      API_UPSTREAM: http://backend:${BACKEND_PORT:-3001}
      FRONTEND_UPSTREAM: http://frontend:${FRONTEND_PORT:-8080}

  # -- Backend (production build) --------------------------------------------
  backend:
    <<: *staging-common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      target: runtime
    container_name: valueos-backend-staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      APP_ENV: staging
      API_PORT: ${BACKEND_PORT:-3001}
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${APP_DOMAIN}}
      CORS_ORIGINS: ${CORS_ORIGINS:-${CORS_ALLOWED_ORIGINS:-https://${APP_DOMAIN}}}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL in ops/env/.env.staging.bootstrap}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?Set SUPABASE_ANON_KEY in ops/env/.env.staging.bootstrap}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.staging.bootstrap}
      SUPABASE_KEY: ${SUPABASE_KEY:?Set SUPABASE_KEY (service role) in ops/env/.env.staging.bootstrap}
      WEB_SCRAPER_ENCRYPTION_KEY: ${WEB_SCRAPER_ENCRYPTION_KEY:?Set WEB_SCRAPER_ENCRYPTION_KEY in ops/env/.env.staging.bootstrap}
      TCT_SECRET: ${TCT_SECRET:?Set TCT_SECRET in ops/env/.env.staging.bootstrap}
      REDIS_TLS_REJECT_UNAUTHORIZED: ${REDIS_TLS_REJECT_UNAUTHORIZED:-true}
      REDIS_TLS_CA_CERT_PATH: ${REDIS_TLS_CA_CERT_PATH:-}
      REDIS_TLS_SERVERNAME: ${REDIS_TLS_SERVERNAME:-}
      ENABLE_TELEMETRY: ${ENABLE_TELEMETRY:-true}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SECRETS_MANAGER_ENABLED: ${SECRETS_MANAGER_ENABLED:-true}
      SECRETS_PROVIDER: ${SECRETS_PROVIDER:?Set SECRETS_PROVIDER to aws or vault in ops/env/.env.staging.bootstrap}
      SECRETS_TENANT_ID: ${SECRETS_TENANT_ID:-platform}
      SECRETS_MOUNT_PATH: ${SECRETS_MOUNT_PATH:-/mnt/secrets}
      SECRETS_VOLUME_WATCH_ENABLED: ${SECRETS_VOLUME_WATCH_ENABLED:-true}
      DATABASE_URL_SECRET_NAME: ${DATABASE_URL_SECRET_NAME:-database-url}
      SUPABASE_SERVICE_ROLE_KEY_SECRET_NAME: ${SUPABASE_SERVICE_ROLE_KEY_SECRET_NAME:-supabase-service-key}
      REDIS_URL_SECRET_NAME: ${REDIS_URL_SECRET_NAME:-redis-url}
      JWT_SECRET_SECRET_NAME: ${JWT_SECRET_SECRET_NAME:-jwt-secret}
      ENCRYPTION_KEY_SECRET_NAME: ${ENCRYPTION_KEY_SECRET_NAME:-encryption-key}
      TOGETHER_API_KEY_SECRET_NAME: ${TOGETHER_API_KEY_SECRET_NAME:-together-api-key}
      OPENAI_API_KEY_SECRET_NAME: ${OPENAI_API_KEY_SECRET_NAME:-openai-api-key}
      APPROVAL_ACTION_SECRET_SECRET_NAME: ${APPROVAL_ACTION_SECRET_SECRET_NAME:-approval-action-secret}
      APPROVAL_WEBHOOK_SECRET_SECRET_NAME: ${APPROVAL_WEBHOOK_SECRET_SECRET_NAME:-approval-webhook-secret}
      STRIPE_SECRET_KEY_SECRET_NAME: ${STRIPE_SECRET_KEY_SECRET_NAME:-stripe-secret-key}
      STRIPE_WEBHOOK_SECRET_SECRET_NAME: ${STRIPE_WEBHOOK_SECRET_SECRET_NAME:-stripe-webhook-secret}
      SENTRY_DSN_SECRET_NAME: ${SENTRY_DSN_SECRET_NAME:-sentry-dsn}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-valuecanvas}
      VAULT_K8S_ROLE: ${VAULT_K8S_ROLE:-}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${BACKEND_PORT:-3001}/health/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- Frontend (production nginx) -------------------------------------------
  frontend:
    <<: *staging-common
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: runtime
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Set VITE_SUPABASE_URL in ops/env/.env.staging.bootstrap}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:?Set VITE_SUPABASE_ANON_KEY in ops/env/.env.staging.bootstrap}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: valueos-frontend-staging
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # -- Postgres (staging) ----------------------------------------------------
  postgres:
    <<: *staging-common
    image: postgres:15-alpine
    container_name: valueos-postgres-staging
    environment:
      POSTGRES_DB: ${PGDATABASE:-valueos}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Export PGPASSWORD in CI/runtime only; do not store it in ops/env/.env.staging.bootstrap}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -- Redis (staging) -------------------------------------------------------
  redis:
    <<: *staging-common
    image: redis:7-alpine
    container_name: valueos-redis-staging
    command: >-
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-staging-network}
