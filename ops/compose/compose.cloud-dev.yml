# Docker Compose for ValueOS cloud-dev environment
# Provides local Redis only - Supabase stays cloud-hosted

services:
  redis:
    image: redis:7-alpine
    container_name: valueos-redis
    restart: unless-stopped
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: valueos-network
