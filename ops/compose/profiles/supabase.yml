# Supabase optional stack. Activate with: docker compose --profile supabase up
# Depends on postgres from the base compose.yml — does NOT redefine it.

services:
  auth:
    image: supabase/gotrue:v2.143.0
    profiles: ["supabase"]
    environment:
      GOTRUE_DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-valueos_dev}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_API_URL: http://localhost:9999
      API_EXTERNAL_URL: http://localhost:9999
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-9999}:9999"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rest:
    image: postgrest/postgrest:v12.0.2
    profiles: ["supabase"]
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-valueos_dev}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REST_PORT:-3000}:3000"

  studio:
    image: supabase/studio:latest
    profiles: ["supabase"]
    environment:
      SUPABASE_URL: http://rest:3000
      STUDIO_PG_META_URL: http://rest:3000
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-54324}:3000"
