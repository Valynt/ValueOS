services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: valueos_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  studio:
    image: supabase/studio:latest
    depends_on:
      - postgres
    ports:
      - "54324:3000"

volumes:
  postgres_data:
