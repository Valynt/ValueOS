# Supabase optional stack. Activate with: docker compose --profile supabase up
# Depends on postgres from ops/compose/compose.yml.

services:
  auth:
    image: supabase/gotrue:v2.143.0
    profiles: ["supabase"]
    environment:
      GOTRUE_DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PGDATABASE:-valueos}
      DB_USER: ${PGUSER:-postgres}
      DB_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in your local env file before starting compose}
      SITE_URL: ${SITE_URL:-http://localhost:${FRONTEND_PORT:-5173}}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:${FRONTEND_PORT:-5173}}
      GOTRUE_API_URL: http://localhost:${AUTH_PORT:-9999}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:${AUTH_PORT:-9999}}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-9999}:9999"

  rest:
    image: postgrest/postgrest:v12.0.2
    profiles: ["supabase"]
    environment:
      PGRST_DB_URI: postgres://${PGUSER:-postgres}:${PGPASSWORD:?Set PGPASSWORD in your local env file before starting compose}@postgres:5432/${PGDATABASE:-valueos}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REST_PORT:-3000}:3000"

  realtime:
    image: supabase/realtime:v2.25.50
    profiles: ["supabase"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PGDATABASE:-valueos}
      DB_USER: ${PGUSER:-postgres}
      DB_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in your local env file before starting compose}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy

 storage:
    image: supabase/storage-api:v0.46.4
    profiles: ["supabase"]
    environment:
      # Database Connection (Consolidated)
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.local}
      
      # Auth & Security
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file}
      ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      
      # Storage Config
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/var/lib/storage

  studio:
    image: supabase/studio:latest
    profiles: ["supabase"]
    environment:
      SUPABASE_URL: http://rest:3000
      STUDIO_PG_META_URL: http://rest:3000
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-54324}:3000"

  kong:
    image: kong:3.6
    profiles: ["supabase"]
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    depends_on: [auth, rest, realtime, storage]
    ports:
      - "${KONG_PROXY_PORT:-54321}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"

volumes:
  storage_data:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-network}
