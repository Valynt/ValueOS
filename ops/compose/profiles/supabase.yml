# Supabase optional profile.
# Usage: docker compose -f ops/compose/compose.yml -f ops/compose/profiles/supabase.yml --profile supabase up

services:
  auth:
    image: supabase/gotrue:v2.143.0
    profiles: ["supabase"]
    environment:
      GOTRUE_DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-valueos_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}
      SITE_URL: ${SITE_URL:-http://localhost:${WEB_PORT:-5173}}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:${WEB_PORT:-5173}}
      GOTRUE_API_URL: http://localhost:${AUTH_PORT:-9999}
      API_EXTERNAL_URL: http://localhost:${AUTH_PORT:-9999}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-9999}:9999"
    networks:
      - valueos-network

  rest:
    image: postgrest/postgrest:v12.0.2
    profiles: ["supabase"]
    environment:
      PGRST_DB_URI: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-dev_password}@postgres:5432/${DB_NAME:-valueos_dev}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REST_PORT:-3000}:3000"
    networks:
      - valueos-network

  studio:
    image: supabase/studio:latest
    profiles: ["supabase"]
    environment:
      SUPABASE_URL: http://rest:3000
      STUDIO_PG_META_URL: http://rest:3000
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-54324}:3000"
    networks:
      - valueos-network

networks:
  valueos-network:
    external: true
    name: valueos-network
