# Devcontainer optional stack. Activate with: docker compose --profile devcontainer up

services:
  dev:
    build:
      context: ../../../
      dockerfile: .devcontainer/Dockerfile.optimized
    image: valueos/dev:devcontainer
    command: sleep infinity
    working_dir: /workspaces/ValueOS
    volumes:
      - ../../../:/workspaces/ValueOS:cached
      - pnpm-store:/home/node/.local/share/pnpm
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/devcontainer/scripts/on-create.sh"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-slim
    profiles: ["devcontainer"]
    working_dir: /workspaces/ValueOS
    command: ["bash", "-lc", "pnpm --filter @valueos/frontend dev --host 0.0.0.0 --port 5173"]
    volumes:
      - ../../../:/workspaces/ValueOS:cached
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  pnpm-store:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-network}
