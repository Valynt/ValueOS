# DEPRECATED: use ops/compose/profiles/supabase.yml (profile: supabase)

services:
  auth:
    image: supabase/gotrue:v2.143.0
    profiles: ["studio"]
    environment:
      GOTRUE_DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-valueos_dev}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_API_URL: http://localhost:${AUTH_PORT:-9999}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-9999}:9999"

  rest:
    image: postgrest/postgrest:v12.0.2
    profiles: ["studio"]
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}@postgres:5432/${POSTGRES_DB:-valueos_dev}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REST_PORT:-3000}:3000"

  realtime:
    image: supabase/realtime:v2.25.50
    profiles: ["studio"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-valueos_dev}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy

  storage:
    image: supabase/storage-api:v0.46.4
    profiles: ["studio"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-valueos_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your local env file before starting compose}
      ANON_KEY: ${ANON_KEY:-}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ops/env/.env.local (example: postgresql://valueos_dev:change-me-dev-password@postgres:5432/valueos)}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/var/lib/storage

  studio:
    image: supabase/studio:latest
    profiles: ["studio"]
    environment:
      SUPABASE_URL: http://rest:3000
      STUDIO_PG_META_URL: http://rest:3000
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local env file before starting compose}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${STUDIO_PORT:-54324}:3000"

  kong:
    image: kong:3.6
    profiles: ["studio"]
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    depends_on: [auth, rest, realtime, storage]
    ports:
      - "${SUPABASE_API_PORT:-54321}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"

volumes:
  storage_data:
    driver: local
    
# DEPRECATED: use ops/compose/profiles/supabase.yml (profile: supabase)
# This file is retained only as a backwards-compatible shim.
# Do not add services here; use the canonical profile compose file instead.

include:
  - ./supabase.yml
