# Optional full application stack for containerized development.
# Activate with: docker compose --profile studio up
services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
      args:
        NODE_VERSION: 20.19.0
        PNPM_VERSION: 9.15.0
    container_name: valueos-backend
    ports:
    - ${API_PORT:-3001}:3001
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3001}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:dev_password@postgres:${DB_PORT:-${POSTGRES_PORT:-5432}}/valuecanvas_dev?sslmode=disable
      DB_URL: postgresql://postgres:dev_password@postgres:${DB_PORT:-${POSTGRES_PORT:-5432}}/valuecanvas_dev?sslmode=disable
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      KAFKA_BROKERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    env_file:
    - ../../ops/env/.env.ports
    - ../../ops/env/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
    - ../../packages/backend/src:/app/packages/backend/src
    - ../../packages/shared/src:/app/packages/shared/src
    - ../../packages/sdui/src:/app/packages/sdui/src
    tmpfs:
    - /tmp:noexec,nosuid,size=100m,uid=1001,gid=1001
    networks:
    - valueos-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:3001/health/ready || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    profiles:
    - studio
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      target: development
      args:
        NODE_VERSION: 20.19.0
        PNPM_VERSION: 9.15.0
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:${VITE_PORT:-5173}}
    container_name: valueos-frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    ports:
    - ${WEB_PORT:-${VITE_PORT:-5173}}:5173
    - ${VITE_HMR_PORT:-24678}:${VITE_HMR_PORT:-24678}
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://host.docker.internal:${SUPABASE_API_PORT:-54321}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      VITE_API_BASE_URL: http://backend:${API_PORT:-3001}
      HOST: 0.0.0.0
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-24678}
      VITE_HMR_PROTOCOL: ${VITE_HMR_PROTOCOL:-ws}
    env_file:
    - ../../ops/env/.env.ports
    - ../../ops/env/.env.local
    depends_on:
      backend:
        condition: service_healthy
    tmpfs:
    - /tmp:noexec,nosuid,size=50m,uid=1001,gid=1001
    networks:
    - valueos-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    profiles:
    - studio
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-dev
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    ports:
    - ${CADDY_HTTP_PORT:-8080}:80
    - ${CADDY_HTTPS_PORT:-8443}:443
    - ${CADDY_ADMIN_PORT:-2019}:2019
    environment:
      DEV_DOMAIN: ${DEV_DOMAIN:-localhost}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:5173}
      CADDY_ADMIN: ${CADDY_ADMIN:-0.0.0.0:${CADDY_ADMIN_PORT:-2019}}
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-DEBUG}
      AUTO_HTTPS: ${AUTO_HTTPS:-off}
    volumes:
    - ../caddy/Caddyfile.dev:/etc/caddy/Caddyfile.dev
    - caddy_data:/data
    - caddy_logs:/var/log/caddy
    networks:
    - valueos-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
    - studio
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: valueos-zookeeper
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
    - 2181:2181
    volumes:
    - zookeeper_data:/var/lib/zookeeper/data
    - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test:
      - CMD-SHELL
      - echo ruok | nc -w 2 localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
    - valueos-network
    profiles:
    - studio
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: valueos-kafka
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
    - 9092:9092
    - 9093:9093
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
    - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
      - CMD
      - kafka-broker-api-versions
      - --bootstrap-server
      - localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - valueos-network
    profiles:
    - studio
  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: valueos-schema-registry
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      kafka:
        condition: service_healthy
    ports:
    - 8081:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8081/subjects
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - valueos-network
    profiles:
    - studio
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: valueos-kafka-ui
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
    - 8080:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: valueos-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: 'true'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:8080/actuator/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
    - valueos-network
    profiles:
    - studio
volumes:
  zookeeper_data: null
  zookeeper_logs: null
  kafka_data: null
  caddy_data: null
  caddy_logs: null
networks:
  valueos-network:
    name: valueos-network
    driver: bridge
