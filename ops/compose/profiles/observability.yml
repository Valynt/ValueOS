# Observability optional stack. Activate with: docker compose --profile observability up

services:
  jaeger:
    image: jaegertracing/all-in-one:1.58
    profiles: ["observability"]
    networks: [valueos-network]
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    profiles: ["observability"]
    networks: [valueos-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [zookeeper]
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [kafka]
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [kafka, schema-registry]
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: valueos-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    networks: [valueos-network]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [prometheus]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

  istiod:
    image: istio/pilot:latest
    profiles: ["observability"]
    networks: [valueos-network]
    ports:
      - "${ISTIOD_XDS_PORT:-15010}:15010"
      - "${ISTIOD_WEBHOOK_PORT:-15017}:15017"

  istio-gateway:
    image: istio/proxyv2:latest
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [istiod]
    ports:
      - "${ISTIO_GATEWAY_STATUS_PORT:-15021}:15021"

  istio-ca:
    image: istio/proxyv2:latest
    profiles: ["observability"]
    networks: [valueos-network]
    depends_on: [istiod]

networks:
  valueos-network:
    name: ${VALUEOS_NETWORK_NAME:-valueos-network}
