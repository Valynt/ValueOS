# Infrastructure dependencies for local development.
# Activate with: docker compose --profile infra up
#
# Redis is already included in compose.yml as a core service.
# This profile adds Kafka (KRaft mode, no Zookeeper) and NATS JetStream
# for local event streaming, matching the K8s StatefulSet in
# infra/k8s/base/nats-jetstream.yaml.
#
# Usage:
#   docker compose --profile infra up           # start Redis + Kafka + NATS
#   docker compose --profile infra up kafka     # start Kafka only
#   docker compose --profile infra up nats      # start NATS only
#
# Set in your .env.local:
#   KAFKA_ENABLED=true
#   KAFKA_BROKERS=localhost:9092
#   NATS_URL=nats://localhost:4222

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    profiles: ["infra"]
    hostname: kafka
    container_name: valueos-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      # KRaft mode — no Zookeeper required.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-valueos-local-kraft-001}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null | grep -q 'id: 1'",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2.10-alpine
    profiles: ["infra"]
    hostname: nats
    container_name: valueos-nats
    # -js enables JetStream; -m exposes the HTTP monitoring endpoint on 8222.
    # The server name matches NATS_SERVER_NAME used in MeteringQueue.ts.
    command: ["-js", "-m", "8222", "-n", "nats-local"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  kafka_data:
    driver: local
  nats_data:
    driver: local

networks:
  default:
    name: ${VALUEOS_NETWORK:-valueos-network}
