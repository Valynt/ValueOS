# ValueOS DevContainer Auth Stub
# PURPOSE: Lightweight service placeholders for frontend-only development
# WARNING: Authentication and database are NOT functional
# For full stack: use docker-compose.devcontainer.yml
name: valueos-devcontainer-auth-stub

services:
  auth:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./stubs/auth-stub.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "9999"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - valueos-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - valueos-network

  kong:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./stubs/kong-stub.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - valueos-network

volumes:
  redis-data:

networks:
  valueos-network:
    driver: bridge
