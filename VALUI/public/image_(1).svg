  <text x="120" y="873" font-family="Arial, sans-serif" font-size="8" fill="#ff6b6b" font-weight="bold">ANNOTATIONS:</text>
  <text x="200" y="873" font-family="Arial, sans-serif" font-size="8" fill="#888">1 - AI-powered prompt input with send | 2 - Quick action cards with contextual icons | 3 - Recent cases with status badges</text>
