    <text x="750" y="750" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">GlobalCo</text>
    <text x="750" y="785" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Enterprise Efficiency</text>
    <text x="750" y="805" font-family="Arial, sans-serif" font-size="9" fill="#666">Updated 3 days ago</text>
