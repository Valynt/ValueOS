    <text x="785" y="831" font-family="Arial, sans-serif" font-size="8" fill="#845ef7" text-anchor="middle">Validated</text>
    
    <rect x="945" y="705" width="200" height="140" rx="8" fill="#2d2d44"/>
    <rect x="945" y="705" width="200" height="60" rx="8" fill="#ff6b6b30"/>
    <text x="965" y="750" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">FinServ Ltd</text>
    <text x="965" y="785" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Compliance ROI</text>
    <text x="965" y="805" font-family="Arial, sans-serif" font-size="9" fill="#666">Updated last week</text>
