    <line x1="1165" y1="240" x2="1188" y2="240" stroke="#ff6b6b" stroke-width="2"/>
    
    <circle cx="560" cy="450" r="12" fill="#ff6b6b"/>
    <text x="560" y="454" fill="white" text-anchor="middle" font-weight="bold">2</text>
    
    <circle cx="400" cy="775" r="12" fill="#ff6b6b"/>
    <text x="400" y="779" fill="white" text-anchor="middle" font-weight="bold">3</text>
  </g>
  
