# HA Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: valueos-ha
  labels:
    name: valueos-ha
    environment: production
    ha: enabled
---
# HA Resource Limits and Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: valueos-ha-quota
  namespace: valueos-ha
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
# Network Policies for Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valueos-ha-network-policy
  namespace: valueos-ha
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: valueos-frontend
        - podSelector:
            matchLabels:
              app: valueos-backend
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: valueos-backend
        - podSelector:
            matchLabels:
              app: postgres
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 3001
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
