_format_version: "2.1"

services:
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1

  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

- name: realtime-service
  url: http://realtime:54324
  routes:
  - name: realtime-route
    paths:
    - /realtime/v1

