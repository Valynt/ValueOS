# Alertmanager configuration for ValueOS
#
# Routing:
#   critical → PagerDuty (immediate page) + Slack #incidents
#   warning  → Slack #alerts-warning (no page)
#
# Required secrets (inject via ExternalSecrets or env substitution):
#   SLACK_WEBHOOK_URL          — Slack incoming webhook URL for #incidents
#   SLACK_WARNING_WEBHOOK_URL  — Slack incoming webhook URL for #alerts-warning
#   PAGERDUTY_INTEGRATION_KEY  — PagerDuty Events API v2 integration key
#
# See infra/DEPLOYMENT_GUIDE.md for secret provisioning instructions.

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-warnings

  routes:
    # Critical alerts → PagerDuty + Slack #incidents
    - matchers:
        - severity = critical
      receiver: pagerduty-critical
      continue: true

    - matchers:
        - severity = critical
      receiver: slack-incidents
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → Slack #alerts-warning only
    - matchers:
        - severity = warning
      receiver: slack-warnings
      group_wait: 1m
      repeat_interval: 4h

receivers:
  - name: slack-incidents
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#incidents"
        send_resolved: true
        title: |-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}
        icon_emoji: ":fire:"
        username: "ValueOS Alertmanager"

  - name: slack-warnings
    slack_configs:
      - api_url: "${SLACK_WARNING_WEBHOOK_URL}"
        channel: "#alerts-warning"
        send_resolved: true
        title: |-
          [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        icon_emoji: ":warning:"
        username: "ValueOS Alertmanager"

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_INTEGRATION_KEY}"
        description: "{{ .CommonAnnotations.summary }}"
        severity: critical
        details:
          alertname: "{{ .CommonLabels.alertname }}"
          team: "{{ .CommonLabels.team }}"
          description: "{{ .CommonAnnotations.description }}"
          runbook: "{{ .CommonAnnotations.runbook_url }}"

inhibit_rules:
  # Suppress warning-level alerts when a critical alert for the same
  # alertname is already firing — avoids double-paging.
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname", "team"]
