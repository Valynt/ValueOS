# Prometheus Configuration for Local Development

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: "local"
    environment: "development"

rule_files:
  - "/etc/prometheus/alerts/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ValueOS Backend Application
  - job_name: "valueos-app"
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: "valueos-backend"
    metrics_path: "/metrics"
    scrape_interval: 10s

  # OTel Collector metrics exporter
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "otel-collector"
    metrics_path: "/metrics"

  # node-exporter for host resource metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
    metrics_path: "/metrics"

  # Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: "tempo"
    metrics_path: "/metrics"

  # Grafana metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
    metrics_path: "/metrics"
