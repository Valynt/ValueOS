# Promtail configuration
# Scrapes Docker container logs and ships them to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}

      # Try to parse the log line as JSON (structured logs from the backend)
      - json:
          expressions:
            level: level
            component: component
            trace_id: traceId
            span_id: spanId
            message: message

      # Extract labels from parsed fields
      - labels:
          level:
          component:
          trace_id:

      # Use the timestamp from the log entry if available
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.999999999Z07:00"

      # Use the message field as the log line when available
      - output:
          source: message

    # Relabel to extract container name and compose service
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: container_name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
