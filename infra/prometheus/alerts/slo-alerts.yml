groups:
  - name: api-slo-availability
    rules:
      # Global API availability SLO: 99.9% success rate (error budget 0.1%)
      - alert: APIAvailabilityFastBurn
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(valuecanvas_http_requests_total[5m]))
          > 0.01
        for: 10m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "Fast burn: API availability SLO breach"
          description: "5xx error ratio is above 1.00% for 10m, consuming error budget too quickly."

      - alert: APIAvailabilitySlowBurn
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[30m]))
          /
          sum(rate(valuecanvas_http_requests_total[30m]))
          > 0.001
        for: 1h
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Slow burn: API availability SLO at risk"
          description: "5xx error ratio is above 0.10% for 1h (below 99.9% availability objective)."

  - name: api-slo-latency
    rules:
      # Interactive API latency SLO: p95 completion under 200ms
      - alert: APIInteractiveLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="interactive"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
          slo: interactive-latency
        annotations:
          summary: "Interactive completion latency SLO breach"
          description: "Interactive request completion p95 has exceeded 200ms for at least 10m."

      # Orchestration SLO: time-to-first-byte p95 under 200ms
      - alert: APIOrchestrationTTFBP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_ttfb_ms_bucket{latency_class="orchestration"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
          slo: orchestration-ttfb
        annotations:
          summary: "Orchestration TTFB SLO breach"
          description: "Orchestration request time-to-first-byte p95 has exceeded 200ms for at least 10m."

      # Orchestration SLO: completion p95 under 3000ms
      - alert: APIOrchestrationCompletionP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="orchestration"}[5m])) by (le)
          ) > 3000
        for: 10m
        labels:
          severity: warning
          slo: orchestration-completion
        annotations:
          summary: "Orchestration completion latency SLO breach"
          description: "Orchestration request completion p95 has exceeded 3000ms for at least 10m."

  - name: api-slo-mttr
    rules:
      # MTTR SLO: incidents should resolve in <= 15 minutes
      - alert: APIMTTRHigh
        expr: |
          avg_over_time(valuecanvas_incident_mttr_minutes[24h]) > 15
        for: 15m
        labels:
          severity: critical
          slo: mttr
        annotations:
          summary: "MTTR SLO breach"
          description: "Average incident MTTR over 24h exceeds 15 minutes."
