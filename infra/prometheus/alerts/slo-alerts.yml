groups:
  - name: api-slo-availability
    rules:
      # Global API availability SLO: 99.9% success rate (error budget 0.1%)
      - alert: APIAvailabilityFastBurn
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(valuecanvas_http_requests_total[5m]))
          > 0.01
        for: 10m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "Fast burn: API availability SLO breach"
          description: "5xx error ratio is above 1.00% for 10m, consuming error budget too quickly."

      - alert: APIAvailabilitySlowBurn
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[30m]))
          /
          sum(rate(valuecanvas_http_requests_total[30m]))
          > 0.001
        for: 1h
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Slow burn: API availability SLO at risk"
          description: "5xx error ratio is above 0.10% for 1h (below 99.9% availability objective)."

  - name: api-slo-latency
    rules:
      # API latency SLO: p95 under 200ms
      - alert: APILatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "High p95 latency"
          description: "P95 API latency has exceeded 200ms for at least 10m."

  - name: api-slo-mttr
    rules:
      # MTTR SLO: incidents should resolve in <= 15 minutes
      - alert: APIMTTRHigh
        expr: |
          avg_over_time(valuecanvas_incident_mttr_minutes[24h]) > 15
        for: 15m
        labels:
          severity: critical
          slo: mttr
        annotations:
          summary: "MTTR SLO breach"
          description: "Average incident MTTR over 24h exceeds 15 minutes."

  - name: api-slo-burn-rate
    rules:
      # Multi-window burn-rate alert used by the deploy.yml deployment gate.
      #
      # The alert name SLOBurnRateTooHigh must match the regex in deploy.yml
      # (line ~957): test("SLOBurnRateTooHigh")
      #
      # Threshold: 14.4x the steady-state error rate (0.1% budget).
      # At 14.4x burn the 30-day error budget exhausts in ~1 hour.
      # Two windows (5m fast-burn + 1h slow-burn) reduce false positives.
      - alert: SLOBurnRateTooHigh
        expr: |
          (
            sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
            / sum(rate(valuecanvas_http_requests_total[5m]))
          ) > (14.4 * 0.001)
          and
          (
            sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[1h]))
            / sum(rate(valuecanvas_http_requests_total[1h]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: availability
          team: platform
        annotations:
          summary: "SLO burn rate too high"
          description: >
            Error-budget burn rate exceeds 14.4x on both 5m and 1h windows.
            At this rate the 30-day availability budget exhausts in under 1 hour.
            Current 5m error ratio: {{ $value | humanizePercentage }}.
