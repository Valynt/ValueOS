groups:
  - name: backend-api-alerts
    rules:
      - alert: HighHttpErrorRate
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(valuecanvas_http_requests_total[5m]))
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate > 5% over the last 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-higherrorrate"

      - alert: InteractiveLatencyBudgetExceeded
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="interactive"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: page
          latency_class: interactive-completion
        annotations:
          summary: "Interactive completion latency budget exceeded"
          description: "Interactive completion p95 is above 200ms for 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: OrchestrationAcknowledgmentLatencyBudgetExceeded
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="orchestration",phase="acknowledgment"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
          latency_class: orchestration-acknowledgment
        annotations:
          summary: "Orchestration acknowledgment latency budget exceeded"
          description: "Orchestration acknowledgment p95 is above 200ms for 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: OrchestrationCompletionLatencyBudgetExceeded
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="orchestration",phase="completion"}[5m])) by (le)
          ) > 3000
        for: 10m
        labels:
          severity: warning
          latency_class: orchestration-completion
        annotations:
          summary: "Orchestration completion latency budget exceeded"
          description: "Orchestration completion p95 is above 3000ms for 10 minutes outside the documented async exception policy."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: ApiScrapeDown
        expr: up{job="valuecanvas-api"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "valuecanvas-api Prometheus target is down"
          description: "No scrape data from valuecanvas-api for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-poddown"

      - alert: PostgresScrapeDown
        expr: up{job="postgresql"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL Prometheus target is down"
          description: "No scrape data from postgresql job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-databaseconnectionpoolexhausted"

      - alert: RedisScrapeDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis Prometheus target is down"
          description: "No scrape data from redis job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highrequestrate"
