groups:
  - name: backend-api-alerts
    rules:
      - alert: HighHttpErrorRate
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(valuecanvas_http_requests_total[5m]))
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate > 5% over the last 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-higherrorrate"

      - alert: HighInteractiveCompletionLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{route!~"/api/(llm|billing|queue).*",route!~"/health(/.*)?",route!="/metrics"}[5m])) by (le, route)
          ) > 200
        for: 5m
        labels:
          severity: page
          latency_class: interactive
        annotations:
          summary: "High interactive completion latency"
          description: "Interactive route p95 completion latency is above 200ms for more than 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: HighOrchestrationAcknowledgmentLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="orchestration",latency_phase="acknowledgment"}[5m])) by (le, route)
          ) > 200
        for: 5m
        labels:
          severity: warning
          latency_class: orchestration
          latency_phase: acknowledgment
        annotations:
          summary: "High orchestration acknowledgment latency"
          description: "Orchestration acknowledgment p95 latency is above 200ms for more than 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: HighOrchestrationCompletionLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{route=~"/api/(llm|billing|queue).*"}[5m])) by (le, route)
          ) > 3000
        for: 10m
        labels:
          severity: warning
          latency_class: orchestration
          latency_phase: completion
        annotations:
          summary: "High orchestration completion latency"
          description: "Orchestration completion p95 latency is above the allowed 3000ms exception policy for more than 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"

      - alert: ApiScrapeDown
        expr: up{job="valuecanvas-api"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "valuecanvas-api Prometheus target is down"
          description: "No scrape data from valuecanvas-api for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-poddown"

      - alert: PostgresScrapeDown
        expr: up{job="postgresql"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL Prometheus target is down"
          description: "No scrape data from postgresql job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-databaseconnectionpoolexhausted"

      - alert: RedisScrapeDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis Prometheus target is down"
          description: "No scrape data from redis job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highrequestrate"

      - alert: HighValueCaseGetP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{route="/api/value-cases"}[5m])) by (le)
          ) > 200
        for: 5m
        labels:
          severity: page
          latency_class: interactive
        annotations:
          summary: "High latency for value-cases endpoint (interactive completion P95 > 200ms)"
          description: "Interactive completion p95 latency for /api/value-cases is above 200ms for more than 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highresponsetime"
