groups:
  - name: backend-api-alerts
    rules:
      - alert: HighHttpErrorRate
        expr: |
          sum(rate(valuecanvas_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(valuecanvas_http_requests_total[5m]))
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate > 5% over the last 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-higherrorrate"

      - alert: InteractiveLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="interactive"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Interactive completion latency SLO is breaching"
          description: "Interactive request completion p95 is above 200ms for 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#interactivecompletionlatencyhigh"

      - alert: OrchestrationTTFBP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_ttfb_ms_bucket{latency_class="orchestration"}[5m])) by (le)
          ) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Orchestration TTFB SLO is breaching"
          description: "Orchestration request time-to-first-byte p95 is above 200ms for 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#orchestrationttfbhigh"

      - alert: OrchestrationCompletionP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{latency_class="orchestration"}[5m])) by (le)
          ) > 3000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Orchestration completion latency SLO is breaching"
          description: "Orchestration request completion p95 is above 3000ms for 10 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#orchestrationcompletionhigh"

      - alert: ApiScrapeDown
        expr: up{job="valuecanvas-api"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "valuecanvas-api Prometheus target is down"
          description: "No scrape data from valuecanvas-api for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-poddown"

      - alert: PostgresScrapeDown
        expr: up{job="postgresql"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL Prometheus target is down"
          description: "No scrape data from postgresql job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-databaseconnectionpoolexhausted"

      - alert: RedisScrapeDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis Prometheus target is down"
          description: "No scrape data from redis job for 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#alert-highrequestrate"

      - alert: HighValueCaseGetP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(valuecanvas_http_request_duration_ms_bucket{route="/api/value-cases"}[5m])) by (le)
          ) > 200
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "High latency for value-cases endpoint (P95 > 200ms)"
          description: "P95 latency for /api/value-cases is above 200ms for more than 5 minutes."
          runbook: "https://github.com/ValueOS/ValueOS/blob/main/docs/runbooks/alert-runbooks.md#interactivecompletionlatencyhigh"
