apiVersion: v1
kind: ConfigMap
metadata:
  name: istio
  namespace: istio-system
data:
  mesh: |-
    # Enable mTLS globally
    defaultConfig:
      proxyMetadata:
        ISTIO_META_DNS_CAPTURE: "true"
        ISTIO_META_DNS_AUTO_ALLOCATE: "true"
    # Global mTLS settings
    peerAuthentication:
      mtls:
        mode: STRICT
    # Traffic policies
    trafficPolicies:
      - name: "default"
        tls:
          mode: ISTIO_MUTUAL
        loadBalancer:
          simple: ROUND_ROBIN
    # Enable access logging
    accessLogFile: "/dev/stdout"
    accessLogFormat: |
      [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%"
      %RESPONSE_CODE% %RESPONSE_FLAGS% "%DYNAMIC_METADATA(istio.mixer:status)%"
      "%UPSTREAM_TRANSPORT_FAILURE_REASON%" %BYTES_RECEIVED% %BYTES_SENT%
      %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% "%REQ(X-FORWARDED-FOR)%"
      "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%"
      "%UPSTREAM_HOST%" %UPSTREAM_CLUSTER% %UPSTREAM_LOCAL_ADDRESS%
      %DOWNSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_REMOTE_ADDRESS%
      %REQUESTED_SERVER_NAME% %ROUTE_NAME%
    # Security settings
    disablePolicyChecks: false
    enableTracing: true
    extensionProviders:
    - name: "envoy.ext_authz"
      envoyExtAuthzHttp:
        service: "ext-authz-service.default.svc.cluster.local"
        port: "80"
        includeHeadersInCheck: ["authorization", "x-tenant-id", "x-user-id"]
        headersToUpstreamOnAllow: ["x-auth-user", "x-auth-groups"]
        headersToDownstreamOnDeny: ["www-authenticate"]
    # Zero-trust settings
    trustDomain: "valueos.local"
    rootNamespace: "istio-system"
