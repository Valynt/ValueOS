apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: valynt
  labels:
    app: valynt
    component: database
    job-type: backup
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: valynt
            component: database-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: valynt-backend
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          volumes:
            - name: backup-data
              emptyDir: {}
          containers:
            - name: backup-export
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP="$(date +%Y%m%d_%H%M%S)"
                  mkdir -p /backup
                  BACKUP_FILE="/backup/valueos_backup_${TIMESTAMP}.sql.gz"

                  echo "Starting database export at ${TIMESTAMP}"
                  pg_dump "${DATABASE_URL}" --no-owner --no-acl | gzip > "${BACKUP_FILE}"

                  BACKUP_SIZE=$(wc -c < "${BACKUP_FILE}")
                  if [ "${BACKUP_SIZE}" -lt 1024 ]; then
                    echo "ERROR: Backup file suspiciously small (${BACKUP_SIZE} bytes)"
                    exit 1
                  fi

                  echo "Database export ready: ${BACKUP_FILE} (${BACKUP_SIZE} bytes)"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: valynt-secrets
                      key: database-url
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
            - name: backup-upload
              image: public.ecr.aws/aws-cli/aws-cli:2.17.49
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  if [ -z "${S3_BACKUP_BUCKET:-}" ] || [ -z "${AWS_DEFAULT_REGION:-}" ]; then
                    echo "ERROR: S3_BACKUP_BUCKET and AWS_DEFAULT_REGION are required"
                    exit 1
                  fi

                  if ! printf '%s' "${BACKUP_RETENTION_DAYS}" | grep -Eq '^[0-9]+$'; then
                    echo "ERROR: BACKUP_RETENTION_DAYS must be numeric"
                    exit 1
                  fi

                  for i in $(seq 1 120); do
                    BACKUP_FILE=$(find /backup -maxdepth 1 -name 'valueos_backup_*.sql.gz' | head -n 1 || true)
                    if [ -n "${BACKUP_FILE}" ]; then
                      break
                    fi
                    sleep 2
                  done

                  if [ -z "${BACKUP_FILE:-}" ]; then
                    echo "ERROR: Timed out waiting for backup export"
                    exit 1
                  fi

                  OBJECT_KEY="database-backups/$(basename "${BACKUP_FILE}")"

                  aws s3api put-object \
                    --bucket "${S3_BACKUP_BUCKET}" \
                    --key "${OBJECT_KEY}" \
                    --body "${BACKUP_FILE}" \
                    --server-side-encryption "${S3_SSE_ALGORITHM}" \
                    --metadata "retention-days=${BACKUP_RETENTION_DAYS}" \
                    --region "${AWS_DEFAULT_REGION}"

                  aws s3api head-object \
                    --bucket "${S3_BACKUP_BUCKET}" \
                    --key "${OBJECT_KEY}" \
                    --region "${AWS_DEFAULT_REGION}" \
                    --query 'ServerSideEncryption' \
                    --output text | grep -Fx "${S3_SSE_ALGORITHM}"

                  echo "Backup uploaded with SSE=${S3_SSE_ALGORITHM}."
                  echo "Retention is enforced via S3 bucket lifecycle policy (days=${BACKUP_RETENTION_DAYS})."
              env:
                - name: S3_BACKUP_BUCKET
                  value: "valueos-production-backups"
                - name: BACKUP_RETENTION_DAYS
                  value: "90"
                - name: S3_SSE_ALGORITHM
                  value: "AES256"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
