apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: valynt
  labels:
    app: valynt
    component: database
    job-type: backup
spec:
  # Daily at 03:00 UTC
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min max
      template:
        metadata:
          labels:
            app: valynt
            component: database-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: valynt-backend
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001

          containers:
            - name: backup
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/tmp/valueos_backup_${TIMESTAMP}.sql.gz"

                  echo "Starting database backup at ${TIMESTAMP}"
                  pg_dump "${DATABASE_URL}" --no-owner --no-acl | gzip > "${BACKUP_FILE}"

                  echo "Uploading to S3..."
                  # aws cli is not in postgres image; use a sidecar or init container
                  # with aws-cli for real deployments. This uses a pre-installed binary.
                  if command -v aws >/dev/null 2>&1; then
                    aws s3 cp "${BACKUP_FILE}" \
                      "s3://${S3_BACKUP_BUCKET}/database-backups/${TIMESTAMP}.sql.gz" \
                      --sse AES256
                    echo "Backup uploaded successfully"

                    # Prune backups older than retention period
                    aws s3 ls "s3://${S3_BACKUP_BUCKET}/database-backups/" \
                      | awk '{print $4}' \
                      | sort \
                      | head -n -${BACKUP_RETENTION_COUNT:-90} \
                      | xargs -I{} aws s3 rm "s3://${S3_BACKUP_BUCKET}/database-backups/{}"
                    echo "Old backups pruned"
                  else
                    echo "WARNING: aws CLI not available; backup saved locally only"
                    ls -lh "${BACKUP_FILE}"
                  fi

                  # Verify backup is non-empty
                  BACKUP_SIZE=$(stat -c%s "${BACKUP_FILE}" 2>/dev/null || stat -f%z "${BACKUP_FILE}")
                  if [ "${BACKUP_SIZE}" -lt 1024 ]; then
                    echo "ERROR: Backup file suspiciously small (${BACKUP_SIZE} bytes)"
                    exit 1
                  fi

                  echo "Backup completed: ${BACKUP_SIZE} bytes"
                  rm -f "${BACKUP_FILE}"

              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: valynt-secrets
                      key: database-url
                - name: S3_BACKUP_BUCKET
                  value: "valueos-production-backups"
                - name: BACKUP_RETENTION_COUNT
                  value: "90"
                - name: AWS_DEFAULT_REGION
                  value: "us-east-1"

              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false  # needs /tmp for backup file
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
