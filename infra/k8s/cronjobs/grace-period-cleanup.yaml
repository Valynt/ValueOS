apiVersion: batch/v1
kind: CronJob
metadata:
  name: grace-period-cleanup
  labels:
    app: valynt
    component: billing
    job-type: grace-period-cleanup
spec:
  # Run daily at 3 AM
  schedule: "0 3 * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  concurrencyPolicy: Forbid

  startingDeadlineSeconds: 300

  jobTemplate:
    metadata:
      labels:
        app: valynt
        component: billing
        job-type: grace-period-cleanup
    spec:
      backoffLimit: 1

      activeDeadlineSeconds: 600

      template:
        metadata:
          labels:
            app: valynt
            component: billing
            job-type: grace-period-cleanup
        spec:
          restartPolicy: OnFailure

          containers:
          - name: grace-period-cleanup
            image: ghcr.io/valynt/valueos-backend:latest
            imagePullPolicy: Always

            command:
            - node
            - scripts/jobs/grace-period-cleanup.js
            - --days=30

            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: url

            - name: VITE_SUPABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: supabase-url

            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-credentials
                  key: service-role-key

            - name: NODE_ENV
              value: "production"

            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
