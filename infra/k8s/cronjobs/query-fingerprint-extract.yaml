apiVersion: batch/v1
kind: CronJob
metadata:
  name: query-fingerprint-extract
  namespace: valueos
spec:
  schedule: "15 * * * *"
  successfulJobsHistoryLimit: 6
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: query-fingerprint-extract
              image: postgres:16
              imagePullPolicy: IfNotPresent
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: valueos-postgres
                      key: database_url
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail
                  psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/top-query-fingerprints.sql --csv > /tmp/top-query-fingerprints.csv
                  cat /tmp/top-query-fingerprints.csv
              volumeMounts:
                - name: query-fingerprint-sql
                  mountPath: /sql
                  readOnly: true
          volumes:
            - name: query-fingerprint-sql
              configMap:
                name: query-fingerprint-sql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: query-fingerprint-sql
  namespace: valueos
data:
  top-query-fingerprints.sql: |
    WITH scoped AS (
      SELECT
        queryid,
        calls,
        total_exec_time,
        mean_exec_time,
        rows,
        shared_blks_hit,
        shared_blks_read,
        temp_blks_written,
        query
      FROM pg_stat_statements
      WHERE query NOT ILIKE '%pg_stat_statements%'
    )
    SELECT
      metric,
      rank,
      queryid,
      calls,
      ROUND(total_exec_time::numeric, 2) AS total_exec_time_ms,
      ROUND(mean_exec_time::numeric, 2) AS mean_exec_time_ms,
      rows,
      shared_blks_hit,
      shared_blks_read,
      temp_blks_written,
      query
    FROM (
      SELECT
        'total_exec_time'::text AS metric,
        ROW_NUMBER() OVER (ORDER BY total_exec_time DESC) AS rank,
        *
      FROM scoped

      UNION ALL

      SELECT
        'mean_exec_time'::text AS metric,
        ROW_NUMBER() OVER (ORDER BY mean_exec_time DESC) AS rank,
        *
      FROM scoped

      UNION ALL

      SELECT
        'calls'::text AS metric,
        ROW_NUMBER() OVER (ORDER BY calls DESC) AS rank,
        *
      FROM scoped
    ) ranked
    WHERE rank <= 25
    ORDER BY metric, rank;
