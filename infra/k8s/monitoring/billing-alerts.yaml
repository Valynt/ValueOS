apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: billing-alerts
  labels:
    app.kubernetes.io/component: billing
spec:
  groups:
    # ================================================================
    # Webhook Reliability (Sprint 1.5)
    # ================================================================
    - name: billing.webhook_reliability
      rules:
        - alert: WebhookProcessingDrift
          expr: |
            (
              rate(webhooks_processed_total{status="success"}[5m])
              /
              rate(webhooks_received_total[5m])
            ) < 0.95
          for: 10m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Webhook processing rate below 95%"
            description: >
              Less than 95% of received webhooks are being successfully processed
              over the last 5 minutes. Current ratio: {{ $value | humanizePercentage }}.
              Silent revenue loss may be occurring.
            runbook_url: "https://docs.valueos.com/runbooks/webhook-processing-drift"

        - alert: WebhookDLQGrowing
          expr: webhook_dlq_size > 10
          for: 15m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Webhook DLQ depth above threshold"
            description: >
              {{ $value }} webhook events are permanently failed (DLQ depth > 10)
              and have not been replayed for 15 minutes.
            runbook_url: "https://docs.valueos.com/runbooks/webhook-dlq"

        - alert: ReconciliationJobFailing
          expr: increase(webhook_reconciliation_failures_total[1h]) > 0
          for: 0m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Stripe reconciliation job failed"
            description: >
              The Stripe↔DB reconciliation job has failed {{ $value }} time(s)
              in the last hour. Missing events may not be recovered automatically.
            runbook_url: "https://docs.valueos.com/runbooks/reconciliation-failure"

        - alert: ReconciliationDriftDetected
          expr: webhook_reconciliation_drift_count > 0
          for: 0m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Stripe↔DB reconciliation drift detected"
            description: >
              {{ $value }} Stripe event(s) were found in Stripe but not in the
              local database during the last reconciliation run. Backfill has
              been attempted automatically.
            runbook_url: "https://docs.valueos.com/runbooks/reconciliation-drift"

    # ================================================================
    # Usage Aggregation Cronjob Health
    # ================================================================
    - name: billing.usage_aggregation
      rules:
        - alert: UsageAggregationJobFailing
          expr: |
            kube_job_status_failed{job_name=~"usage-aggregation-.*"} > 0
          for: 15m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Usage aggregation cronjob is failing"
            description: "The usage-aggregation job has failed {{ $value }} times in the last 15 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/billing-usage-aggregation"

        - alert: UsageAggregationJobMissing
          expr: |
            time() - kube_cronjob_status_last_schedule_time{cronjob="usage-aggregation"} > 900
          for: 5m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Usage aggregation cronjob has not run in 15+ minutes"
            description: "Expected every 5 minutes; last run was {{ $value | humanizeDuration }} ago"

        - alert: UsageAggregationBacklog
          expr: |
            billing_usage_records_unaggregated > 5000
          for: 30m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Large backlog of un-aggregated usage records"
            description: "{{ $value }} records pending aggregation"

    # ================================================================
    # Stripe Submission Health
    # ================================================================
    - name: billing.stripe_submission
      rules:
        - alert: StripeSubmissionErrorRate
          expr: |
            (
              rate(billing_stripe_submission_errors_total[10m])
              /
              clamp_min(rate(billing_stripe_submission_total[10m]), 0.001)
            ) > 0.1
          for: 10m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Stripe usage submission error rate above 10%"
            description: "Error rate is {{ $value | humanizePercentage }}"

        - alert: StripeSubmissionLatencyHigh
          expr: |
            histogram_quantile(0.95, rate(billing_stripe_submission_duration_seconds_bucket[5m])) > 5
          for: 10m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Stripe submission p95 latency above 5s"
            description: "p95 latency is {{ $value }}s"

        - alert: StripePendingAggregatesStale
          expr: |
            billing_pending_aggregates_age_seconds > 3600
          for: 15m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Pending usage aggregates are older than 1 hour"
            description: "Oldest pending aggregate is {{ $value | humanizeDuration }} old"

    # ================================================================
    # Approval Workflow Health
    # ================================================================
    - name: billing.approvals
      rules:
        - alert: ApprovalCleanupJobFailing
          expr: |
            kube_job_status_failed{job_name=~"approval-cleanup-.*"} > 0
          for: 30m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Approval cleanup cronjob is failing"
            description: "The approval-cleanup job has failed"

        - alert: StaleApprovalRequests
          expr: |
            billing_approval_requests_pending_age_seconds > 604800
          for: 1h
          labels:
            severity: info
            component: billing
          annotations:
            summary: "Approval requests pending for over 7 days"
            description: "{{ $value }} approval requests are stale"

    # ================================================================
    # Webhook Processing Health
    # ================================================================
    - name: billing.webhooks
      rules:
        - alert: WebhookUnresolvedTenant
          expr: |
            increase(billing_webhook_unresolved_tenant_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "payment_succeeded event could not resolve tenant"
            description: "A Stripe payment succeeded but no billing_customers row matched the customer ID. Tenant enforcement state was not updated — tenant paid but may remain restricted."
            runbook_url: "https://docs.valueos.com/runbooks/billing-unresolved-tenant"

        - alert: WebhookRetryBacklog
          expr: |
            billing_webhook_retry_queue_size > 100
          for: 30m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Webhook retry queue is growing"
            description: "{{ $value }} webhooks pending retry"

        - alert: WebhookProcessingErrorRate
          expr: |
            (
              rate(billing_webhook_processing_errors_total[10m])
              /
              clamp_min(rate(billing_webhook_processing_total[10m]), 0.001)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Webhook processing error rate above 5%"
            description: "Error rate is {{ $value | humanizePercentage }}"

        # ── DLQ / BullMQ exhaustion alerts ──────────────────────────────────

        - alert: WebhookRetryExhausted
          expr: |
            increase(billing_webhook_exhausted_total[15m]) > 0
          for: 1m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Webhook retry exhausted — event moved to DLQ"
            description: |
              {{ $value }} Stripe webhook event(s) exhausted all BullMQ retry
              attempts. These events require manual replay. Billing state may
              be inconsistent.
            runbook_url: "https://docs.valueos.com/runbooks/billing-webhook-dlq"

        - alert: WebhookBullMQFailedJobsHigh
          expr: |
            increase(queue_job_total{queue="webhook-retry",status="failed"}[30m]) > 5
          for: 5m
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "BullMQ webhook-retry queue has elevated failures"
            description: "More than 5 webhook-retry jobs failed in the last 30 minutes."

        - alert: WebhookRetryWorkerStalled
          expr: |
            queue_consumer_lag{queue="webhook-retry"} > 10
            and
            queue_job_total{queue="webhook-retry",status="active"} == 0
          for: 10m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Webhook retry worker appears stalled"
            description: |
              The webhook-retry queue has {{ $value }} waiting/delayed jobs but
              no active processing for 10 minutes. The WebhookRetryWorker may
              be down or unable to connect to Redis.

    # ================================================================
    # Invoice and Revenue Health
    # ================================================================
    - name: billing.invoices
      rules:
        - alert: InvoiceGenerationFailures
          expr: |
            rate(billing_invoice_generation_errors_total[1h]) > 0
          for: 15m
          labels:
            severity: critical
            component: billing
          annotations:
            summary: "Invoice generation failures detected"
            description: "{{ $value }} invoice generation errors per second"

        - alert: HighUnpaidInvoiceRate
          expr: |
            (
              billing_invoices_unpaid_total
              /
              clamp_min(billing_invoices_total, 1)
            ) > 0.2
          for: 24h
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "More than 20% of invoices are unpaid"
            description: "Unpaid rate is {{ $value | humanizePercentage }}"

    # ================================================================
    # Quota and Overage Monitoring
    # ================================================================
    - name: billing.quotas
      rules:
        - alert: TenantQuotaExceeded
          expr: |
            billing_tenant_quota_usage_ratio > 1.0
          for: 5m
          labels:
            severity: info
            component: billing
          annotations:
            summary: "Tenant {{ $labels.tenant_id }} exceeded quota for {{ $labels.metric }}"
            description: "Usage ratio is {{ $value }} ({{ $value | humanizePercentage }} of quota)"

        - alert: HighOverageSpend
          expr: |
            billing_tenant_overage_amount_dollars > 500
          for: 1h
          labels:
            severity: warning
            component: billing
          annotations:
            summary: "Tenant {{ $labels.tenant_id }} has high overage charges"
            description: "Overage amount is ${{ $value }}"
