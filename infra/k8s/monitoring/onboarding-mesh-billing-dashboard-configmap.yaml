apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-onboarding-mesh-billing
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: observability
data:
  onboarding-mesh-billing-observability.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "id": null,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            {
              "expr": "onboarding:provision_tenant:success_rate5m",
              "legendFormat": "success rate",
              "refId": "A"
            }
          ],
          "title": "Onboarding Provision Tenant Success Rate (5m)",
          "type": "gauge"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "id": 2,
          "targets": [
            {
              "expr": "sum by (status) (rate(provision_tenant_calls_total[5m]))",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "title": "Provision Tenant Calls by Outcome",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "targets": [
            {
              "expr": "topk(8, sum by (error_code) (rate(provision_tenant_calls_total{status=\"error\"}[5m])))",
              "legendFormat": "{{error_code}}",
              "refId": "A"
            }
          ],
          "title": "Provision Tenant Error Breakdown (Top 8)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "targets": [
            {
              "expr": "onboarding:provision_tenant:error_rate5m",
              "legendFormat": "error rate",
              "refId": "A"
            }
          ],
          "title": "Provision Tenant Error Rate (5m)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "id": 5,
          "targets": [
            {
              "expr": "mesh:latency_overhead_ms:p95",
              "legendFormat": "mesh overhead p95",
              "refId": "A"
            }
          ],
          "title": "Mesh Added Latency (p95)",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 16 },
          "id": 6,
          "targets": [
            {
              "expr": "mesh:request_latency_seconds:p95",
              "legendFormat": "mesh request p95",
              "refId": "A"
            },
            {
              "expr": "app:request_latency_seconds:p95",
              "legendFormat": "app request p95",
              "refId": "B"
            },
            {
              "expr": "app:request_latency_seconds_no_proxy:p95",
              "legendFormat": "app request p95 (no-proxy baseline)",
              "refId": "C"
            }
          ],
          "title": "App vs Mesh Request Latency p95",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 24 },
          "id": 7,
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "billing:stripe_invoice_created_ack_latency_seconds:p95",
              "legendFormat": "invoice.created ack p95",
              "refId": "A"
            }
          ],
          "title": "Stripe invoice.created ACK Latency p95",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 24 },
          "id": 8,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(billing_stripe_webhook_ack_latency_seconds_bucket{event_type=\"invoice.created\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(billing_stripe_webhook_ack_latency_seconds_bucket{event_type=\"invoice.created\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "B"
            }
          ],
          "title": "Stripe invoice.created ACK Latency Distribution",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["onboarding", "mesh", "billing", "stripe", "sre"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Onboarding, Mesh Overhead & Stripe ACK",
      "timezone": "UTC",
      "version": 1
    }
