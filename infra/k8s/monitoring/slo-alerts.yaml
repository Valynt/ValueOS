---
# SLO burn-rate and latency-policy alerting rules.
#
# Fires when the canonical latency/error budget policy from
# docs/operations/slo-sli.md is violated.
#
# SLO targets:
#   SLO-1: API availability                          99.9%  (error budget 0.1%)
#   SLO-2: Interactive completion latency p95       <= 200ms
#   SLO-3: Orchestration acknowledgment latency p95 <= 200ms
#   SLO-3: Orchestration completion exception p95   <= 3000ms

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-burn-rate-alerts
  namespace: valynt
  labels:
    app: valueos
    component: slo-alerting
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # ── SLO-1: API Availability ───────────────────────────────────────────────
    - name: slo.api_availability
      rules:
        # Fast burn: consuming budget at 14× rate over 1h/5m windows
        - alert: SLO1ApiAvailabilityFastBurn
          expr: |
            (
              slo:api_availability:ratio_rate1h < (1 - 14 * 0.001)
            ) and (
              slo:api_availability:ratio_rate5m < (1 - 14 * 0.001)
            )
          for: 2m
          labels:
            severity: critical
            slo: api_availability
          annotations:
            summary: "API availability SLO fast burn (14×)"
            description: >
              API error rate is consuming the 30-day error budget at 14× the
              sustainable rate. At this pace the budget will be exhausted in
              ~2 hours. Current 1h ratio: {{ $value | humanizePercentage }}.

        # Slow burn: consuming budget at 6× rate over 6h/30m windows
        - alert: SLO1ApiAvailabilitySlowBurn
          expr: |
            (
              slo:api_availability:ratio_rate6h < (1 - 6 * 0.001)
            ) and (
              slo:api_availability:ratio_rate30m < (1 - 6 * 0.001)
            )
          for: 15m
          labels:
            severity: warning
            slo: api_availability
          annotations:
            summary: "API availability SLO slow burn (6×)"
            description: >
              API error rate is consuming the 30-day error budget at 6× the
              sustainable rate. Current 6h ratio: {{ $value | humanizePercentage }}.

    # ── SLO-2: Interactive Completion Latency (p95 <= 200ms) ────────────────
    - name: slo.interactive_completion_latency
      rules:
        - alert: SLO2InteractiveCompletionLatencyFastBurn
          expr: |
            (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="interactive"
                  }[1h])
                )
              ) > 0.2
            ) and (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="interactive"
                  }[5m])
                )
              ) > 0.2
            )
          for: 2m
          labels:
            severity: critical
            slo: interactive_completion_latency
            latency_class: interactive
          annotations:
            summary: "Interactive completion p95 exceeds 200ms (fast burn)"
            description: >
              Interactive route completion latency has exceeded the 200ms p95
              policy in both the 1h and 5m windows. Current 5m p95:
              {{ $value | humanizeDuration }}.

        - alert: SLO2InteractiveCompletionLatencySlowBurn
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(http_request_duration_seconds_bucket{
                  job="valueos-api",
                  latency_class="interactive"
                }[6h])
              )
            ) > 0.2
          for: 15m
          labels:
            severity: warning
            slo: interactive_completion_latency
            latency_class: interactive
          annotations:
            summary: "Interactive completion p95 exceeds 200ms (slow burn)"
            description: >
              Interactive route completion latency has exceeded the 200ms p95
              policy over the last 6 hours. Current 6h p95:
              {{ $value | humanizeDuration }}.

    # ── SLO-3: Orchestration Acknowledgment Latency (p95 <= 200ms) ──────────
    - name: slo.orchestration_acknowledgment_latency
      rules:
        - alert: SLO3OrchestrationAcknowledgmentLatencyFastBurn
          expr: |
            (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="orchestration",
                    latency_phase="acknowledgment"
                  }[1h])
                )
              ) > 0.2
            ) and (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="orchestration",
                    latency_phase="acknowledgment"
                  }[5m])
                )
              ) > 0.2
            )
          for: 2m
          labels:
            severity: critical
            slo: orchestration_acknowledgment_latency
            latency_class: orchestration
            latency_phase: acknowledgment
          annotations:
            summary: "Orchestration acknowledgment p95 exceeds 200ms (fast burn)"
            description: >
              Orchestration acknowledgment latency has exceeded the 200ms p95
              policy in both the 1h and 5m windows. Current 5m p95:
              {{ $value | humanizeDuration }}.

        - alert: SLO3OrchestrationAcknowledgmentLatencySlowBurn
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(http_request_duration_seconds_bucket{
                  job="valueos-api",
                  latency_class="orchestration",
                  latency_phase="acknowledgment"
                }[6h])
              )
            ) > 0.2
          for: 15m
          labels:
            severity: warning
            slo: orchestration_acknowledgment_latency
            latency_class: orchestration
            latency_phase: acknowledgment
          annotations:
            summary: "Orchestration acknowledgment p95 exceeds 200ms (slow burn)"
            description: >
              Orchestration acknowledgment latency has exceeded the 200ms p95
              policy over the last 6 hours. Current 6h p95:
              {{ $value | humanizeDuration }}.

    # ── Exception Policy: Orchestration Completion (p95 <= 3000ms) ──────────
    - name: slo.orchestration_completion_exception_policy
      rules:
        - alert: OrchestrationCompletionExceptionPolicyFastBurn
          expr: |
            (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="orchestration",
                    latency_phase="completion"
                  }[1h])
                )
              ) > 3.0
            ) and (
              histogram_quantile(0.95,
                sum by (le) (
                  rate(http_request_duration_seconds_bucket{
                    job="valueos-api",
                    latency_class="orchestration",
                    latency_phase="completion"
                  }[5m])
                )
              ) > 3.0
            )
          for: 5m
          labels:
            severity: critical
            slo: orchestration_completion_exception_policy
            latency_class: orchestration
            latency_phase: completion
          annotations:
            summary: "Orchestration completion p95 exceeds 3000ms exception policy"
            description: >
              Orchestration completion latency has exceeded the allowed 3000ms
              p95 exception policy in both the 1h and 5m windows. This is an
              orchestration-class regression, not an interactive latency SLO.
              Current 5m p95: {{ $value | humanizeDuration }}.

        - alert: OrchestrationCompletionExceptionPolicySlowBurn
          expr: |
            histogram_quantile(0.95,
              sum by (le) (
                rate(http_request_duration_seconds_bucket{
                  job="valueos-api",
                  latency_class="orchestration",
                  latency_phase="completion"
                }[6h])
              )
            ) > 3.0
          for: 15m
          labels:
            severity: warning
            slo: orchestration_completion_exception_policy
            latency_class: orchestration
            latency_phase: completion
          annotations:
            summary: "Orchestration completion p95 exceeds 3000ms exception policy (slow burn)"
            description: >
              Orchestration completion latency has exceeded the allowed 3000ms
              p95 exception policy over the last 6 hours. Current 6h p95:
              {{ $value | humanizeDuration }}.
