---
# SLO burn-rate alerting rules
#
# Fires when error budget is being consumed faster than sustainable.
# Multi-window, multi-burn-rate approach (Google SRE Workbook ch.5).
#
# SLO targets:
#   SLO-1: API availability                      99.9%
#   SLO-2: Interactive completion latency p95   ≤200ms
#   SLO-3: Orchestration TTFB p95               ≤200ms
#   SLO-4: Orchestration completion latency p95 ≤3000ms

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-burn-rate-alerts
  namespace: valynt
  labels:
    app: valueos
    component: slo-alerting
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: slo.api_availability
      rules:
        - alert: SLO1ApiAvailabilityFastBurn
          expr: |
            (
              slo:api_availability:ratio_rate1h < (1 - 14 * 0.001)
            ) and (
              slo:api_availability:ratio_rate5m < (1 - 14 * 0.001)
            )
          for: 2m
          labels:
            severity: critical
            slo: api_availability
          annotations:
            summary: "API availability SLO fast burn (14×)"
            description: >
              API error rate is consuming the 30-day error budget at 14× the
              sustainable rate. At this pace the budget will be exhausted in
              ~2 hours. Current 1h ratio: {{ $value | humanizePercentage }}.

        - alert: SLO1ApiAvailabilitySlowBurn
          expr: |
            (
              slo:api_availability:ratio_rate6h < (1 - 6 * 0.001)
            ) and (
              slo:api_availability:ratio_rate30m < (1 - 6 * 0.001)
            )
          for: 15m
          labels:
            severity: warning
            slo: api_availability
          annotations:
            summary: "API availability SLO slow burn (6×)"
            description: >
              API error rate is consuming the 30-day error budget at 6× the
              sustainable rate. Current 6h ratio: {{ $value | humanizePercentage }}.

    - name: slo.interactive_completion_latency
      rules:
        - alert: SLO2InteractiveCompletionLatencyFastBurn
          expr: |
            (
              histogram_quantile(
                0.95,
                sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="interactive"}[1h])) by (le)
              ) > 200
            ) and (
              histogram_quantile(
                0.95,
                sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="interactive"}[5m])) by (le)
              ) > 200
            )
          for: 2m
          labels:
            severity: critical
            slo: interactive_completion_latency
          annotations:
            summary: "Interactive completion p95 exceeds 200ms SLO (fast burn)"
            description: >
              Interactive request completion p95 has exceeded 200ms in both the
              1h and 5m windows. Current 5m p95: {{ $value }}ms.

        - alert: SLO2InteractiveCompletionLatencySlowBurn
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="interactive"}[6h])) by (le)
            ) > 200
          for: 15m
          labels:
            severity: warning
            slo: interactive_completion_latency
          annotations:
            summary: "Interactive completion p95 exceeds 200ms SLO (slow burn)"
            description: >
              Interactive request completion p95 has exceeded 200ms over the last
              6 hours. Current 6h p95: {{ $value }}ms.

    - name: slo.orchestration_ttfb_latency
      rules:
        - alert: SLO3OrchestrationTTFBFastBurn
          expr: |
            (
              max_over_time(backend_orchestration_ttfb_p95_latency_ms{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[1h]) > 200
            ) and (
              max_over_time(backend_orchestration_ttfb_p95_latency_ms{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[5m]) > 200
            )
          for: 2m
          labels:
            severity: critical
            slo: orchestration_ttfb_latency
          annotations:
            summary: "Orchestration TTFB p95 exceeds 200ms SLO (fast burn)"
            description: >
              Orchestration time-to-first-byte p95 has exceeded 200ms in both the
              1h and 5m windows. Current 5m p95: {{ $value }}ms.

        - alert: SLO3OrchestrationTTFBSlowBurn
          expr: |
            max_over_time(backend_orchestration_ttfb_p95_latency_ms{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[6h]) > 200
          for: 15m
          labels:
            severity: warning
            slo: orchestration_ttfb_latency
          annotations:
            summary: "Orchestration TTFB p95 exceeds 200ms SLO (slow burn)"
            description: >
              Orchestration time-to-first-byte p95 has exceeded 200ms over the last
              6 hours. Current 6h p95: {{ $value }}ms.

    - name: slo.orchestration_completion_latency
      rules:
        - alert: SLO4OrchestrationCompletionLatencyFastBurn
          expr: |
            (
              histogram_quantile(
                0.95,
                sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[1h])) by (le)
              ) > 3000
            ) and (
              histogram_quantile(
                0.95,
                sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[5m])) by (le)
              ) > 3000
            )
          for: 2m
          labels:
            severity: critical
            slo: orchestration_completion_latency
          annotations:
            summary: "Orchestration completion p95 exceeds 3000ms SLO (fast burn)"
            description: >
              Orchestration completion p95 has exceeded 3000ms in both the
              1h and 5m windows. Current 5m p95: {{ $value }}ms.

        - alert: SLO4OrchestrationCompletionLatencySlowBurn
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",latency_class="orchestration"}[6h])) by (le)
            ) > 3000
          for: 15m
          labels:
            severity: warning
            slo: orchestration_completion_latency
          annotations:
            summary: "Orchestration completion p95 exceeds 3000ms SLO (slow burn)"
            description: >
              Orchestration completion p95 has exceeded 3000ms over the last
              6 hours. Current 6h p95: {{ $value }}ms.
