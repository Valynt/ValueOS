---
# SLO burn-rate alerting rules
#
# Fires when error budget is being consumed faster than sustainable.
# Multi-window, multi-burn-rate approach (Google SRE Workbook ch.5).
#
# SLO targets (from docs/operations/slo-sli.md):
#   SLO-1: API availability   99.9%  (error budget 0.1%)
#   SLO-2: Case creation p95  ≤2000ms
#   SLO-3: Agent invocation p95 ≤10000ms

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: slo-burn-rate-alerts
  namespace: valynt
  labels:
    app: valueos
    component: slo-alerting
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # ── SLO-1: API Availability ───────────────────────────────────────────────
    - name: slo.api_availability
      rules:
        # Fast burn: consuming budget at 14× rate over 1h/5m windows
        - alert: SLO1ApiAvailabilityFastBurn
          expr: |
            (
              slo:api_availability:ratio_rate1h < (1 - 14 * 0.001)
            ) and (
              slo:api_availability:ratio_rate5m < (1 - 14 * 0.001)
            )
          for: 2m
          labels:
            severity: critical
            slo: api_availability
          annotations:
            summary: "API availability SLO fast burn (14×)"
            description: >
              API error rate is consuming the 30-day error budget at 14× the
              sustainable rate. At this pace the budget will be exhausted in
              ~2 hours. Current 1h ratio: {{ $value | humanizePercentage }}.

        # Slow burn: consuming budget at 6× rate over 6h/30m windows
        - alert: SLO1ApiAvailabilitySlowBurn
          expr: |
            (
              slo:api_availability:ratio_rate6h < (1 - 6 * 0.001)
            ) and (
              slo:api_availability:ratio_rate30m < (1 - 6 * 0.001)
            )
          for: 15m
          labels:
            severity: warning
            slo: api_availability
          annotations:
            summary: "API availability SLO slow burn (6×)"
            description: >
              API error rate is consuming the 30-day error budget at 6× the
              sustainable rate. Current 6h ratio: {{ $value | humanizePercentage }}.

    # ── SLO-2: Case Creation Latency (p95 ≤ 2000ms) ─────────────────────────
    - name: slo.case_creation_latency
      rules:
        - alert: SLO2CaseCreationLatencyFastBurn
          expr: |
            (
              histogram_quantile(0.95,
                rate(http_request_duration_seconds_bucket{
                  job="valueos-api",
                  route=~"/api/v1/cases.*",
                  method="POST"
                }[1h])
              ) > 2.0
            ) and (
              histogram_quantile(0.95,
                rate(http_request_duration_seconds_bucket{
                  job="valueos-api",
                  route=~"/api/v1/cases.*",
                  method="POST"
                }[5m])
              ) > 2.0
            )
          for: 2m
          labels:
            severity: critical
            slo: case_creation_latency
          annotations:
            summary: "Case creation p95 latency exceeds 2s SLO (fast burn)"
            description: >
              POST /api/v1/cases p95 latency has exceeded 2000ms in both the
              1h and 5m windows. Current 5m p95: {{ $value | humanizeDuration }}.

        - alert: SLO2CaseCreationLatencySlowBurn
          expr: |
            histogram_quantile(0.95,
              rate(http_request_duration_seconds_bucket{
                job="valueos-api",
                route=~"/api/v1/cases.*",
                method="POST"
              }[6h])
            ) > 2.0
          for: 15m
          labels:
            severity: warning
            slo: case_creation_latency
          annotations:
            summary: "Case creation p95 latency exceeds 2s SLO (slow burn)"
            description: >
              POST /api/v1/cases p95 latency has exceeded 2000ms over the last
              6 hours. Current 6h p95: {{ $value | humanizeDuration }}.

    # ── SLO-3: Agent Invocation Latency (p95 ≤ 10000ms) ─────────────────────
    - name: slo.agent_invocation_latency
      rules:
        - alert: SLO3AgentInvocationLatencyFastBurn
          expr: |
            (
              histogram_quantile(0.95,
                rate(agent_invocation_duration_seconds_bucket{
                  job="valueos-api"
                }[1h])
              ) > 10.0
            ) and (
              histogram_quantile(0.95,
                rate(agent_invocation_duration_seconds_bucket{
                  job="valueos-api"
                }[5m])
              ) > 10.0
            )
          for: 2m
          labels:
            severity: critical
            slo: agent_invocation_latency
          annotations:
            summary: "Agent invocation p95 latency exceeds 10s SLO (fast burn)"
            description: >
              Agent invocation p95 latency has exceeded 10000ms in both the
              1h and 5m windows. Current 5m p95: {{ $value | humanizeDuration }}.

        - alert: SLO3AgentInvocationLatencySlowBurn
          expr: |
            histogram_quantile(0.95,
              rate(agent_invocation_duration_seconds_bucket{
                job="valueos-api"
              }[6h])
            ) > 10.0
          for: 15m
          labels:
            severity: warning
            slo: agent_invocation_latency
          annotations:
            summary: "Agent invocation p95 latency exceeds 10s SLO (slow burn)"
            description: >
              Agent invocation p95 latency has exceeded 10000ms over the last
              6 hours. Current 6h p95: {{ $value | humanizeDuration }}.
