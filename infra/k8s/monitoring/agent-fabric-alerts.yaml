apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agent-fabric-alerts
  labels:
    app.kubernetes.io/component: agent-fabric
spec:
  groups:
    - name: agent-fabric.health
      rules:
        - alert: AgentFabricExecutionErrorRateHigh
          expr: |
            (
              rate(agent_fabric_execution_failure_total[5m])
                /
                clamp_min(
                  rate(agent_fabric_execution_success_total[5m])
                  + rate(agent_fabric_execution_failure_total[5m]),
                  0.000001
                )
              ) > 0.05
          for: 10m
          labels:
            severity: warning
            component: agent-fabric
          annotations:
            summary: "Agent Fabric execution error rate is above 5%"
            description: "Execution error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-error-rate"

        - alert: AgentFabricExecutionLatencyP95High
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(agent_fabric_execution_duration_seconds_bucket[5m])) by (le)
            ) > 30
          for: 10m
          labels:
            severity: warning
            component: agent-fabric
          annotations:
            summary: "Agent Fabric execution p95 latency is high"
            description: "p95 latency is {{ $value }}s over the last 5 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-latency"

        - alert: AgentFabricExecutionLatencyP99High
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(agent_fabric_execution_duration_seconds_bucket[5m])) by (le)
            ) > 60
          for: 10m
          labels:
            severity: critical
            component: agent-fabric
          annotations:
            summary: "Agent Fabric execution p99 latency is critical"
            description: "p99 latency is {{ $value }}s over the last 5 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-latency"

        - alert: AgentFabricSecurityEventsSpike
          expr: |
            rate(agent_fabric_security_events_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
            component: agent-fabric
          annotations:
            summary: "Agent Fabric security events detected"
            description: "Security event rate is {{ $value }} events/sec over the last 5 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-security"

    - name: agent-fabric-business.rules
      rules:
        - alert: AgentFabricLowROI
          expr: |
            (
              rate(agent_fabric_value_generated_usd_total[1h])
                /
                clamp_min(rate(agent_fabric_cost_usd_total[1h]), 0.000001)
              ) * 100 < 50
          for: 15m
          labels:
            severity: warning
            component: agent-fabric
            business: "true"
          annotations:
            summary: "Agent Fabric ROI is below 50%"
            description: "ROI is {{ $value }}% over the last hour"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-roi"

        - alert: AgentFabricLowValueGeneration
          expr: |
            rate(agent_fabric_value_generated_usd_total[1h]) < 1000
          for: 15m
          labels:
            severity: warning
            component: agent-fabric
            business: "true"
          annotations:
            summary: "Agent Fabric value generation is low"
            description: "Value generation is ${{ $value }}/hour over the last hour"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-value"

        - alert: AgentFabricHighCostPerValue
          expr: |
            rate(agent_fabric_cost_usd_total[1h])
            /
            clamp_min(rate(agent_fabric_value_generated_usd_total[1h]), 0.000001) > 0.5
          for: 15m
          labels:
            severity: warning
            component: agent-fabric
            business: "true"
          annotations:
            summary: "Agent Fabric cost per value is high"
            description: "Cost per value is {{ $value | humanizePercentage }} over the last hour"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-cost-per-value"

        - alert: AgentFabricTokenUsageHigh
          expr: |
            rate(agent_fabric_token_usage_total[15m]) > 5000
          for: 15m
          labels:
            severity: warning
            component: agent-fabric
            business: "true"
          annotations:
            summary: "Agent Fabric token usage is high"
            description: "Token usage is {{ $value }} tokens/sec over the last 15 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-token-usage"

        - alert: AgentFabricCostBurnRateHigh
          expr: |
            rate(agent_fabric_cost_usd_total[30m]) > 50
          for: 30m
          labels:
            severity: warning
            component: agent-fabric
            business: "true"
          annotations:
            summary: "Agent Fabric cost burn rate is high"
            description: "Cost burn is ${{ $value }}/sec over the last 30 minutes"
            runbook_url: "https://docs.valueos.com/runbooks/agent-fabric-cost"
