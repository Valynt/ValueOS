apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-slo-rules
  namespace: monitoring
data:
  slo-rules.yaml: |
    groups:
      - name: valueos_slo_recording
        interval: 30s
        rules:
          # SLO targets
          - record: slo:target:api_availability
            expr: vector(0.999)

          - record: slo:target:api_latency_p95
            expr: vector(0.95)

          - record: slo:target:auth_success
            expr: vector(0.995)

          - record: slo:target:queue_health
            expr: vector(0.99)


          - record: slo:target:agent_cold_start
            expr: vector(0.95)

          # Agent cold-start SLI (enqueue-to-ready <= 45s)
          - record: slo:agent_cold_start:good_rate5m
            expr: |
              sum(rate(agent_enqueue_to_ready_seconds_bucket{le="45"}[5m]))
              /
              sum(rate(agent_enqueue_to_ready_seconds_count[5m]))

          - record: slo:agent_cold_start:good_rate1h
            expr: |
              sum(rate(agent_enqueue_to_ready_seconds_bucket{le="45"}[1h]))
              /
              sum(rate(agent_enqueue_to_ready_seconds_count[1h]))

          - record: slo:agent_cold_start:error_budget_burn_rate5m
            expr: |
              (1 - slo:agent_cold_start:good_rate5m) / (1 - slo:target:agent_cold_start)

          - record: slo:agent_cold_start:error_budget_burn_rate1h
            expr: |
              (1 - slo:agent_cold_start:good_rate1h) / (1 - slo:target:agent_cold_start)

          # API availability SLI (non-5xx over total)
          - record: slo:api_availability:ratio_rate5m
            expr: |
              sum(rate(valuecanvas_http_requests_total{job="valueos-app",service="valueos-backend",status_code!~"5.."}[5m]))
              /
              sum(rate(valuecanvas_http_requests_total{job="valueos-app",service="valueos-backend"}[5m]))

          - record: slo:api_availability:ratio_rate1h
            expr: |
              sum(rate(valuecanvas_http_requests_total{job="valueos-app",service="valueos-backend",status_code!~"5.."}[1h]))
              /
              sum(rate(valuecanvas_http_requests_total{job="valueos-app",service="valueos-backend"}[1h]))

          - record: slo:api_availability:error_budget_burn_rate5m
            expr: |
              (1 - slo:api_availability:ratio_rate5m) / (1 - slo:target:api_availability)

          - record: slo:api_availability:error_budget_burn_rate1h
            expr: |
              (1 - slo:api_availability:ratio_rate1h) / (1 - slo:target:api_availability)

          # API latency SLI (P95 under 300ms)
          - record: slo:api_latency:good_rate5m
            expr: |
              sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",le="300"}[5m]))
              /
              sum(rate(valuecanvas_http_request_duration_ms_count{job="valueos-app",service="valueos-backend"}[5m]))

          - record: slo:api_latency:good_rate1h
            expr: |
              sum(rate(valuecanvas_http_request_duration_ms_bucket{job="valueos-app",service="valueos-backend",le="300"}[1h]))
              /
              sum(rate(valuecanvas_http_request_duration_ms_count{job="valueos-app",service="valueos-backend"}[1h]))

          - record: slo:api_latency:error_budget_burn_rate5m
            expr: |
              (1 - slo:api_latency:good_rate5m) / (1 - slo:target:api_latency_p95)

          - record: slo:api_latency:error_budget_burn_rate1h
            expr: |
              (1 - slo:api_latency:good_rate1h) / (1 - slo:target:api_latency_p95)

          # Auth success SLI
          - record: slo:auth_success:ratio_rate5m
            expr: |
              sum(rate(auth_attempts_total{job="valueos-app",service="valueos-backend",result="success"}[5m]))
              /
              sum(rate(auth_attempts_total{job="valueos-app",service="valueos-backend"}[5m]))

          - record: slo:auth_success:ratio_rate1h
            expr: |
              sum(rate(auth_attempts_total{job="valueos-app",service="valueos-backend",result="success"}[1h]))
              /
              sum(rate(auth_attempts_total{job="valueos-app",service="valueos-backend"}[1h]))

          - record: slo:auth_success:error_budget_burn_rate5m
            expr: |
              (1 - slo:auth_success:ratio_rate5m) / (1 - slo:target:auth_success)

          - record: slo:auth_success:error_budget_burn_rate1h
            expr: |
              (1 - slo:auth_success:ratio_rate1h) / (1 - slo:target:auth_success)

          # Queue health SLI (queue depth and age within thresholds)
          - record: slo:queue_health:ratio_rate5m
            expr: |
              avg_over_time((queue_depth{job="valueos-app",service="valueos-backend",queue="default"} < bool 100)[5m:])
              *
              avg_over_time((queue_oldest_message_age_seconds{job="valueos-app",service="valueos-backend",queue="default"} < bool 120)[5m:])

          - record: slo:queue_health:ratio_rate1h
            expr: |
              avg_over_time((queue_depth{job="valueos-app",service="valueos-backend",queue="default"} < bool 100)[1h:])
              *
              avg_over_time((queue_oldest_message_age_seconds{job="valueos-app",service="valueos-backend",queue="default"} < bool 120)[1h:])

          - record: slo:queue_health:error_budget_burn_rate5m
            expr: |
              (1 - slo:queue_health:ratio_rate5m) / (1 - slo:target:queue_health)

          - record: slo:queue_health:error_budget_burn_rate1h
            expr: |
              (1 - slo:queue_health:ratio_rate1h) / (1 - slo:target:queue_health)

      - name: valueos_slo_burn_rate_alerts
        interval: 30s
        rules:
          - alert: ApiAvailabilitySLOBurnRateTooHigh
            expr: |
              slo:api_availability:error_budget_burn_rate5m > 14.4
              and
              slo:api_availability:error_budget_burn_rate1h > 14.4
            for: 5m
            labels:
              severity: critical
              slo: api-availability
            annotations:
              summary: "API availability error budget burn rate is critically high"
              description: "API availability burn-rate exceeded 14.4x in 5m and 1h windows"

          - alert: ApiLatencySLOBurnRateTooHigh
            expr: |
              slo:api_latency:error_budget_burn_rate5m > 14.4
              and
              slo:api_latency:error_budget_burn_rate1h > 14.4
            for: 5m
            labels:
              severity: critical
              slo: api-latency
            annotations:
              summary: "API latency error budget burn rate is critically high"
              description: "API latency burn-rate exceeded 14.4x in 5m and 1h windows"

          - alert: AuthSuccessSLOBurnRateTooHigh
            expr: |
              slo:auth_success:error_budget_burn_rate5m > 14.4
              and
              slo:auth_success:error_budget_burn_rate1h > 14.4
            for: 5m
            labels:
              severity: critical
              slo: auth-success
            annotations:
              summary: "Auth success error budget burn rate is critically high"
              description: "Auth success burn-rate exceeded 14.4x in 5m and 1h windows"

          - alert: QueueHealthSLOBurnRateTooHigh
            expr: |
              slo:queue_health:error_budget_burn_rate5m > 14.4
              and
              slo:queue_health:error_budget_burn_rate1h > 14.4
            for: 5m
            labels:
              severity: critical
              slo: queue-health
            annotations:
              summary: "Queue health error budget burn rate is critically high"
              description: "Queue health burn-rate exceeded 14.4x in 5m and 1h windows"


          - alert: AgentColdStartSLOBurnRateTooHigh
            expr: |
              slo:agent_cold_start:error_budget_burn_rate5m > 14.4
              and
              slo:agent_cold_start:error_budget_burn_rate1h > 14.4
            for: 5m
            labels:
              severity: critical
              slo: agent-cold-start
            annotations:
              summary: "Agent cold-start enqueue-to-ready SLO burn rate is critically high"
              description: "Cold-start burn-rate exceeded 14.4x in 5m and 1h windows"
