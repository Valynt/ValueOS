# Agent pairwise ALLOW authorization policies.
#
# Trust domain: valueos.internal
# SPIFFE principal format: spiffe://valueos.internal/ns/{namespace}/agents/{slug}
#
# These policies override the deny-by-default policy in deny-by-default-policy.yaml.
# Every edge declared here must also appear in agent-handoff-allowlist.md.
# Any communication path NOT listed here is denied.
#
# Agents covered: opportunity, target, financial-modeling, integrity, realization,
#   expansion, narrative, compliance-auditor, context-extraction, deal-assembly, discovery
#
# Backend orchestrator (spiffe://valueos.internal/ns/valynt/services/backend-api)
# is an allowed initiator for ALL agents.

# ── Backend orchestrator → all agents ────────────────────────────────────────
# The backend API is the sole external initiator of agent invocations.

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-backend-to-opportunity
  namespace: valynt
  labels:
    valueos.io/policy-layer: explicit-allow
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opportunity-agent
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "spiffe://valueos.internal/ns/valynt/services/backend-api"
      to:
        - operation:
            ports: ["8080"]

