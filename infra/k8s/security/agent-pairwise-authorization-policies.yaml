apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: agent-default-deny
  namespace: valynt
spec:
  selector:
    matchLabels:
      component: agent
  action: ALLOW
  rules: []

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-backend-to-agents
  namespace: valynt
spec:
  selector:
    matchLabels:
      component: agent
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - spiffe://valueos/ns/valynt/sa/backend
      to:
        - operation:
            ports: ["8080"]

---
# Pairwise explicit allow-list from architecture manifest.
