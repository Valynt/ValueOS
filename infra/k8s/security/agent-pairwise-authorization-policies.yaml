---
# compliance-auditor reads from all agents (read-only audit path).
# Declared as a single policy targeting the compliance-auditor agent
# to allow the backend to invoke it for cross-agent audit queries.
# Compliance-auditor does NOT initiate calls to other agents.
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-backend-compliance-auditor-invoke
  namespace: valynt
  labels:
    valueos.io/policy-layer: explicit-allow
    valueos.io/dag-edge: "backend->compliance-auditor"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: compliance-auditor-agent
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "spiffe://valueos.internal/ns/valynt/services/backend-api"
      to:
        - operation:
            ports: ["8080"]
