apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-strict-mtls
  namespace: valynt
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-by-default
  namespace: valynt
spec:
  {}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-tenant-gateway-access
  namespace: valynt
spec:
  selector:
    matchLabels:
      valueos/component: tenant-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/valynt/sa/istio-ingressgateway-service-account"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/*"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: tenant-service-isolation
  namespace: valynt
spec:
  selector:
    matchLabels:
      valueos/multi-tenant: "true"
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/valynt/sa/tenant-gateway"]
        requestPrincipals: ["cluster.local/ns/valynt/sa/tenant-gateway"]
    to:
    - operation:
        methods: ["*"]
  - from:
    - source:
        principals: ["cluster.local/ns/valynt/sa/auth-service"]
        requestPrincipals: ["cluster.local/ns/valynt/sa/auth-service"]
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/validate", "/refresh"]
  - from:
    - source:
        principals: ["cluster.local/ns/valynt/sa/audit-service"]
        requestPrincipals: ["cluster.local/ns/valynt/sa/audit-service"]
    to:
    - operation:
        methods: ["POST"]
        paths: ["/audit"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: database-access-control
  namespace: valynt
spec:
  selector:
    matchLabels:
      valueos/component: database
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/valynt/sa/api-gateway"
        - "cluster.local/ns/valynt/sa/auth-service"
        - "cluster.local/ns/valynt/sa/tenant-provisioning"
        requestPrincipals:
        - "cluster.local/ns/valynt/sa/api-gateway"
        - "cluster.local/ns/valynt/sa/auth-service"
        - "cluster.local/ns/valynt/sa/tenant-provisioning"
    to:
    - operation:
        ports: ["5432"]
  - from:
    - source:
        principals: ["cluster.local/ns/valynt/sa/monitoring"]
        requestPrincipals: ["cluster.local/ns/valynt/sa/monitoring"]
    to:
    - operation:
        methods: ["SELECT"]
        ports: ["5432"]
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mutual-tls-for-all
  namespace: valynt
spec:
  host: "*.valynt.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: load-balancing-policy
  namespace: valynt
spec:
  host: "*.valynt.svc.cluster.local"
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-routing
  namespace: valynt
spec:
  hosts:
  - "api.valynt.com"
  gateways:
  - valueos-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1/auth"
    route:
    - destination:
        host: auth-service.valynt.svc.cluster.local
        port:
          number: 8080
  - match:
    - uri:
        prefix: "/api/v1/users"
    route:
    - destination:
        host: user-service.valynt.svc.cluster.local
        port:
          number: 8080
  - match:
    - uri:
        prefix: "/api/v1/tenants"
    route:
    - destination:
        host: tenant-service.valynt.svc.cluster.local
        port:
          number: 8080
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: strip-untrusted-service-identity-headers
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.header_mutation
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
            request_mutations:
              remove:
                - x-spiffe-id
                - x-service-principal
                - x-service-identity
                - x-service-jwt
