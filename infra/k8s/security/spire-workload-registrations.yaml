# Per-agent SPIFFE workload registrations for ValueOS.
#
# Trust domain: valueos.internal
# Namespace shape:
#   Agents:   spiffe://valueos.internal/ns/{namespace}/agents/{agent-slug}
#   Services: spiffe://valueos.internal/ns/{namespace}/services/{service-slug}
#   Workers:  spiffe://valueos.internal/ns/{namespace}/workers/{worker-slug}
#
# Rules:
# - One ClusterSPIFFEID per deployed runtime principal. No placeholders.
# - Each agent has a dedicated ServiceAccount (defined below).
# - GroundTruthAnalyzer is an internal library, not a runtime principal — no entry.
# - New agents are added here when they become named runtime workloads with
#   clear trust boundaries. See docs/security-compliance/agent-identity-contract.md.

