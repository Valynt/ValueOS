# Identity contract reference — consumed by serviceIdentityMiddleware and policy enforcement.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-workload-identity-contract
  namespace: valynt
  labels:
    app.kubernetes.io/part-of: valueos-identity
  annotations:
    valueos.io/doc: "docs/security-compliance/agent-identity-contract.md"
data:
  trust_domain: "valueos.internal"
  README: |
    Workload identity contract for ValueOS agents and services.

    Trust domain: valueos.internal
    SPIFFE ID shapes:
      Agents:   spiffe://valueos.internal/ns/{namespace}/agents/{agent-slug}
      Services: spiffe://valueos.internal/ns/{namespace}/services/{service-slug}
      Workers:  spiffe://valueos.internal/ns/{namespace}/workers/{worker-slug}

    Integration steps:
      1. Deploy SPIRE server/agent from infra/k8s/security/spire-server.yaml and spire-agent.yaml.
      2. Ensure workloads mount the SPIRE socket: /run/spire/sockets/agent.sock
      3. serviceIdentityMiddleware reads x-spiffe-id header or mTLS peer cert.
      4. Istio AuthorizationPolicies reference SPIFFE principals from this trust domain.

    Namespace handling:
      workloadSelectorTemplates use "k8s:ns:{{ .PodMeta.Namespace }}" so that
      SPIRE matches pods in any namespace (valynt, valynt-staging, etc.) without
      requiring separate ClusterSPIFFEID entries per environment.

    Adding a new agent:
      - Add a ServiceAccount and ClusterSPIFFEID entry to this file.
      - Add an AuthorizationPolicy entry to agent-pairwise-authorization-policies.yaml.
      - Add the agent to agent-handoff-allowlist.md.
      - Update control-registry.json if the agent introduces new governed paths.
