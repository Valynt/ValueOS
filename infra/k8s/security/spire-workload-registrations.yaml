# ── ClusterSPIFFEIDs ─────────────────────────────────────────────────────────
# One entry per deployed runtime principal.

---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: agent-opportunity
spec:
  spiffeIDTemplate: "spiffe://valueos.internal/ns/{{ .PodMeta.Namespace }}/agents/opportunity"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opportunity-agent
  workloadSelectorTemplates:
    - "k8s:ns:{{ .PodMeta.Namespace }}"
    - "k8s:sa:opportunity-agent"

