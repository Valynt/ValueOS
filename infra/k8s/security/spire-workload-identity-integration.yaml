apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: valynt
spec:
  template:
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///run/spire/sockets/agent.sock
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory

---
