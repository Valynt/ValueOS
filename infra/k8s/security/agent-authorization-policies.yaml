apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: opportunity-agent-ingress-allow
  namespace: valynt-agents
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opportunity-agent
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - spiffe://cluster.local/ns/valynt/sa/valynt-orchestrator
      to:
        - operation:
            ports: ["8080"]

