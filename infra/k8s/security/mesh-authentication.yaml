---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: api-allow-gateway-spiffe
  namespace: valynt
spec:
  selector:
    matchLabels:
      component: api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/valynt/sa/valynt-backend
      to:
        - operation:
            ports: ["3000"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: redis-allow-mesh-identities
  namespace: valynt
spec:
  selector:
    matchLabels:
      app: redis-broker
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/valynt/sa/valynt-backend
              - cluster.local/ns/valynt-agents/sa/opportunity-agent
              - cluster.local/ns/valynt-agents/sa/coordinator-agent
      to:
        - operation:
            ports: ["6379"]

---
apiVersion: security.istio.io/v1beta1
