apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: valynt-default-peer-auth
  namespace: valynt
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: api-allow-gateway-spiffe
  namespace: valynt
spec:
  selector:
    matchLabels:
      component: api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - spiffe://valynt/api-gateway
      to:
        - operation:
            ports: ["3000"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: agents-allow-api-and-proxy
  namespace: valynt
spec:
  selector:
    matchLabels:
      component: agent
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - spiffe://valynt/api-gateway
              - spiffe://valynt/llm-proxy
      to:
        - operation:
            ports: ["8080"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: redis-allow-mesh-identities
  namespace: valynt
spec:
  selector:
    matchLabels:
      app: redis-broker
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - spiffe://valynt/message-worker
              - spiffe://valynt/opportunity-agent
              - spiffe://valynt/api-gateway
      to:
        - operation:
            ports: ["6379"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-plaintext
  namespace: valynt
spec:
  action: DENY
  rules:
    - when:
        - key: connection.mtls
          values: ["false"]
