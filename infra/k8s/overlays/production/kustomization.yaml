apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt

resources:
  - ../../base

nameSuffix: -production

commonLabels:
  environment: production

patches:
  - path: deployment-patch.yaml
  - path: external-secrets-vault-patch.yaml
  - path: remove-placeholder-secrets.yaml

replicas:
  - name: backend-blue
    count: 3
  - name: frontend-blue
    count: 2

images:
  - name: REGISTRY_URL/valynt-backend
    newTag: latest
  - name: REGISTRY_URL/valynt-frontend
    newTag: latest

configMapGenerator:
  - name: valynt-config
    behavior: merge
    literals:
      - node-env=production
      - log-level=info
