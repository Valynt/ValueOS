apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt

resources:
  - ../../base
  - ../../security
  - rate-limiting-patch.yaml

nameSuffix: -production

labels:
  - pairs:
      environment: production

patches:
  - path: deployment-patch.yaml
  - path: ingress-patch.yaml
  # Override ConfigMap values for production
  - target:
      kind: ConfigMap
      name: valynt-config
    patch: |-
      - op: replace
        path: /data/node-env
        value: production
      - op: replace
        path: /data/app-env
        value: prod
      - op: replace
        path: /data/log-level
        value: info

# Excluded patches (applied separately):
# - external-secrets-vault-patch.yaml: ExternalSecret resources span multiple
#   namespaces; apply via: kubectl apply -f ../../base/external-secrets.yaml
#   then apply the vault patch: kubectl apply -f external-secrets-vault-patch.yaml
# - remove-placeholder-secrets.yaml: base secrets.yaml is a non-deployable
#   template (SecretTemplate), not a real Secret resource

replicas:
  - name: backend-blue
    count: 3
  - name: frontend-blue
    count: 2

images:
  - name: ghcr.io/valynt/valueos-backend
    newTag: latest
  - name: ghcr.io/valynt/valueos-frontend
    newTag: latest
