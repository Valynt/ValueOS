apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valynt
  namespace: valynt
  annotations:
    # Set these values from your AWS Certificate Manager ARN for the production domain.
    # Example: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/certificate-arn: "REQUIRED_PRODUCTION_CERTIFICATE_ARN"
    # WAF ACL ARN — required for production internet-facing ingress.
    alb.ingress.kubernetes.io/wafv2-acl-arn: "REQUIRED_PRODUCTION_WAFV2_ACL_ARN"
    alb.ingress.kubernetes.io/tags: Environment=production,Application=valynt
spec:
  rules:
  - host: app.valynt.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-active
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-active
            port:
              number: 80
