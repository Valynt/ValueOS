apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: valynt
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: APP_ENV
              value: "prod"
            - name: DATABASE_EXPECTED_CONCURRENCY
              value: "8"
            - name: RATE_LIMIT_DISTRIBUTED
              value: "true"
            - name: RATE_LIMIT_ALLOW_SENSITIVE_MEMORY_FALLBACK
              value: "false"
            - name: RATE_LIMIT_REQUIRE_DISTRIBUTED_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: rate-limiting-config
                  key: require-distributed-backend
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
---
