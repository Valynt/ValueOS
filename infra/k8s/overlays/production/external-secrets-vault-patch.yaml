apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valynt-secrets
spec:
  secretStoreRef:
    name: production-vault
    kind: ClusterSecretStore
---
# Switch point: apply this patch (or override secretStoreRef.name) to use Vault for agent secrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-shared-secrets
  namespace: valynt-agents
spec:
  secretStoreRef:
    name: production-vault
    kind: ClusterSecretStore
