apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: valynt
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: APP_ENV
              value: "staging"
            - name: DATABASE_EXPECTED_CONCURRENCY
              value: "8"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
