apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt-staging

resources:
  - ../../base
  # Staging parity: include messaging infrastructure (Redis Streams)
  - ../../messaging/redis-streams.yaml

nameSuffix: -staging

commonLabels:
  environment: staging

patches:
  - path: deployment-patch.yaml
  - path: external-secrets-aws-patch.yaml
  - path: remove-placeholder-secrets.yaml
  - path: ingress-patch.yaml
  # Staging parity: rate limiting matches production
  - path: rate-limiting-patch.yaml

replicas:
  - name: backend
    count: 2
  - name: frontend
    count: 1

images:
  - name: ghcr.io/valynt/valueos-backend
    newTag: develop
  - name: ghcr.io/valynt/valueos-frontend
    newTag: develop

configMapGenerator:
  - name: valynt-config
    behavior: merge
    literals:
      - node-env=staging
      - log-level=debug
      # Staging parity: same feature flags as production
      - enable-circuit-breaker=true
      - enable-rate-limiting=true
      - enable-audit-logging=true
