apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt-staging

resources:
  - ../../base
  - ../../security
  # Staging-only resources
  - rate-limiting-patch.yaml

nameSuffix: -staging

labels:
  - pairs:
      environment: staging

configMapGenerator:
  - name: ingress-annotations
    behavior: create
    envs:
      - ingress-annotations.env

replacements:
  - source:
      kind: ConfigMap
      name: ingress-annotations
      fieldPath: data.ALB_CERTIFICATE_ARN
    targets:
      - select:
          kind: Ingress
          name: valynt
        fieldPaths:
          - metadata.annotations.alb\.ingress\.kubernetes\.io/certificate-arn

patches:
  - path: deployment-patch.yaml
  - path: ingress-patch.yaml
  # Override ConfigMap values for staging
  - target:
      kind: ConfigMap
      name: valynt-config
    patch: |-
      - op: replace
        path: /data/node-env
        value: staging
      - op: replace
        path: /data/app-env
        value: staging
      - op: replace
        path: /data/log-level
        value: debug

# Excluded patches (applied separately):
# - external-secrets-aws-patch.yaml: ExternalSecret/ClusterSecretStore span
#   multiple namespaces; apply via: kubectl apply -f ../../base/external-secrets.yaml
# - remove-placeholder-secrets.yaml: base secrets.yaml is a non-deployable
#   template (SecretTemplate), not a real Secret resource

replicas:
  - name: backend
    count: 2
  - name: frontend-blue
    count: 1

images:
  - name: ghcr.io/valynt/valueos-backend
    newTag: develop
  - name: ghcr.io/valynt/valueos-frontend
    newTag: develop
