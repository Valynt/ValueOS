apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valynt
  namespace: valynt
  annotations:
    # Set these values from your AWS Certificate Manager ARN for the staging domain.
    # Example: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/CERT_ID
    alb.ingress.kubernetes.io/certificate-arn: ""
    # Optional: attach the staging WAF ACL that enforces login/signup/reset/MFA
    # rate-based rules ahead of the application for fail-closed auth protection.
    # Example: arn:aws:wafv2:us-east-1:ACCOUNT_ID:regional/webacl/valueos-staging/ID
    # alb.ingress.kubernetes.io/wafv2-acl-arn: ""
    alb.ingress.kubernetes.io/tags: Environment=staging,Application=valynt
spec:
  rules:
  - host: staging.valueos.app
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-active
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-active
            port:
              number: 80
