apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # Blue-Green deployments
  - backend-deployment.yaml
  - backend-blue-deployment.yaml
  - backend-green-deployment.yaml
  - frontend-blue-deployment.yaml
  - frontend-green-deployment.yaml
  # Services (active + blue + green for each)
  - backend-active-service.yaml
  - backend-blue-service.yaml
  - backend-green-service.yaml
  - frontend-active-service.yaml
  - frontend-blue-service.yaml
  - frontend-green-service.yaml
  # Ingress
  - ingress.yaml
  # Pod Disruption Budgets
  - backend-pdb.yaml
  - frontend-pdb.yaml
  # Horizontal Pod Autoscalers
  - hpa.yaml
  # Security policies are in infra/k8s/security/ and applied separately:
  # kubectl apply -f ../security/istio-service-mesh.yaml
  # kubectl apply -f ../security/mesh-authentication.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: valynt

images:
  - name: REGISTRY_URL/valynt-backend
    newName: REGISTRY_URL/valynt-backend
    newTag: latest
  - name: REGISTRY_URL/valynt-frontend
    newName: REGISTRY_URL/valynt-frontend
    newTag: latest
