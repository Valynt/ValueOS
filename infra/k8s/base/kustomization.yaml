apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: valynt

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secrets.yaml
  - network-policies.yaml
  - agents/network-policy.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: valynt

images:
  - name: REGISTRY_URL/valynt-backend
    newName: REGISTRY_URL/valynt-backend
    newTag: latest
  - name: REGISTRY_URL/valynt-frontend
    newName: REGISTRY_URL/valynt-frontend
    newTag: latest
