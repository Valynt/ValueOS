# DEPRECATED: Direct Secret manifests are not allowed for deployments.
#
# This file is intentionally a NON-DEPLOYABLE template to document expected
# keys only. Runtime secret values must be provisioned through ExternalSecret
# resources in overlays.
#
# ExternalSecret sources:
# - infra/k8s/overlays/staging/external-secrets-aws-patch.yaml
# - infra/k8s/overlays/production/external-secrets-vault-patch.yaml

apiVersion: valueos.io/v1
kind: SecretTemplate
metadata:
  name: valynt-secrets-template
  annotations:
    valueos.io/deprecated: "true"
    valueos.io/non-deployable-template: "true"
spec:
  requiredKeys:
    - database-url
    - supabase-url
    - supabase-anon-key
    - supabase-service-key
    - browser-telemetry-ingestion-key
    - browser-telemetry-allowed-origins
    - together-api-key
    - openai-api-key
    - jwt-secret
  placeholderValue: REPLACE_ME
