apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-aggregator-worker
  namespace: valynt
  labels:
    app: billing-aggregator-worker
    component: billing
    app.kubernetes.io/name: billing-aggregator-worker
    app.kubernetes.io/component: billing
    app.kubernetes.io/part-of: valynt
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: billing-aggregator-worker
  template:
    metadata:
      labels:
        app: billing-aggregator-worker
        component: billing
    spec:
      serviceAccountName: valynt-backend
      containers:
        - name: billing-aggregator-worker
          image: ghcr.io/valynt/valueos-backend:latest
          imagePullPolicy: Always
          command: ["node", "dist/workers/billingAggregatorWorker.js"]
          ports:
            - name: health
              containerPort: 8082
          env:
            - name: NODE_ENV
              value: "production"
            - name: BILLING_WORKER_HEALTH_PORT
              value: "8082"
            - name: METERING_NATS_SERVERS
              value: "nats://metering-nats:4222"
            - name: METERING_USAGE_STREAM
              value: "METERING_USAGE_EVENTS"
            - name: METERING_USAGE_SUBJECT
              value: "metering.usage.events"
            - name: METERING_USAGE_CONSUMER
              value: "billing-aggregator"
            - name: METERING_USAGE_MAX_DELIVER
              value: "5"
            - name: METERING_USAGE_BACKOFF_MS
              value: "2000,10000,30000,120000"
            - name: METERING_USAGE_DLQ_STREAM
              value: "METERING_USAGE_EVENTS_DLQ"
            - name: METERING_USAGE_DLQ_SUBJECT
              value: "metering.usage.events.dlq"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-service-key
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
