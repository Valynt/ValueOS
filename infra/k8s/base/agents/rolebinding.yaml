apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-rolebinding
  namespace: valynt-agents
subjects:
  - kind: ServiceAccount
    name: valynt-agent
    namespace: valynt-agents
  - kind: ServiceAccount
    name: opportunity-agent
    namespace: valynt-agents
  - kind: ServiceAccount
    name: target-agent
    namespace: valynt-agents
  - kind: ServiceAccount
    name: realization-agent
    namespace: valynt-agents
  - kind: ServiceAccount
    name: expansion-agent
    namespace: valynt-agents
  - kind: ServiceAccount
    name: integrity-agent
    namespace: valynt-agents
roleRef:
  kind: Role
  name: agent-role
  apiGroup: rbac.authorization.k8s.io
