apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-agent
  namespace: valynt-agents
  labels:
    app: research-agent
    autoscaling.valueos.dev/profile: async-throughput
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-agent
  minReplicas: 3
  maxReplicas: 14
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: research
        target:
          type: AverageValue
          averageValue: "6"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 8
          periodSeconds: 30
      selectPolicy: Max
