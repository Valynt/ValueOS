apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-agent
  namespace: valynt-agents
  labels:
    app: research-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-agent
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: External
      external:
        metric:
          name: agent_research_load
          selector:
            matchLabels:
              agent_type: "research"
        target:
          type: AverageValue
          averageValue: "8"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 6
          periodSeconds: 30
      selectPolicy: Max
