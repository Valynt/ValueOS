apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-agent
  namespace: valynt-agents
  labels:
    app: research-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-agent
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: research
        target:
          type: AverageValue
          averageValue: "8"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 10
          periodSeconds: 30
      selectPolicy: Max
# Resolved: codex/migrate-low-frequency-agents-to-keda-scaledobject
# Replace the HPA approach with KEDA ScaledObjects for queue-driven autoscaling
# and true scale-to-zero for low-frequency agents.

# Notes:
# - This assumes you have KEDA installed in the cluster.
# - This uses Prometheus as the metric source (common when you already have an
#   `agent_queue_depth{queue="agent-tasks",agent_type="..."}` series).
# - If your queue depth comes from another system (SQS/Rabbit/Redis/Kafka), swap
#   the trigger type accordingly.
# - We explicitly set `minReplicaCount: 0` for scale-to-zero.

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: benchmark-agent
  namespace: valynt-agents
  labels:
    app: benchmark-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: benchmark-agent

  # Scale-to-zero for low-frequency workloads
  minReplicaCount: 0
  maxReplicaCount: 8

  # Polling + cooldown behavior (similar intent to HPA stabilization)
  pollingInterval: 15          # seconds
  cooldownPeriod: 300          # seconds after last trigger before scaling down
  idleReplicaCount: 0

  # Advanced behavior knobs (KEDA -> HPA behavior tuning)
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 200
              periodSeconds: 30
            - type: Pods
              value: 10
              periodSeconds: 30
          selectPolicy: Max

  triggers:
    - type: prometheus
      metadata:
        # Replace with your Prometheus server endpoint (cluster DNS) if different.
        serverAddress: http://prometheus-k8s.monitoring.svc.cluster.local:9090

        # Query must return a single scalar. This computes the current queue depth.
        query: |
          sum(agent_queue_depth{queue="agent-tasks",agent_type="benchmark"})

        # When queue depth > threshold, scale out.
        # Equivalent-ish to HPA AverageValue "10" for this agent.
        threshold: "10"

