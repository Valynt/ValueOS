apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-agent
  namespace: valynt-agents
  annotations:
    autoscaling.valueos.dev/source-of-truth: docs/operations/slo-sli.md#canonical-classification-and-policy-matrix
    scaling.valueos.io/routing-guardrail: async-warm throughput only; do not route interactive traffic here
  labels:
    app: research-agent
    autoscaling.valueos.dev/profile: async-warm-agent
    scaling.valueos.io/request-path-policy: async-only
    scaling.valueos.io/cold-start-class: async-warm
    scaling.valueos.io/execution-class: orchestration
    monitoring.valueos.dev/orchestration-acknowledgment-p95-ms: "200"
    monitoring.valueos.dev/orchestration-completion-p95-ms: "3000"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-agent
  minReplicas: 3
  maxReplicas: 14
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: research
        target:
          type: AverageValue
          averageValue: "6"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 240
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 8
          periodSeconds: 30
      selectPolicy: Max
