apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-modeling-agent
  namespace: valynt-agents
  annotations:
    autoscaling.valueos.dev/source-of-truth: docs/operations/slo-sli.md#canonical-classification-and-policy-matrix
  labels:
    app: financial-modeling-agent
    autoscaling.valueos.dev/profile: warm-interactive-agent
    scaling.valueos.io/request-path-policy: interactive-allowlisted
    scaling.valueos.io/cold-start-class: warm-interactive
    scaling.valueos.io/execution-class: interactive
    monitoring.valueos.dev/interactive-completion-p95-ms: "200"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-modeling-agent
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: financial-modeling
        target:
          type: AverageValue
          averageValue: "6"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 90
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 6
          periodSeconds: 30
      selectPolicy: Max
