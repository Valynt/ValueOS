apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: company-intelligence-agent
  namespace: valynt-agents
  labels:
    app: company-intelligence-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: company-intelligence-agent

  # Scale-to-zero
  minReplicaCount: 0
  maxReplicaCount: 8

  # Similar intent to prior HPA stabilization
  pollingInterval: 15
  cooldownPeriod: 300
  idleReplicaCount: 0

  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 200
              periodSeconds: 30
            - type: Pods
              value: 10
              periodSeconds: 30
          selectPolicy: Max

  triggers:
    - type: prometheus
      metadata:
        # Replace if your Prometheus service name/namespace differs.
        serverAddress: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        query: |
          sum(agent_queue_depth{queue="agent-tasks",agent_type="company-intelligence"})
        threshold: "10"
  name: financial-modeling-agent
  namespace: valynt-agents
  labels:
    app: financial-modeling-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-modeling-agent
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: financial-modeling
        target:
          type: AverageValue
          averageValue: "8"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 10
          periodSeconds: 30
      selectPolicy: Max
