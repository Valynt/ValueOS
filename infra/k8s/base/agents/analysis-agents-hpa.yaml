apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-modeling-agent
  namespace: valynt-agents
  labels:
    app: financial-modeling-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-modeling-agent
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: External
      external:
        metric:
          name: agent_processing_time
          selector:
            matchLabels:
              agent_type: "financial-modeling"
        target:
          type: AverageValue
          averageValue: "30s"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 6
          periodSeconds: 30
      selectPolicy: Max
