apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-modeling-agent
  namespace: valynt-agents
  labels:
    app: financial-modeling-agent
    autoscaling.valueos.dev/profile: financial-critical
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-modeling-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: financial-modeling
        target:
          type: AverageValue
          averageValue: "6"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
