apiVersion: apps/v1
kind: Deployment
metadata:
  name: value-mapping-agent
  labels:
    app: value-mapping-agent
    component: agent
    tier: backend
    app.kubernetes.io/name: value-mapping-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: valynt
  annotations:
    valynt.io/llm-usage-limit: '200.00'
    valynt.io/cost-center: agent-value-mapping
    valynt.io/cost-tracking: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: value-mapping-agent
  template:
    metadata:
      labels:
        app: value-mapping-agent
        component: agent
        tier: backend
        app.kubernetes.io/name: value-mapping-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: valynt
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: 'true'
        prometheus.io/port: '15021'
        prometheus.io/path: /stats/prometheus
    spec:
      serviceAccountName: value-mapping-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        operator: Equal
        value: spot
        effect: NoSchedule
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: 'true'
        effect: NoSchedule
      containers:
      - name: value-mapping-agent
        image: ghcr.io/valynt/valueos-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 18080
          name: app-http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: node-env
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: log-level
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-metrics
        - name: ENABLE_HEALTH_CHECKS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-health-checks
        - name: MAX_CONCURRENT_REQUESTS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: low-frequency-async-max-concurrent-requests
        - name: REQUEST_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: request-timeout-ms
        - name: DEFAULT_AGENT_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: default-agent-timeout
        - name: ENABLE_CIRCUIT_BREAKER
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-circuit-breaker
        - name: CIRCUIT_BREAKER_FAILURE_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: circuit-breaker-failure-threshold
        - name: CIRCUIT_BREAKER_RECOVERY_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: circuit-breaker-recovery-timeout
        - name: DB_CONNECTION_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: low-frequency-async-db-connection-pool-size
        - name: DB_CONNECTION_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: db-connection-timeout
        - name: EXTERNAL_API_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: external-api-timeout
        - name: LLM_API_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: llm-api-timeout
        - name: ENABLE_STRUCTURED_LOGGING
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-structured-logging
        - name: ENABLE_REQUEST_TRACING
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-request-tracing
        - name: AGENT_NAME
          value: value-mapping
        - name: AGENT_TYPE
          value: value-mapping
        - name: EXPOSE_PORT
          value: '18080'
        - name: PORT
          value: '18080'
        - name: HOST
          value: 127.0.0.1
        - name: BIND_ADDRESS
          value: 127.0.0.1
        envFrom:
        - secretRef:
            name: agent-secrets
        resources:
          requests:
            cpu: 150m
            memory: 384Mi
          limits:
            cpu: 750m
            memory: 1.5Gi
        livenessProbe:
          httpGet:
            path: /health
            port: app-http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: app-http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
      - name: opa-ext-authz
        image: openpolicyagent/opa:0.68.0-envoy
        args:
        - run
        - --server
        - --config-file=/config/opa-config.yaml
        - /policy/policy.rego
        ports:
        - name: opa-http
          containerPort: 8181
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health?plugins
            port: opa-http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: opa-http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: agent-sidecar-policy
          mountPath: /policy
          readOnly: true
        - name: agent-sidecar-config
          mountPath: /config
          readOnly: true
      - name: auth-proxy
        image: envoyproxy/envoy:v1.30-latest
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - agent-auth-proxy
        ports:
        - name: proxy-http
          containerPort: 8080
          protocol: TCP
        - name: proxy-admin
          containerPort: 15021
          protocol: TCP
        - name: proxy-egress
          containerPort: 15001
          protocol: TCP
        env:
        - name: JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: agent-sidecar-config
              key: jwt_issuer
        - name: JWT_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: agent-sidecar-config
              key: jwt_audience
        readinessProbe:
          httpGet:
            path: /ready
            port: proxy-admin
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ready
            port: proxy-admin
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: agent-sidecar-config
          mountPath: /etc/envoy
          readOnly: true
        - name: agent-sidecar-certs
          mountPath: /etc/agent-certs
          readOnly: true
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      - name: agent-sidecar-config
        configMap:
          name: agent-sidecar-config
      - name: agent-sidecar-policy
        configMap:
          name: agent-sidecar-policy
      - name: agent-sidecar-certs
        secret:
          secretName: agent-sidecar-certs
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - value-mapping-agent
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: value-mapping-agent
