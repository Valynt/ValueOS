apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opportunity-agent
  namespace: valynt-agents
  labels:
    app: opportunity-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opportunity-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # Primary: scale on Redis Stream pending message count (queue depth)
    - type: External
      external:
        metric:
          name: redis_stream_pending_messages
          selector:
            matchLabels:
              stream: "valuecanvas.events"
              consumer_group: "valuecanvas-workers"
        target:
          type: AverageValue
          averageValue: "20"
    # Secondary: CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Tertiary: memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
