apiVersion: apps/v1
kind: Deployment
metadata:
  name: opportunity-agent
  labels:
    app: opportunity-agent
    component: agent
    tier: backend
    app.kubernetes.io/name: opportunity-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: valynt
  annotations:
    valynt.io/llm-usage-limit: "200.00" # Monthly USD limit for this agent
    valynt.io/cost-center: "agent-opportunity"
    valynt.io/cost-tracking: "enabled"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opportunity-agent
  template:
    metadata:
      labels:
        app: opportunity-agent
        component: agent
        tier: backend
        app.kubernetes.io/name: opportunity-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: valynt
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: valynt-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Prefer spot instances; tolerate preemption for cost savings.
      # Safe for spot: Redis Streams XAUTOCLAIM reclaims orphaned messages.
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "eks.amazonaws.com/capacityType"
          operator: "Equal"
          value: "SPOT"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: "node.kubernetes.io/capacity-type"
                    operator: In
                    values: ["spot"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: opportunity-agent
                topologyKey: "kubernetes.io/hostname"
      containers:

        - name: opportunity-agent
          image: ${ECR_REGISTRY}/valynt-opportunity:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: environment
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: database_url
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase_url
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase_service_key
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis_url
            - name: LLM_PROXY_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: llm_proxy_url
            - name: LOG_LEVEL
              value: "info"
            - name: METRICS_ENABLED
              value: "true"
            # Backpressure: limit in-flight concurrent requests per pod
            - name: MAX_CONCURRENT_REQUESTS
              value: "10"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: opportunity-agent
  labels:
    app: opportunity-agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: opportunity-agent
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opportunity-agent
  namespace: valynt-agents
  labels:
    app: opportunity-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opportunity-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # Primary: scale on Redis Stream pending message count (queue depth).
    # Prometheus adapter exposes this from broker.pending.claimed histogram.
    - type: External
      external:
        metric:
          name: redis_stream_pending_messages
          selector:
            matchLabels:
              stream: "valuecanvas.events"
              consumer_group: "valuecanvas-workers"
        target:
          type: AverageValue
          averageValue: "20"
    # Secondary: CPU as a safety net for compute-bound LLM post-processing
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    # Tertiary: memory pressure from in-flight context windows
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      # 5-minute cooldown prevents flapping after burst subsides
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
    scaleUp:
      # Zero stabilization: react immediately to queue depth spikes
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opportunity-agent-pdb
  namespace: valynt-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: opportunity-agent
