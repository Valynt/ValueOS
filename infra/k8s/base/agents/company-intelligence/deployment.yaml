apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-intelligence-agent
  labels:
    app: company-intelligence-agent
    component: agent
    tier: backend
    app.kubernetes.io/name: company-intelligence-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: valynt
  annotations:
    valynt.io/llm-usage-limit: "250.00" # Monthly USD limit for this agent
    valynt.io/cost-center: "agent-company-intelligence"
    valynt.io/cost-tracking: "enabled"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: company-intelligence-agent
  template:
    metadata:
      labels:
        app: company-intelligence-agent
        component: agent
        tier: backend
        app.kubernetes.io/name: company-intelligence-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: valynt
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: valynt-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
      - name: company-intelligence-agent
        image: valynt/agent-company-intelligence@sha256:FIXME_RUN_crane_digest_valynt_agent-company-intelligence_latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: node-env
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: log-level
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-metrics
        - name: ENABLE_HEALTH_CHECKS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-health-checks
        - name: MAX_CONCURRENT_REQUESTS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: max-concurrent-requests
        - name: REQUEST_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: request-timeout-ms
        - name: DEFAULT_AGENT_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: default-agent-timeout
        - name: ENABLE_CIRCUIT_BREAKER
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-circuit-breaker
        - name: CIRCUIT_BREAKER_FAILURE_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: circuit-breaker-failure-threshold
        - name: CIRCUIT_BREAKER_RECOVERY_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: circuit-breaker-recovery-timeout
        - name: DB_CONNECTION_POOL_SIZE
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: db-connection-pool-size
        - name: DB_CONNECTION_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: db-connection-timeout
        - name: EXTERNAL_API_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: external-api-timeout
        - name: LLM_API_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: llm-api-timeout
        - name: ENABLE_STRUCTURED_LOGGING
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-structured-logging
        - name: ENABLE_REQUEST_TRACING
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: enable-request-tracing
        - name: AGENT_NAME
          value: "company-intelligence"
        - name: AGENT_TYPE
          value: "company-intelligence"
        - name: EXPOSE_PORT
          value: "8080"
        envFrom:
        - secretRef:
            name: agent-secrets
        resources:
          requests:
            cpu: "150m"
            memory: "384Mi"
          limits:
            cpu: "750m"
            memory: "1.5Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - company-intelligence-agent
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: company-intelligence-agent
