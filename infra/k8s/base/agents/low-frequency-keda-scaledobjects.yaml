apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: company-intelligence-agent
  namespace: valynt-agents
  annotations:
    autoscaling.valueos.dev/source-of-truth: docs/operations/slo-sli.md#canonical-classification-and-policy-matrix
    scaling.valueos.io/routing-guardrail: scale-to-zero async-only; deny interactive routing unless the canonical matrix, request-path label, and minReplicaCount are all updated together
  labels:
    app: company-intelligence-agent
    autoscaling.valueos.dev/profile: scale-to-zero-async-agent
    scaling.valueos.io/class: low-frequency-queue
    scaling.valueos.io/request-path-policy: async-only
    scaling.valueos.io/cold-start-class: scale-to-zero-async
    scaling.valueos.io/execution-class: orchestration
    monitoring.valueos.dev/orchestration-acknowledgment-p95-ms: "200"
    monitoring.valueos.dev/orchestration-completion-p95-ms: "3000"
spec:
  scaleTargetRef:
    name: company-intelligence-agent
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        metricName: company_intelligence_redis_stream_depth
        threshold: "1"
        activationThreshold: "1"
        query: sum(redis_stream_length{stream="valuecanvas.events",consumer_group="company-intelligence"})
---
