apiVersion: apps/v1
kind: Deployment
metadata:
  name: realization-agent
  namespace: valynt-agents
  labels:
    app: realization-agent
    component: agent
    tier: backend
    app.kubernetes.io/name: realization-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: valynt
  annotations:
    valynt.io/llm-usage-limit: '300.00'
    valynt.io/cost-center: agent-realization
    valynt.io/cost-tracking: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realization-agent
  template:
    metadata:
      labels:
        app: realization-agent
        component: agent
        tier: backend
        app.kubernetes.io/name: realization-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: valynt
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '15021'
        prometheus.io/path: /stats/prometheus
    spec:
      serviceAccountName: realization-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      tolerations:
      - key: kubernetes.azure.com/scalesetpriority
        operator: Equal
        value: spot
        effect: NoSchedule
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: 'true'
        effect: NoSchedule
      - key: eks.amazonaws.com/capacityType
        operator: Equal
        value: SPOT
        effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            preference:
              matchExpressions:
              - key: node.kubernetes.io/capacity-type
                operator: In
                values:
                - spot
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: realization-agent
              topologyKey: kubernetes.io/hostname
      containers:
      - name: realization-agent
        image: ${ECR_REGISTRY}/valynt-realization:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - name: app-http
          containerPort: 18080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: PORT
          value: '18080'
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: valynt-config
              key: environment
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: valynt-secrets
              key: database_url
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: valynt-secrets
              key: supabase_url
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: valynt-secrets
              key: supabase_service_key
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: valynt-config
              key: redis_url
        - name: LLM_PROXY_URL
          value: http://127.0.0.1:15001
        - name: LOG_LEVEL
          value: info
        - name: METRICS_ENABLED
          value: 'true'
        - name: MAX_CONCURRENT_REQUESTS
          value: '8'
        - name: HOST
          value: 127.0.0.1
        - name: BIND_ADDRESS
          value: 127.0.0.1
        resources:
          requests:
            cpu: 750m
            memory: 1536Mi
          limits:
            cpu: 2000m
            memory: 3Gi
        livenessProbe:
          httpGet:
            path: /health
            port: app-http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: app-http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - sleep 15
      - name: opa-ext-authz
        image: openpolicyagent/opa:0.68.0-envoy
        args:
        - run
        - --server
        - --config-file=/config/opa-config.yaml
        - /policy/policy.rego
        ports:
        - name: opa-http
          containerPort: 8181
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health?plugins
            port: opa-http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: opa-http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: agent-sidecar-policy
          mountPath: /policy
          readOnly: true
        - name: agent-sidecar-config
          mountPath: /config
          readOnly: true
      - name: auth-proxy
        image: envoyproxy/envoy:v1.30-latest
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - agent-auth-proxy
        ports:
        - name: proxy-http
          containerPort: 8080
          protocol: TCP
        - name: proxy-admin
          containerPort: 15021
          protocol: TCP
        - name: proxy-egress
          containerPort: 15001
          protocol: TCP
        env:
        - name: JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: agent-sidecar-config
              key: jwt_issuer
        - name: JWT_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: agent-sidecar-config
              key: jwt_audience
        readinessProbe:
          httpGet:
            path: /ready
            port: proxy-admin
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ready
            port: proxy-admin
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: agent-sidecar-config
          mountPath: /etc/envoy
          readOnly: true
        - name: agent-sidecar-certs
          mountPath: /etc/agent-certs
          readOnly: true
      terminationGracePeriodSeconds: 45
      volumes:
      - name: agent-sidecar-config
        configMap:
          name: agent-sidecar-config
      - name: agent-sidecar-policy
        configMap:
          name: agent-sidecar-policy
      - name: agent-sidecar-certs
        secret:
          secretName: agent-sidecar-certs
---
apiVersion: v1
kind: Service
metadata:
  name: realization-agent
  namespace: valynt-agents
  labels:
    app: realization-agent
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: proxy-http
    protocol: TCP
  selector:
    app: realization-agent
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: realization-agent-pdb
  namespace: valynt-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: realization-agent
