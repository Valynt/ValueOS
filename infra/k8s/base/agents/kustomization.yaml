apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: valynt-agents
  namespace: valynt-agents

resources:
  - namespace.yaml
  - configmap.yaml
  - sidecar-proxy-resources.yaml
  - serviceaccounts.yaml
  - external-secrets.yaml
  - network-policy.yaml
  - isolation-guardrails.yaml
  - role.yaml
  - rolebinding.yaml
  - prometheus-adapter-rules.yaml
  # Batch 1 (Sprints 1-4) — core lifecycle agents
  - opportunity
  - target
  - expansion
  - integrity
  - realization
  - financial-modeling
  - narrative
  - groundtruth
  # Batch 1 (Sprints 1-4) — extended fabric agents
  - company-intelligence
  - value-mapping
  - system-mapper
  - intervention-designer
  - outcome-engineer
  - coordinator
  - value-eval
  - communicator
  - research
  - benchmark
  # Batch 2-4 (Sprint 5) — remaining canonical agents
  - compliance-auditor
  - context-extraction
  - deal-assembly
  - discovery
  # Autoscaling
  - core-lifecycle-hpa.yaml
  - analysis-agents-hpa.yaml
  - remaining-agents-hpa-part2.yaml
  - sprint5-agents-hpa.yaml
  - low-frequency-keda-scaledobjects.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: valueos
      app.kubernetes.io/managed-by: kustomize
