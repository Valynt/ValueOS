apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: valynt-agents
  namespace: valynt-agents

resources:
  - namespace.yaml
  - configmap.yaml
  - external-secrets.yaml
  - network-policy.yaml
  - role.yaml
  - rolebinding.yaml
  - prometheus-adapter-rules.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: valynt
      app.kubernetes.io/managed-by: kustomize
