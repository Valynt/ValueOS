apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: valynt-agents
  namespace: valynt-agents

resources:
  # Namespace and shared resources
  - namespace.yaml
  - configmap.yaml
  - external-secrets.yaml
  - network-policy.yaml
  - role.yaml
  - rolebinding.yaml
  - prometheus-adapter-rules.yaml

  # Core lifecycle agents
  - opportunity/deployment.yaml
  - opportunity/hpa.yaml
  - target/deployment.yaml
  - expansion/deployment.yaml
  - integrity/deployment.yaml
  - realization/deployment.yaml
  - realization/hpa.yaml

  # Analysis agents
  - company-intelligence/deployment.yaml
  - financial-modeling/deployment.yaml
  - value-mapping/deployment.yaml

  # Design agents
  - system-mapper/deployment.yaml
  - intervention-designer/deployment.yaml
  - outcome-engineer/deployment.yaml

  # Coordination and evaluation agents
  - coordinator/deployment.yaml
  - value-eval/deployment.yaml
  - communicator/deployment.yaml

  # Research and processing agents
  - research/deployment.yaml
  - benchmark/deployment.yaml
  - narrative/deployment.yaml
  - groundtruth/deployment.yaml

  # HPA resources (grouped)
  - core-lifecycle-hpa.yaml
  - analysis-agents-hpa.yaml
  - design-agents-hpa.yaml
  - remaining-agents-hpa-part1.yaml
  - remaining-agents-hpa-part2.yaml

commonLabels:
  app.kubernetes.io/part-of: valynt
  app.kubernetes.io/managed-by: kustomize

images:
  - name: valynt/agent-opportunity
    newTag: latest
  - name: valynt/agent-target
    newTag: latest
  - name: valynt/agent-expansion
    newTag: latest
  - name: valynt/agent-integrity
    newTag: latest
  - name: valynt/agent-realization
    newTag: latest
  - name: valynt/agent-company-intelligence
    newTag: latest
  - name: valynt/agent-financial-modeling
    newTag: latest
  - name: valynt/agent-value-mapping
    newTag: latest
  - name: valynt/agent-system-mapper
    newTag: latest
  - name: valynt/agent-intervention-designer
    newTag: latest
  - name: valynt/agent-outcome-engineer
    newTag: latest
  - name: valynt/agent-coordinator
    newTag: latest
  - name: valynt/agent-value-eval
    newTag: latest
  - name: valynt/agent-communicator
    newTag: latest
  - name: valynt/agent-research
    newTag: latest
  - name: valynt/agent-benchmark
    newTag: latest
  - name: valynt/agent-narrative
    newTag: latest
  - name: valynt/agent-groundtruth
    newTag: latest

patchesStrategicMerge: []

patchesJson6902: []
