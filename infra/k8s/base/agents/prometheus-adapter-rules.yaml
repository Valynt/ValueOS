# Prometheus Adapter external metrics rules for agent autoscaling.
# This exposes per-agent queue depth metrics to Kubernetes HPAs.
#
# Deploy alongside prometheus-adapter and merge `agent-rules.yaml`
# into your adapter values under `rules.external`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-agent-rules
  namespace: valynt-agents
  labels:
    app.kubernetes.io/name: prometheus-adapter
    app.kubernetes.io/component: metrics
data:
  agent-rules.yaml: |
    rules:
      - seriesQuery: 'valueos_agent_queue_depth{namespace!="",queue!="",agent_type!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
        name:
          matches: "^valueos_agent_queue_depth$"
          as: "agent_queue_depth"
        metricsQuery: 'max(valueos_agent_queue_depth{<<.LabelMatchers>>}) by (namespace, queue, agent_type)'
