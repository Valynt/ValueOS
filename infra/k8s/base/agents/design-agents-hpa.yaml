apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: system-mapper-agent
  namespace: valynt-agents
  labels:
    app: system-mapper-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: system-mapper-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: system-mapper
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 10
          periodSeconds: 30
      selectPolicy: Max
---
