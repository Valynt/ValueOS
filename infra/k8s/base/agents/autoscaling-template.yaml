# Common HPA template for all ValueOS agents.
# Copy this and replace {{...}} placeholders for each agent deployment.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{agent-name}}-agent
  namespace: valynt-agents
  labels:
    app: {{agent-name}}-agent
    autoscaling.valueos.dev/profile: queue-depth
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{agent-name}}-agent
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: External
      external:
        metric:
          name: agent_queue_depth
          selector:
            matchLabels:
              queue: agent-tasks
              agent_type: {{agent-name}}
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
        - type: Pods
          value: 10
          periodSeconds: 30
      selectPolicy: Max
