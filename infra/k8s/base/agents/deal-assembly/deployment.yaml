apiVersion: apps/v1
kind: Deployment
metadata:
  name: deal-assembly-agent
  labels:
    app: deal-assembly-agent
    workload: deal-assembly-agent
    component: agent
    tier: backend
    app.kubernetes.io/name: deal-assembly-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: valynt
  annotations:
    # Deal assembly aggregates outputs from multiple upstream agents into a
    # CFO-defensible value case. Treated as financial-critical: higher LLM
    # budget, narrower per-pod concurrency, scales through replicas.
    valynt.io/llm-usage-limit: "350.00"
    valynt.io/cost-center: agent-deal-assembly
    valynt.io/cost-tracking: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deal-assembly-agent
  template:
    metadata:
      labels:
        app: deal-assembly-agent
        workload: deal-assembly-agent
        component: agent
        tier: backend
        app.kubernetes.io/name: deal-assembly-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: valynt
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "15021"
        prometheus.io/path: /stats/prometheus
    spec:
      serviceAccountName: deal-assembly-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      tolerations:
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: eks.amazonaws.com/capacityType
          operator: Equal
          value: SPOT
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: deal-assembly-agent
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: deal-assembly-agent
      containers:
        - name: deal-assembly-agent
          image: ghcr.io/valynt/valueos-backend:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: app-http
              containerPort: 18080
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: node-env
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: log-level
            - name: ENABLE_METRICS
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: enable-metrics
            - name: ENABLE_HEALTH_CHECKS
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: enable-health-checks
            # Financial-critical profile: narrow per-pod concurrency, scale via replicas
            - name: MAX_CONCURRENT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: financial-critical-max-concurrent-requests
            - name: DATABASE_EXPECTED_CONCURRENCY
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: financial-critical-max-concurrent-requests
            - name: DB_CONNECTION_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: financial-critical-db-connection-pool-size
            - name: DATABASE_POOL_MAX
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: financial-critical-db-connection-pool-size
            - name: REQUEST_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: request-timeout-ms
            - name: DEFAULT_AGENT_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: default-agent-timeout
            - name: ENABLE_CIRCUIT_BREAKER
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: enable-circuit-breaker
            - name: CIRCUIT_BREAKER_FAILURE_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: circuit-breaker-failure-threshold
            - name: CIRCUIT_BREAKER_RECOVERY_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: circuit-breaker-recovery-timeout
            - name: DB_CONNECTION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: db-connection-timeout
            - name: EXTERNAL_API_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: external-api-timeout
            - name: LLM_API_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: llm-api-timeout
            - name: ENABLE_STRUCTURED_LOGGING
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: enable-structured-logging
            - name: ENABLE_REQUEST_TRACING
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: enable-request-tracing
            - name: AGENT_NAME
              value: deal-assembly
            - name: AGENT_TYPE
              value: deal-assembly
            - name: EXPOSE_PORT
              value: "18080"
            - name: PORT
              value: "18080"
            - name: HOST
              value: 127.0.0.1
            - name: BIND_ADDRESS
              value: 127.0.0.1
            - name: LLM_PROXY_URL
              value: http://127.0.0.1:15001
          envFrom:
            - secretRef:
                name: agent-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: app-http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: app-http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: cache-volume
              mountPath: /app/cache
        - name: opa-ext-authz
          image: openpolicyagent/opa:0.68.0-envoy
          args:
            - run
            - --server
            - --config-file=/config/opa-config.yaml
            - /policy/policy.rego
          ports:
            - name: opa-http
              containerPort: 8181
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /health?plugins
              port: opa-http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: opa-http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: agent-sidecar-policy
              mountPath: /policy
              readOnly: true
            - name: agent-sidecar-config
              mountPath: /config
              readOnly: true
        - name: auth-proxy
          image: envoyproxy/envoy:v1.30-latest
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --service-cluster
            - agent-auth-proxy
          ports:
            - name: proxy-http
              containerPort: 8080
              protocol: TCP
            - name: proxy-admin
              containerPort: 15021
              protocol: TCP
            - name: proxy-egress
              containerPort: 15001
              protocol: TCP
          env:
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: agent-sidecar-config
                  key: jwt_issuer
            - name: JWT_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: agent-sidecar-config
                  key: jwt_audience
          resources:
            requests:
              cpu: 75m
              memory: 160Mi
            limits:
              cpu: 250m
              memory: 320Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: proxy-admin
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: proxy-admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: agent-sidecar-config
              mountPath: /etc/envoy
              readOnly: true
            - name: agent-sidecar-certs
              mountPath: /etc/agent-certs
              readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: cache-volume
          emptyDir: {}
        - name: agent-sidecar-config
          configMap:
            name: agent-sidecar-config
        - name: agent-sidecar-policy
          configMap:
            name: agent-sidecar-policy
        - name: agent-sidecar-certs
          secret:
            secretName: agent-sidecar-certs
---
apiVersion: v1
kind: Service
metadata:
  name: deal-assembly-agent
  labels:
    app: deal-assembly-agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: proxy-http
      protocol: TCP
  selector:
    app: deal-assembly-agent
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: deal-assembly-agent-pdb
  namespace: valynt-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: deal-assembly-agent
