# External Secrets for Agents
# Template for agent-specific secrets
# Customize the secret keys and AWS secret names for each agent

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valuecanvas-agent
  namespace: valuecanvas-agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/valuecanvas-agent-secrets-reader

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-shared-secrets
  namespace: valuecanvas-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: agent-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database credentials (shared across agents)
        database-url: "{{ .database_url }}"
        redis-url: "{{ .redis_url }}"

        # JWT and API keys
        jwt-secret: "{{ .jwt_secret }}"
        api-key: "{{ .api_key }}"

        # External service credentials
        openai-api-key: "{{ .openai_api_key }}"
        together-api-key: "{{ .together_api_key }}"
        anthropic-api-key: "{{ .anthropic_api_key }}"

        # Monitoring and logging
        datadog-api-key: "{{ .datadog_api_key }}"
        new-relic-license-key: "{{ .new_relic_license_key }}"

        # Cloud provider credentials
        aws-access-key-id: "{{ .aws_access_key_id }}"
        aws-secret-access-key: "{{ .aws_secret_access_key }}"
