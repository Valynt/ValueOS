# External Secrets for Agents
# Production agent secrets synced from centralized secret stores.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valynt-agent
  namespace: valynt-agents
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/valynt-production-agent-secrets-reader

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-shared-secrets
  namespace: valynt-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Default store is AWS; override to production-vault in the production overlay to switch.
    name: production-aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: agent-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database credentials (shared across agents)
        database-url: "{{ .database_url }}"
        redis-url: "{{ .redis_url }}"

        # JWT and API keys
        jwt-secret: "{{ .jwt_secret }}"
        api-key: "{{ .api_key }}"

        # External service credentials
        openai-api-key: "{{ .openai_api_key }}"
        together-api-key: "{{ .together_api_key }}"
        anthropic-api-key: "{{ .anthropic_api_key }}"

        # Monitoring and logging
        datadog-api-key: "{{ .datadog_api_key }}"
        new-relic-license-key: "{{ .new_relic_license_key }}"

        # Cloud provider credentials
        aws-access-key-id: "{{ .aws_access_key_id }}"
        aws-secret-access-key: "{{ .aws_secret_access_key }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: valynt/production/agents/database-url
        version: AWSCURRENT
    - secretKey: redis_url
      remoteRef:
        key: valynt/production/agents/redis-url
        version: AWSCURRENT
    - secretKey: jwt_secret
      remoteRef:
        key: valynt/production/agents/jwt-secret
        version: AWSCURRENT
    - secretKey: api_key
      remoteRef:
        key: valynt/production/agents/api-key
        version: AWSCURRENT
    - secretKey: openai_api_key
      remoteRef:
        key: valynt/production/agents/openai-api-key
        version: AWSCURRENT
    - secretKey: together_api_key
      remoteRef:
        key: valynt/production/agents/together-api-key
        version: AWSCURRENT
    - secretKey: anthropic_api_key
      remoteRef:
        key: valynt/production/agents/anthropic-api-key
        version: AWSCURRENT
    - secretKey: datadog_api_key
      remoteRef:
        key: valynt/production/agents/datadog-api-key
        version: AWSCURRENT
    - secretKey: new_relic_license_key
      remoteRef:
        key: valynt/production/agents/new-relic-license-key
        version: AWSCURRENT
    - secretKey: aws_access_key_id
      remoteRef:
        key: valynt/production/agents/aws-access-key-id
        version: AWSCURRENT
    - secretKey: aws_secret_access_key
      remoteRef:
        key: valynt/production/agents/aws-secret-access-key
        version: AWSCURRENT
