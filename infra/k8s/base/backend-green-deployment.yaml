apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-green
  namespace: valynt
  labels:
    app: backend
    workload: backend-green
    slot: green
    component: api
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: valynt
  annotations:
    valynt.io/llm-usage-limit: "500.00"
    valynt.io/cost-center: "ai-orchestration"
    valynt.io/cost-tracking: "enabled"
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
      slot: green
  template:
    metadata:
      labels:
        app: backend
        workload: backend-green
        slot: green
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: valynt-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: backend
          image: ghcr.io/valynt/valueos-backend:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: API_PORT
              value: "3001"
            - name: DATABASE_POOL_ROLE
              value: "api"
            - name: OBSERVABILITY_DEPLOYMENT
              value: "backend-green"
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_LEVEL
              value: "info"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-anon-key
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-service-key
            - name: TOGETHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: together-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: openai-api-key
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-url
            - name: REDIS_CONTROL_PLANE_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-control-plane-url
            - name: REDIS_CACHE_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-cache-url
            - name: REDIS_CONTROL_PLANE_TLS_SERVERNAME
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-control-plane-tls-servername
            - name: REDIS_CACHE_TLS_SERVERNAME
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-cache-tls-servername
            - name: REDIS_TLS_REJECT_UNAUTHORIZED
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-tls-reject-unauthorized
            - name: REDIS_TLS_CA_CERT_PATH
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-tls-ca-cert-path
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: otel-exporter-otlp-endpoint
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: otel-service-name

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 1G

          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
