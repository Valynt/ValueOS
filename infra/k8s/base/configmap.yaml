apiVersion: v1
kind: ConfigMap
metadata:
  name: valynt-config
  namespace: valynt
  labels:
    app.kubernetes.io/name: valynt
    app.kubernetes.io/part-of: valynt
data:
  # Redis configuration
  # `redis-url` is the legacy control-plane alias consumed by services that have not
  # yet been migrated to role-specific Redis environment variables.
  redis-url: "rediss://redis-control-plane:6379"
  redis-control-plane-url: "rediss://redis-control-plane:6379"
  redis-cache-url: "rediss://redis-cache:6379"
  redis-tls-servername: "redis-control-plane"
  redis-control-plane-tls-servername: "redis-control-plane"
  redis-cache-tls-servername: "redis-cache"
  redis-tls-reject-unauthorized: "true"
  redis-tls-ca-cert-path: "/etc/redis/tls/ca.crt"

  # Application configuration
  # IMPORTANT: node-env must be overridden by each overlay (staging/production).
  # The base value is intentionally set to a placeholder to prevent accidental
  # production deployments without an explicit overlay.
  node-env: "MUST_BE_OVERRIDDEN_BY_OVERLAY"
  app-env: "MUST_BE_OVERRIDDEN_BY_OVERLAY"
  log-level: "info"

  # Feature flags
  enable-circuit-breaker: "true"
  enable-rate-limiting: "true"
  enable-audit-logging: "true"

  # LLM configuration
  llm-provider: "together"

  # Performance settings
  max-request-size: "10mb"
  request-timeout: "30000"

  # OpenTelemetry — in-cluster collector endpoint (HTTP/OTLP)
  otel-exporter-otlp-endpoint: "http://otel-collector.observability.svc.cluster.local:4318"
  otel-service-name: "valueos-backend"
  # Sampler: parentbased_traceidratio with 10% sample rate in production.
  # The tracing.ts code defaults to 0.1 in production, but we set this
  # explicitly here so the value is visible in config and can be overridden
  # per-overlay without a code change.
  otel-traces-sampler: "parentbased_traceidratio"
  otel-traces-sampler-arg: "0.1"
