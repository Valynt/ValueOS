apiVersion: v1
kind: ConfigMap
metadata:
  name: valynt-config
  namespace: valynt
  labels:
    app.kubernetes.io/name: valynt
    app.kubernetes.io/part-of: valynt
data:
  # Redis configuration
  redis-url: "rediss://redis:6379"
  redis-tls-servername: "redis"
  redis-tls-reject-unauthorized: "true"
  redis-tls-ca-cert-path: "/etc/redis/tls/ca.crt"
  
  # Application configuration
  node-env: "production"
  log-level: "info"
  
  # Feature flags
  enable-circuit-breaker: "true"
  enable-rate-limiting: "true"
  enable-audit-logging: "true"
  
  # LLM configuration
  llm-provider: "together"
  
  # Performance settings
  max-request-size: "10mb"
  request-timeout: "30000"

  # OpenTelemetry — in-cluster collector endpoint (HTTP/OTLP)
  otel-exporter-otlp-endpoint: "http://otel-collector.observability.svc.cluster.local:4318"
  otel-service-name: "valueos-backend"
