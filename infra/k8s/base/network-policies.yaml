---
# Zero-Trust: Default deny all ingress/egress everywhere
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: valynt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: valynt-agents
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Only allow Orchestrator to talk to LLM Gateway (ingress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-gateway-ingress-from-orchestrator
  namespace: valynt
spec:
  podSelector:
    matchLabels:
      component: llm-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: valynt
          podSelector:
            matchLabels:
              component: orchestrator
      ports:
        - protocol: TCP
          port: 8443
---
# Only allow Orchestrator to talk to agents (ingress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agents-ingress-from-orchestrator
  namespace: valynt-agents
spec:
  podSelector:
    matchLabels:
      component: agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: valynt
          podSelector:
            matchLabels:
              component: orchestrator
      ports:
        - protocol: TCP
          port: 8080
---
# Allow egress from Orchestrator to LLM Gateway and agents
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-egress-allow-llm-gateway-and-agents
  namespace: valynt
spec:
  podSelector:
    matchLabels:
      component: orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              component: llm-gateway
      ports:
        - protocol: TCP
          port: 8443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: valynt-agents
          podSelector:
            matchLabels:
              component: agent
      ports:
        - protocol: TCP
          port: 8080
              kubernetes.io/metadata.name: valynt-agents
