apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fabric-default-deny
  namespace: valynt
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fabric-agents-default-deny
  namespace: valynt-agents
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-gateway-ingress-from-orchestrator
  namespace: valynt
spec:
  podSelector:
    matchLabels:
      component: llm-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              component: orchestrator
      ports:
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-egress-allowlist
  namespace: valynt
spec:
  podSelector:
    matchLabels:
      component: orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              component: llm-gateway
      ports:
        - protocol: TCP
          port: 8443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agents-deny-agent-to-agent-ingress
  namespace: valynt-agents
spec:
  podSelector:
    matchLabels:
      component: agent
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agents-allow-orchestrator-control-plane
  namespace: valynt-agents
spec:
  podSelector:
    matchLabels:
      component: agent
    matchExpressions:
      - key: agent-type
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: valynt
          podSelector:
            matchLabels:
              component: orchestrator
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agents-allow-orchestrator-control-plane-untagged
  namespace: valynt-agents
spec:
  podSelector:
    matchLabels:
      component: agent
    matchExpressions:
      - key: agent-type
        operator: DoesNotExist
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: valynt
          podSelector:
            matchLabels:
              component: orchestrator
      ports:
        - protocol: TCP
          port: 8080
