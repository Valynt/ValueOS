apiVersion: v1
kind: Service
metadata:
  name: metering-nats
  namespace: valynt
  labels:
    app: metering-nats
    app.kubernetes.io/name: metering-nats
    app.kubernetes.io/component: messaging
spec:
  selector:
    app: metering-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metering-nats
  namespace: valynt
  labels:
    app: metering-nats
    app.kubernetes.io/name: metering-nats
    app.kubernetes.io/component: messaging
spec:
  serviceName: metering-nats
  replicas: 1
  selector:
    matchLabels:
      app: metering-nats
  template:
    metadata:
      labels:
        app: metering-nats
        app.kubernetes.io/name: metering-nats
        app.kubernetes.io/component: messaging
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - -js
            - -m
            - "8222"
            - --store_dir
            - /data
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
