# External Secrets Operator Configuration
# Supports production provider selection between AWS Secrets Manager and Vault.
#
# Installation:
# helm repo add external-secrets https://charts.external-secrets.io
# helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valynt-secrets-reader
  namespace: external-secrets-system

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: dev-aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: valynt-secrets-reader
            namespace: external-secrets-system

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: staging-aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: valynt-secrets-reader
            namespace: external-secrets-system

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: production-aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: valynt-secrets-reader
            namespace: external-secrets-system

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: production-vault
spec:
  provider:
    vault:
      server: https://vault.production.valueos.com:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: valueos-production
          serviceAccountRef:
            name: valynt-secrets-reader
            namespace: external-secrets-system

---
# Dev Environment Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valynt-secrets
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: dev-aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: valynt-secrets
    creationPolicy: Owner
  data:
    - secretKey: supabase-url
      remoteRef:
        key: valuecanvas/dev/tenants/platform/supabase-url
    - secretKey: supabase-anon-key
      remoteRef:
        key: valuecanvas/dev/tenants/platform/supabase-anon-key
    - secretKey: supabase-service-key
      remoteRef:
        key: valuecanvas/dev/tenants/platform/supabase-service-key
    - secretKey: together-api-key
      remoteRef:
        key: valuecanvas/dev/tenants/platform/together-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: valuecanvas/dev/tenants/platform/openai-api-key
    - secretKey: database-url
      remoteRef:
        key: valuecanvas/dev/tenants/platform/database-url
    - secretKey: jwt-secret
      remoteRef:
        key: valuecanvas/dev/tenants/platform/jwt-secret
    - secretKey: encryption-key
      remoteRef:
        key: valuecanvas/dev/tenants/platform/encryption-key
    - secretKey: redis-url
      remoteRef:
        key: valuecanvas/dev/tenants/platform/redis-url
    - secretKey: session-secret
      remoteRef:
        key: valuecanvas/dev/tenants/platform/session-secret

---
# Staging Environment Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valynt-secrets
  namespace: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: staging-aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: valynt-secrets
    creationPolicy: Owner
  data:
    - secretKey: supabase-url
      remoteRef:
        key: valuecanvas/staging/tenants/platform/supabase-url
    - secretKey: supabase-anon-key
      remoteRef:
        key: valuecanvas/staging/tenants/platform/supabase-anon-key
    - secretKey: supabase-service-key
      remoteRef:
        key: valuecanvas/staging/tenants/platform/supabase-service-key
    - secretKey: together-api-key
      remoteRef:
        key: valuecanvas/staging/tenants/platform/together-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: valuecanvas/staging/tenants/platform/openai-api-key
    - secretKey: database-url
      remoteRef:
        key: valuecanvas/staging/tenants/platform/database-url
    - secretKey: jwt-secret
      remoteRef:
        key: valuecanvas/staging/tenants/platform/jwt-secret
    - secretKey: encryption-key
      remoteRef:
        key: valuecanvas/staging/tenants/platform/encryption-key
    - secretKey: redis-url
      remoteRef:
        key: valuecanvas/staging/tenants/platform/redis-url
    - secretKey: session-secret
      remoteRef:
        key: valuecanvas/staging/tenants/platform/session-secret

---
# Production Environment Secrets

# Use AWS Secrets Manager by default for production. To use Vault, set secretStoreRef.name to production-vault in overlays/production.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valynt-secrets
  namespace: production
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: production-aws-secretsmanager # overlays/production: set to production-vault for Vault
    kind: ClusterSecretStore
  target:
    name: valynt-secrets
    creationPolicy: Owner
  data:
    - secretKey: supabase-url
      remoteRef:
        key: valuecanvas/production/tenants/platform/supabase-url
        version: AWSCURRENT
    - secretKey: supabase-anon-key
      remoteRef:
        key: valuecanvas/production/tenants/platform/supabase-anon-key
        version: AWSCURRENT
    - secretKey: supabase-service-key
      remoteRef:
        key: valuecanvas/production/tenants/platform/supabase-service-key
        version: AWSCURRENT
    - secretKey: together-api-key
      remoteRef:
        key: valuecanvas/production/tenants/platform/together-api-key
        version: AWSCURRENT
    - secretKey: openai-api-key
      remoteRef:
        key: valuecanvas/production/tenants/platform/openai-api-key
        version: AWSCURRENT
    - secretKey: database-url
      remoteRef:
        key: valuecanvas/production/tenants/platform/database-url
        version: AWSCURRENT
    - secretKey: jwt-secret
      remoteRef:
        key: valuecanvas/production/tenants/platform/jwt-secret
        version: AWSCURRENT
    - secretKey: encryption-key
      remoteRef:
        key: valuecanvas/production/tenants/platform/encryption-key
        version: AWSCURRENT
    - secretKey: redis-url
      remoteRef:
        key: valuecanvas/production/tenants/platform/redis-url
        version: AWSCURRENT
    - secretKey: session-secret
      remoteRef:
        key: valuecanvas/production/tenants/platform/session-secret
        version: AWSCURRENT
