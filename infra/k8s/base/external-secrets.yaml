# External Secrets Operator Configuration
# Centralizes secret management using AWS Secrets Manager
#
# Installation:
# helm repo add external-secrets https://charts.external-secrets.io
# helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: valuecanvas-app
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/valuecanvas-secrets-reader

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: valuecanvas-app
            namespace: default

---
# Dev Environment Secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valuecanvas-secrets
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: valuecanvas-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Database
        DATABASE_URL: "{{ .databaseUrl }}"
        
        # Supabase
        VITE_SUPABASE_URL: "{{ .supabaseUrl }}"
        VITE_SUPABASE_ANON_KEY: "{{ .supabaseAnonKey }}"
        SUPABASE_SERVICE_KEY: "{{ .supabaseServiceKey }}"
        
        # LLM Providers
        TOGETHER_API_KEY: "{{ .togetherApiKey }}"
        OPENAI_API_KEY: "{{ .openaiApiKey }}"
        
        # Security
        JWT_SECRET: "{{ .jwtSecret }}"
        SESSION_SECRET: "{{ .sessionSecret }}"
  data:
    - secretKey: databaseUrl
      remoteRef:
        key: valuecanvas/dev/database-url
    - secretKey: supabaseUrl
      remoteRef:
        key: valuecanvas/dev/supabase-url
    - secretKey: supabaseAnonKey
      remoteRef:
        key: valuecanvas/dev/supabase-anon-key
    - secretKey: supabaseServiceKey
      remoteRef:
        key: valuecanvas/dev/supabase-service-key
    - secretKey: togetherApiKey
      remoteRef:
        key: valuecanvas/dev/together-api-key
    - secretKey: openaiApiKey
      remoteRef:
        key: valuecanvas/dev/openai-api-key
    - secretKey: jwtSecret
      remoteRef:
        key: valuecanvas/dev/jwt-secret
    - secretKey: sessionSecret
      remoteRef:
        key: valuecanvas/dev/session-secret

