apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: valynt
  labels:
    app: worker
    component: background-jobs
    autoscaling.valueos.dev/profile: queue-depth
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: background-jobs
    app.kubernetes.io/part-of: valynt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 12
  metrics:
    # BullMQ agent job queue depth is the canonical worker scaling signal.
    # Target ~20 waiting jobs per pod based on observed throughput.
    - type: External
      external:
        metric:
          name: bullmq_queue_waiting_jobs
          selector:
            matchLabels:
              queue: agent-jobs
        target:
          type: AverageValue
          averageValue: "20"

    # Delayed jobs provide early scale-out before scheduled bursts become active.
    - type: External
      external:
        metric:
          name: bullmq_queue_delayed_jobs
          selector:
            matchLabels:
              queue: agent-jobs
        target:
          type: AverageValue
          averageValue: "50"

    # CPU and memory remain secondary safety signals for compute-heavy jobs.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      # Queue-driven workers should react quickly to pending job spikes.
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30

    scaleDown:
      # Keep the longer drain window for async jobs with in-flight execution.
      # Worker scale-down remains slower than API scale-down because pods may
      # still be holding BullMQ jobs that cannot be interrupted safely.
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 120
