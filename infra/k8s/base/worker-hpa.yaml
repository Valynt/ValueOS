apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: valynt
  annotations:
    autoscaling.valueos.dev/source-of-truth: docs/operations/slo-sli.md#canonical-classification-and-policy-matrix
    scaling.valueos.io/routing-guardrail: worker capacity is async-only and must not be counted toward interactive request paths
  labels:
    app: worker
    component: background-jobs
    autoscaling.valueos.dev/profile: async-worker
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: background-jobs
    app.kubernetes.io/part-of: valynt
    scaling.valueos.io/request-path-policy: async-only
    scaling.valueos.io/execution-class: orchestration
    monitoring.valueos.dev/orchestration-acknowledgment-p95-ms: "200"
    monitoring.valueos.dev/orchestration-completion-p95-ms: "3000"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 16
  metrics:
    # BullMQ agent job queue depth is the canonical worker scaling signal.
    # Target ~15 waiting jobs per pod now that per-worker concurrency is capped at 4.
    - type: External
      external:
        metric:
          name: bullmq_queue_waiting_jobs
          selector:
            matchLabels:
              queue: agent-jobs
        target:
          type: AverageValue
          averageValue: "15"

    # Delayed jobs provide early scale-out before scheduled bursts become active and workers saturate.
    - type: External
      external:
        metric:
          name: bullmq_queue_delayed_jobs
          selector:
            matchLabels:
              queue: agent-jobs
        target:
          type: AverageValue
          averageValue: "40"

    # CPU and memory remain secondary safety signals for compute-heavy jobs.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      # Queue-driven workers should react quickly to pending job spikes.
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30

    scaleDown:
      # Operational tuning now supports a shorter drain window than the prior
      # 300s default, while still leaving enough time for in-flight BullMQ jobs
      # to settle before pods are removed.
      stabilizationWindowSeconds: 240
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 120
