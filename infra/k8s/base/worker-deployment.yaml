apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: valynt
  labels:
    app: worker
    workload: worker
    component: background-jobs
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: background-jobs
    app.kubernetes.io/part-of: valynt
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        workload: worker
        component: background-jobs
    spec:
      serviceAccountName: valynt-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: worker
          image: ghcr.io/valynt/valueos-backend:latest
          imagePullPolicy: Always
          command: ["node", "dist/workers/workerMain.js"]

          ports:
            - name: health
              containerPort: 8081
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: WORKER_HEALTH_PORT
              value: "8081"
            - name: OBSERVABILITY_DEPLOYMENT
              value: "worker"
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: supabase-service-key
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: redis-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: otel-exporter-otlp-endpoint
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: valynt-config
                  key: otel-service-name
            - name: TOGETHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: together-api-key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: valynt-secrets
                  key: openai-api-key
                  optional: true
            - name: AGENT_QUEUE_CONCURRENCY
              value: "4"
            - name: DATABASE_POOL_SIZE
              value: "4"

          resources:
            # Tuned from observed p95/p99 execution windows to reduce throttling while lowering idle waste.
            requests:
              cpu: 300m
              memory: 640Mi
            limits:
              cpu: 1200m
              memory: 1536Mi

          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: valynt
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker
