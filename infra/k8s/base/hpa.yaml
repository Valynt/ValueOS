# HPAs target the blue (active) deployments by default. During a blue-green
# switch, update scaleTargetRef.name to point to the newly active deployment
# (e.g., backend-green / frontend-green).
#
# Latency classes:
# - Interactive API routes scale on completion p95 < 200ms.
# - Orchestration / LLM routes scale on TTFB p95 < 200ms with a separate
#   completion SLO handled by streaming/async telemetry, not by the universal
#   200ms completion guardrail.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: valynt
  labels:
    app: backend
    component: api
    autoscaling.valueos.dev/profile: interactive-api
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: valynt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-blue
  minReplicas: 2
  maxReplicas: 18
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 78
    - type: External
      external:
        metric:
          name: backend_http_requests_per_second
          selector:
            matchLabels:
              app: backend
              namespace: valynt
        target:
          type: AverageValue
          averageValue: "8"
    - type: External
      external:
        metric:
          name: backend_interactive_http_p95_latency_ms
          selector:
            matchLabels:
              app: backend
              namespace: valynt
              latency_class: interactive
        target:
          type: Value
          value: "200"
    - type: External
      external:
        metric:
          name: backend_orchestration_ttfb_p95_latency_ms
          selector:
            matchLabels:
              app: backend
              namespace: valynt
              latency_class: orchestration
        target:
          type: Value
          value: "200"
  behavior:
    scaleDown:
      # Interactive request/response traffic was validated for no request thrash,
      # so scale-in can happen faster than async workers.
      stabilizationWindowSeconds: 120
      selectPolicy: Min
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 90
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: valynt
  labels:
    app: frontend
    component: web
    autoscaling.valueos.dev/profile: interactive-api
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: valynt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-blue
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Frontend pods are stateless interactive capacity, so use the shortest
      # validated scale-in window once request-thrash checks stay clean.
      stabilizationWindowSeconds: 90
      selectPolicy: Min
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 90
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
