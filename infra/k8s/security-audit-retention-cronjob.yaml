apiVersion: batch/v1
kind: CronJob
metadata:
  name: security-audit-retention
  namespace: valynt
spec:
  schedule: "30 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: audit-retention
              image: postgres@sha256:cedbd4a3809524b5d1c29fb855a695d9c688f1916ee29c07620ef35efe1d9732
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: valynt-database
                      key: url
              command: ["/bin/sh", "-c"]
              args:
                - |
                  psql "$DATABASE_URL" -c "SELECT public.rotate_security_audit_logs(180);"
          serviceAccountName: audit-ops
