version: "3.9"

x-valueos-build: &valueos-build
  context: ../..
  dockerfile: Dockerfile.dev

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "8443:443"
      - "127.0.0.1:2019:2019"
    environment:
      API_UPSTREAM: http://backend:8000
      FRONTEND_UPSTREAM: http://frontend:5173
    volumes:
      - ../caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - valueos
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: valueos-dev
    build: *valueos-build
    command:
      [
        "npm",
        "run",
        "dev",
        "--",
        "--host",
        "0.0.0.0",
        "--port",
        "5173",
        "--strictPort",
        "--hmr-port",
        "24678",
      ]
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: /api
      VITE_APP_URL: http://localhost:8080
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 24678
    volumes:
      - ../../src:/app/src:cached
      - ../../public:/app/public:cached
      - ../../public/public/index.html:/app/public/public/index.html:cached
      - ../../vite.config.ts:/app/vite.config.ts:cached
      - ../../tsconfig.json:/app/tsconfig.json:cached
      - ../../tsconfig.app.json:/app/tsconfig.app.json:cached
      - ../../tsconfig.node.json:/app/tsconfig.node.json:cached
      - /app/node_modules
    ports:
      - "5173:5173"
      - "24678:24678"
    networks:
      - valueos
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5173",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    image: valueos-dev
    build: *valueos-build
    command: ["npm", "run", "backend:dev"]
    environment:
      NODE_ENV: development
      API_PORT: 8000
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://localhost:5173
    volumes:
      - ../../src:/app/src:cached
      - ../../package.json:/app/package.json:cached
      - ../../package-lock.json:/app/package-lock.json:cached
      - /app/node_modules
    expose:
      - "8000"
    networks:
      - valueos

networks:
  valueos:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
