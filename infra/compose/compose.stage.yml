version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-staging.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-staging@example.com}
      ACME_CA: ${ACME_CA:-https://acme-staging-v02.api.letsencrypt.org/directory}
      STATIC_ROOT: /srv/www
      API_UPSTREAM: http://backend:8000
    volumes:
      - ../caddy/Caddyfile.stage:/etc/caddy/Caddyfile:ro
      - ../../dist:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - valueos
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backend:
    image: node:20-alpine
    working_dir: /app
    command: |
      sh -c "npm ci --legacy-peer-deps && API_PORT=8000 NODE_ENV=staging CORS_ALLOWED_ORIGINS=https://${APP_DOMAIN:-staging.example.com} npm run backend:dev"
    environment:
      NODE_ENV: staging
      API_PORT: 8000
      CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN:-staging.example.com}
    volumes:
      - ../..:/app
    expose:
      - "8000"
    networks:
      - valueos

networks:
  valueos:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
