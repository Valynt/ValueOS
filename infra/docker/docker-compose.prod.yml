version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-security@example.com}
      ACME_CA: ${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
      TLS_MODE: ${TLS_MODE:-}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:8080}
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
    volumes:
      - ../infra/caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    command:
      [
        "caddy",
        "run",
        "--config",
        "/etc/caddy/Caddyfile.prod",
        "--adapter",
        "caddyfile",
      ]
    networks:
      - valueos-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NODE_VERSION: "20.19.0"
        PNPM_VERSION: "9.15.0"
        VITE_API_BASE_URL: /api
        VITE_APP_URL: https://${APP_DOMAIN:-app.example.com}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_PUBLIC_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: valueos-frontend-prod
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: /api
      VITE_APP_URL: https://${APP_DOMAIN:-app.example.com}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_PUBLIC_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    networks:
      - valueos-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: valueos-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN:-app.example.com}
      SUPABASE_SERVICE_KEY_FILE: /run/secrets/supabase_service_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      SUPABASE_URL: ${SUPABASE_URL:-${SUPABASE_INTERNAL_URL:-http://kong:8000}}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_PUBLIC_URL:-http://localhost:${SUPABASE_API_PORT:-54321}}}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      EVENT_EXECUTOR_ENABLED: ${EVENT_EXECUTOR_ENABLED:-false}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9093}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      KAFKA_SSL_ENABLED: "true"
      KAFKA_SSL_REJECT_UNAUTHORIZED: ${KAFKA_SSL_REJECT_UNAUTHORIZED:-true}
      KAFKA_SSL_CA_PATH: /etc/kafka/certs/ca.crt
      KAFKA_SSL_CERT_PATH: /etc/kafka/certs/backend.crt
      KAFKA_SSL_KEY_PATH: /etc/kafka/certs/backend.key
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-scram-sha-512}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-valueos-backend}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
    secrets:
      - supabase_service_key
      - openai_api_key
    volumes:
      - ../tls/certs:/etc/kafka/certs:ro
    expose:
      - "${API_PORT:-3001}"
    networks:
      - valueos-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${API_PORT:-3001}/health/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: valueos-redis-prod
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: valueos-zookeeper-prod
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: valueos-kafka-prod
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_SSL:SASL_SSL
      KAFKA_LISTENERS: SASL_SSL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_SSL://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_SSL
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-512
      KAFKA_SSL_CLIENT_AUTH: required
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.broker.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_sslkey_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.broker.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: kafka_truststore_creds
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ../tls/certs:/etc/kafka/secrets:ro
    networks:
      - valueos-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9093",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  valueos-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-logs:

secrets:
  supabase_service_key:
    file: ../secrets/supabase_service_key.txt
  openai_api_key:
    file: ../secrets/openai_api_key.txt
