version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-security@example.com}
      ACME_CA: ${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
      TLS_MODE: ${TLS_MODE:-}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      STATIC_ROOT: /srv/www
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
    volumes:
      - ../infra/caddy:/etc/caddy:ro
      - frontend-dist:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    command:
      [
        "caddy",
        "run",
        "--config",
        "/etc/caddy/Caddyfile.prod",
        "--adapter",
        "caddyfile",
      ]
    networks:
      - valueos-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: node:20.19.0-alpine
    container_name: valueos-frontend-prod
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "npm ci --legacy-peer-deps && npm run build && cp -r dist/. /dist && tail -f /dev/null",
      ]
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: /api
      VITE_APP_URL: https://${APP_DOMAIN:-app.example.com}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - ../:/app
      - frontend-dist:/dist
      - frontend-node-modules:/app/node_modules
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "test", "-f", "/dist/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: valueos-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN:-app.example.com}
      SUPABASE_SERVICE_KEY_FILE: /run/secrets/supabase_service_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      KAFKA_BROKERS: kafka:9092
    secrets:
      - supabase_service_key
      - openai_api_key
    expose:
      - "${API_PORT:-3001}"
    networks:
      - valueos-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${API_PORT:-3001}/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: valueos-redis-prod
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: valueos-zookeeper-prod
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - valueos-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: valueos-kafka-prod
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - valueos-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  valueos-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
  redis-data:
  frontend-dist:
  frontend-node-modules:

secrets:
  supabase_service_key:
    file: ../secrets/supabase_service_key.txt
  openai_api_key:
    file: ../secrets/openai_api_key.txt
