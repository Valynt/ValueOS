server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to all responses from this server block.
    # IMPORTANT: nginx does NOT inherit add_header directives from a parent block
    # into a location block that defines its own add_header. Any location that
    # sets its own add_header MUST also repeat these headers explicitly.
    # CSP is intentionally omitted here; the backend sets a nonce-based CSP
    # per-request via securityHeadersMiddleware. Duplicating it here would
    # conflict with the nonce injection done in the SPA fallback location.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS: 1 year, include subdomains. Only effective over HTTPS (Caddy terminates TLS).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        # Repeat security headers — this location sets Content-Type which suppresses
        # inheritance of the server-block headers above (nginx add_header inheritance rule).
        add_header Content-Type text/plain;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Static assets with caching.
    # Repeat security headers — this location sets Cache-Control which suppresses
    # inheritance of the server-block headers above (nginx add_header inheritance rule).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        # Inject CSP nonce into script tags in HTML responses so explicitly
        # allowed inline scripts can execute when nonce matches CSP header.
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '<script' '<script nonce="$request_id"';

        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
