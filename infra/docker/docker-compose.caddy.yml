# ============================================================================
# ValueCanvas Development with Caddy Reverse Proxy
# ============================================================================
# Enhanced docker-compose with Caddy for automatic HTTPS and better routing
# ============================================================================

version: "3.8"

services:
  # ============================================================================
  # Caddy Reverse Proxy
  # ============================================================================
  caddy:
    image: caddy:2-alpine
    container_name: valuecanvas-caddy
    ports:
      - "8080:80" # HTTP (mapped to host 8080 for local dev)
      - "8443:443" # HTTPS (automatic mapped to host 8443 for local TLS testing)
      - "2019:2019" # Caddy Admin API
    volumes:
      - ./infra/caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    command:
      [
        "caddy",
        "run",
        "--config",
        "/etc/caddy/Caddyfile.dev",
        "--adapter",
        "caddyfile",
      ]
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
      - FRONTEND_UPSTREAM=http://localhost:5173
    networks:
      - valuecanvas-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: valuecanvas-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env.local
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-valuecanvas}
      - POSTGRES_USER=${POSTGRES_USER:-valuecanvas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-valuecanvas_dev_password}
    # For local development, use environment variables instead of secrets
    # secrets:
    #   - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - valuecanvas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-valuecanvas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: valuecanvas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - valuecanvas-network
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev_password}
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli --no-auth-warning -a ${REDIS_PASSWORD} ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c 'redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru'
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Networks
# ============================================================================
networks:
  valuecanvas-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

# ============================================================================
# Secrets
# ============================================================================
secrets:
  db_password:
    file: /workspaces/ValueOS/secrets/dev_db_password.txt
  redis_password:
    file: /workspaces/ValueOS/secrets/dev_redis_password.txt
