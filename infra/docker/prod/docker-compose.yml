version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: infra/infra/docker/prod/Dockerfile
    container_name: prod-app
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=${PROD_REDIS_URL}
    env_file:
      - ../../.env.prod
    networks:
      - prod-network
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: prod-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - prod-redis-data:/data
    networks:
      - prod-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: prod-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - prod-network
    depends_on:
      - app
    restart: always

networks:
  prod-network:
    name: valuecanvas-network
    driver: bridge

volumes:
  prod-redis-data:
