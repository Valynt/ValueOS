version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-staging
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-staging.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-staging@example.com}
      ACME_CA: ${ACME_CA:-https://acme-staging-v02.api.letsencrypt.org/directory}
      TLS_MODE: ${TLS_MODE:-}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      STATIC_ROOT: /srv/www
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
    volumes:
      - ./infra/caddy:/etc/caddy:ro
      - frontend-dist:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    command:
      [
        "caddy",
        "run",
        "--config",
        "/etc/caddy/Caddyfile.staging",
        "--adapter",
        "caddyfile",
      ]
    networks:
      - valueos
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: valueos-frontend-staging
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "npm ci --legacy-peer-deps && npm run build && cp -r dist/. /dist && tail -f /dev/null",
      ]
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: /api
      VITE_APP_URL: https://${APP_DOMAIN:-staging.example.com}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - ./:/app
      - frontend-dist:/dist
      - frontend-node-modules:/app/node_modules
    networks:
      - valueos
    healthcheck:
      test: ["CMD", "test", "-f", "/dist/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: valueos-backend-staging
    environment:
      NODE_ENV: staging
      API_PORT: ${API_PORT:-3001}
      CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN:-staging.example.com}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    expose:
      - "${API_PORT:-3001}"
    networks:
      - valueos
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${API_PORT:-3001}/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: valueos-redis-staging
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - valueos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  valueos:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
  redis-data:
  frontend-dist:
  frontend-node-modules:
