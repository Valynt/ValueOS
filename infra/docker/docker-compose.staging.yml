version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: valueos-caddy-staging
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-staging.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-staging@example.com}
      ACME_CA: ${ACME_CA:-https://acme-staging-v02.api.letsencrypt.org/directory}
      TLS_MODE: ${TLS_MODE:-}
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:${API_PORT:-3001}}
      FRONTEND_UPSTREAM: http://frontend:8080
      CADDY_LOG_DIR: /var/log/caddy
      CADDY_STORAGE: /data
      CADDY_LOG_LEVEL: ${CADDY_LOG_LEVEL:-INFO}
    volumes:
      - ../caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile.staging", "--adapter", "caddyfile"]
    networks:
      - valueos-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NODE_VERSION: 20
        PNPM_VERSION: 9.15.4
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_API_BASE_URL: /api
        VITE_APP_URL: https://${APP_DOMAIN:-staging.example.com}
        NODE_ENV: production
    container_name: valueos-frontend-staging
    expose:
      - "8080"
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: valueos-backend-staging
    environment:
      NODE_ENV: staging
      API_PORT: ${API_PORT:-3001}
      CORS_ALLOWED_ORIGINS: https://${APP_DOMAIN:-staging.example.com}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-rediss://redis:6379}
      REDIS_TLS_REJECT_UNAUTHORIZED: ${REDIS_TLS_REJECT_UNAUTHORIZED:-true}
      REDIS_TLS_CA_CERT_PATH: ${REDIS_TLS_CA_CERT_PATH:-/run/secrets/redis-ca.crt}
      REDIS_TLS_SERVERNAME: ${REDIS_TLS_SERVERNAME:-redis}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:?SUPABASE_SERVICE_KEY is required}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    expose:
      - "${API_PORT:-3001}"
    networks:
      - valueos-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${API_PORT:-3001}/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: valueos-redis-staging
    command: >-
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      --port 0
      --tls-port 6379
      --tls-cert-file /etc/redis/tls/tls.crt
      --tls-key-file /etc/redis/tls/tls.key
      --tls-ca-cert-file /etc/redis/tls/ca.crt
      --tls-auth-clients no
    volumes:
      - redis-data:/data
      - ${REDIS_TLS_CERTS_DIR:-./certs/redis}:/etc/redis/tls:ro
    networks:
      - valueos-network
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/etc/redis/tls/ca.crt", "-h", "localhost", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  valueos-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:
  redis-data:
