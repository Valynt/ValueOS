version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prod/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
      placement:
        constraints:
          - node.role == manager

  backend:
    image: ${BACKEND_IMAGE:-valueos/backend:latest}
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - POSTGRES_SSL=true
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    secrets:
      - postgres_password
      - jwt_secret
      - api_keys
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.labels.type == app
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-valueos/frontend:latest}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.labels.type == web
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Production load balancer
  traefik:
    image: traefik:v3.0
    container_name: valueos-traefik-prod
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./prod/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./prod/ssl:/etc/traefik/ssl:ro
    networks:
      - valueos-network
      - traefik-net
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`traefik.valueos.com`)"
        - "traefik.http.routers.api.service=api@internal"
    profiles:
      - prod-lb

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: valueos-prometheus-prod
    volumes:
      - ./prod/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    networks:
      - valueos-network
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: valueos-grafana-prod
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./prod/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - valueos-network
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    profiles:
      - monitoring

secrets:
  postgres_password:
    external: true
  jwt_secret:
    external: true
  api_keys:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  valueos-network:
    driver: overlay
  traefik-net:
    driver: overlay
  monitoring:
    driver: overlay
