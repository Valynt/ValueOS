<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Cloud | Strategic Value Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- Sidebar: Executive Snapshot -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col z-20 shadow-xl overflow-y-auto">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="cloud" class="text-white w-5 h-5"></i>
                    </div>
                    <h1 class="font-bold text-lg tracking-tight">Sales Cloud</h1>
                </div>
                <button id="themeToggle" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="moon" class="w-4 h-4 text-slate-500"></i>
                </button>
            </div>

            <div class="p-6 space-y-8">
                <div>
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Impact Snapshot</h2>
                    <div class="space-y-4">
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <p class="text-sm text-blue-600 font-medium">Logos & Seats</p>
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-bold text-blue-900">80</span>
                                <span class="text-xs text-blue-500">Rel. Impact</span>
                            </div>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                            <p class="text-sm text-emerald-600 font-medium">ARPU SKU Mix</p>
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-bold text-emerald-900">65</span>
                                <span class="text-xs text-emerald-500">Rel. Impact</span>
                            </div>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                            <p class="text-sm text-indigo-600 font-medium">Retention (NRR)</p>
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-bold text-indigo-900">70</span>
                                <span class="text-xs text-indigo-500">Rel. Impact</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="relative">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Core Metrics</h2>
                    <canvas id="impactChart" height="200"></canvas>
                </div>

                <div>
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Near-Term Recommendations</h2>
                    <ul class="space-y-3 text-sm text-slate-600" id="recommendationsList">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 flex flex-col relative overflow-hidden">
            <!-- Header -->
            <header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 z-10">
                <div class="flex items-center gap-6">
                    <nav class="flex items-center gap-1 text-sm font-medium">
                        <span class="text-slate-400">Strategist Workspace</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                        <span class="text-slate-900">Value Tree Visualization</span>
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button class="px-3 py-1 text-xs font-medium bg-white shadow-sm rounded-md transition-all">Horizontal</button>
                        <button class="px-3 py-1 text-xs font-medium text-slate-500 hover:text-slate-700 transition-all">Vertical</button>
                    </div>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-lg shadow-blue-500/20 transition-all">
                        <i data-lucide="share-2" class="w-4 h-4"></i> Export Analysis
                    </button>
                </div>
            </header>

            <!-- Tree Canvas -->
            <div id="treeCanvas" class="flex-1 overflow-auto p-12 bg-pattern cursor-grab active:cursor-grabbing">
                <div id="treeContainer" class="min-w-max min-h-full flex items-center justify-center relative">
                    <!-- Tree rendered here -->
                </div>
            </div>

            <!-- Detail Panel (Overlay/Slide-up) -->
            <div id="detailPanel" class="absolute bottom-0 inset-x-0 h-1/3 bg-white border-t border-slate-200 shadow-2xl z-20 translate-y-full transition-transform duration-500 ease-out p-8">
                <div class="max-w-6xl mx-auto grid grid-cols-3 gap-8">
                    <div id="detailHeader">
                        <div class="flex items-center gap-3 mb-2">
                            <span id="detailIcon" class="p-2 rounded-lg bg-blue-100 text-blue-600"></span>
                            <h3 id="detailTitle" class="text-2xl font-bold text-slate-900"></h3>
                        </div>
                        <p id="detailDescription" class="text-slate-500 leading-relaxed"></p>
                    </div>
                    <div id="enablersSection">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Strategic Enablers</h4>
                        <div id="enablersList" class="space-y-2"></div>
                    </div>
                    <div id="efficiencySection">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Efficiency Levers</h4>
                        <div id="efficiencyList" class="space-y-2"></div>
                    </div>
                </div>
                <button id="closeDetail" class="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                </button>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
