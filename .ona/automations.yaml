services:
  postgres:
    name: PostgreSQL
    description: Postgres 15 database for local development.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        docker run --rm --name valueos-postgres \
          -e POSTGRES_DB=valueos \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          -p 5432:5432 \
          postgres:15-alpine
      ready: |
        docker exec valueos-postgres pg_isready -U postgres
      stop: |
        docker stop valueos-postgres 2>/dev/null || true

  redis:
    name: Redis
    description: Redis 7 cache and BullMQ queue broker.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        docker run --rm --name valueos-redis \
          -p 6379:6379 \
          redis:7-alpine \
          redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
      ready: |
        docker exec valueos-redis redis-cli ping | grep -q PONG
      stop: |
        docker stop valueos-redis 2>/dev/null || true

  nats:
    name: NATS
    description: NATS message broker for inter-agent CloudEvents messaging.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        docker run --rm --name valueos-nats \
          -p 4222:4222 \
          -p 8222:8222 \
          nats:2-alpine \
          -m 8222
      ready: |
        curl -sf http://localhost:8222/healthz
      stop: |
        docker stop valueos-nats 2>/dev/null || true

  backend:
    name: Backend API
    description: Express API server on port 8000.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        ona env port open 8000 --protocol https 2>/dev/null || true
        pnpm run dev:backend
      ready: |
        curl -sf http://localhost:8000/health

  frontend:
    name: ValyntApp (Vite)
    description: Vite dev server for ValyntApp on port 5173.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        ona env port open 5173 --protocol https 2>/dev/null || true
        pnpm run dev:frontend
      ready: |
        curl -sf http://localhost:5173

tasks:
  installDeps:
    name: Install dependencies
    description: Enable corepack, activate pnpm, and install workspace dependencies.
    command: |
      sudo corepack enable --install-directory /usr/local/bin 2>/dev/null || true
      corepack prepare pnpm@9.15.0 --activate 2>/dev/null || true
      # Clean incomplete node_modules from a previous failed run before installing.
      # ENOTEMPTY errors occur when multiple pnpm processes race on first boot.
      if [ -d node_modules/.pnpm ] && [ ! -f node_modules/.modules.yaml ]; then
        echo "Detected incomplete node_modules — cleaning before install."
        rm -rf node_modules
      fi
      CI=true pnpm install --no-frozen-lockfile
    triggeredBy:
      - postDevcontainerStart

  setupTools:
    name: Setup dev tools
    description: Install tsx and other global CLI tools required by backend scripts.
    command: |
      export PNPM_HOME="${PNPM_HOME:-/home/vscode/.local/share/pnpm}"
      mkdir -p "$PNPM_HOME"
      export PATH="$PNPM_HOME:$PATH"
      if ! command -v tsx &>/dev/null; then
        pnpm add -g tsx
      fi
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - installDeps

  applyMigrations:
    name: Apply database migrations
    description: Apply pending SQL migrations to the local Postgres instance.
    command: |
      MIGRATIONS_DIR="${MIGRATIONS_DIR:-infra/supabase/supabase/migrations}"
      if [ ! -d "$MIGRATIONS_DIR" ]; then
        echo "WARNING: migrations directory not found at $MIGRATIONS_DIR — skipping."
        exit 0
      fi

      # Resolve DATABASE_URL: env var -> ops/env/.env.local -> default local credentials.
      if [ -z "${DATABASE_URL:-}" ] && [ -f ops/env/.env.local ]; then
        set -a; . ops/env/.env.local; set +a
      fi
      export DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/valueos}"

      # Wait for Postgres to be reachable before attempting migrations.
      _retries=0
      until pg_isready -d "$DATABASE_URL" -q 2>/dev/null || [ "$_retries" -ge 30 ]; do
        echo "Waiting for Postgres..."
        sleep 2
        _retries=$((_retries + 1))
      done
      if ! pg_isready -d "$DATABASE_URL" -q 2>/dev/null; then
        echo "Postgres not reachable after 60s — skipping migrations."
        exit 0
      fi

      # Ensure migration tracking table exists.
      psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -X -q -c "
        CREATE TABLE IF NOT EXISTS public.schema_migrations (
          name        TEXT PRIMARY KEY,
          applied_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
          checksum    TEXT
        );
        ALTER TABLE public.schema_migrations ENABLE ROW LEVEL SECURITY;
        GRANT SELECT ON public.schema_migrations TO anon, authenticated;
        GRANT ALL   ON public.schema_migrations TO service_role, supabase_admin;
      " || { echo "FAIL: could not create schema_migrations table"; exit 1; }

      _applied=0
      _skipped=0
      for _file in $(find "$MIGRATIONS_DIR" -maxdepth 1 -type f -name "*.sql" | sort); do
        _name="$(basename "$_file")"
        _already="$(psql "$DATABASE_URL" -tAX -c "SELECT 1 FROM public.schema_migrations WHERE name = '$_name' LIMIT 1;" 2>/dev/null || true)"
        if [ "$_already" = "1" ]; then
          _skipped=$((_skipped + 1))
          continue
        fi
        echo "  -> $_name"
        if psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -X -f "$_file"; then
          psql "$DATABASE_URL" -X -q -c "INSERT INTO public.schema_migrations (name) VALUES ('$_name') ON CONFLICT (name) DO NOTHING;" || true
          _applied=$((_applied + 1))
        else
          echo "FAIL: $_name"; exit 1
        fi
      done

      echo "Migrations: $_applied applied, $_skipped already up-to-date."
    triggeredBy:
      - postEnvironmentStart
    dependsOn:
      - setupTools

  lint:
    name: Lint
    description: Run ESLint across the workspace.
    command: |
      pnpm run lint
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  typecheck:
    name: Typecheck
    description: Run tsc --noEmit across all packages via Turbo.
    command: |
      pnpm run check
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  test:
    name: Run tests
    description: Execute the full Vitest suite (unit + backend).
    command: |
      pnpm test
      pnpm --filter @valueos/backend test
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  testRls:
    name: RLS policy tests
    description: Validate row-level security tenant isolation policies.
    command: |
      pnpm run test:rls
    triggeredBy:
      - manual
    dependsOn:
      - applyMigrations

  build:
    name: Build
    description: Build ValyntApp and backend for production.
    command: |
      pnpm run build
    triggeredBy:
      - manual
    dependsOn:
      - installDeps
