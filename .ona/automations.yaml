tasks:
  installDeps:
    name: Install dependencies
    description: Validate toolchain, ensure .env, and install workspace dependencies from the lockfile.
    command: bash .devcontainer/scripts/bootstrap.sh
    triggeredBy:
      - postDevcontainerStart
      - prebuild

  lint:
    name: Lint
    description: Run ESLint across the workspace via Turbo.
    command: pnpm run lint
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  typecheck:
    name: Typecheck
    description: Run tsc --noEmit across all packages via Turbo.
    command: pnpm run check
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  test:
    name: Run tests
    description: Execute the full Vitest suite (unit + backend).
    command: pnpm test
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  testRls:
    name: RLS policy tests
    description: Validate row-level security tenant isolation policies.
    command: pnpm run test:rls
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  build:
    name: Build
    description: Build ValyntApp and backend for production.
    command: pnpm run build
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

services:
  backend:
    name: Backend API
    description: Express API server on port 3001.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        # Wait for installDeps to write the sentinel before starting.
        wait_count=0
        until [ -f node_modules/.modules.yaml ]; do
          wait_count=$((wait_count + 1))
          if [ $wait_count -ge 150 ]; then
            echo "[backend] Timed out waiting for node_modules — did installDeps fail?"
            exit 1
          fi
          echo "[backend] Waiting for node_modules... (${wait_count}/150)"
          sleep 2
        done
        ona environment port open 3001 --name "Backend API" 2>/dev/null || true
        pnpm run dev:backend
      ready: curl -sf http://localhost:3001/health

  frontend:
    name: ValyntApp (Vite)
    description: Vite dev server for ValyntApp on port 5173.
    triggeredBy:
      - postEnvironmentStart
    commands:
      start: |
        wait_count=0
        until [ -f node_modules/.modules.yaml ]; do
          wait_count=$((wait_count + 1))
          if [ $wait_count -ge 150 ]; then
            echo "[frontend] Timed out waiting for node_modules — did installDeps fail?"
            exit 1
          fi
          echo "[frontend] Waiting for node_modules... (${wait_count}/150)"
          sleep 2
        done
        ona environment port open 5173 --name "ValyntApp" 2>/dev/null || true
        pnpm run dev:frontend
      ready: curl -sf http://localhost:5173


