tasks:
  installDeps:
    name: Install dependencies
    description: Enable corepack and install pnpm workspace dependencies.
    command: |
      sudo corepack enable --install-directory /usr/local/bin 2>/dev/null || true
      corepack prepare pnpm@9.15.0 --activate
      if [ -f pnpm-lock.yaml ]; then
        pnpm install --frozen-lockfile || pnpm install
      else
        pnpm install
      fi
    triggeredBy:
      - postDevcontainerStart

  applyMigrations:
    name: Apply database migrations
    description: Run database migrations if a local Supabase instance is available.
    command: |
      if command -v supabase &> /dev/null && supabase status &> /dev/null; then
        pnpm run db:apply-migrations || echo "WARNING: database migrations failed" >&2
      else
        echo "Supabase not running, skipping migrations"
      fi
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - installDeps

  setupTools:
    name: Setup dev tools
    description: Install tsx and other global dev tools.
    command: |
      if [ -z "$PNPM_HOME" ]; then
        echo "WARNING: PNPM_HOME not set by container env, defaulting to /home/vscode/.local/share/pnpm" >&2
        export PNPM_HOME="/home/vscode/.local/share/pnpm"
      fi
      mkdir -p "$PNPM_HOME"
      export PATH="$PNPM_HOME:$PATH"
      if ! command -v tsx &> /dev/null; then
        pnpm add -g tsx
      fi
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - installDeps
